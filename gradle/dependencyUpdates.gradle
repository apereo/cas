import org.apereo.cas.gradle.CasDependencyUpdatesTask
import org.gradle.api.artifacts.repositories.MavenArtifactRepository
import org.gradle.api.artifacts.result.ResolvedDependencyResult

def dependencyUpdatesRequested = gradle.startParameter.taskNames.any {
    it == 'dependencyUpdates' || it.endsWith(':dependencyUpdates')
}

def resolvedCoordinates = { configuration ->
    try {
        configuration.incoming.resolutionResult.root.dependencies
            .findAll { it instanceof ResolvedDependencyResult && it.selected.moduleVersion }
            .collect { "${it.selected.moduleVersion.group}:${it.selected.moduleVersion.name}:${it.selected.moduleVersion.version}" }
    } catch (final Exception ignored) {
        []
    }
}

def buildscriptDependencies = dependencyUpdatesRequested
    ? resolvedCoordinates(project.buildscript.configurations.classpath)
    : []

def projectDependencies = dependencyUpdatesRequested
    ? project.configurations
        .matching { it.canBeResolved }
        .collectMany { resolvedCoordinates(it) }
    : []

def dependencyUpdateCoordinates = (buildscriptDependencies + projectDependencies).unique()

def buildscriptRepositories = project.buildscript.repositories
    .withType(MavenArtifactRepository)
    .collect { it.url.toString() }

def reportOutputDir = providers.systemProperty('outputDir')
    .map { file(it) }
    .getOrElse(layout.buildDirectory.dir('dependencyUpdates').get().asFile)

tasks.register('dependencyUpdates', CasDependencyUpdatesTask) {
    dependencyCoordinates.set(dependencyUpdateCoordinates)
    repositoryUrls.set(buildscriptRepositories)
    revision.set(providers.systemProperty('revision').orElse('milestone'))
    gradleReleaseChannel.set(providers.systemProperty('gradleReleaseChannel').orElse('release-candidate'))
    reportfileName.set(providers.systemProperty('reportfileName').orElse('report'))
    outputFormatter.set(providers.systemProperty('outputFormatter').orElse('plain'))
    reportOutputDirectory.set(reportOutputDir)
}
