apply plugin: "org.apereo.cas.project-conventions"

import org.apereo.cas.gradle.CasBuildSettings
import org.apereo.cas.gradle.CasProjectConventions

description = "Apereo CAS Documentation Generator"

ext {
    mainClassName = "org.apereo.cas.documentation.CasDocumentationApplication"
    forceBootifulArtifact = !CasBuildSettings.isSkipBootifulArtifact(project)
    archiveFileName = "casdocsgen.jar"
}

apply plugin: "org.apereo.cas.spring-boot-conventions"

javadoc {
    enabled = false
}

test {
    enabled = false
}

plugins.withId("org.springframework.boot") {
    tasks.named("bootJar") {
        enabled = !skipBootifulArtifact
    }
}

if (tasks.findByName("install") != null) {
    tasks.getByName("install").enabled(false)
}

dependencies {
    libraries.each {
        implementation it.value
    }

    CasBuildSettings.includedProjectPaths(project).each { includedProjectPath ->
        if (includedProjectPath != project.path) {
            def includedProjectName = CasBuildSettings.projectNameFromPath(includedProjectPath)
            if (CasProjectConventions.shouldBePublished(includedProjectName)) {
                implementation(project(path: includedProjectPath))
            } else {
                logger.debug("Skipping project for documentation processing: ${includedProjectName}")
                compileOnly(project(path: includedProjectPath))
            }
        }
    }
}

tasks.register('jsonDependencies') {
    mustRunAfter(build)
    it.notCompatibleWithConfigurationCache("Task is not compatible with configuration cache")
    doLast {
        def rcp = configurations.runtimeClasspath.resolvedConfiguration
        def results = rcp.firstLevelModuleDependencies
            .findAll { dependency ->
                {
                    !dependency.module.id.group.startsWith("org.apereo.cas")
                }
            }
            .sort(dependency -> dependency.module.id.group + "/" + dependency.module.id.name)
            .stream()
            .map(dependency -> [group: dependency.module.id.group, name: dependency.module.id.name, version: dependency.module.id.version])
            .toList()
        def jsonFile = new File(project.layout.buildDirectory.getAsFile().get(), "dependencies.json")
        def output = new groovy.json.JsonBuilder(results).toPrettyString();
        jsonFile.delete()
        jsonFile << output
    }
}
