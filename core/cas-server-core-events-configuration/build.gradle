apply plugin: "org.apereo.cas.project-conventions"

description = "Publishes events when CAS configuration changes or refreshes."
ext {
    publishMetadata = true
    projectMetadata = [
            category: "Configuration Management",
            title: "Configuration Events"
    ]
}
dependencies {
    api project(":api:cas-server-core-api-configuration-model")

    implementation project(":core:cas-server-core-configuration-api")
    implementation project(":core:cas-server-core-util-api")
    implementation project(":core:cas-server-core-configuration")
    implementation project(":core:cas-server-core-events")
    
    testImplementation project(path: ":core:cas-server-core-util-api", configuration: "tests")
}
