import org.apache.tools.ant.taskdefs.condition.Os
import org.apereo.cas.gradle.CasBuildSettings
import org.gradle.api.file.DuplicatesStrategy

import java.net.ServerSocket

if (project.ext.forceBootifulArtifact || (!publishFlag && !skipBootifulArtifact)) {
    def projectGroup = CasBuildSettings.projectGroup(project)
    def projectVersion = CasBuildSettings.projectVersion(project)

    project.pluginManager.apply('org.springframework.boot')
    def bootJarTask = tasks.named('bootJar')

    sourceSets {
        bootRun {
            if (project.hasProperty('casWebApplication') && project.ext.casWebApplication) {
                resources {
                    srcDirs new File('/etc/cas/templates/'),
                        new File(project.rootDir, 'webapp/cas-server-webapp-resources/src/main/resources/'),
                        new File(project.rootDir, 'support/cas-server-support-thymeleaf/src/main/resources/'),
                        new File(project.rootDir, 'support/cas-server-support-themes-collection/src/main/resources/')
                }
            }
        }
    }

    springBoot {
        mainClassName = project.ext.mainClassName
        buildInfo {
            properties {
                artifact = project.name
                group = projectGroup
                name = project.name
                version = projectVersion
                if (!generateTimestamps) {
                    excludes = ['time']
                }
            }
        }
    }

    if (plugins.hasPlugin('war')) {
        tasks.named('javadoc') {
            enabled = false
        }

        tasks.named('bootWar') {
            def propertiesFile = project.layout.buildDirectory.file('resources/main/git.properties').get().asFile
            def properties = new Properties()
            def projectName = project.name
            if (propertiesFile.exists()) {
                propertiesFile.withInputStream { stream ->
                    properties.load(stream)
                }
            }
            def projectSpecVersion = properties.getProperty('git.commit.id', 'N/A')

            mainClass.set(project.ext.mainClassName)
            manifest {
                attributes(
                    'Automatic-Module-Name': projectName.replace('-', '.'),
                    'Implementation-Title': projectName,
                    'Implementation-Vendor': projectGroup,
                    'Created-By': projectGroup
                )
                if (generateTimestamps) {
                    attributes('Implementation-Date': java.time.ZonedDateTime.now())
                }

                attributes(
                    'Specification-Version': "${-> projectSpecVersion}",
                    'Implementation-Version': projectVersion
                )
            }
            from "${project.layout.buildDirectory.getAsFile().get().path}/resources/main", { into 'WEB-INF/classes' }
            duplicatesStrategy = DuplicatesStrategy.EXCLUDE
        }
    } else {
        bootJarTask.configure {
            mainClass.set(project.ext.mainClassName)
            if (project.ext.has('archiveFileName')) {
                archiveFileName = project.ext.archiveFileName
            }
            from "${project.layout.buildDirectory.getAsFile().get().path}/resources/main", { into 'WEB-INF/classes' }
            duplicatesStrategy = DuplicatesStrategy.EXCLUDE
        }

        if (CasBuildSettings.isTaskRequested(project, 'bootJar')
            || CasBuildSettings.isTaskRequested(project, 'assemble')
            || CasBuildSettings.isTaskRequested(project, 'build')
            || CasBuildSettings.isTaskRequested(project, 'publish')) {
            configurations {
                [apiElements, runtimeElements].each {
                    it.outgoing.artifacts.removeIf { artifact -> artifact.extension == 'jar' && !artifact.classifier }
                    it.outgoing.artifact(bootJarTask)
                }
            }
        }
    }

    tasks.named('processBootRunResources') {
        duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    }

    tasks.named('bootRun') {
        mainClass.set(project.ext.mainClassName)

        if (Os.isFamily(Os.FAMILY_WINDOWS)) {
            dependsOn pathingJar
            doFirst {
                classpath = files(
                    "$project.layout.buildDirectory.getAsFile().get().path/classes/main",
                    "$project.layout.buildDirectory.getAsFile().get().path/resources/main",
                    "${new File(project.rootDir, 'webapp/cas-server-webapp-resources/src/main/resources').path}/",
                    pathingJar.archivePath
                )
            }
        }

        sourceResources sourceSets.bootRun
        systemProperties = System.properties

        def list = []
        list.add('-Djava.net.preferIPv4Stack=true ')
        list.add('-Djava.net.preferIPv4Addresses=true')
        list.add('-XX:TieredStopAtLevel=1')
        list.add('--add-modules')
        list.add('java.se')
        list.add('--add-exports')
        list.add('java.base/jdk.internal.ref=ALL-UNNAMED')
        list.add('--add-opens')
        list.add('java.base/java.lang=ALL-UNNAMED')
        list.add('--add-opens')
        list.add('java.base/java.util.concurrent=ALL-UNNAMED')
        list.add('--add-opens')
        list.add('java.base/java.util.regex=ALL-UNNAMED')
        list.add('--add-opens')
        list.add('java.base/java.util.concurrent.locks=ALL-UNNAMED')
        list.add('--add-opens')
        list.add('java.base/java.util=ALL-UNNAMED')
        list.add('--add-opens')
        list.add('java.base/java.time=ALL-UNNAMED')
        list.add('--add-opens')
        list.add('java.base/java.net=ALL-UNNAMED')
        list.add('--add-opens')
        list.add('java.base/java.nio=ALL-UNNAMED')
        list.add('--add-opens')
        list.add('java.base/sun.nio.ch=ALL-UNNAMED')
        list.add('--add-opens')
        list.add('java.management/sun.management=ALL-UNNAMED')
        list.add('--add-opens')
        list.add('jdk.management/com.sun.management.internal=ALL-UNNAMED')

        list.add('-XX:+AllowEnhancedClassRedefinition')

        if (skipHotSwapAgent) {
            ansi.yellow 'HotSwap Agent will be disabled for this run.'
        } else {
            def agentPath = new File(project.rootDir, 'etc').absolutePath
            list.add("-javaagent:${agentPath}/hotswap-agent.jar=autoHotswap=true")
        }

        if (enableRemoteDebugging) {
            def port = findAvailableTcpPort(5000..5010)
            if (port > 0) {
                ansi.green "Port ${port} will be available for remote debugging requests with suspend=${remoteDebuggingSuspend}"
                list.add("-Xrunjdwp:transport=dt_socket,address=${port},server=y,suspend=${remoteDebuggingSuspend}")
            }
        }

        jvmArgs = list

        def appArgList = []
        appArgList.add('--spring.thymeleaf.cache=false')
        args = appArgList
    }
} else {
    logger.info '''
Ignoring application of Spring Boot plugin, since the build is preparing to publish SNAPSHOTs or releases,
or the build is signaled to skip the plugin explicitly.
    '''
}

int findAvailableTcpPort(final List<Integer> portRange) {
    for (int port : portRange) {
        try {
            logger.debug "Checking port ${port}"
            def serverSocket = new ServerSocket(port)
            serverSocket.close()
            return port
        } catch (Exception e) {
            logger.debug "Port ${port} is not available: ${e.message}"
        }
    }
    -1
}
