configurations.configureEach {
    resolutionStrategy {
        dependencySubstitution {
            substitute module('org.lz4:lz4-java') using module("at.yawk.lz4:lz4-java:${rootProject.libs.lz4.get().version}")
        }

        capabilitiesResolution {
            withCapability('com.google.collections:google-collections') {
                selectHighestVersion()
            }
            withCapability('org.lz4:lz4-java') { details ->
                def preferred = details.candidates.find { it.id.group == 'at.yawk.lz4' }
                if (preferred != null) {
                    details.select(preferred)
                }
            }
        }

        if (!providers.systemProperty('skipVersionConflict').present) {
            failOnVersionConflict()
        }
        preferProjectModules()

        def dependencyCacheDays = Integer.valueOf(providers.systemProperty('dependencyCacheDays').getOrElse('1'))
        cacheDynamicVersionsFor dependencyCacheDays, 'days'
        cacheChangingModulesFor dependencyCacheDays, 'days'

        def dependencyUpdates = gradle.startParameter.taskNames.any { task -> task.equalsIgnoreCase('dependencyUpdates') }
        if (!dependencyUpdates) {
            eachDependency { DependencyResolveDetails details ->
                def requested = details.requested
                if (requested.group == 'org.bouncycastle') {
                    if (requested.name != 'bcprov-ext-jdk18on') {
                        details.useVersion(rootProject.libs.bcprov.jdk18on.get().version)
                    }
                }
                if (requested.group == 'gnu-getopt') {
                    details.useTarget group: 'gnu.getopt', name: 'java-getopt', version: requested.version
                }
                if (requested.group == 'com.google.guava' && requested.name == 'guava') {
                    details.useVersion(rootProject.libs.guava.get().version)
                }
                if (requested.group == 'org.opensaml') {
                    details.useVersion(rootProject.libs.opensaml.core.api.get().version)
                }
                if (requested.group == 'org.springframework.amqp') {
                    details.useVersion(rootProject.libs.spring.rabbit.get().version)
                }
                if (requested.group == 'jakarta.activation') {
                    details.useVersion(rootProject.libs.jakarta.activation.api.get().version)
                }
                if (requested.group == 'com.h2database') {
                    details.useVersion(rootProject.libs.h2.get().version)
                }
                if (requested.group == 'io.prometheus' && requested.name.startsWith('prometheus-')) {
                    details.useVersion(rootProject.libs.prometheus.get().version)
                }
                if (requested.group == 'com.google.code.gson') {
                    details.useVersion(rootProject.libs.gson.get().version)
                }
                if (requested.group == 'org.apache.pulsar') {
                    details.useVersion(rootProject.libs.pulsar.client.api.get().version)
                }
                if (requested.name == 'hibernate-validator') {
                    details.useVersion(rootProject.libs.hibernate.validator.get().version)
                }
                if (requested.name == 'commons-lang3') {
                    details.useVersion(rootProject.libs.commons.lang3.get().version)
                }
                if (requested.group == 'org.hibernate.orm') {
                    details.useVersion(rootProject.libs.hibernate.core.get().version)
                }
                if (requested.group == 'com.squareup.okhttp3') {
                    details.useVersion(rootProject.libs.okhttp3.get().version)
                }
                if (requested.group == 'org.postgresql') {
                    details.useVersion(rootProject.libs.postgresql.get().version)
                }
                if (requested.group == 'com.hazelcast' && requested.name == 'hazelcast') {
                    details.useVersion(rootProject.libs.hazelcast.sdk.get().version)
                }
                if (requested.group == 'org.pac4j' && requested.name.startsWith('pac4j-')) {
                    details.useVersion(rootProject.libs.pac4j.core.get().version)
                }
                if (requested.group == 'org.springframework') {
                    details.useVersion(rootProject.libs.spring.core.get().version)
                }
                if (requested.group == 'io.github.classgraph') {
                    details.useVersion(rootProject.libs.classgraph.get().version)
                }
                if (requested.group == 'org.eclipse.angus' && requested.name.contains('mail')) {
                    details.useVersion(rootProject.libs.jakarta.mail.get().version)
                }
                if (requested.group == 'org.springframework.session') {
                    details.useVersion(rootProject.libs.spring.session.core.get().version)
                }
                if (requested.group.startsWith('org.eclipse.jetty')) {
                    details.useVersion(rootProject.libs.versions.jetty.get())
                }
                if (requested.group.startsWith('org.apache.tomcat')) {
                    details.useVersion(rootProject.libs.versions.tomcat.get())
                }
                if (requested.group == 'org.hsqldb') {
                    details.useVersion(rootProject.libs.hsqldb.get().version)
                }
                if (requested.group == 'org.mariadb.jdbc') {
                    details.useVersion(rootProject.libs.mariadb.java.client.get().version)
                }
                if (requested.group == 'com.microsoft.sqlserver') {
                    details.useVersion(rootProject.libs.mssql.jdbc.get().version)
                }
                if (requested.group == 'com.oracle.database.jdbc') {
                    details.useVersion(rootProject.libs.ojdbc11.get().version)
                }
                if (requested.group == 'io.netty') {
                    if (!requested.name.startsWith('netty-tcnative')) {
                        details.useVersion(rootProject.libs.netty.common.get().version)
                    }
                }
                if (requested.group == 'org.apache.kafka') {
                    details.useVersion(rootProject.libs.kafka.clients.get().version)
                }
                if (requested.group == 'org.mongodb') {
                    if (requested.name == 'mongodb-spring-session') {
                        details.useVersion(rootProject.libs.mongodb.spring.session.get().version)
                    } else {
                        details.useVersion(rootProject.libs.mongodb.driver.core.get().version)
                    }
                }
                if (requested.group == 'mysql') {
                    details.useVersion(rootProject.libs.mysql.connectorj.get().version)
                }
                if (requested.group == 'net.sourceforge.jtds') {
                    details.useVersion(rootProject.libs.jtds.get().version)
                }
                if (requested.group == 'com.github.ben-manes.caffeine') {
                    details.useVersion(rootProject.libs.caffeine.get().version)
                }
                if (requested.group == 'org.apache.groovy') {
                    details.useVersion(rootProject.libs.apachegroovy.core.get().version)
                }
                if (requested.group == 'org.apache.cxf') {
                    details.useVersion(rootProject.libs.cxf.rt.transports.http.get().version)
                }
                if (requested.group == 'com.zaxxer') {
                    details.useVersion(rootProject.libs.hikaricp.get().version)
                }
                if (requested.group == 'org.thymeleaf') {
                    details.useVersion(rootProject.libs.thymeleafsdk.get().version)
                }
                if (requested.group == 'com.github.zhanhb' && requested.name == 'thymeleaf-layout-dialect') {
                    details.useVersion(rootProject.libs.thymeleaf.layout.dialect.get().version)
                }
                if (requested.group == 'commons-beanutils' && requested.name == 'commons-beanutils') {
                    details.useVersion(rootProject.libs.commons.beanutils.get().version)
                }
                if (requested.group == 'ch.qos.logback') {
                    if (requested.name == 'logback-access') {
                        details.useVersion(rootProject.libs.logback.access.get().version)
                    } else {
                        details.useVersion(rootProject.libs.logback.core.get().version)
                    }
                }
                if (requested.group.startsWith('jakarta.xml.bind')) {
                    details.useVersion(rootProject.libs.jakarta.xml.bind.api.get().version)
                }
                if (requested.name == 'jakarta.servlet.jsp.jstl-api') {
                    details.useVersion(rootProject.libs.jakarta.servlet.jsp.jstl.api.get().version)
                } else if (requested.group.startsWith('jakarta.servlet')) {
                    details.useVersion(rootProject.libs.jakarta.servlet.api.get().version)
                }
                if (requested.group == 'org.apache.httpcomponents.client5') {
                    details.useVersion(rootProject.libs.httpclient5.get().version)
                }
                if (requested.group == 'org.apache.httpcomponents.core5') {
                    details.useVersion(rootProject.libs.httpcore5.get().version)
                }
                if (requested.group.startsWith('com.fasterxml.jackson')) {
                    if (requested.name.equals('jackson-annotations')) {
                        details.useVersion(rootProject.libs.jackson.annotations.get().version)
                    } else {
                        details.useVersion(rootProject.libs.versions.jackson2.get())
                    }
                }
                if (requested.group.startsWith('tools.jackson.core')) {
                    details.useVersion(rootProject.libs.jackson.core.lib.get().version)
                }

                if (requested.group == 'io.micrometer' && requested.name.startsWith('micrometer-')) {
                    if (requested.name.contains('tracing')) {
                        details.useVersion(rootProject.libs.micrometer.tracing.bridge.otel.get().version)
                    } else {
                        details.useVersion(rootProject.libs.micrometer.core.get().version)
                    }
                }
                if (requested.group == 'org.apache.wss4j') {
                    details.useVersion(rootProject.libs.wss4j.bindings.get().version)
                }
                if (requested.group == 'org.slf4j') {
                    details.useVersion(rootProject.libs.slf4j.api.get().version)
                }
                if (requested.group == 'org.apache.logging.log4j') {
                    details.useVersion(rootProject.libs.log4j.core.get().version)
                }
            }
        }
    }
    exclude(group: 'cglib', module: 'cglib')
    exclude(group: 'cglib', module: 'cglib-full')
    exclude(group: 'org.slf4j', module: 'slf4j-log4j12')
    exclude(group: 'org.slf4j', module: 'slf4j-simple')
    exclude(group: 'org.slf4j', module: 'jcl-over-slf4j')
    exclude(group: 'org.apache.logging.log4j', module: 'log4j-to-slf4j')
    exclude(group: 'pull-parser', module: 'pull-parser')
    exclude(group: 'javax.servlet', module: 'servlet-api')
    exclude(group: 'javax.ws.rs', module: 'javax.ws.rs-api')
    exclude(group: 'javax.annotation', module: 'javax.annotation-api')
    exclude(group: 'javax.activation', module: 'activation')
    exclude group: 'com.sun.activation', module: 'jakarta.activation'
    exclude(group: 'com.fasterxml.jackson.module', module: 'jackson-module-jaxb-annotations')
    exclude(group: 'org.bouncycastle', module: 'bcprov-ext-jdk15on')
    exclude(group: 'org.bouncycastle', module: 'bcprov-jdk15on')
    exclude(group: 'org.bouncycastle', module: 'bcpkix-jdk15on')
    exclude(group: 'io.netty', module: 'netty-transport-native-kqueue')
    exclude(group: 'org.springframework', module: 'spring-jcl')
}

