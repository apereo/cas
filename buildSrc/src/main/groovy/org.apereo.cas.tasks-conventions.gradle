import org.apache.tools.ant.taskdefs.condition.Os
import org.apereo.cas.gradle.Ansi
import org.apereo.cas.gradle.CasBuildSettings
import org.gradle.api.attributes.Bundling
import org.gradle.api.attributes.Category
import org.gradle.api.attributes.DocsType
import org.gradle.api.attributes.LibraryElements
import org.gradle.api.attributes.Usage
import org.gradle.jvm.tasks.Jar

Object.metaClass.ansi = new Ansi()
project.ext.set('ansi', new Ansi())

if (Os.isFamily(Os.FAMILY_WINDOWS)) {
    tasks.register('pathingJar', Jar) {
        description = "Produces a 'pathing' JAR whose manifest class-path contains project runtime dependencies"
        dependsOn configurations.runtimeClasspath
        archiveAppendix.set('pathing')

        def files = configurations.runtimeClasspath.files
        doFirst {
            manifest {
                attributes 'Class-Path': files.collect {
                    it.toURI().toString().replaceFirst('/file:/+/', '/')
                }.join(' ')
            }
        }
    }
}

def testClassesTask = tasks.named('testClasses')
def classesTask = tasks.named('classes')
def javadocTask = tasks.named('javadoc')
def testTasks = tasks.withType(Test)

tasks.register('testJar', Jar) {
    dependsOn testClassesTask
    description = 'Archive the testClasses'
    archiveClassifier.set('tests')
    from sourceSets.test.output
}

tasks.register('sourcesJar', Jar) {
    archiveClassifier.set('sources')

    if (CasBuildSettings.isPrivateRelease(project)) {
        def placeholderFile = layout.buildDirectory.file('generated/placeholder-sources/README.md')
        from(placeholderFile)
        doFirst {
            def file = placeholderFile.get().asFile
            file.parentFile.mkdirs()
            file.text = 'This is a placeholder sources artifact for private releases.'
        }
    } else {
        dependsOn classesTask
        from sourceSets.main.allSource
    }
}

tasks.register('aggregateJavadocSourcesJar', Jar) {
    archiveClassifier.set('aggregate-javadoc-sources')
    from sourceSets.main.allJava
}

configurations {
    aggregateJavadocSourcesElements {
        canBeResolved = false
        canBeConsumed = true
        visible = false
        attributes {
            attribute(Category.CATEGORY_ATTRIBUTE, objects.named(Category, Category.DOCUMENTATION))
            attribute(Bundling.BUNDLING_ATTRIBUTE, objects.named(Bundling, Bundling.EXTERNAL))
            attribute(DocsType.DOCS_TYPE_ATTRIBUTE, objects.named(DocsType, DocsType.SOURCES))
            attribute(LibraryElements.LIBRARY_ELEMENTS_ATTRIBUTE, objects.named(LibraryElements, LibraryElements.JAR))
            attribute(Usage.USAGE_ATTRIBUTE, objects.named(Usage, Usage.JAVA_RUNTIME))
        }
        outgoing.artifact(tasks.named('aggregateJavadocSourcesJar'))
    }
    aggregateCoverageDataElements {
        canBeResolved = false
        canBeConsumed = true
        visible = false
        outgoing.artifact(layout.buildDirectory.dir('.')) {
            builtBy(testTasks)
        }
    }
    aggregateCoverageClassDirectoriesElements {
        canBeResolved = false
        canBeConsumed = true
        visible = false
        sourceSets.main.output.classesDirs.files.each { classesDir ->
            outgoing.artifact(classesDir) {
                builtBy(classesTask)
            }
        }
    }
    aggregateCoverageSourceDirectoriesElements {
        canBeResolved = false
        canBeConsumed = true
        visible = false
        sourceSets.main.allJava.srcDirs.each { sourceDir ->
            outgoing.artifact(sourceDir)
        }
    }
}

tasks.register('resourcesJar', Jar) {
    archiveClassifier.set('resources')
    from project.file('src/main/resources')
}

tasks.register('javadocJar', Jar) {
    archiveClassifier.set('javadoc')

    if (publishReleases || publishSnapshots) {
        logger.info "Skipping Javadoc generation for ${project.name} as it is being published..."
        def placeholderFile = layout.buildDirectory.file('generated/placeholder-javadoc/README.md')
        from(placeholderFile)
        doFirst {
            def file = placeholderFile.get().asFile
            file.parentFile.mkdirs()
            file.text = 'This is a placeholder Javadoc artifact.'
        }
    } else {
        logger.info "Generating Javadoc for ${project.name}..."
        dependsOn javadocTask
        from(javadocTask.map { it.destinationDir })
    }
}

tasks.register('downloadDependencies') {
    description 'Pre-download project dependencies for all configurations'
    doLast {
        configurations.getAsMap().each { name, config ->
            logger.info "Retrieving dependencies for $project:$name"
            try {
                config.files
            } catch (e) {
                project.logger.info e.message
            }
        }
    }
}
