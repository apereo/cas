def shouldTest(final Set sourceTestDirectories, final String category) {
    def foundTest = gradle.startParameter.taskNames.any { task -> task.matches(/^test${category}$/) }
    if (!foundTest) {
        logger.debug "No tests with category ${category} found"
    }
    !providers.systemProperty('skipTests').present && foundTest && hasTestsOfCategory(sourceTestDirectories, category)
}

def hasTestsOfCategory(final Set sourceTestDirectories, final String category) {
    def result = testTagMap.computeIfAbsent(testTagCacheKey(sourceTestDirectories)) {
        loadTagsFromCache(sourceTestDirectories)
    } as Set<String>
    result.contains(category)
}

def isCoverageEnabled() {
    providers.systemProperty('enableJacocoAgent').orElse('false').get().toBoolean() ||
        gradle.startParameter.taskNames.any { it.toLowerCase(Locale.ENGLISH).contains('jacoco') }
}

static def testTagCacheKey(final Set sourceTestDirectories) {
    def digest = MessageDigest.getInstance('SHA-256')
    def keyMaterial = sourceTestDirectories
        .findAll { it.exists() }
        .collect { it.canonicalPath }
        .sort()
        .join('|')
    digest.update(keyMaterial.getBytes(StandardCharsets.UTF_8))
    digest.digest().encodeHex().toString()
}

def testTagCacheFile(final Set sourceTestDirectories) {
    new File(project.rootDir, ".gradle/cas-test-tags/${testTagCacheKey(sourceTestDirectories)}.json")
}

static def collectTestFiles(final Set sourceTestDirectories) {
    def files = []
    sourceTestDirectories.each { src ->
        if (src.exists()) {
            src.traverse(type: FileType.FILES, nameFilter: ~/.*Tests\.\w+/) { file ->
                files << file
            }
        }
    }
    files
}

def loadTagsFromCache(final Set sourceTestDirectories) {
    def cacheFile = testTagCacheFile(sourceTestDirectories)
    cacheFile.parentFile.mkdirs()

    def testFiles = collectTestFiles(sourceTestDirectories)
    def cacheFingerprint = testFiles
        .collect { "${it.canonicalPath}:${it.length()}:${it.lastModified()}" }
        .sort()
        .join('|')

    if (cacheFile.exists()) {
        try {
            def cache = new JsonSlurper().parse(cacheFile)
            if (cache.fingerprint == cacheFingerprint) {
                return new HashSet<String>(cache.tags ?: [])
            }
        } catch (ignored) {
            cacheFile.delete()
        }
    }

    def tagPattern = ~/^\s*@Tag\("(\w+)"\)\s*$/
    def tags = Collections.synchronizedSet(new HashSet<String>())
    testFiles.parallelStream().forEach { file ->
        file.readLines().each { line ->
            def match = line =~ tagPattern
            if (match.find()) {
                tags.add(match.group(1))
            }
        }
    }
    cacheFile.text = JsonOutput.toJson([
        fingerprint: cacheFingerprint,
        tags       : tags.toSorted()
    ])
    tags
}

