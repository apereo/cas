apply plugin: "org.apereo.cas.project-conventions"

description = "Loads CAS configuration from Azure Key Vault so settings can be managed outside the application package."
ext {
    publishMetadata = true
    projectMetadata = [
            category: "Configuration Management",
            title: "Configuration Management via Azure KeyVault",
            aliases: ["azurekeyvault"]
    ]
}
dependencies {
    implementation libraries.azurekeyvault
    implementation libraries.springcloudbootstrap

    implementation project(":core:cas-server-core-util-api")
}
