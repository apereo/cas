apply plugin: "org.apereo.cas.project-conventions"

description = "Adds shared Amazon DynamoDB support used by CAS DynamoDB-backed features."
dependencies {
    implementation libraries.awsjavadynamodb
    
    implementation project(":support:cas-server-support-aws")
    implementation project(":core:cas-server-core-tickets-api")
    implementation project(":core:cas-server-core-configuration-api")
    implementation project(":core:cas-server-core-util-api")

    testImplementation project(path: ":core:cas-server-core-util-api", configuration: "tests")
    
}
