apply plugin: "org.apereo.cas.project-conventions"

import org.apereo.cas.gradle.CasBuildSettings

description = "Apereo CAS Bill of Material"

def projectName = project.name.toString()
def projectPath = project.path.toString()
def projectVersion = project.version.toString()
def projectGroupId = project.group.toString()
def projectScmUrl = project.projectScmUrl
def projectLicenseName = project.projectLicenseName
def projectLicenseUrl = project.projectLicenseUrl
def projectIssueSystem = project.projectIssueSystem
def projectIssueUrl = project.projectIssueUrl
def projectInceptionYear = project.projectInceptionYear
def includedProjectPaths = CasBuildSettings.includedProjectPaths(project)
def projectLibraries = PomXmlSupport.normalizeLibraries(libraries)

publishing {
    publications {
        mavenJava(MavenPublication) {
            pom.withXml {
                ansi.green "Creating BOM with all project dependencies for ${projectName}"

                def iter = asNode().iterator()
                while (iter.hasNext()) {
                    def node = iter.next()
                    if (node.name().getLocalPart().equals("dependencies")) {
                        ansi.green "Removing dependencies block from generated POM"
                        iter.remove()
                    }
                    if (node.name().getLocalPart().equals("properties")) {
                        ansi.green "Removing properties block from generated POM"
                        iter.remove()
                    }
                }

                def dependencyManagement = asNode().appendNode("dependencyManagement")
                def dependencies = dependencyManagement.appendNode("dependencies")

                def dependencyVersions = [:]
                def allLibraries = []

                includedProjectPaths
                        .findAll { p -> p != projectPath && CasBuildSettings.projectNameFromPath(p).matches(PomXmlSupport.getProjectNamePattern()) }
                        .each { p ->
                            PomXmlSupport.createDependency(dependencies, projectGroupId, CasBuildSettings.projectNameFromPath(p),
                                    projectVersion, dependencyVersions, allLibraries)
                        }

                projectLibraries.each { artifact ->
                    PomXmlSupport.createDependency(
                            dependencies,
                            artifact.group,
                            artifact.name,
                            artifact.version,
                            dependencyVersions,
                            allLibraries
                    )
                }

                def properties = asNode().appendNode("properties")
                dependencyVersions.each { ver ->
                    properties.appendNode(ver.key, ver.value)
                }
            }

            pom {
                url = "$projectUrl"
                inceptionYear = projectInceptionYear
                name = projectName
                description = projectName
                packaging = "pom"
                issueManagement {
                    system = projectIssueSystem
                    url = projectIssueUrl
                }
                licenses {
                    license {
                        name = projectLicenseName
                        url = projectLicenseUrl
                    }
                }
                scm {
                    connection = projectScmUrl
                    developerConnection = projectScmUrl
                    url = projectScmUrl
                }
                developers {
                    developer {
                        id = "mmoayyed"
                        name = "Misagh Moayyed"
                    }
                }
            }
        }
    }
}

class PomXmlSupport {
    static String getProjectNamePattern() {
        return "^cas-server-(core-api|core|support|webapp).*"
    }

    static List<Map<String, String>> normalizeLibraries(libraries) {
        def results = []

        libraries.each { entry ->
            def artifact = entry.value

            if (artifact instanceof List) {
                artifact.each { art ->
                    normalizeArtifact(art, results)
                }
            } else {
                normalizeArtifact(artifact, results)
            }
        }

        return results
    }

    private static void normalizeArtifact(Object artifact, List<Map<String, String>> results) {
        if (artifact == null) {
            return
        }

        if (artifact.class.isArray()) {
            artifact.each { coords ->
                addCoordinates(coords.toString(), results)
            }
            return
        }

        addDependencyLikeObject(artifact, results)
    }

    private static void addCoordinates(String coords, List<Map<String, String>> results) {
        def elem = coords.split(":")
        if (elem.length >= 3) {
            results.add([
                    group  : elem[0].toString(),
                    name   : elem[1].toString(),
                    version: elem[2].toString()
            ])
        }
    }

    private static void addDependencyLikeObject(Object artifact, List<Map<String, String>> results) {
        def version = extractVersion(artifact)

        results.add([
                group  : artifact.group.toString(),
                name   : artifact.name.toString(),
                version: version.toString()
        ])
    }

    private static String extractVersion(Object artifact) {
        if (artifact.hasProperty("version") && artifact.version != null) {
            return artifact.version.toString()
        }

        if (artifact.hasProperty("versionConstraint") && artifact.versionConstraint != null) {
            def vc = artifact.versionConstraint

            if (vc.requiredVersion) {
                return vc.requiredVersion.toString()
            }

            if (vc.preferredVersion) {
                return vc.preferredVersion.toString()
            }

            if (vc.strictVersion) {
                return vc.strictVersion.toString()
            }
        }

        throw new GradleException("Unable to determine version for dependency ${artifact}")
    }

    static void createDependency(dependencies, group, name, version, dependencyVersions, allLibraries) {
        def key = "${group}@${name}"
        if (!allLibraries.contains(key)) {
            def dependency = dependencies.appendNode("dependency")
            dependency.appendNode("groupId", group)
            dependency.appendNode("artifactId", name)

            if (name.matches(getProjectNamePattern())) {
                dependency.appendNode("version", "\${cas.version}")
                dependencyVersions.put("cas.version", version)
            } else {
                def versionProp = "${group}.${name}.version"

                dependency.appendNode("version", String.format("\${%s}", versionProp))
                dependencyVersions.put(versionProp, version)
            }

            allLibraries.add(key)
        }
    }
}
