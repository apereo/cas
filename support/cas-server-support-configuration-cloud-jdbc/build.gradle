apply plugin: "org.apereo.cas.project-conventions"

description = "Loads CAS configuration from a JDBC-compatible database so settings can be managed outside the application package."
ext {
    publishMetadata = true
    projectMetadata = [
            category: "Configuration Management",
            title: "Configuration Management via JDBC"
    ]
}
dependencies {
    implementation libraries.springcloudbootstrap

    implementation project(":core:cas-server-core-util-api")
    implementation project(":core:cas-server-core-configuration-api")
    implementation project(":support:cas-server-support-jpa-util")
    
    runtimeOnly project(":support:cas-server-support-jdbc-drivers")

    testImplementation project(path: ":core:cas-server-core-util-api", configuration: "tests")
}
