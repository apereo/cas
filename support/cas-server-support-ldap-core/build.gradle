apply plugin: "org.apereo.cas.project-conventions"

description = "Adds LDAP directory support for authentication, attributes, and directory-backed integrations."
dependencies {
    implementation project(":core:cas-server-core-util-api")
    implementation project(":core:cas-server-core-configuration-api")
    implementation project(":core:cas-server-core-authentication-api")
    implementation project(":core:cas-server-core-authentication-mfa-api")

    api libraries.ldaptive

    implementation project(":support:cas-server-support-person-directory-core")
    
    testImplementation project(":core:cas-server-core-util")
    testImplementation project(":core:cas-server-core-scripting")
    testImplementation project(path: ":core:cas-server-core-util-api", configuration: "tests")
}
