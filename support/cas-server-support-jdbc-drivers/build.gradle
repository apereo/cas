apply plugin: "org.apereo.cas.project-conventions"

description = "Bundles common JDBC drivers so database-backed CAS features can connect to supported databases."
ext {
    publishMetadata = true
    projectMetadata = [
            category: "Relational Databases (JDBC & JPA)",
            title: "Database Drivers"
    ]
}

dependencies {
    api project(":api:cas-server-core-api")
    runtimeOnly libraries.databasedrivers
}
