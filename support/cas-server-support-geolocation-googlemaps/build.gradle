apply plugin: "org.apereo.cas.project-conventions"

description = "Adds Google Maps geolocation lookup for contextual access decisions and audit data."
ext {
    publishMetadata = true
    projectMetadata = [
            category: "GeoLocation",
            title: "GoogleMaps GeoLocation",
            aliases: ["googlemaps"]
    ]
}
dependencies {
    implementation project(":core:cas-server-core-configuration-api")
    implementation project(":core:cas-server-core-util-api")
    implementation project(":support:cas-server-support-geolocation")

    api project(":api:cas-server-core-api-authentication")

    implementation libraries.googlegeocoding
    implementation libraries.okhttp
    
    testImplementation project(path: ":core:cas-server-core-util-api", configuration: "tests")
}
