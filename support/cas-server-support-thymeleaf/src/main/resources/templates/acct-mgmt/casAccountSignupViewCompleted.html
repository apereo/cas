<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <link href="../../static/css/cas.css" rel="stylesheet" th:remove="tag"/>

    <script type="text/javascript" th:src="@{#{webjars.sweet-alert.js}}"></script>
    <link rel="stylesheet" type="text/css" th:href="@{#{webjars.sweet-alert.css}}" />
</head>

<body id="cas">
<main class="container mt-3 mb-3">
    <div layout:fragment="content" class="mdc-card p-4 m-auto w-lg-100 alert alert-success">
        <h2 th:utext="#{cas.screen.acct.title}"/>
        <p class="intro" th:utext="#{cas.screen.acct.intro.completed}"/>

        <span th:if="${service}" th:remove="tag">
            <script th:inline="javascript">
                /*<![CDATA[*/
                const fullRequestUrl = /*[[${fullRequestUrl}]]*/;
                console.info("Redirecting to", fullRequestUrl);
                /*]]>*/
                
                Swal.fire({
                    title: 'Redirecting to Application',
                    text: 'CAS is preparing to redirect to the original application...',
                    timer: 2500,
                    timerProgressBar: true,  
                    allowOutsideClick: false,
                    allowEscapeKey: false,
                    showConfirmButton: false,
                    showCancelButton: false,
                    didOpen: () => {
                        Swal.showLoading(); 
                    },
                    willClose: () => {
                        window.location.href = fullRequestUrl;
                    }
                });
            </script>
        </span>
    </div>
</main>
</body>
</html>
