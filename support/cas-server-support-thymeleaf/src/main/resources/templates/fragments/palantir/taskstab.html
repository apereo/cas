<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
</head>
<body>
<span th:fragment="main">
        <div class="attribute-tab w-100 d-none mdc-data-table table-responsive noborder" id="attribute-tab-3">
             <div class="jqueryui-tabs" id="tasks-tabs">
                  <ul>
                    <li><a id="scheduledtaskstab" href="#scheduledtasks-tab">Scheduled Tasks</a></li>
                    <li><a id="threaddumptab" href="#threaddump-tab">Thread Dump</a></li>
                  </ul>

                 <div id="scheduledtasks-tab">
                    <table id="scheduledTasksTable" class="mdc-data-table__table table table-striped noborder">
	                    <thead>
	                    <tr class="mdc-data-table__header-row">
	                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">Type</th>
	                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">Task</th>
	                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">Target</th>
	                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">Initial Delay</th>
	                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">Interval</th>
	                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">Last Status</th>
	                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">Last Execution</th>
	                        <th class="mdc-data-table__header-cell" role="columnheader" scope="col">Next Execution</th>
	                    </tr>
	                    </thead>
                    <tbody class="mdc-data-table__content">
                    </tbody>
                </table>
                 </div>

                 <div id="threaddump-tab">
                      <table id="threadDumpTable" class="mdc-data-table__table table table-striped noborder">
                        <thead>
                        <tr class="mdc-data-table__header-row">
                            <th class="mdc-data-table__header-cell" role="columnheader" scope="col">Name</th>
                            <th class="mdc-data-table__header-cell" role="columnheader" scope="col">ID</th>
                            <th class="mdc-data-table__header-cell" role="columnheader" scope="col">State</th>
                            <th class="mdc-data-table__header-cell" role="columnheader" scope="col">Priority</th>
                            <th class="mdc-data-table__header-cell" role="columnheader" scope="col">Daemon</th>
                            <th class="mdc-data-table__header-cell" role="columnheader" scope="col">CPU</th>
                            <th class="mdc-data-table__header-cell" role="columnheader" scope="col"></th>
                        </tr>
                        </thead>
                        <tbody class="mdc-data-table__content">
                        </tbody>
                    </table>
                     <div class="mdc-dialog modal" id="threadDumpStackDialog" role="alertdialog"
                          aria-modal="true" aria-labelledby="threadDumpStackDialog-title"
                          aria-describedby="threadDumpStackDialog-content">
                         <div class="mdc-dialog__container w-75 modal-dialog">
                             <div class="mdc-dialog__surface mw-75 modal-content">
                                 <h1 class="mdc-dialog__title modal-header mt-lg-2"
                                     id="threadDumpStackDialog-title">Thread Stack</h1>
                                 <div class="mdc-dialog__content modal-body" id="threadDumpStackDialog-content">
                                     <div id="threadDumpStackSummary" class="thread-dump-stack-summary"></div>
                                     <pre class="thread-dump-stack-trace"><code id="threadDumpStackTrace"></code></pre>
                                 </div>
                                 <footer class="mdc-dialog__actions modal-footer">
                                     <button type="button" class="mdc-button mdc-button--raised"
                                             data-mdc-dialog-action="accept" data-mdc-dialog-button-default
                                             data-bs-dismiss="modal">
                                         <span class="mdc-button__ripple"></span>
                                         <span class="mdc-button__label">Close</span>
                                     </button>
                                 </footer>
                             </div>
                         </div>
                         <div class="mdc-dialog__scrim"></div>
                     </div>
                 </div>
             </div>

            <div class="task-charts-grid">
              <div class="task-charts-row">
                <div class="task-chart-cell">
                    <div class="task-chart-container"><canvas id="jvmThreadsChart"></canvas></div>
                </div>
                <div class="task-chart-cell">
                    <div class="task-chart-container"><canvas id="threadDumpChart"></canvas></div>
                </div>
              </div>
            </div>
        </div>
    </span>
</body>
</html>
