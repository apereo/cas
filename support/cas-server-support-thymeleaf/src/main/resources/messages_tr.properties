screen.oidc.confirm.bindingmessage.header=Bağlayıcı Mesaj
screen.oidc.confirm.bindingmessage.description=Son kullanıcı için görsel bir işaret yoluyla işlem için bunları birbirine kilitlemek üzere hem tüketim cihazında hem de kimlik doğrulama cihazında görüntülenmesi amaçlanan, insan tarafından okunabilen bir tanımlayıcı veya mesaj. Bu kilitleme mesajı, son kullanıcının, kimlik doğrulama cihazında gerçekleştirilen eylemin, tüketim cihazı tarafından başlatılan istekle ilgili olduğundan emin olmasını sağlar.
