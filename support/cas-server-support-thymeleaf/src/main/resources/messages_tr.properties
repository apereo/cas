screen.oidc.confirm.claim.phone_number=Son Kullanıcının tercih ettiği telefon numarası. Bu iddianın formatı olarak TAVSİYE EDİLİR. Örneğin, <code>+1 (425) 555-1212</code> veya <code>+56 (2) 687 2400</code>.
