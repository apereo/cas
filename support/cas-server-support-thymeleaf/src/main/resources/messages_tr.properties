cas.screen.acct.title=Hesap Kaydı
cas.screen.acct.intro=Yeni hesabınızı CAS'a kaydetmek için lütfen aşağıdaki formu doldurun. Form gönderildikten sonra hesabınızı etkinleştirmek, şifrenizi ayarlamak ve CAS'ı kullanmaya başlamak için hesap etkinleştirme bağlantısını içeren bir e-posta alacaksınız.
cas.screen.acct.infosent=Hesap etkinleştirme talimatları başarıyla gönderildi. Lütfen e-postanızı vb. kontrol edin ve talimatları izleyin.
cas.screen.acct.intro.complete=Tekrar hoş geldiniz! Hesabınızı doğruladığınız için teşekkür ederiz. Yeni hesabınızı CAS'a kaydetmek için lütfen aşağıdaki formu doldurun. 
