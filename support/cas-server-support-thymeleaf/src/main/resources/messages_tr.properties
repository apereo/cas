passwordless.token.header=Jeton Sağla
passwordless.token.description=Lütfen size e-posta, telefon vb. aracılığıyla gönderilen güvenlik belirtecini sağlayın. Belirtecin yalnızca kısa bir süre için geçerli olduğunu ve gönderildikten sonra diğer tüm belirteçlerin geçersiz kılınacağını ve kaldırılacağını unutmayın.
passwordless.error.failure.title=Kimlik Doğrulama Hatası
passwordless.error.failure.description=Sağlanan jeton doğrulanamadı. Geçersiz kılınmış, kaldırılmış veya süresi dolmuş olabilir.
passwordless.error.unknown.user=Sağlanan kullanıcı adı CAS tarafından tanınamıyor ve bulunamıyor.
passwordless.error.invalid.user=Sağlanan kullanıcı adı yeterli iletişim bilgisini taşımıyor.
passwordless.getuser.header=Parolasız Kimlik Doğrulama
passwordless.getuser.description=Hesabınızı bulmak için lütfen kullanıcı adınızı girin. Hesabınız doğrulandıktan sonra CAS sizin için uygun kimlik doğrulama stratejisini seçecektir.
passwordless.selection.header=Kimlik Doğrulama Seçimi
passwordless.selection.description=Devam etmek için aşağıda listelenen kimlik doğrulama seçeneklerinden birini seçin.
passwordless.selection.password.header=Şifre
passwordless.selection.password.description=Şifrenizi kullanarak kimlik doğrulaması yapabilirsiniz. Hesabınız uygunsa çok faktörlü bir kimlik doğrulama akışını tamamlamanız da istenebilir.
passwordless.selection.token.header=Jeton
passwordless.selection.token.description=CAS'tan e-posta veya SMS yoluyla sınırlı bir süre için geçerli olan tek seferlik bir jeton alacaksınız ve devam etmek için kodu tekrar girmeniz istenecek.
passwordless.selection.mfa.header=Çok faktörlü
passwordless.selection.mfa.description=Doğrudan çok faktörlü bir kimlik doğrulama akışına yönlendirileceksiniz. Kimlik doğrulama adımını tamamladıktan sonra akış otomatik olarak devam edecektir.
passwordless.selection.delegation.header=Harici
passwordless.selection.delegation.description=Giriş yapmanız için harici bir kimlik sağlayıcıya yönlendirileceksiniz. Harici kimlik sağlayıcıyla kimlik doğrulama akışını tamamladıktan sonra devam etmek için otomatik olarak CAS'a yönlendirileceksiniz.
cas.authn.qr.fail=QR koduna dayalı kimlik doğrulama isteği kabul edilemiyor. QR kodunun doğru şekilde tarandığından ve sağlanan kimlik bilgilerinin geçerli olduğundan, bu CAS sunucusu tarafından verildiğinden ve süresinin dolmadığından emin olun.
