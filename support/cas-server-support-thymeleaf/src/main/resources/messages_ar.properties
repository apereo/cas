authenticationFailure.FailedLoginException=فشلت محاولة المصادقة، ويرجع ذلك على الأرجح إلى بيانات اعتماد غير صالحة. يرجى التحقق والمحاولة مرة أخرى.
authenticationFailure.MultifactorAuthenticationProviderAbsentException=غير قادر على تلبية متطلبات المصادقة متعددة العوامل. تم تكوين حسابك لاستراتيجية مصادقة متعددة العوامل، ومع ذلك فإن CAS غير قادر على تحديد موقع هذه الإستراتيجية وتنفيذها على الأرجح بسبب التكوين الخاطئ للخادم. اتصل بمسؤولي الخدمة للحصول على المساعدة.
authenticationFailure.SurrogateAuthenticationException=لا يحق لك انتحال شخصية المستخدم المشار إليه في هذا الوقت.
authenticationFailure.AccountPasswordMustChangeException=لقد انتهت صلاحية كلمة مرور حسابك ويجب تغييرها.
authenticationFailure.UnauthorizedServiceForPrincipalException=تم رفض الوصول إلى الخدمة بسبب فقدان الامتيازات.
authenticationFailure.MultifactorAuthenticationRequiredException=تم رفض محاولة المصادقة لحسابك، لأنه لم يتم تكوين حسابك بعد لإجراء المصادقة متعددة العوامل. اتصل بمسؤولي الخدمة للحصول على المساعدة، وتأكد من أن حسابك مسجل ومؤهل للمصادقة متعددة العوامل وحاول مرة أخرى.
authenticationFailure.MultifactorAuthenticationFailedException=فشلت محاولة المصادقة متعددة العوامل، على الأرجح بسبب بيانات اعتماد المصادقة متعددة العوامل غير الصالحة. يرجى التحقق والمحاولة مرة أخرى.
authenticationFailure.RiskyAuthenticationException=CAS غير قادرة على متابعة تدفق المصادقة، ويرجع ذلك على الأرجح إلى أن محاولة المصادقة هذه تم تحديدها على أنها محفوفة بالمخاطر ومشبوهة مع درجة مخاطرة عالية بما يكفي أعلى من الحد المقبول. ربما تم حظر محاولتك للمصادقة لأنك تستخدم متصفح ويب غير معروف، أو لأنك تقوم بتسجيل الدخول من مكان غير معروف. للحصول على معلومات وتوجيهات إضافية، يرجى الاتصال بالمسؤول و/أو مكتب المساعدة.
authenticationFailure.UNKNOWN=فشلت محاولة المصادقة.
authenticationFailure.AuthenticationException=تم رفض/عدم صلاحية بيانات الاعتماد وفشلت محاولة المصادقة.
INVALID_REQUEST_PROXY=تم تنسيق الطلب بشكل غير صحيح. تأكد من ترميز جميع المعلمات المطلوبة وإدراجها بشكل صحيح.
INVALID_TICKET_SPEC=فشلت مواصفات التحقق من صحة التذكرة. قد تتضمن الأخطاء المحتملة محاولة التحقق من صحة تذكرة الوكيل عبر مدقق تذكرة الخدمة، أو عدم الامتثال لطلب `التجديد = صحيح`.
INVALID_REQUEST=تعذر تحديد هذا الطلب أو الترخيص به أو إكماله، ويرجع ذلك على الأرجح إلى وجود معلمات مطلوبة بشكل غير صحيح أو مفقودة.
INVALID_AUTHENTICATION_CONTEXT=طلب التحقق من صحة لـ [''{0}''] لا يمكن أن يكون راضيا. الطلب إما غير معروف أو لم يتم تنفيذه.
INVALID_TICKET=تذكرة ''{0}'' لم يتم التعرف عليه
INVALID_PROXY_GRANTING_TICKET=تم إنشاء PGT بالفعل لهذا ST. لا يمكن منح أكثر من PGT واحد لـ ST
INVALID_SERVICE=تذكرة ''{0}'' لا يتطابق مع الخدمة المتوفرة. الخدمة الأصلية كانت ''{1}'' وكانت الخدمة المقدمة ''{2}''.
INVALID_PROXY_CALLBACK=عنوان URL لرد اتصال الوكيل الذي تم توفيره ''{0}'' لا يمكن المصادقة. إما ''{0}'' لا يمكن الوصول إليه، أو أنه غير مسموح له بممارسة مصادقة الوكيل.
UNAUTHORIZED_SERVICE_PROXY=الخدمة المقدمة ''{0}'' غير مصرح له باستخدام مصادقة وكيل CAS.
UNSATISFIED_AUTHN_POLICY=تم رفض الوصول إلى الخدمة بسبب سياسة المصادقة غير المرضية.
INVALID_AUTHN_REQUEST=فشلت محاولة المصادقة، ويرجع ذلك على الأرجح إلى بيانات اعتماد غير صالحة.
BLOCKED_AUTHN_REQUEST=تم حظر محاولة المصادقة ولا يمكن المتابعة، ويرجع ذلك على الأرجح إلى وجود معلمات مطلوبة بشكل غير صحيح أو مفقودة. افحص سجلات خادم CAS لتحديد السبب الجذري للخطأ.
UNSATISFIED_SAML_REQUEST=لا يمكن فهم طلب مصادقة SAML أو قبوله أو التحقق من صحته بواسطة CAS، ويرجع ذلك على الأرجح إلى وجود معلمات مطلوبة بشكل غير صحيح أو مفقودة. يرجى فحص سجلات خادم CAS لتحديد السبب الجذري للخطأ.
MISSING_SAML_REQUEST=لا يمكن تحديد طلب مصادقة SAML2 من مخزن جلسة CAS. ويعني هذا عادةً أن طلب مصادقة SAML2 الأصلي الذي تم إرساله إلى CAS عبر موفر خدمة SAML2 لا يمكن استرجاعه واستعادته بعد محاولة المصادقة على الأرجح لأن مخزن الجلسة الأساسي إما أزال طلب المصادقة بالقوة أو قرر أن الطلب المتعقب منتهي الصلاحية وقديم، بما يتجاوز ما تسمح به سياسة انتهاء صلاحية مخزن الجلسة. يرجى فحص سجلات خادم CAS لتحديد السبب الجذري للخطأ.
screen.service.error.header=التطبيق غير مصرح له باستخدام CAS
screen.service.error.redirect=غير مصرح لك للوصول إلى هذا التطبيق. يرجى التحلي بالصبر لأنك على وشك إعادة توجيهك إليه <strong>{0}</strong> لمعرفة المزيد عن هذا السيناريو.
service.principal.resolution.error=CAS غير قادر على تحديد مبدأ المصادقة الصحيح. إما أنه لا يمكن حل المبدأ بشكل صحيح ككيان واحد فريد أو أن CAS وجدت مبادئ رئيسية مرشحة مختلطة/متعددة ولا تستطيع تحديد أي منها يجب استخدامه. قد يحدث هذا الخطأ أيضًا إذا لم يُسمح للمدير الذي تمت مصادقته بالوصول إلى التطبيق المستهدف بسبب فقدان الامتيازات التي حددتها سياسات ترخيص خادم CAS.
service.not.authorized.missing.attr=غير مصرح لك بالوصول إلى التطبيق لأن حسابك يفتقد الامتيازات التي يطلبها خادم CAS للمصادقة في هذه الخدمة. يرجى إخطار مكتب الدعم الخاص بك.
screen.service.error.message=التطبيق الذي حاولت المصادقة عليه غير مصرح له باستخدام CAS. يشير هذا عادةً إلى أن التطبيق غير مسجل لدى CAS، أو أن سياسة الترخيص المحددة في سجل التسجيل الخاص به تمنعه ​​من الاستفادة من وظائف CAS، أو أنه مشوه ولم يتم التعرف عليه بواسطة CAS. اتصل بمسؤول CAS الخاص بك لمعرفة كيفية تسجيل طلبك ودمجه مع CAS.
screen.service.empty.error.message=سجل خدمات CAS فارغ ولا يحتوي على تعريفات للخدمة. يجب تحديد التطبيقات التي ترغب في المصادقة مع CAS بشكل واضح في سجل الخدمات.
screen.service.expired.message=انتهت صلاحية التطبيق الذي حاولت المصادقة عليه في سجل خدمة CAS. إذا كانت هذه الخدمة لا تزال قيد الاستخدام، فيرجى الاتصال بمسؤولي الخدمة لتجديد التطبيق.
