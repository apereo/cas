cas.mfa.simple.label.contactfailed.email=CAS غير قادر على استخدام معلومات الاتصال المحددة لإرسال بريد إلكتروني إليك باستخدام رمز المصادقة متعدد العوامل. يرجى مراجعة معلومات الاتصال الخاصة بك والاتصال بمسؤول CAS للحصول على المساعدة.
