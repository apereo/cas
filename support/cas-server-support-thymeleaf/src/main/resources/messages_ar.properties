screen.surrogates.wildcard.description=يتم التعرف على حسابك داخليًا بواسطة CAS باعتباره حسابًا يتمتع بأذونات خاصة، ومصرح له بانتحال شخصية جميع المستخدمين والحسابات. لذلك، لا يُسمح باختيار حساب انتحال الهوية لحسابك. وبدلاً من ذلك، يمكنك مباشرة تسجيل الدخول وانتحال شخصية أي حساب آخر باستخدام اسم المستخدم الخاص به.
