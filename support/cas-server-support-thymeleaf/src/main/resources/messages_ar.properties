authenticationFailure.CredentialExpiredException=لقد انتهت صلاحية كلمة المرور الخاصة بك.
authenticationFailure.InvalidLoginLocationException=لا يمكنك تسجيل الدخول من محطة العمل هذه.
authenticationFailure.UniquePrincipalRequiredException=لا يمكنك تسجيل الدخول في هذا الوقت، حيث أن لديك جلسة تسجيل دخول فردي نشطة أخرى قيد التقدم وتم تكوين CAS باستخدام سياسة مصادقة تمنع جلسات تسجيل دخول فردي متزامنة متعددة.
authenticationFailure.InvalidLoginTimeException=حسابك محظور تسجيل الدخول في هذا الوقت.
