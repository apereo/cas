screen.unavailable.message=حدث خطأ أثناء محاولة إكمال طلبك. <strong>يرجى إبلاغ مكتب الدعم الخاص بك أو حاول مرة أخرى.</strong> <p><div>Apereo هي مؤسسة غير ربحية لإدارة البرمجيات مفتوحة المصدر. برنامج CAS هو مشروع ترعاه Apereo ويمكن تنزيله واستخدامه مجانًا من قبل أي شخص. ومع ذلك، لا يقوم Apereo بتشغيل أنظمة أي شخص يستخدم البرنامج وفي معظم الحالات لا يعرف حتى من يستخدمه أو كيفية الاتصال به إلا إذا كان جزءًا نشطًا من مجتمع Apereo.<br/></br>إذا كنت تواجه مشاكل في تسجيل الدخول باستخدام CAS، <strong>ستحتاج إلى الاتصال بموظفي تكنولوجيا المعلومات أو مكتب المساعدة في مؤسستك للحصول على المساعدة</strong>. <br/><br/>نتمنى أن نكون أكثر فائدة لك بشكل مباشر.</div>
