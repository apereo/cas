screen.logout.confirm.text=<p>ربما قام أحد التطبيقات بإعادة توجيهك إلى خدمة المصادقة المركزية لتسجيل خروجك بالكامل وتدمير جلسة تسجيل الدخول الموحد الخاصة بك. إذا اخترت تسجيل الخروج، سيُطلب منك مرة أخرى تقديم بيانات الاعتماد الخاصة بك وتسجيل الدخول مرة أخرى بمجرد محاولة الوصول إلى التطبيق.</p>
screen.logout.confirm.proceed=هل تريد المتابعة؟
screen.logout.header=تم تسجيل الخروج بنجاح
screen.logout.success=لقد قمت بتسجيل الخروج من خدمة المصادقة المركزية بنجاح. يجوز لك <a href="{0}">تسجيل الدخول</a> مرة أخرى.
screen.logout.fc.success=لقد قمت بتسجيل الخروج من خدمة المصادقة المركزية بنجاح. نظرًا لأنه تم تمكين تسجيل الخروج الفردي باستخدام CAS، فإن قائمة التطبيقات التالية هي: <strong> أخطرت فقط</strong> لتسجيل خروجك وتدمير جلسة المستخدم الخاصة بك. تذكر أن هذا مجرد إشعار، وليس ضمانًا. والأمر متروك للتطبيق نفسه لاحترام هذه الإشعارات واتخاذ الإجراء المناسب لتسجيل خروجك.
screen.logout.security=لأسباب أمنية، قم بالخروج من متصفح الويب الخاص بك.
screen.logout.pending=طلب الخروج معلق...
screen.service.wildcard.message=لا يحتوي هذا التطبيق على إدخال تسجيل مخصص في سجل خدمة CAS. تم ترخيصه والسماح به من قبل CAS نظرًا لوجود إدخال تعريف خدمة بدل في سجل خدمة CAS يسمح ويقبل طلبات المصادقة من تطبيقات غير معروفة مثل هذا التطبيق. <p/>كأفضل ممارسة أمنية، يوصى بشدة بقصر منشأة إدارة الخدمة على <strong>تشمل فقط قائمة التطبيقات المعروفة</strong> المصرح لها صراحة باستخدام CAS. قد يؤدي ترك واجهة الإدارة مفتوحة لجميع التطبيقات إلى خلق فرصة لهجمات أمنية وسيجعل من الصعب تدقيق متطلبات التطبيق واحتياجات السمات.
screen.service.sso.error.header=مطلوب إعادة المصادقة للوصول إلى هذه الخدمة
screen.service.sso.error.message=لقد حاولت الوصول إلى خدمة تتطلب المصادقة دون إعادة المصادقة.  الرجاء محاولة المصادقة مرة أخرى</a>.
screen.service.required.message=لقد حاولت المصادقة دون تحديد التطبيق المستهدف. يرجى إعادة دراسة الطلب والمحاولة مرة أخرى.
screen.service.initial.message=محاولة الوصول إلى CAS أو التطبيق المستهدف المشار إليه غير مسموح بها في الوقت الحالي. تتطلب سياسة المصادقة أن تقوم بتغيير تطبيق البدء ثم الانتقال إلى التطبيقات والخدمات الأخرى.
