screen.success.success=أنت، <strong>{0}</strong>، لقد قمت بتسجيل الدخول بنجاح إلى خدمة المصادقة المركزية. ومع ذلك، فإنك تشاهد هذه الصفحة لأن CAS لا تعرف وجهتك المستهدفة وكيفية الوصول إلى هناك. افحص طلب المصادقة مرة أخرى وتأكد من تحديد الخدمة/التطبيق المستهدف المعتمد والمسجل لدى CAS.
screen.success.security=عند الانتهاء، لأسباب أمنية، من فضلك <a href="logout">تسجيل الخروج</a> والخروج من متصفح الويب الخاص بك.
