cas.mfa.simple.label.tokensent=يتم إرسال رمز مصادقة متعدد العوامل إليك عبر البريد الإلكتروني أو رسالة نصية. يرجى تحديد موقع الرمز المميز وإرساله هنا للمتابعة. لاحظ أن الرمز المميز ستنتهي صلاحيته بعد فترة زمنية قصيرة ولن يتم التعرف عليه من قبل CAS، وفي هذه الحالة، يمكنك أن تطلب من CAS أن ترسل لك رمزًا مميزًا جديدًا.
