screen.service.wildcard.message=اس ایپلیکیشن میں CAS سروس رجسٹری میں کوئی سرشار رجسٹریشن اندراج نہیں ہے۔ یہ CAS کے ذریعہ مجاز اور اس کی اجازت ہے کیونکہ CAS سروس رجسٹری میں وائلڈ کارڈڈ سروس ڈیفینیشن انٹری موجود ہے جو کہ اس جیسی نامعلوم ایپلی کیشنز سے تصدیق کی درخواستوں کی اجازت اور قبول کرتی ہے۔ <p/>سیکورٹی کے بہترین عمل کے طور پر، سروس مینجمنٹ کی سہولت کو محدود کرنے کی سختی سے سفارش کی جاتی ہے۔ <strong>صرف معلوم ایپلی کیشنز کی فہرست شامل کریں۔</strong> جو واضح طور پر CAS استعمال کرنے کے مجاز ہیں۔ تمام ایپلیکیشنز کے لیے مینجمنٹ انٹرفیس کو کھلا چھوڑنے سے سیکیورٹی حملوں کا موقع پیدا ہو سکتا ہے اور درخواست کی ضروریات اور انتساب کی ضروریات کا آڈٹ کرنا مشکل ہو جائے گا۔
