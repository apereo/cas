passwordless.token.header=ٹوکن فراہم کریں۔
passwordless.token.description=براہ کرم آپ کو ای میل، فون وغیرہ کے ذریعے بھیجا گیا سیکیورٹی ٹوکن فراہم کریں۔ نوٹ کریں کہ ٹوکن صرف ایک مختصر ونڈو کے لیے درست ہے اور جمع کروانے پر، باقی تمام ٹوکنز کو باطل اور ہٹا دیا جائے گا۔
