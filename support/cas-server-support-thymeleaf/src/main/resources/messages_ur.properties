screen.unavailable.message=آپ کی درخواست مکمل کرنے کی کوشش میں ایک خامی تھی۔ <strong>براہ کرم اپنے سپورٹ ڈیسک کو مطلع کریں یا دوبارہ کوشش کریں۔</strong> <p><div>Apereo ایک غیر منافع بخش اوپن سورس سافٹ ویئر گورننس فاؤنڈیشن ہے۔ CAS سافٹ ویئر ایک Apereo سپانسر شدہ پروجیکٹ ہے اور یہ آزادانہ طور پر ڈاؤن لوڈ اور کسی کے لیے استعمال کے قابل ہے۔ تاہم، Apereo سافٹ ویئر استعمال کرنے والے کسی کے سسٹم کو آپریٹ نہیں کرتا ہے اور زیادہ تر معاملات میں یہ بھی نہیں معلوم ہوتا ہے کہ کون اسے استعمال کر رہا ہے یا ان سے رابطہ کیسے کیا جائے جب تک کہ وہ Apereo کمیونٹی کا ایک فعال حصہ نہ ہوں۔<br/></br>اگر آپ کو CAS کا استعمال کرتے ہوئے لاگ ان کرنے میں دشواری ہو رہی ہے، <strong>آپ کو مدد کے لیے اپنی تنظیم کے IT عملے یا ہیلپ ڈیسک سے رابطہ کرنے کی ضرورت ہوگی۔</strong>. <br/><br/>ہماری خواہش ہے کہ ہم آپ کے لیے براہ راست زیادہ مددگار ثابت ہوں۔</div>
