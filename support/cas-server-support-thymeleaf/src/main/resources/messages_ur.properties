cas.screen.acct.intro=اپنے نئے اکاؤنٹ کو CAS کے ساتھ رجسٹر کرنے کے لیے براہ کرم نیچے دیا گیا فارم پُر کریں۔ فارم جمع ہونے کے بعد، آپ کو اپنے اکاؤنٹ کو فعال کرنے، اپنا پاس ورڈ ترتیب دینے اور CAS کا استعمال شروع کرنے کے لیے اکاؤنٹ ایکٹیویشن لنک کے ساتھ ایک ای میل موصول ہوگا۔
