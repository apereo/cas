MISSING_SAML_REQUEST=SAML2 کی توثیق کی درخواست کا تعین CAS سیشن اسٹور سے نہیں کیا جا سکتا۔ اس کا عام طور پر مطلب یہ ہے کہ اصل SAML2 توثیق کی درخواست جو SAML2 سروس فراہم کنندہ کے ذریعے CAS کو جمع کرائی گئی تھی، تصدیق کی کوشش کے بعد دوبارہ حاصل اور بحال نہیں کی جا سکتی ہے کیونکہ بنیادی سیشن اسٹور نے یا تو توثیق کی درخواست کو زبردستی ہٹا دیا ہے یا اس بات کا تعین کیا ہے کہ ٹریک کردہ درخواست کی میعاد ختم ہو چکی تھی اور سیشن اسٹور کی پالیسی کی مدت ختم ہونے کی اجازت سے زیادہ۔ غلطی کی اصل وجہ کا پتہ لگانے کے لیے براہ کرم CAS سرور لاگز کا جائزہ لیں۔
