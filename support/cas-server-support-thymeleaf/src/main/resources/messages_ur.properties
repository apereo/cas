cas.mfa.webauthn.register.discoverablecredentials=آپ اپنا آلہ استعمال کرکے رجسٹر بھی کر سکتے ہیں۔ <i>قابل دریافت اسناد / رہائشی چابیاں</i>. اس کا مطلب ہے کہ پرائیویٹ کلید اور متعلقہ میٹا ڈیٹا کو استناد کار پر مستقل میموری میں محفوظ کیا جاتا ہے نہ کہ CAS سرور پر۔
