passwordless.getuser.description=اپنے اکاؤنٹ کا پتہ لگانے کے لیے براہ کرم اپنا صارف نام فراہم کریں۔ ایک بار جب آپ کے اکاؤنٹ کی تصدیق ہو جاتی ہے، CAS آپ کے لیے توثیق کی مناسب حکمت عملی کا انتخاب کرے گا۔
passwordless.selection.header=توثیق کا انتخاب
passwordless.selection.description=آگے بڑھنے کے لیے ذیل میں درج تصدیقی اختیارات میں سے ایک کو منتخب کریں۔
passwordless.selection.password.header=پاس ورڈ
passwordless.selection.password.description=آپ اپنا پاس ورڈ استعمال کرکے تصدیق کر سکتے ہیں۔ اگر آپ کا اکاؤنٹ اہل ہے تو آپ سے ملٹی فیکٹر تصدیقی بہاؤ کو مکمل کرنے کے لیے بھی کہا جا سکتا ہے۔
passwordless.selection.token.header=ٹوکن
passwordless.selection.token.description=آپ کو سی اے ایس کی جانب سے ای میل یا ایس ایم ایس کے ذریعے ایک وقتی ٹوکن ملے گا، جو محدود مدت کے لیے درست ہے اور آپ کو آگے بڑھنے کے لیے کوڈ واپس داخل کرنے کے لیے کہا جائے گا۔
passwordless.selection.mfa.header=ملٹی فیکٹر
passwordless.selection.mfa.description=آپ کو براہ راست ملٹی فیکٹر تصدیق کے بہاؤ کی طرف لے جایا جائے گا۔ ایک بار جب آپ تصدیق کا مرحلہ مکمل کر لیں گے، بہاؤ خود بخود دوبارہ شروع ہو جائے گا۔
passwordless.selection.delegation.header=بیرونی
passwordless.selection.delegation.description=لاگ ان کرنے کے لیے آپ کو ایک بیرونی شناخت فراہم کنندہ کے پاس بھیجا جائے گا۔ ایک بار جب آپ بیرونی شناخت فراہم کنندہ کے ساتھ توثیق کا عمل مکمل کر لیتے ہیں، تو آپ کو جاری رکھنے کے لیے خود بخود واپس CAS پر بھیج دیا جائے گا۔
cas.authn.qr.fail=QR کوڈ کی بنیاد پر تصدیق کی درخواست قبول کرنے سے قاصر ہے۔ اس بات کو یقینی بنائیں کہ QR کوڈ درست طریقے سے اسکین کیا گیا ہے، اور فراہم کردہ اسناد درست ہیں، جو اس CAS سرور کے ذریعے جاری کیے گئے ہیں اور ان کی میعاد ختم نہیں ہوئی ہے۔
