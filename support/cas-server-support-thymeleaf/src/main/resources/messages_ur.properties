service.principal.resolution.error=CAS درست توثیق کے اصول کا تعین کرنے سے قاصر ہے۔ یا تو پرنسپل کو ایک منفرد ہستی کے طور پر درست طریقے سے حل نہیں کیا جا سکا یا CAS کو مخلوط/متعدد امیدوار پرنسپل ملے ہیں اور وہ یہ فیصلہ کرنے سے قاصر ہے کہ کون سا استعمال کیا جانا چاہیے۔ یہ خرابی اس وقت بھی ہو سکتی ہے اگر تصدیق شدہ پرنسپل کو CAS سرور کی اجازت کی پالیسیوں کے ذریعے متعین کردہ مراعات کی کمی کی وجہ سے ہدف کی درخواست تک رسائی کی اجازت نہ ہو۔
