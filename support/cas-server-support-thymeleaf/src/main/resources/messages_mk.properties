OAUTH_BAD_SESSION_REQUEST=Барањето OAuth не може да се комплетира, бидејќи CAS не може да ја лоцира или одреди URL-адресата за пренасочување на OAuth. Ова е обично показател за застоено или неусогласено барање каде што идентификацијата на сесијата за обработено барање е различна од активната сесија и може да биде предизвикана од целосна операција за одјавување. Исчистете ги колачињата и историјата, рестартирајте го прелистувачот и обидете се повторно.
screen.oidc.confirm.ciba.header=Барање за автентикација на задниот канал
