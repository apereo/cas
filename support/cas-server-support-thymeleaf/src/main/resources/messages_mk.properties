cas.mfa.providerselection.optional.header=Изборна мултифакторска автентикација
cas.mfa.providerselection.optional.description=Повеќефакторската автентикација е конфигурирана да биде опционална и може да продолжите без да изберете провајдер за да продолжите.
cas.mfa.providerselection.mfa-duo=Duo Security
cas.mfa.providerselection.mfa-duo.notes=Широката разновидност на методи за автентикација на Duo му овозможуваат на секој корисник безбедно и брзо да се најави.
cas.mfa.providerselection.mfa-webauthn=FIDO2 WebAuthn
cas.mfa.providerselection.mfa-webauthn.notes=WebAuthn е API што многу го олеснува интегрирањето на силната автентикација во апликациите на потпираната страна, како што е веб-услугата, користејќи поддршка вградена во сите водечки прелистувачи и платформи. 
cas.mfa.providerselection.mfa-gauth=Google Authenticator
cas.mfa.providerselection.mfa-gauth.notes=Google Authenticator е софтверски автентикатор кој имплементира услуги за верификација во два чекора за автентикација на корисниците на мобилни апликации од Google.
cas.mfa.providerselection.mfa-simple=CAS мултифакторска автентикација
cas.mfa.providerselection.mfa-simple.notes=Дозволете CAS да дејствува како провајдер за повеќефакторска автентикација самостојно, издавајќи токени и испраќајќи ги до крајните корисници преку однапред дефинирани канали за комуникација, како што се е-пошта или текстуални пораки.
cas.mfa.providerselection.mfa-yubikey=YubiKey мултифакторска автентикација
cas.mfa.providerselection.mfa-yubikey.notes=Yubico е услуга базирана на облак која овозможува силна, лесна за употреба и достапна двофакторна автентикација со еднократни лозинки преку нивниот водечки производ, YubiKey. 
cas.mfa.duologin.pagetitle=Најава за безбедност на Duo
cas.mfa.simple.contact-selection.title=Изберете Информации за контакт
cas.mfa.simple.contact-selection.description=Најдовме повеќе начини да ве контактираме за вашата сметка. Изберете ги сметките каде што сакате да го добиете токенот за повеќефакторска автентикација.
cas.mfa.simple.pagetitle=Најава за повеќефакторска автентикација на CAS
cas.mfa.simple.label.token=Токен:
cas.mfa.simple.label.resend=Испрати повторно
cas.mfa.simple.label.tokensent=Ви се испраќа токен за повеќефакторска автентикација преку е-пошта или текстуална порака. Лоцирајте го токенот и испратете го овде за да продолжите. Имајте предвид дека токенот ќе истече по краток временски период и повеќе нема да биде препознаен од CAS, во тој случај, може да побарате од CAS да ви испрати нов токен.
cas.mfa.simple.label.contactfailed.sms=CAS не може да ги користи избраните информации за контакт за да ви испрати SMS со токенот за повеќефакторска автентикација. Ве молиме прегледајте ги вашите информации за контакт и контактирајте со вашиот CAS администратор за помош.
cas.mfa.simple.label.contactfailed.email=CAS не може да ги користи избраните информации за контакт за да ви испрати е-пошта со токенот за повеќефакторска автентикација. Ве молиме прегледајте ги вашите информации за контакт и контактирајте со вашиот CAS администратор за помош.
cas.mfa.simple.token.failed=Не може да се прифати овој обид за повеќефакторска автентикација. Обезбедениот токен е неважечки.
cas.mfa.simple.registration.title=Регистрација на сметка
cas.mfa.simple.registration.description=Вашата сметка не е регистрирана за повеќефакторска автентикација иако е подобна и потребна од апликацијата до која се обидувате да пристапите. Ве молам <a href="https://account.example.org/mfa">регистрирајте ја вашата сметка</a> за повеќефакторска автентикација и осигурајте се дека CAS има пристап до вашите информации за контакт, како што се адресата на е-пошта, телефонот итн.
cas.mfa.simple.registration.email.failed=Не може да се регистрира вашата сметка за повеќефакторска автентикација. CAS не може да ја препознае и прифати вашата адреса за е-пошта за да ви испрати е-пошта со врската за регистрација. Ве молиме прегледајте ги вашите информации за контакт и контактирајте со вашиот CAS администратор за помош.
cas.mfa.simple.registration.email.sent=Ви е испратена е-пошта со токенот за регистрација. Ве молиме проверете го вашето сандаче и кодот на добавувачот овде.
cas.mfa.simple.registration.token.failed=Не може да се регистрира вашата сметка за повеќефакторска автентикација. Обезбедениот токен е неважечки, истечен или на друг начин компромитиран. Прегледајте го токенот и обидете се повторно.
cas.mfa.twilio.pagetitle=Twilio мултифакторска автентикација
cas.mfa.twilio.label.token=Токен:
cas.mfa.twilio.label.tokensent=Ви е испратен токен за повеќефакторска автентикација. Лоцирајте го токенот и испратете го овде за да продолжите.
