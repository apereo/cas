screen.success.header=Најавете се успешно
screen.success.success=Ти, <strong>{0}</strong>, успешно се најавија на Централната услуга за автентикација. Сепак, ја гледате оваа страница бидејќи CAS не знае за вашата целна дестинација и како да ве однесе таму. Повторно испитајте го барањето за автентикација и проверете дали е наведена целната услуга/апликација која е овластена и регистрирана во CAS.
screen.success.security=Кога ќе завршите, од безбедносни причини, ве молиме <a href="logout">одјави се</a> и излезете од вашиот веб-прелистувач.
screen.logout.confirm.header=Дали вие, <strong>{0}</strong>, сакате целосно да се одјавите?
screen.logout.confirm.header.anonymous=Дали сакате целосно да се одјавите?
screen.logout.confirm.text=<p>Можеби апликацијата ве пренасочила до Централната служба за автентикација за целосно да ве одјави и да ја уништи вашата единствена сесија за најавување. Ако изберете да се одјавите, ќе биде побарано повторно да ги дадете вашите ингеренции и повторно да се најавите откако ќе се обидете да пристапите до апликација.</p>
screen.logout.confirm.proceed=Дали сакате да продолжите?
screen.logout.header=Одјавувањето е успешно
screen.logout.success=Успешно се одјавивте од Централната услуга за автентикација. Можеш <a href="{0}">најавете се</a> повторно.
screen.logout.fc.success=Успешно се одјавивте од Централната услуга за автентикација. Со оглед на тоа што едно одјавување е овозможено со CAS, следнава листа на апликации се <strong> само известени</strong> да ве одјави и да ја уништи вашата корисничка сесија. Запомнете дека ова е само известување, а не гаранција. На самата апликација е да ги почитува овие известувања и правилно да преземе мерки за да ве одјави.
screen.logout.security=Од безбедносни причини, излезете од вашиот веб-прелистувач.
screen.logout.pending=Барањето за одјавување се чека…
screen.service.wildcard.message=Оваа апликација нема посебен запис за регистрација во регистарот на услуги CAS. Тоа е овластено и дозволено од CAS затоа што постои запис за дефиниција на услуга со букви во регистарот на услуги на CAS што дозволува и прифаќа барања за автентикација од непознати апликации како што е оваа. <p/>Како најдобра безбедносна практика, силно се препорачува да се ограничи капацитетот за управување со услуги на <strong>вклучи само список на познати апликации</strong> кои се експлицитно овластени да користат CAS. Оставањето на интерфејсот за управување отворен за сите апликации може да создаде можност за безбедносни напади и ќе ја отежне ревизијата на барањата за апликацијата и потребите за атрибути.
screen.service.sso.error.header=Потребна е повторна автентикација за пристап до оваа услуга
screen.service.sso.error.message=Се обидовте да пристапите до услуга која бара автентикација без повторна автентикација.  Обидете се повторно да се автентицирате</a>.
screen.service.required.message=Се обидовте со автентикација без да ја наведете целната апликација. Ве молиме преиспитајте го барањето и обидете се повторно.
screen.service.initial.message=Обидот за пристап до CAS или наведената целна апликација во овој момент е забранет. Политиката за автентикација бара да ја промените почетната апликација и потоа да преминете на други апликации и услуги.
captchaError=Потврдата на reCAPTCHA не успеа.
username.required=Корисничкото име е задолжително поле.
password.required=Лозинката е задолжително поле.
source.required=Изворот за автентикација е задолжително поле.
confirmedPassword.required=Лозинката мора да биде потврдена.
pm.passwordsMustMatch=Обезбедените лозинки не се совпаѓаат.
pm.passwordFailedCriteria=Обезбедената лозинка не ја задоволува безбедносната политика за лозинка. Ве молиме обидете се повторно.
pm.updateFailure=Лозинката на сметката не може да се измени. Ве молиме обидете се повторно.
authenticationFailure.AccountDisabledException=Оваа сметка е оневозможена.
authenticationFailure.AccountLockedException=Оваа сметка е заклучена.
authenticationFailure.AccountExpiredException=Оваа сметка е истечена и во овој момент е забрането да се најавите.
authenticationFailure.CredentialExpiredException=Вашата лозинка е истечена.
authenticationFailure.InvalidLoginLocationException=Не можете да се најавите од оваа работна станица.
authenticationFailure.UniquePrincipalRequiredException=Не можете да се најавите во моментов, бидејќи имате уште една активна единечна сесија за најавување во тек и CAS е конфигуриран со политика за автентикација што спречува повеќе истовремени сесии за едно најавување.
authenticationFailure.InvalidLoginTimeException=Во овој момент, вашата сметка е забранета да се најавува.
authenticationFailure.AccountNotFoundException=Вашата сметка не е препознаена и не може да се најавите во моментов.
authenticationFailure.FailedLoginException=Обидот за автентикација не успеа, најверојатно поради неважечки акредитиви. Потврдете и обидете се повторно.
authenticationFailure.MultifactorAuthenticationProviderAbsentException=Не може да се задоволат барањата за повеќефакторска автентикација. Вашата сметка е конфигурирана за стратегија за повеќефакторска автентикација, но сепак CAS не може да ја лоцира и изврши таа стратегија најверојатно поради погрешна конфигурација на серверот. Контактирајте ги администраторите на услугите за помош.
authenticationFailure.SurrogateAuthenticationException=Во моментов не сте овластени да го имитирате наведениот корисник.
authenticationFailure.AccountPasswordMustChangeException=Лозинката на вашата сметка е истечена и мора да се смени.
authenticationFailure.UnauthorizedServiceForPrincipalException=Пристапот до услугата е одбиен поради пропуштени привилегии.
authenticationFailure.MultifactorAuthenticationRequiredException=Обидот за автентикација за вашата сметка е одбиен, бидејќи вашата сметка сè уште не е конфигурирана да поминува низ повеќефакторска автентикација. Контактирајте со администраторите на услугата за помош, проверете дали вашата сметка е запишана и подобна за повеќефакторска автентикација и обидете се повторно.
authenticationFailure.MultifactorAuthenticationFailedException=Обидот за повеќефакторска автентикација не успеа, најверојатно поради неважечки акредитиви за повеќефакторска автентикација. Потврдете и обидете се повторно.
authenticationFailure.RiskyAuthenticationException=CAS не може да продолжи со протокот на автентикација, најверојатно затоа што овој обид за автентикација е утврдено дека е ризичен и сомнителен со доволно висок резултат на ризик над прифатениот праг. Можеби вашиот обид за автентикација е блокиран затоа што користите непознат веб-прелистувач или се најавувате од непозната локација. За дополнителни информации и насоки, ве молиме контактирајте со вашиот администратор и/или пултот за помош.
authenticationFailure.UNKNOWN=Обидот за автентикација не успеа.
authenticationFailure.AuthenticationException=Акредитациите се отфрлени/неважечки и обидот за автентикација не успеа.
INVALID_REQUEST_PROXY=Барањето е погрешно форматирано. Проверете дали сите потребни параметри се правилно кодирани и вклучени.
INVALID_TICKET_SPEC=Спецификацијата за валидација на билетот не успеа. Можните грешки може да вклучуваат обид за валидација на прокси билет преку валидатор на услужен билет или неусогласеност со барањето „обнови=точно“.
INVALID_REQUEST=Не може да се идентификува, овласти или комплетира ова барање, најверојатно поради погрешно или недостиг на потребните параметри.
INVALID_AUTHENTICATION_CONTEXT=Барањето за валидација за [''{0}''] не може да биде задоволен. Барањето е или непризнаено или неисполнето.
INVALID_TICKET=билет ''{0}'' не е препознаен
INVALID_PROXY_GRANTING_TICKET=PGT веќе е генериран за овој ST. Не може да се додели повеќе од еден PGT за ST
INVALID_SERVICE=билет ''{0}'' не се совпаѓа со испорачаната услуга. Оригиналната услуга беше ''{1}'' и обезбедената услуга беше ''{2}''.
INVALID_PROXY_CALLBACK=Доставената URL-адреса за повратен повик на прокси ''{0}'' не можеше да се автентицира. или ''{0}'' не може да се постигне или не е дозволено да се врши проверка на прокси.
UNAUTHORIZED_SERVICE_PROXY=Обезбедената услуга ''{0}'' не е овластен да користи CAS автентикација на прокси.
UNSATISFIED_AUTHN_POLICY=Пристапот до услугата е одбиен поради незадоволна политика за автентикација.
INVALID_AUTHN_REQUEST=Обидот за автентикација не успеа, најверојатно поради неважечки акредитиви.
BLOCKED_AUTHN_REQUEST=Обидот за автентикација е блокиран и не може да продолжи, најверојатно поради неправилно обликување или недостаток на потребните параметри. Испитајте ги дневниците на серверот CAS за да ја лоцирате основната причина за грешката.
UNSATISFIED_SAML_REQUEST=Барањето за автентикација SAML не може да биде разбрано, прифатено или потврдено од CAS, најверојатно поради погрешно или недостиг на потребните параметри. Проверете ги дневниците на серверот CAS за да ја лоцирате основната причина за грешката.
MISSING_SAML_REQUEST=Барањето за автентикација SAML2 не може да се одреди од продавницата за сесии CAS. Ова обично значи дека оригиналното барање за автентикација SAML2 што беше поднесено до CAS преку давател на услуги SAML2 не може да се врати и обнови по обид за автентикација, најверојатно затоа што основната продавница за сесија или насилно го отстрани барањето за автентикација или утврди дека следеното барање е истечено и застоено, надвор од она што го дозволува политиката за истекување на продавницата за сесии. Проверете ги дневниците на серверот CAS за да ја лоцирате основната причина за грешката.
screen.service.error.header=Апликацијата не е овластена да користи CAS
screen.service.error.redirect=Не сте овластени за пристап до оваа апликација. Ве молиме бидете трпеливи бидејќи ќе ве пренасочат <strong>{0}</strong> за да дознаете повеќе за ова сценарио.
service.principal.resolution.error=CAS не може да ја одреди точната главна автентикација. Или главниот обврзник не може да се реши правилно бидејќи единствен ентитет или CAS нашол мешани/повеќе кандидати директори и не може да одлучи кои треба да се користат. Оваа грешка може да биде предизвикана и ако на автентицираната главна сметка не му е дозволено да пристапи до целната апликација поради пропуштени привилегии поставени од политиките за авторизација на серверот CAS.
service.not.authorized.missing.attr=Не сте овластени да пристапите до апликацијата бидејќи на вашата сметка недостасуваат привилегии што ги бара серверот CAS за автентикација на оваа услуга. Ве молиме известете го вашето биро за поддршка.
screen.service.error.message=Апликацијата на која се обидовте да се автентицирате не е овластена да користи CAS. Ова обично укажува дека апликацијата не е регистрирана во CAS, или нејзината политика за овластување дефинирана во записот за регистрација ја спречува да ја искористи функционалноста на CAS или дека е погрешно формирана и непризнаена од CAS. Контактирајте со вашиот CAS администратор за да дознаете како можете да ја регистрирате и интегрирате вашата апликација со CAS.
screen.service.empty.error.message=Регистарот на услуги на CAS е празен и нема дефиниции за услуги. Апликациите што сакаат да се автентицираат со CAS мора експлицитно да бидат дефинирани во регистарот на услуги.
screen.service.expired.message=Апликацијата на која се обидовте да се автентицирате е истечена во регистарот на услуги CAS. Ако оваа услуга сè уште треба да се смета дека се користи, ве молиме контактирајте со администраторите на услугата за да се обнови апликацијата.
screen.surrogates.account.selection.header=Избор на сметка за имитирање
screen.surrogates.choose.account=Изберете Сметка
screen.surrogates.message=<p>Ви е доставен список на сметки во име на кои ви е дозволено да ги автентицирате.</p> <p>Изберете еден и продолжете.</p>
screen.surrogates.button.cancel=Откажи
screen.surrogates.account.selection.error=Во моментов не сте овластени да го имитирате наведениот корисник.
screen.surrogates.wildcard.title=Избор на сметка за имитирање 
screen.surrogates.wildcard.description=Вашата сметка е внатрешно препознаена од CAS како сметка со посебни дозволи, овластена да ги имитира сите корисници и сметки. Затоа, изборот на сметка за имитирање не е дозволен за вашата сметка. Наместо тоа, можете директно да продолжите да се најавувате и да имитирате која било друга сметка користејќи го нејзиното корисничко име.
screen.browserstorage.failure.title=Не може да се продолжи на следниот чекор.
screen.browserstorage.failure.message=API за складирање веројатно не е поддржан или достапен во вашиот прелистувач. Механизмот за складирање мора да биде конфигуриран да користи складирање од страна на серверот. Контактирајте со ИТ персоналот на вашата организација за помош.
password.expiration.warning=Вашата лозинка истекува {0} ден(и). Ве молам <a href="https://pm.example.edu">сменете ја вашата лозинка</a> сега.
password.expiration.loginsRemaining=Имате {0} најавување(а) кои остануваат пред вас <strong>МОРА</strong> сменете ја вашата лозинка.
