screen.samlidp.error.description=Услугата на која се обидувате да се најавите, идентификуваше проблем со вашиот профил или барање. Ве молиме контактирајте со вашата ИТ служба за поддршка за поддршка.
screen.unavailable.header=CAS грешка
screen.unavailable.heading=CAS не може да го обработи ова барање:{0}:{1}"
screen.unavailable.message=Настана грешка при обидот да се заврши вашето барање. <strong>Ве молиме известете го вашето биро за поддршка или обидете се повторно.</strong> <p><div>Apereo е непрофитна фондација за управување со софтвер со отворен код. Софтверот CAS е проект спонзориран на Apereo и може слободно да се преземе и да го користи секој. Сепак, Apereo не управува со системите на никого што го користи софтверот и во повеќето случаи дури и не знае кој го користи или како да контактира со нив, освен ако тие не се активен дел од заедницата на Apereo.<br/></br>Ако имате проблеми со најавувањето користејќи CAS, <strong>ќе треба да го контактирате персоналот за ИТ или Help Desk на вашата организација за помош</strong>. <br/><br/>Посакуваме да можевме подиректно да ви помогнеме.</div>
