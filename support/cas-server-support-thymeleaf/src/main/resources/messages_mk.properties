screen.authentication.webauthn.qr.success.title=Успешна автентикација
screen.authentication.webauthn.qr.success.desc=Сега сте успешно автентицирани со вашиот уред со FIDO2. CAS сега автоматски ќе го препознае вашиот обид за автентикација и ќе продолжи на следниот чекор. Може да го затворите овој прозорец и да се вратите на оригиналниот екран.
screen.authentication.webauthn.qr.fail.title=Автентикацијата не успеа
screen.authentication.webauthn.qr.fail.desc=Обидот за автентикација не успеа. Проверете дали вашето корисничко име и избраниот уред се регистрирани со CAS и проверете ги дневниците на серверот CAS за да ја одредите основната причина за грешката. Идните обиди за автентикација ќе бидат блокирани. Не го освежувајте прозорецот и наместо тоа, размислете за рестартирање на процесот на автентикација.
screen.authentication.webauthn.qr.info=Ако го немате вашиот уред со FIDO со вас или овој уред не е регистриран во CAS, можете да го скенирате QR-кодот подолу и да се автентицирате со помош на друг (мобилен) уред. Откако успешно ќе ја потврдите автентичноста, автоматски ќе продолжите на следниот чекор.
