screen.authnblocked.message=Вашиот обид за автентикација е недоверлив и неовластен од вашата тековна работна станица.
screen.risk.authnconfirmed.heading=Обидот за ризична автентикација е потврден.
screen.risk.authnconfirmed.message=Обидот за ризична автентикација не може да се потврди и потврди.
screen.risk.authnblocked.heading=Обидот за автентикација е блокиран.
