screen.oidc.confirm.claim.preferred_username=МОЖЕ да е која било валидна JSON низа, вклучувајќи специјални знаци како што се @, / или празно место. RP НЕ СМЕЕ да се потпира на тоа дека оваа вредност е единствена.
screen.oidc.confirm.claim.profile=URL на страницата на профилот на крајниот корисник. Содржината на оваа веб-страница ТРЕБА да биде за крајниот корисник.
screen.oidc.confirm.claim.picture=URL на профилната слика на крајниот корисник. Оваа URL-адреса МОРА да се однесува на датотека со слика (на пример, датотека со слика PNG, JPEG или GIF), наместо на веб-страница што содржи слика. Забележете дека оваа URL-адреса ТРЕБА конкретно да упатува на фотографија на профилот на крајниот корисник погодна за прикажување при опишување на крајниот корисник, наместо произволна фотографија направена од крајниот корисник.
screen.oidc.confirm.claim.phone_number=Префериран телефонски број на крајниот корисник. Се препорачува како формат на ова тврдење. На пример, <code>+1 (425) 555-1212</code> или <code>+56 (2) 687 2400</code>.
