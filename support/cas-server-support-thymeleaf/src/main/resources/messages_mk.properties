screen.oidc.confirm.bindingmessage.header=Обврзувачка порака
screen.oidc.confirm.bindingmessage.description=Идентификатор или порака што може да се чита од човек, наменета да се прикаже и на уредот за потрошувачка и на уредот за автентикација за да ги заглави заедно за трансакцијата преку визуелен знак за крајниот корисник. Оваа испреплетена порака му овозможува на крајниот корисник да се осигура дека дејството преземено на уредот за автентикација е поврзано со барањето иницирано од уредот за потрошувачка.
screen.oidc.confirm.usercode.header=Кориснички код
screen.oidc.confirm.usercode.description=Таен код, како лозинка или пин, кој е познат само на корисникот, но може да се провери од CAS. Кодот се користи за овластување за испраќање барање за автентикација до уредот за автентикација на корисникот.
