passwordless.token.header=Обезбедете токен
passwordless.token.description=Ве молиме наведете го безбедносниот токен испратен до вас преку е-пошта, телефон, итн. Имајте предвид дека токенот важи само за краток прозорец и по поднесувањето, сите други токени ќе бидат поништени и отстранети.
passwordless.error.failure.title=Неуспех во автентикацијата
passwordless.error.failure.description=Обезбедениот токен не може да се потврди. Можеби е поништена, отстранета или истечена.
passwordless.error.unknown.user=Обезбеденото корисничко име не може да биде препознаено и лоцирано од CAS.
passwordless.error.invalid.user=Обезбеденото корисничко име не содржи доволно информации за контакт.
passwordless.getuser.header=Автентикација без лозинка
passwordless.getuser.description=Ве молиме внесете го вашето корисничко име за да ја лоцирате вашата сметка. Откако вашата сметка ќе биде потврдена, CAS ќе ја избере соодветната стратегија за автентикација за вас.
passwordless.selection.header=Избор за автентикација
passwordless.selection.description=Изберете една од опциите за автентикација наведени подолу за да продолжите.
passwordless.selection.password.header=Лозинка
passwordless.selection.password.description=Може да се автентицирате користејќи ја вашата лозинка. Може да биде побарано и од вас да завршите повеќефакторски тек на автентикација доколку вашата сметка е подобна.
passwordless.selection.token.header=Токен
passwordless.selection.token.description=Ќе добиете еднократен токен, валиден за ограничен временски период, преку е-пошта или СМС од CAS и ќе биде побарано да го внесете кодот назад за да продолжите.
passwordless.selection.mfa.header=Мултифактор
passwordless.selection.mfa.description=Ќе бидете директно насочени кон проток на повеќефакторска автентикација. Откако ќе го завршите чекорот за автентикација, протокот автоматски ќе продолжи.
passwordless.selection.delegation.header=Надворешен
passwordless.selection.delegation.description=Ќе бидете испратени до надворешен давател на идентитет за да се најавите. Откако ќе го завршите протокот на автентикација со надворешниот давател на идентитет, автоматски ќе бидете пренасочени назад во CAS за да продолжите.
cas.authn.qr.fail=Не може да се прифати барањето за автентикација врз основа на QR-кодот. Проверете дали QR-кодот е правилно скениран и под услов акредитивите да се валидни, издадени од овој CAS-сервер и да не се истечени.
cas.inwebo.checkresult.title=Проверка на автентикацијата на Inwebo
cas.inwebo.checkresult.heading=Се чека да се одобри известувањето Inwebo:
cas.inwebo.checkresult.message=Потврдете го на вашиот телефон/десктоп…
cas.inwebo.error.title=Грешка при автентикација на Inwebo
cas.inwebo.error.heading=Се појави грешка.
cas.inwebo.error.userrefusedortoolate=Ја одбивте автентикацијата или не ја потврдивте доволно брзо.
cas.inwebo.error.usernotregistered=Пред секое најавување, мора да бидете регистрирани на Inwebo. Проверете го вашето поштенско сандаче за да го следите процесот на запишување или пополнете ги вашите шифри за активирање и PIN-кодовите подолу за да се запишете во вашиот прелистувач…
