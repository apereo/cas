cas.screen.acct.title=Регистрација на сметка
cas.screen.acct.intro=Ве молиме пополнете го формуларот подолу за да ја регистрирате вашата нова сметка во CAS. Откако ќе се поднесе формуларот, ќе добиете е-пошта со врска за активирање на сметката за да ја овозможите вашата сметка, да ја поставите лозинката и да започнете со користење на CAS.
cas.screen.acct.infosent=Упатствата за активирање на сметката се успешно испратени. Ве молиме проверете ја вашата е-пошта итн. и следете ги инструкциите.
cas.screen.acct.intro.complete=Добредојдовте назад! Ви благодариме што ја потврдивте вашата сметка. Ве молиме пополнете го формуларот подолу за да ја регистрирате вашата нова сметка во CAS. 
cas.screen.acct.intro.completed=Ви благодариме! Вашата сметка сега е активирана и регистрирана во CAS.
