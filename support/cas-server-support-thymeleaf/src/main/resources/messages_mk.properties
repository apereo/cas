screen.authentication.yubikey.reganotherdevice=Можете исто така да регистрирате друг уред за користење за повеќефакторска автентикација.
screen.authentication.yubikey.name=Име на уред:
cas.mfa.yubikey.pagetitle=YubiKey автентикација
cas.mfa.yubikey.authenticate=Користете ги регистрираните уреди (и) YubiKey за автентикација.
cas.mfa.yubikey.register=Вашиот уред сè уште не е регистриран. Користете го формуларот подолу за да го регистрирате вашиот уред со CAS.
cas.mfa.yubikey.register.fail=Не може да се регистрира вашиот уред YubiKey за автентикација. Обезбедениот токен може да биде неважечки, истечен или на друг начин компромитиран.
cas.mfa.yubikey.label.token=Токен:
cas.mfa.webauthn.auth.fail=Не може да се потврди вашиот уред за автентикација. Под услов товарите да бидат невалидни, истечени или на друг начин компромитирани.
cas.mfa.webauthn.register.helptext=Доделете пријателско име на вашиот уред со FIDO2, а потоа регистрирајте го со CAS за повеќефакторска автентикација. Откако регистрацијата на уредот ќе биде успешно завршена, автоматски ќе бидете пренасочени на следниот чекор за да се најавите со вашиот уред.
cas.mfa.webauthn.register.wait=Вашиот уред со FIDO2 сега е регистриран во CAS. Ве молиме почекајте…
cas.mfa.webauthn.register.discoverablecredentials=Можете исто така да го регистрирате вашиот уред користејќи <i>Ингеренциите за откривање / клучеви за резидент</i>. Ова значи дека приватниот клуч и поврзаните метаподатоци се зачувани во постојана меморија на автентикаторот, а не на CAS-серверот.
cas.mfa.registerdevice.label.title=Регистрирајте го уредот
cas.mfa.registerdevice.label.intro=Ве молиме именувајте го тековниот уред.
cas.mfa.registerdevice.pagetitle=Регистрирајте го уредот
cas.mfa.registerdevice.label.name=Име
cas.mfa.registerdevice.label.duration=Колку долго треба да го паметиме овој уред?
