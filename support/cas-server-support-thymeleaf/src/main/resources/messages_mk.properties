screen.oidc.confirm.claim.name=Целосното име на крајниот корисник во форма што може да се прикаже, вклучувајќи ги сите делови од имињата, можеби вклучувајќи наслови и суфикси, подредени според локацијата и преференциите на крајниот корисник.
screen.oidc.confirm.claim.given_name=Дадено(и) име(и) или име(и) на крајниот корисник. Забележете дека во некои култури, луѓето можат да имаат повеќе дадени имиња; сите можат да бидат присутни, а имињата се одделени со празно место.
screen.oidc.confirm.claim.middle_name=Средно име(и) на крајниот корисник. Забележете дека во некои култури, луѓето можат да имаат повеќе средни имиња; сите можат да бидат присутни, а имињата се одделени со празно место. Исто така, имајте во предвид дека во некои култури, средните имиња не се користат.
screen.oidc.confirm.claim.family_name=Презиме(и) или презиме(и) на крајниот корисник. Забележете дека во некои култури, луѓето може да имаат повеќе презимиња или без презиме; сите можат да бидат присутни, а имињата се одделени со празно место.
