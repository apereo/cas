cas.mfa.yubikey.label.token=Žeton:
cas.mfa.webauthn.auth.fail=Ni mogoče preveriti vaše naprave za preverjanje pristnosti. Zagotovljeni koristni tovori so lahko neveljavni, potečeni ali kako drugače ogroženi.
cas.mfa.webauthn.register.helptext=Svoji napravi, ki podpira FIDO2, dodelite prijazno ime in jo nato registrirajte pri CAS za večfaktorsko avtentikacijo. Ko je registracija naprave uspešno zaključena, boste samodejno preusmerjeni na naslednji korak za prijavo z vašo napravo.
cas.mfa.webauthn.register.wait=Vaša naprava, ki podpira FIDO2, je zdaj registrirana pri CAS. Počakajte prosim ...
cas.mfa.webauthn.register.discoverablecredentials=Svojo napravo lahko tudi registrirate z <i>Odkrite poverilnice/stalni ključi</i>. To pomeni, da so zasebni ključ in povezani metapodatki shranjeni v obstojnem pomnilniku v overitelju in ne v strežniku CAS.
