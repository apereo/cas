passwordless.getuser.header=Preverjanje pristnosti brez gesla
passwordless.getuser.description=Vnesite svoje uporabniško ime, da poiščete svoj račun. Ko bo vaš račun preverjen, bo CAS za vas izbral ustrezno strategijo avtentikacije.
passwordless.selection.header=Izbira avtentikacije
passwordless.selection.description=Za nadaljevanje izberite eno od spodaj navedenih možnosti preverjanja pristnosti.
