OAUTH_BAD_SESSION_REQUEST=Zahteve OAuth ni mogoče dokončati, ker CAS ne more najti ali določiti URL-ja za preusmeritev OAuth. To je običajno znak zastarele ali neujemajoče se zahteve, kjer se ID seje obdelane zahteve razlikuje od aktivne seje in je lahko posledica popolne operacije odjave. Počistite piškotke in zgodovino, ponovno zaženite brskalnik in poskusite znova.
