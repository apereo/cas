authenticationFailure.UniquePrincipalRequiredException=Trenutno se ne morete prijaviti, ker imate v teku še eno aktivno sejo enotne prijave in je CAS konfiguriran s pravilnikom za preverjanje pristnosti, ki preprečuje več sočasnih sej enotne prijave.
authenticationFailure.InvalidLoginTimeException=Vaš račun je trenutno prepovedan za prijavo.
authenticationFailure.AccountNotFoundException=Vaš račun ni prepoznan in se trenutno ne more prijaviti.
authenticationFailure.FailedLoginException=Poskus preverjanja pristnosti ni uspel, verjetno zaradi neveljavnih poverilnic. Preverite in poskusite znova.
authenticationFailure.MultifactorAuthenticationProviderAbsentException=Ni mogoče izpolniti zahtev večfaktorske avtentikacije. Vaš račun je konfiguriran za strategijo večfaktorske avtentikacije, vendar CAS ne more najti in izvesti te strategije, najverjetneje zaradi napačne konfiguracije strežnika. Za pomoč se obrnite na skrbnike storitve.
authenticationFailure.SurrogateAuthenticationException=Trenutno niste pooblaščeni za lažno predstavljanje navedenega uporabnika.
authenticationFailure.AccountPasswordMustChangeException=Geslo vašega računa je poteklo in ga morate spremeniti.
authenticationFailure.UnauthorizedServiceForPrincipalException=Dostop do storitve zavrnjen zaradi manjkajočih pravic.
authenticationFailure.MultifactorAuthenticationRequiredException=Poskus avtentikacije za vaš račun je zavrnjen, ker vaš račun še ni konfiguriran za večfaktorsko avtentikacijo. Za pomoč se obrnite na skrbnike storitve, preverite, ali je vaš račun vpisan in primeren za večfaktorsko preverjanje pristnosti, in poskusite znova.
authenticationFailure.MultifactorAuthenticationFailedException=Poskus večfaktorske avtentikacije ni uspel, verjetno zaradi neveljavnih poverilnic za večfaktorsko avtentikacijo. Preverite in poskusite znova.
authenticationFailure.RiskyAuthenticationException=CAS ne more nadaljevati s tokom preverjanja pristnosti, verjetno zato, ker je ta poskus preverjanja pristnosti ugotovljen kot tvegan in sumljiv z dovolj visokim rezultatom tveganja nad sprejemljivim pragom. Morda je vaš poskus avtentikacije blokiran, ker uporabljate neznan spletni brskalnik ali pa se prijavljate z neznane lokacije. Za dodatne informacije in navodila se obrnite na skrbnika in/ali službo za pomoč uporabnikom.
authenticationFailure.UNKNOWN=Poskus avtentikacije ni uspel.
authenticationFailure.AuthenticationException=Poverilnice so zavrnjene/neveljavne in poskus preverjanja pristnosti ni uspel.
INVALID_REQUEST_PROXY=Zahteva je nepravilno oblikovana. Zagotovite, da so vsi zahtevani parametri pravilno kodirani in vključeni.
INVALID_TICKET_SPEC=Specifikacija veljavnosti vstopnice ni uspela. Možne napake lahko vključujejo poskus potrditve posredniške vstopnice prek validatorja storitvenih vstopnic ali neupoštevanje zahteve `renew=true`.
INVALID_REQUEST=Te zahteve ni mogoče identificirati, odobriti ali dokončati, verjetno zaradi napačno oblikovanih ali manjkajočih zahtevanih parametrov.
INVALID_AUTHENTICATION_CONTEXT=Zahteva za preverjanje veljavnosti za [''{0}''] ni mogoče zadovoljiti. Zahteva je neprepoznana ali neizpolnjena.
INVALID_TICKET=vstopnica ''{0}'' ni prepoznano
INVALID_PROXY_GRANTING_TICKET=PGT je že ustvarjen za ta ST. Ne more dodeliti več kot enega PGT za ST
INVALID_SERVICE=vstopnica ''{0}'' se ne ujema z opravljeno storitvijo. Prvotna storitev je bila ''{1}'' in opravljena storitev je bila ''{2}''.
INVALID_PROXY_CALLBACK=Naveden URL povratnega klica posrednika ''{0}'' ni bilo mogoče preveriti. bodisi ''{0}'' ni dosegljiv ali pa ni dovoljeno izvajati preverjanja pristnosti posrednika.
UNAUTHORIZED_SERVICE_PROXY=Opravljena storitev ''{0}'' ni pooblaščen za uporabo avtentikacije posrednika CAS.
UNSATISFIED_AUTHN_POLICY=Dostop do storitve zavrnjen zaradi nezadovoljenega pravilnika o preverjanju pristnosti.
INVALID_AUTHN_REQUEST=Poskus preverjanja pristnosti ni uspel, verjetno zaradi neveljavnih poverilnic.
BLOCKED_AUTHN_REQUEST=Poskus preverjanja pristnosti je blokiran in se ne more nadaljevati, verjetno zaradi napačno oblikovanih ali manjkajočih zahtevanih parametrov. Preglejte dnevnike strežnika CAS, da poiščete glavni vzrok napake.
UNSATISFIED_SAML_REQUEST=CAS ne more razumeti, sprejeti ali potrditi zahteve za preverjanje pristnosti SAML, verjetno zaradi napačno oblikovanih ali manjkajočih zahtevanih parametrov. Preverite dnevnike strežnika CAS, da poiščete glavni vzrok napake.
MISSING_SAML_REQUEST=Zahteve za preverjanje pristnosti SAML2 ni mogoče ugotoviti iz shrambe sej CAS. To običajno pomeni, da prvotne zahteve za preverjanje pristnosti SAML2, ki je bila poslana CAS-u prek ponudnika storitev SAML2, ni mogoče pridobiti in obnoviti po poskusu preverjanja pristnosti, verjetno zato, ker je osnovna shramba seje bodisi prisilno odstranila zahtevo za preverjanje pristnosti ali pa je ugotovila, da je sledena zahteva potekla in zastarela, več kot dovoljuje pravilnik o poteku shrambe seje. Preverite dnevnike strežnika CAS, da poiščete glavni vzrok napake.
screen.service.error.header=Aplikacija ni pooblaščena za uporabo CAS
screen.service.error.redirect=Niste pooblaščeni za dostop do te aplikacije. Bodite potrpežljivi, saj boste kmalu preusmerjeni na <strong>{0}</strong> če želite izvedeti več o tem scenariju.
service.principal.resolution.error=CAS ne more določiti pravilnega principala avtentikacije. Bodisi principala ni bilo mogoče pravilno razrešiti kot eno samo edinstveno entiteto ali pa je CAS našel mešane/več kandidatov za principale in se ne more odločiti, katerega bi bilo treba uporabiti. Do te napake lahko pride tudi, če overjenemu principalu ni dovoljen dostop do ciljne aplikacije zaradi manjkajočih privilegijev, ki jih določajo avtorizacijske politike strežnika CAS.
service.not.authorized.missing.attr=Niste pooblaščeni za dostop do aplikacije, ker vašemu računu manjkajo privilegiji, ki jih zahteva strežnik CAS za preverjanje pristnosti v tej storitvi. Prosimo, obvestite svojo službo za podporo.
screen.service.error.message=Aplikacija, v kateri ste poskušali preveriti pristnost, ni pooblaščena za uporabo CAS. To običajno pomeni, da aplikacija ni registrirana pri CAS ali da njena avtorizacijska politika, opredeljena v registracijskem zapisu, preprečuje, da bi izkoristila funkcionalnost CAS, ali pa je napačno oblikovana in je CAS ne prepozna. Obrnite se na skrbnika CAS, če želite izvedeti, kako lahko registrirate in integrirate svojo aplikacijo s CAS.
screen.service.empty.error.message=Register storitev CAS je prazen in nima definicij storitev. Aplikacije, ki se želijo avtentikirati s CAS, morajo biti izrecno definirane v registru storitev.
screen.service.expired.message=Aplikacija, v kateri ste poskušali preveriti pristnost, je potekla v registru storitev CAS. Če se ta storitev še vedno uporablja, se obrnite na skrbnike storitve, da obnovijo aplikacijo.
