cas.mfa.providerselection.mfa-duo=Varnost Duo
cas.mfa.providerselection.mfa-duo.notes=Širok nabor načinov preverjanja pristnosti Duo omogoča vsakemu uporabniku varno in hitro prijavo. Duo Push, ki ga pošlje aplikacija za preverjanje pristnosti Duo Mobile, omogoča uporabnikom, da odobrijo potisna obvestila za preverjanje svoje identitete.
cas.mfa.providerselection.mfa-webauthn=FIDO2 WebAuthn
cas.mfa.providerselection.mfa-webauthn.notes=WebAuthn je API, ki stranki, ki se zanaša, kot je spletna storitev, zelo olajša integracijo močne avtentikacije v aplikacije z uporabo podpore, vgrajene v vse vodilne brskalnike in platforme. 
cas.mfa.providerselection.mfa-gauth=Google Authenticator
cas.mfa.providerselection.mfa-gauth.notes=Google Authenticator je programski avtentifikator, ki izvaja dvostopenjske storitve preverjanja pristnosti uporabnikov mobilnih aplikacij s strani Googla.
cas.mfa.providerselection.mfa-simple=Večfaktorska avtentikacija CAS
cas.mfa.providerselection.mfa-simple.notes=Dovolite CAS, da sam deluje kot ponudnik večfaktorske avtentikacije, izdaja žetone in jih pošilja končnim uporabnikom prek vnaprej določenih komunikacijskih kanalov, kot so e-pošta ali besedilna sporočila.
cas.mfa.providerselection.mfa-yubikey=Večfaktorska avtentikacija YubiKey
cas.mfa.providerselection.mfa-yubikey.notes=Yubico je storitev v oblaku, ki omogoča močno, enostavno za uporabo in cenovno dostopno dvofaktorsko avtentikacijo z enkratnimi gesli prek njihovega vodilnega izdelka YubiKey. 
cas.mfa.duologin.pagetitle=Varnostna prijava Duo
cas.mfa.simple.contact-selection.title=Izberite Kontaktne informacije
cas.mfa.simple.contact-selection.description=Našli smo več načinov za stik z vami glede vašega računa. Prosimo izberite račun(-e), kjer želite prejeti žeton za večfaktorsko avtentikacijo.
cas.mfa.simple.pagetitle=Prijava z večfaktorsko avtentikacijo CAS
cas.mfa.simple.label.token=Žeton:
cas.mfa.simple.label.resend=Ponovno pošlji
cas.mfa.simple.label.tokensent=Žeton za večfaktorsko avtentikacijo vam pošljemo po e-pošti ali besedilnem sporočilu. Za nadaljevanje poiščite žeton in ga pošljite sem. Upoštevajte, da bo žeton po kratkem času potekel in ga CAS ne bo več prepoznal, v tem primeru lahko prosite CAS, da vam pošlje nov žeton.
cas.mfa.simple.label.contactfailed.sms=CAS ne more uporabiti izbranih kontaktnih podatkov, da bi vam poslal SMS z žetonom večfaktorske avtentikacije. Preglejte svoje kontaktne podatke in se za pomoč obrnite na skrbnika CAS.
cas.mfa.simple.label.contactfailed.email=CAS ne more uporabiti izbranih kontaktnih podatkov, da bi vam poslal e-pošto z žetonom za večfaktorsko avtentikacijo. Preglejte svoje kontaktne podatke in se za pomoč obrnite na skrbnika CAS.
cas.mfa.simple.token.failed=Tega poskusa večfaktorske avtentikacije ni mogoče sprejeti. Navedeni žeton je neveljaven.
cas.mfa.simple.registration.title=Registracija računa
cas.mfa.simple.registration.description=Vaš račun ni registriran za večfaktorsko avtentikacijo, čeprav je primerna in jo zahteva aplikacija, do katere poskušate dostopati. prosim <a href="https://account.example.org/mfa">registrirajte svoj račun</a> za večfaktorsko avtentikacijo in zagotovite, da ima CAS dostop do vaših kontaktnih podatkov, kot so e-poštni naslov, telefon itd.
cas.mfa.simple.registration.email.failed=Vašega računa ni mogoče registrirati za večfaktorsko avtentikacijo. CAS ne more prepoznati in sprejeti vašega e-poštnega naslova, da bi vam poslal e-pošto s povezavo za registracijo. Preglejte svoje kontaktne podatke in se za pomoč obrnite na skrbnika CAS.
cas.mfa.simple.registration.email.sent=Poslano vam je bilo e-poštno sporočilo z registracijskim žetonom. Tukaj preverite svoj nabiralnik in kodo ponudnika.
cas.mfa.simple.registration.token.failed=Vašega računa ni mogoče registrirati za večfaktorsko avtentikacijo. Predloženi žeton je neveljaven, je potekel ali je kako drugače ogrožen. Preglejte žeton in poskusite znova.
