screen.service.wildcard.message=Ta aplikacija nima posebnega registracijskega vnosa v registru storitev CAS. CAS jo je odobril in dovolil, ker v registru storitev CAS obstaja vnos definicije storitve z nadomestnimi znaki, ki dovoljuje in sprejema zahteve za preverjanje pristnosti neznanih aplikacij, kot je ta. <p/>Kot najboljšo varnostno prakso je zelo priporočljivo omejiti možnost upravljanja storitev na <strong>vključite le seznam znanih aplikacij</strong> ki so izrecno pooblaščeni za uporabo CAS. Če pustite upravljalni vmesnik odprt za vse aplikacije, lahko ustvarite priložnost za varnostne napade in otežite revidiranje zahtev aplikacij in potreb atributov.
screen.service.sso.error.header=Za dostop do te storitve je potrebno ponovno preverjanje pristnosti
screen.service.sso.error.message=Poskušali ste dostopati do storitve, ki zahteva preverjanje pristnosti brez ponovnega preverjanja pristnosti.  Poskusite ponovno preveriti pristnost</a>.
screen.service.required.message=Poskusili ste preveriti pristnost, ne da bi navedli ciljno aplikacijo. Ponovno preglejte zahtevo in poskusite znova.
screen.service.initial.message=Poskus dostopa do CAS ali navedene ciljne aplikacije trenutno ni dovoljen. Politika preverjanja pristnosti zahteva, da spremenite začetno aplikacijo in se nato premaknete na druge aplikacije in storitve.
