screen.oidc.confirm.ciba.confirmed=Zahteva za preverjanje pristnosti povratnega kanala je zdaj potrjena. Ne osvežuj tega okna. Namesto tega zaprite to okno brskalnika in preverite svojo napravo za nadaljnja navodila.
screen.oidc.confirm.ciba.failed=Zahteve za preverjanje pristnosti povratnega kanala ni bilo mogoče potrditi. Preverite dnevnike strežnika in se za več informacij obrnite na skrbnika CAS.
OIDC_CIBA_BAD_REQUEST=Zahteva za preverjanje pristnosti povratnega kanala ni uspela.
screen.oidc.confirm.bindingmessage.header=Zavezujoče sporočilo
screen.oidc.confirm.bindingmessage.description=Človeku berljiv identifikator ali sporočilo, ki je namenjeno prikazovanju na potrošniški napravi in napravi za preverjanje pristnosti, da ju medsebojno poveže za transakcijo prek vizualnega znaka za končnega uporabnika. To prepleteno sporočilo omogoča končnemu uporabniku, da zagotovi, da je dejanje, izvedeno na napravi za preverjanje pristnosti, povezano z zahtevo, ki jo sproži potrošna naprava.
screen.oidc.confirm.usercode.header=Uporabniška koda
screen.oidc.confirm.usercode.description=Skrivna koda, kot je geslo ali PIN, ki je znana samo uporabniku, vendar jo lahko preveri CAS. Koda se uporablja za odobritev pošiljanja zahteve za preverjanje pristnosti uporabnikovi napravi za preverjanje pristnosti.
screen.oidc.confirm.infourl=Izvedite več o {0}.
screen.oidc.confirm.privacyurl=Poučite se o {0} pravila zasebnosti.
screen.oidc.confirm.scopes=Območja
screen.oidc.confirm.claims=Terjatve
screen.oidc.confirm.scope.profile=To zahteva dostop do zahtevkov za profil, razen zahtevkov za naslov in e-pošto.
screen.oidc.confirm.scope.email=To zahteva dostop do e-poštnih zahtevkov.
screen.oidc.confirm.scope.address=To zahteva dostop do zahtevkov naslova.
screen.oidc.confirm.scope.openid=To označuje zahtevo za avtorizacijo OpenID Connect.
screen.oidc.confirm.scope.phone=To zahteva dostop do telefonskih zahtevkov.
screen.oidc.confirm.scope.offline_access=To zahteva dostop za žeton za osvežitev, ki se uporablja za dostop brez povezave.
screen.oidc.confirm.claim.name=Polno ime končnega uporabnika v obliki, ki jo je mogoče prikazati, vključno z vsemi deli imena, po možnosti vključno z naslovi in priponami, urejeno glede na jezik in nastavitve končnega uporabnika.
screen.oidc.confirm.claim.given_name=Ime(-na) ali ime(-na) končnega uporabnika. Upoštevajte, da imajo lahko ljudje v nekaterih kulturah več imen; vsi so lahko prisotni, pri čemer so imena ločena s presledki.
screen.oidc.confirm.claim.middle_name=Srednje ime(-na) končnega uporabnika. Upoštevajte, da imajo lahko ljudje v nekaterih kulturah več srednjih imen; vsi so lahko prisotni, pri čemer so imena ločena s presledki. Upoštevajte tudi, da se v nekaterih kulturah srednjih imen ne uporablja.
screen.oidc.confirm.claim.family_name=Priimek(-i) ali priimek(-i) končnega uporabnika. Upoštevajte, da imajo lahko v nekaterih kulturah ljudje več priimkov ali pa nimajo priimka; vsi so lahko prisotni, pri čemer so imena ločena s presledki.
screen.oidc.confirm.claim.email=Želeni e-poštni naslov končnega uporabnika.
screen.oidc.confirm.claim.preferred_username=LAHKO je kateri koli veljaven niz JSON, vključno s posebnimi znaki, kot so @, / ali presledki. RP se NE SME zanašati na to, da je ta vrednost edinstvena.
screen.oidc.confirm.claim.profile=URL strani profila končnega uporabnika. Vsebina te spletne strani MORA biti o končnem uporabniku.
screen.oidc.confirm.claim.picture=URL slike profila končnega uporabnika. Ta URL se MORA nanašati na slikovno datoteko (na primer slikovno datoteko PNG, JPEG ali GIF) in ne na spletno stran, ki vsebuje sliko. Upoštevajte, da se MORA ta URL izrecno sklicevati na fotografijo profila končnega uporabnika, ki je primerna za prikaz pri opisu končnega uporabnika, namesto na poljubno fotografijo, ki jo posname končni uporabnik.
screen.oidc.confirm.claim.phone_number=Želena telefonska številka končnega uporabnika. Priporočljivo je kot oblika tega zahtevka. npr. <code>+1 (425) 555-1212</code> oz <code>+56 (2) 687 2400</code>.
screen.oidc.confirm.asksinfo=Naročnik prosi za naslednje podatke:
screen.oidc.confirm.dynamic=Ta odjemalec je bil dinamično registriran na <code>{0}</code>.
screen.oidc.issuer.invalid=URL izdajatelja je neveljaven in se ne ujema z URL-jem izdajatelja strežnika CAS.
screen.samlidp.error.title=Napaka ponudnika identitete SAML2
screen.samlidp.error.description=Storitev, v katero se poskušate prijaviti, je odkrila težavo z vašim profilom ali zahtevo. Za podporo se obrnite na svojo službo za IT.
screen.unavailable.header=Napaka CAS
screen.unavailable.heading=CAS ne more obdelati te zahteve: "{0}:{1}"
screen.unavailable.message=Pri dokončanju vaše zahteve je prišlo do napake. <strong>Obvestite službo za podporo ali poskusite znova.</strong> <p><div>Apereo je neprofitna fundacija za upravljanje odprtokodne programske opreme. Programska oprema CAS je projekt, ki ga sponzorira Apereo in jo lahko brezplačno prenese in uporablja vsak. Vendar pa Apereo ne upravlja sistemov nikogar, ki uporablja programsko opremo, in v večini primerov niti ne ve, kdo jo uporablja ali kako stopiti v stik z njim, razen če je aktiven del skupnosti Apereo.<br/></br>Če imate težave pri prijavi s CAS, <strong>za pomoč se boste morali obrniti na IT osebje ali službo za pomoč uporabnikom vaše organizacije</strong>. <br/><br/>Želimo si, da bi vam lahko bolj neposredno pomagali.</div>
screen.mfaDenied.header=MFA Zavrnjeno
screen.mfaDenied.heading=Poskus MFA je ponudnik zavrnil
screen.mfaDenied.message=Vaš ponudnik MFA je zavrnil vaš poskus preverjanja pristnosti drugega faktorja. Za pomoč pri obnovitvi računa se obrnite na skrbnika sistema.
screen.mfaUnavailable.header=Ponudnik MFA ni na voljo
screen.mfaUnavailable.heading=Ponudnik MFA ni na voljo
screen.mfaUnavailable.message=CAS trenutno ni mogel doseči vašega konfiguriranega ponudnika MFA. Zaradi pravilnikov o napakah, konfiguriranih za storitev, do katere poskušate dostopati, preverjanja pristnosti trenutno ni mogoče odobriti.
