passwordless.selection.password.description=Pristnost lahko preverite s svojim geslom. Morda boste tudi pozvani, da dokončate tok večfaktorske avtentikacije, če je vaš račun primeren.
passwordless.selection.token.header=Žeton
passwordless.selection.token.description=Prejeli boste enkratni žeton, ki velja za omejeno časovno obdobje, po e-pošti ali SMS-u od CAS-a in za nadaljevanje boste morali vnesti kodo nazaj.
passwordless.selection.mfa.header=Večfaktor
passwordless.selection.mfa.description=Usmerjeni boste neposredno v tok večfaktorske avtentikacije. Ko končate korak preverjanja pristnosti, se bo tok samodejno nadaljeval.
passwordless.selection.delegation.header=Zunanji
passwordless.selection.delegation.description=Poslani boste k zunanjemu ponudniku identitete, da se prijavite. Ko zaključite tok preverjanja pristnosti pri zunanjem ponudniku identitete, boste samodejno preusmerjeni nazaj na CAS za nadaljevanje.
cas.authn.qr.fail=Ni mogoče sprejeti zahteve za preverjanje pristnosti na podlagi kode QR. Prepričajte se, da je koda QR pravilno skenirana in da so poverilnice veljavne, da jih je izdal ta strežnik CAS in da niso potekle.
