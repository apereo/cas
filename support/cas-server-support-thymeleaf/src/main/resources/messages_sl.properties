screen.authentication.webauthn.qr.fail.desc=Poskus preverjanja pristnosti ni uspel. Prepričajte se, da sta vaše uporabniško ime in izbrana naprava registrirana pri CAS, in preverite dnevnike strežnika CAS, da ugotovite glavni vzrok napake. Prihodnji poskusi preverjanja pristnosti bodo blokirani. Ne osvežite okna in namesto tega razmislite o ponovnem zagonu postopka preverjanja pristnosti.
screen.authentication.webauthn.qr.info=Če pri sebi nimate svoje naprave, ki podpira FIDO, ali ta naprava ni registrirana pri CAS, lahko skenirate spodnjo kodo QR in preverite pristnost z drugo (mobilno) napravo. Ko ste uspešno overjeni, boste samodejno nadaljevali z naslednjim korakom.
