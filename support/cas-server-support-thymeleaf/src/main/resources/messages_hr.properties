screen.samlidp.error.title=SAML2 pogreška pružatelja identiteta
screen.samlidp.error.description=Usluga na koju se pokušavate prijaviti otkrila je problem s vašim profilom ili zahtjevom. Obratite se svojoj IT službi za podršku radi podrške.
screen.unavailable.header=CAS greška
screen.unavailable.heading=CAS ne može obraditi ovaj zahtjev: "{0}:{1}"
screen.unavailable.message=Došlo je do pogreške prilikom pokušaja dovršetka vašeg zahtjeva. <strong>Obavijestite svoju podršku ili pokušajte ponovno.</strong> <p><div>Apereo je neprofitna zaklada za upravljanje softverom otvorenog koda. Softver CAS je projekt koji sponzorira Apereo i može se besplatno preuzeti i koristiti bilo tko. Međutim, Apereo ne upravlja sustavima bilo koga tko koristi softver i u većini slučajeva niti ne zna tko ga koristi ili kako ih kontaktirati osim ako nisu aktivni dio Apereo zajednice.<br/></br>Ako imate problema s prijavom pomoću CAS-a, <strong>morat ćete kontaktirati IT osoblje ili Help Desk vaše organizacije za pomoć</strong>. <br/><br/>Voljeli bismo da vam možemo biti izravnije od pomoći.</div>
screen.mfaDenied.header=MFA odbijeno
screen.mfaDenied.heading=Davatelj je odbio pokušaj MFA
screen.mfaDenied.message=Vaš MFA pružatelj usluga odbio je vaš pokušaj autentifikacije drugog faktora. Kontaktirajte svog administratora sustava za pomoć pri vraćanju vašeg računa.
screen.mfaUnavailable.header=MFA pružatelj usluga nedostupan
screen.mfaUnavailable.heading=MFA pružatelj usluga nedostupan
screen.mfaUnavailable.message=CAS trenutno nije mogao doći do vašeg konfiguriranog MFA pružatelja usluga. Zbog pravila neuspjeha konfiguriranih za uslugu kojoj pokušavate pristupiti, provjera autentičnosti se trenutno ne može odobriti.
