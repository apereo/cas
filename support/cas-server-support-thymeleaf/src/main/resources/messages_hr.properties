cas.screen.acct.intro=Ispunite obrazac u nastavku kako biste registrirali svoj novi račun u CAS-u. Nakon što se obrazac pošalje, primit ćete e-poruku s vezom za aktivaciju računa kako biste omogućili svoj račun, postavili lozinku i počeli koristiti CAS.
