authenticationFailure.RiskyAuthenticationException=CAS ne može nastaviti s tijekom autentifikacije, vjerojatno zato što je ovaj pokušaj autentifikacije utvrđeno kao rizičan i sumnjiv s dovoljno visokim rezultatom rizika iznad prihvaćenog praga. Moguće je da je vaš pokušaj autentifikacije blokiran jer koristite nepoznati web preglednik ili se prijavljujete s nepoznate lokacije. Za dodatne informacije i smjernice obratite se svom administratoru i/ili službi za pomoć.
