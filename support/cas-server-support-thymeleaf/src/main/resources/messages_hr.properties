authenticationFailure.MultifactorAuthenticationRequiredException=Pokušaj autentifikacije za vaš račun je odbijen jer vaš račun još nije konfiguriran za prolazak kroz multifaktorsku autentifikaciju. Obratite se administratorima usluge za pomoć, provjerite je li vaš račun upisan i ispunjava li uvjete za multifaktorsku autentifikaciju i pokušajte ponovno.
