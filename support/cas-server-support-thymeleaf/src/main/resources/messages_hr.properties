INVALID_TICKET_SPEC=Specifikacija provjere valjanosti ulaznice nije uspjela. Moguće pogreške mogu uključivati ​​pokušaj provjere valjanosti proxy ulaznice putem validatora servisne karte ili nepridržavanje zahtjeva `renew=true`.
