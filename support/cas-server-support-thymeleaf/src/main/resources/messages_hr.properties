INVALID_PROXY_CALLBACK=Isporučeni proxy url za povratni poziv ''{0}'' nije moguće ovjeriti. bilo ''{0}'' nije moguće dosegnuti ili mu nije dopuštena provjera autentičnosti posrednika.
