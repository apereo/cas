authenticationFailure.MultifactorAuthenticationProviderAbsentException=Nije moguće zadovoljiti zahtjeve višestruke provjere autentičnosti. Vaš je račun konfiguriran za strategiju višestruke provjere autentičnosti, ali CAS ne može locirati i izvršiti tu strategiju najvjerojatnije zbog pogrešne konfiguracije poslužitelja. Obratite se administratorima usluge za pomoć.
