cas.mfa.providerselection.mfa-duo=Duo Sigurnost
cas.mfa.providerselection.mfa-duo.notes=Širok izbor Duoovih metoda provjere autentičnosti omogućuje svakom korisniku sigurnu i brzu prijavu. Duo Push, koji šalje Duo Mobile aplikacija za provjeru autentičnosti, omogućuje korisnicima da odobre push obavijesti kako bi potvrdili svoj identitet.
cas.mfa.providerselection.mfa-webauthn=FIDO2 WebAuthn
cas.mfa.providerselection.mfa-webauthn.notes=WebAuthn je API koji pouzdanoj strani, kao što je web servis, olakšava integraciju jake autentifikacije u aplikacije koristeći podršku ugrađenu u sve vodeće preglednike i platforme. 
cas.mfa.providerselection.mfa-gauth=Google autentifikator
cas.mfa.providerselection.mfa-gauth.notes=Google Authenticator je softverski autentifikator koji implementira usluge provjere u dva koraka za autentifikaciju korisnika mobilnih aplikacija od strane Googlea.
cas.mfa.providerselection.mfa-simple=CAS višefaktorska autentifikacija
cas.mfa.providerselection.mfa-simple.notes=Dopustite CAS-u da samostalno djeluje kao pružatelj multifaktorske autentifikacije, izdajući tokene i šaljući ih krajnjim korisnicima putem unaprijed definiranih komunikacijskih kanala kao što su e-pošta ili tekstualne poruke.
cas.mfa.providerselection.mfa-yubikey=YubiKey Multifactor Authentication
cas.mfa.providerselection.mfa-yubikey.notes=Yubico je usluga temeljena na oblaku koja omogućuje jaku, jednostavnu za korištenje i pristupačnu dvofaktorsku autentifikaciju s jednokratnim lozinkama putem njihovog vodećeg proizvoda, YubiKey. 
