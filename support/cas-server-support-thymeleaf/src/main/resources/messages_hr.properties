passwordless.token.header=Osigurajte token
passwordless.token.description=Dostavite sigurnosni token koji vam je poslan e-poštom, telefonom itd. Imajte na umu da token vrijedi samo kratko vrijeme i nakon podnošenja svi ostali tokeni bit će poništeni i uklonjeni.
passwordless.error.failure.title=Neuspjeh provjere autentičnosti
passwordless.error.failure.description=Navedeni token nije moguće provjeriti. Možda je poništen, uklonjen ili istekao.
passwordless.error.unknown.user=CAS ne može prepoznati i locirati navedeno korisničko ime.
passwordless.error.invalid.user=Navedeno korisničko ime ne sadrži dovoljno podataka za kontakt.
passwordless.getuser.header=Autentifikacija bez lozinke
passwordless.getuser.description=Unesite svoje korisničko ime kako biste locirali svoj račun. Nakon što je vaš račun potvrđen, CAS će odabrati odgovarajuću strategiju provjere autentičnosti za vas.
passwordless.selection.header=Odabir provjere autentičnosti
passwordless.selection.description=Za nastavak odaberite jednu od dolje navedenih opcija provjere autentičnosti.
passwordless.selection.password.header=Lozinka
passwordless.selection.password.description=Možete se autentificirati koristeći svoju lozinku. Od vas se također može tražiti da dovršite tijek višestruke provjere autentičnosti ako vaš račun ispunjava uvjete.
passwordless.selection.token.header=Token
passwordless.selection.token.description=Primit ćete jednokratni token, koji vrijedi ograničeno vremensko razdoblje, putem e-pošte ili SMS-a od CAS-a i od vas će se tražiti da ponovno unesete kod za nastavak.
passwordless.selection.mfa.header=Multifaktor
passwordless.selection.mfa.description=Bit ćete izravno preusmjereni na tijek višestruke provjere autentičnosti. Nakon što dovršite korak provjere autentičnosti, tijek će se automatski nastaviti.
passwordless.selection.delegation.header=Vanjski
passwordless.selection.delegation.description=Bit ćete poslani vanjskom davatelju identiteta da se prijavite. Nakon što dovršite tijek provjere autentičnosti s vanjskim pružateljem identiteta, bit ćete automatski preusmjereni natrag na CAS za nastavak.
cas.authn.qr.fail=Nije moguće prihvatiti zahtjev za autentifikaciju na temelju QR koda. Provjerite je li QR kod ispravno skeniran i jesu li vjerodajnice važeće, izdane od ovog CAS poslužitelja i da nisu istekle.
