cas.mfa.simple.contact-selection.title=Odaberite Kontakt podaci
cas.mfa.simple.contact-selection.description=Pronašli smo više načina da vas kontaktiramo za vaš račun. Odaberite račun(e) na koji želite primiti token višefaktorske provjere autentičnosti.
cas.mfa.simple.pagetitle=Prijava za višefaktornu autentifikaciju CAS-a
cas.mfa.simple.label.token=Token:
cas.mfa.simple.label.resend=Ponovno pošalji
cas.mfa.simple.label.tokensent=Token višestruke provjere autentičnosti šalje vam se putem e-pošte ili tekstualne poruke. Pronađite token i pošaljite ga ovdje za nastavak. Imajte na umu da će token isteći nakon kratkog vremena i CAS ga više neće prepoznati, u kojem slučaju možete zatražiti od CAS-a da vam pošalje novi token.
cas.mfa.simple.label.contactfailed.sms=CAS ne može upotrijebiti odabrane podatke za kontakt kako bi vam poslao SMS s tokenom višefaktorske provjere autentičnosti. Pregledajte svoje podatke za kontakt i kontaktirajte svog CAS administratora za pomoć.
cas.mfa.simple.label.contactfailed.email=CAS ne može upotrijebiti odabrane podatke za kontakt kako bi vam poslao e-poštu s tokenom višefaktorske provjere autentičnosti. Pregledajte svoje podatke za kontakt i kontaktirajte svog CAS administratora za pomoć.
cas.mfa.simple.token.failed=Nije moguće prihvatiti ovaj pokušaj višestruke provjere autentičnosti. Navedeni token je nevažeći.
cas.mfa.simple.registration.title=Registracija računa
cas.mfa.simple.registration.description=Vaš račun nije registriran za multifaktorsku provjeru autentičnosti iako ispunjava uvjete i zahtijeva je aplikacija kojoj pokušavate pristupiti. molim te <a href="https://account.example.org/mfa">registrirajte svoj račun</a> za multifaktorsku autentifikaciju i osigurati da CAS ima pristup vašim kontakt podacima kao što su adresa e-pošte, telefon itd.
cas.mfa.simple.registration.email.failed=Nije moguće registrirati vaš račun za višestruku autentifikaciju. CAS ne može prepoznati i prihvatiti vašu adresu e-pošte kako bi vam poslao poruku e-pošte s vezom za registraciju. Pregledajte svoje podatke za kontakt i kontaktirajte svog CAS administratora za pomoć.
cas.mfa.simple.registration.email.sent=Poslana vam je e-pošta s registracijskim tokenom. Provjerite svoju pristiglu poštu i kod davatelja usluge ovdje.
cas.mfa.simple.registration.token.failed=Nije moguće registrirati vaš račun za višestruku autentifikaciju. Navedeni token nije valjan, istekao je ili je na drugi način ugrožen. Pregledajte token i pokušajte ponovno.
