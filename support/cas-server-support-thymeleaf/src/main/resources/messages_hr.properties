screen.oidc.confirm.claim.name=Puno ime krajnjeg korisnika u obliku koji se može prikazati, uključujući sve dijelove imena, po mogućnosti uključujući naslove i sufikse, poredane prema lokalnom standardu i preferencijama krajnjeg korisnika.
screen.oidc.confirm.claim.given_name=Ime(na) ili ime(na) Krajnjeg korisnika. Imajte na umu da u nekim kulturama ljudi mogu imati više imena; svi mogu biti prisutni, s tim da su imena odvojena razmakom.
screen.oidc.confirm.claim.middle_name=Srednje ime(na) krajnjeg korisnika. Imajte na umu da u nekim kulturama ljudi mogu imati više srednjih imena; svi mogu biti prisutni, s tim da su imena odvojena razmakom. Također imajte na umu da se u nekim kulturama ne koriste srednja imena.
screen.oidc.confirm.claim.family_name=Prezime(a) ili prezime(na) Krajnjeg korisnika. Imajte na umu da u nekim kulturama ljudi mogu imati više prezimena ili bez prezimena; svi mogu biti prisutni, s tim da su imena odvojena razmakom.
screen.oidc.confirm.claim.email=Preferirana e-mail adresa krajnjeg korisnika.
screen.oidc.confirm.claim.preferred_username=MOŽE biti bilo koji važeći JSON niz uključujući posebne znakove kao što su @, / ili razmak. RP se NE SMIJE oslanjati na to da je ova vrijednost jedinstvena.
screen.oidc.confirm.claim.profile=URL stranice profila krajnjeg korisnika. Sadržaj ove web stranice TREBA biti o Krajnjem korisniku.
screen.oidc.confirm.claim.picture=URL slike profila Krajnjeg korisnika. Ovaj URL MORA upućivati ​​na slikovnu datoteku (na primjer, PNG, JPEG ili GIF slikovnu datoteku), a ne na web stranicu koja sadrži sliku. Imajte na umu da ovaj URL TREBA izričito upućivati ​​na fotografiju profila Krajnjeg korisnika koja je prikladna za prikazivanje prilikom opisa Krajnjeg korisnika, umjesto proizvoljne fotografije koju je snimio Krajnji korisnik.
screen.oidc.confirm.claim.phone_number=Preferirani telefonski broj krajnjeg korisnika. PREPORUČUJE SE kao format ovog zahtjeva. na primjer, <code>+1 (425) 555-1212</code> ili <code>+56 (2) 687 2400</code>.
screen.oidc.confirm.asksinfo=Klijent traži sljedeće podatke:
