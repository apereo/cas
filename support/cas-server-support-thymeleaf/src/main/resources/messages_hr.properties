OAUTH_BAD_SESSION_REQUEST=Zahtjev za OAuth ne može se dovršiti jer CAS ne može locirati ili odrediti URL za preusmjeravanje OAuth. To je obično pokazatelj zastarjelog ili neusklađenog zahtjeva gdje se obrađeni ID sesije zahtjeva razlikuje od aktivne sesije i može biti uzrokovano potpunom operacijom odjave. Obrišite kolačiće i povijest, ponovno pokrenite preglednik i pokušajte ponovo.
screen.oidc.confirm.ciba.header=Zahtjev za autentifikaciju povratnog kanala
screen.oidc.confirm.ciba.confirmed=Zahtjev za autentifikaciju povratnog kanala sada je potvrđen. Nemojte osvježavati ovaj prozor. Umjesto toga, zatvorite ovaj prozor preglednika i provjerite svoj uređaj za daljnje upute.
screen.oidc.confirm.ciba.failed=Zahtjev za autentifikaciju povratnog kanala nije moguće potvrditi. Provjerite zapisnike poslužitelja i kontaktirajte svog CAS administratora za više informacija.
OIDC_CIBA_BAD_REQUEST=Zahtjev za autentifikaciju backchannel-a nije uspio.
screen.oidc.confirm.bindingmessage.header=Obvezujuća poruka
screen.oidc.confirm.bindingmessage.description=Čovjeku čitljiv identifikator ili poruka namijenjena za prikazivanje i na uređaju za potrošnju i na uređaju za autentifikaciju kako bi se međusobno povezali za transakciju putem vizualnog znaka za krajnjeg korisnika. Ova isprepletena poruka omogućuje krajnjem korisniku da osigura da je radnja poduzeta na autentifikacijskom uređaju povezana sa zahtjevom koji je pokrenuo potrošački uređaj.
screen.oidc.confirm.usercode.header=Korisnički kod
screen.oidc.confirm.usercode.description=Tajni kod, kao što je lozinka ili PIN, koji je poznat samo korisniku, ali ga CAS može provjeriti. Šifra se koristi za autorizaciju slanja zahtjeva za autentifikaciju na uređaj za autentifikaciju korisnika.
