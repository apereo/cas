cas.mfa.yubikey.label.token=Token:
cas.mfa.webauthn.auth.fail=Nije moguće potvrditi vaš uređaj za autentifikaciju. Dostavljeni korisni učinci mogu biti nevažeći, istekli ili na neki drugi način ugroženi.
cas.mfa.webauthn.register.helptext=Dodijelite prijateljsko ime svom uređaju koji podržava FIDO2, a zatim ga registrirajte u CAS-u za višestruku autentifikaciju. Nakon što je registracija uređaja uspješno dovršena, automatski ćete biti preusmjereni na sljedeći korak za prijavu sa svojim uređajem.
cas.mfa.webauthn.register.wait=Vaš uređaj koji podržava FIDO2 sada je registriran kod CAS-a. Molimo pričekajte…
cas.mfa.webauthn.register.discoverablecredentials=Također možete registrirati svoj uređaj koristeći <i>Otkrivene vjerodajnice / rezidentni ključevi</i>. To znači da su privatni ključ i povezani metapodaci pohranjeni u trajnoj memoriji na autentifikatoru, a ne na CAS poslužitelju.
