screen.service.wildcard.message=Ova aplikacija nema namjenski unos registracije u registru usluga CAS-a. Ovlašten je i dopušten od strane CAS-a jer postoji unos definicije usluge sa zamjenskim znakovima u registru usluga CAS-a koji dopušta i prihvaća zahtjeve za autentifikaciju od nepoznatih aplikacija kao što je ova. <p/>Kao najbolja sigurnosna praksa, snažno se preporučuje ograničiti mogućnost upravljanja uslugom na <strong>uključuje samo popis poznatih aplikacija</strong> koji su izričito ovlašteni za korištenje CAS-a. Ostavljanje upravljačkog sučelja otvorenim za sve aplikacije može stvoriti priliku za sigurnosne napade i otežati reviziju zahtjeva aplikacije i potreba atributa.
