BLOCKED_AUTHN_REQUEST=Pokušaj autentifikacije je blokiran i ne može se nastaviti, vjerojatno zbog pogrešnog formata ili nedostatka potrebnih parametara. Pregledajte zapisnike CAS poslužitelja kako biste locirali glavni uzrok pogreške.
UNSATISFIED_SAML_REQUEST=CAS ne može razumjeti, prihvatiti ili potvrditi SAML zahtjev za autentifikaciju, vjerojatno zbog neispravnog oblikovanja ili nedostatka potrebnih parametara. Provjerite zapisnike CAS poslužitelja kako biste locirali glavni uzrok pogreške.
MISSING_SAML_REQUEST=SAML2 zahtjev za autentifikaciju ne može se utvrditi iz pohrane sesije CAS. To obično znači da se originalni SAML2 zahtjev za autentifikaciju koji je poslan CAS-u putem SAML2 pružatelja usluge ne može dohvatiti i vratiti nakon pokušaja autentifikacije vjerojatno zato što je temeljna pohrana sesije ili nasilno uklonila zahtjev za autentifikaciju ili je utvrdila da je praćeni zahtjev istekao i zastario, izvan onoga što dopušta politika isteka pohrane sesije. Provjerite zapisnike CAS poslužitelja kako biste locirali glavni uzrok pogreške.
screen.service.error.header=Aplikacija nije ovlaštena za korištenje CAS-a
screen.service.error.redirect=Niste ovlašteni za pristup ovoj aplikaciji. Budite strpljivi jer ćete biti preusmjereni na <strong>{0}</strong> kako biste saznali više o ovom scenariju.
service.principal.resolution.error=CAS ne može odrediti ispravan principal provjere autentičnosti. Ili se principal nije mogao ispravno razriješiti kao jedan jedinstveni entitet ili je CAS pronašao mješovite/višestruke principale kandidate i ne može odlučiti koji bi se trebao koristiti. Ova pogreška također može biti uzrokovana ako autentificiranom principalu nije dopušten pristup ciljnoj aplikaciji zbog nedostajućih privilegija postavljenih pravilima autorizacije CAS poslužitelja.
service.not.authorized.missing.attr=Niste ovlašteni za pristup aplikaciji jer vašem računu nedostaju privilegije koje CAS poslužitelj zahtijeva za autentifikaciju u ovoj usluzi. Obavijestite svoju podršku.
screen.service.error.message=Aplikacija koju ste pokušali autentificirati nije ovlaštena za korištenje CAS-a. To obično znači da aplikacija nije registrirana na CAS-u ili da njezina politika autorizacije definirana u registracijskom zapisu sprječava da iskoristi CAS funkcionalnost ili da je pogrešno oblikovana i CAS je ne prepoznaje. Kontaktirajte svog CAS administratora da saznate kako možete registrirati i integrirati svoju aplikaciju s CAS-om.
screen.service.empty.error.message=Registar usluga CAS-a je prazan i nema definicije usluga. Aplikacije koje se žele autentificirati s CAS-om moraju biti izričito definirane u registru usluga.
screen.service.expired.message=Aplikacija koju ste pokušali autentificirati istekla je u registru usluga CAS-a. Ako se ova usluga još uvijek smatra korištenom, obratite se administratorima usluge kako bi obnovili aplikaciju.
