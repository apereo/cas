cas.oauth.error.pagetitle=Ошибка OAuth
cas.oauth.error.header=Ошибка авторизации OAuth
OAUTH_BAD_SESSION_REQUEST=Запрос OAuth не может быть выполнен, так как CAS не может найти или определить URL-адрес перенаправления OAuth. Обычно это указывает на устаревший или несоответствующий запрос, когда идентификатор сеанса обработанного запроса отличается от активного сеанса, и может быть вызвано полным выходом из системы. Очистите файлы cookie и историю, перезапустите браузер и повторите попытку.
screen.oidc.confirm.ciba.header=Запрос аутентификации по обратному каналу
screen.oidc.confirm.ciba.confirmed=Запрос на аутентификацию по обратному каналу теперь подтвержден. Не обновляйте это окно. Вместо этого закройте это окно браузера и проверьте свое устройство на наличие дальнейших инструкций.
screen.oidc.confirm.ciba.failed=Запрос на аутентификацию по обратному каналу не может быть подтвержден. Пожалуйста, проверьте журналы сервера и обратитесь к администратору CAS для получения дополнительной информации.
OIDC_CIBA_BAD_REQUEST=Запрос аутентификации по обратному каналу не выполнен.
screen.oidc.confirm.bindingmessage.header=Связующее сообщение
screen.oidc.confirm.bindingmessage.description=Удобочитаемый идентификатор или сообщение, предназначенное для отображения как на потребительском устройстве, так и на устройстве аутентификации, чтобы связать их вместе для транзакции посредством визуальной подсказки для конечного пользователя. Это сообщение блокировки позволяет конечному пользователю убедиться, что действие, предпринятое на устройстве аутентификации, связано с запросом, инициированным потребительским устройством.
screen.oidc.confirm.usercode.header=Код пользователя
screen.oidc.confirm.usercode.description=Секретный код, например пароль или PIN-код, который известен только пользователю, но может быть проверен CAS. Код используется для авторизации отправки запроса аутентификации на устройство аутентификации пользователя.
screen.oidc.confirm.infourl=Узнайте больше о {0}.
