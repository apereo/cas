cas.mfa.providerselection.mfa-duo=Дуэт Безопасности
cas.mfa.providerselection.mfa-duo.notes=Широкий выбор методов аутентификации Duo позволяет каждому пользователю безопасно и быстро войти в систему. Duo Push, отправляемый приложением аутентификации Duo Mobile, позволяет пользователям одобрять push-уведомления для подтверждения своей личности.
cas.mfa.providerselection.mfa-webauthn=FIDO2 WebAuthn
cas.mfa.providerselection.mfa-webauthn.notes=WebAuthn — это API, который позволяет проверяющей стороне, например веб-службе, легко интегрировать надежную аутентификацию в приложения, используя поддержку, встроенную во все ведущие браузеры и платформы. 
cas.mfa.providerselection.mfa-gauth=Google Аутентификатор
cas.mfa.providerselection.mfa-gauth.notes=Google Authenticator — это программный аутентификатор, реализующий услуги двухэтапной проверки для аутентификации пользователей мобильных приложений Google.
cas.mfa.providerselection.mfa-simple=Многофакторная аутентификация CAS
cas.mfa.providerselection.mfa-simple.notes=Позвольте CAS самостоятельно выступать в качестве поставщика многофакторной аутентификации, выпуская токены и отправляя их конечным пользователям через заранее определенные каналы связи, такие как электронная почта или текстовые сообщения.
cas.mfa.providerselection.mfa-yubikey=Многофакторная аутентификация YubiKey
cas.mfa.providerselection.mfa-yubikey.notes=Yubico — это облачный сервис, который обеспечивает надежную, простую в использовании и доступную двухфакторную аутентификацию с помощью одноразовых паролей с помощью своего флагманского продукта YubiKey. 
cas.mfa.duologin.pagetitle=Вход в систему Duo Security
cas.mfa.simple.contact-selection.title=Выберите контактную информацию
cas.mfa.simple.contact-selection.description=Мы нашли несколько способов связаться с вами по поводу вашей учетной записи. Пожалуйста, выберите аккаунт(ы), где вы хотите получить токен многофакторной аутентификации.
cas.mfa.simple.pagetitle=Вход в систему многофакторной аутентификации CAS
cas.mfa.simple.label.token=Токен:
cas.mfa.simple.label.resend=Отправить повторно
cas.mfa.simple.label.tokensent=Токен многофакторной аутентификации будет отправлен вам по электронной почте или в текстовом сообщении. Найдите токен и отправьте его сюда, чтобы продолжить. Обратите внимание, что срок действия токена истечет через короткий период времени и он больше не будет распознаваться CAS. В этом случае вы можете попросить CAS отправить вам новый токен.
cas.mfa.simple.label.contactfailed.sms=CAS не может использовать выбранную контактную информацию для отправки вам SMS с токеном многофакторной аутентификации. Проверьте свою контактную информацию и обратитесь за помощью к администратору CAS.
cas.mfa.simple.label.contactfailed.email=CAS не может использовать выбранную контактную информацию для отправки вам электронного письма с токеном многофакторной аутентификации. Проверьте свою контактную информацию и обратитесь за помощью к администратору CAS.
cas.mfa.simple.token.failed=Невозможно принять эту попытку многофакторной аутентификации. Предоставленный токен недействителен.
cas.mfa.simple.registration.title=Регистрация аккаунта
cas.mfa.simple.registration.description=Ваша учетная запись не зарегистрирована для многофакторной аутентификации, хотя она соответствует требованиям и требуется для приложения, к которому вы пытаетесь получить доступ. Пожалуйста <a href="https://account.example.org/mfa">зарегистрировать свой аккаунт</a> для многофакторной аутентификации и убедитесь, что CAS имеет доступ к вашей контактной информации, такой как адрес электронной почты, телефон и т. д.
cas.mfa.simple.registration.email.failed=Не удалось зарегистрировать учетную запись для многофакторной аутентификации. CAS не может распознать и принять ваш адрес электронной почты, чтобы отправить вам электронное письмо со ссылкой для регистрации. Проверьте свою контактную информацию и обратитесь за помощью к администратору CAS.
cas.mfa.simple.registration.email.sent=Вам было отправлено письмо с регистрационным токеном. Пожалуйста, проверьте свой почтовый ящик и укажите код здесь.
cas.mfa.simple.registration.token.failed=Не удалось зарегистрировать учетную запись для многофакторной аутентификации. Предоставленный токен недействителен, просрочен или иным образом скомпрометирован. Пожалуйста, проверьте токен и повторите попытку.
cas.mfa.twilio.pagetitle=Многофакторная аутентификация Twilio
cas.mfa.twilio.label.token=Токен:
cas.mfa.twilio.label.tokensent=Вам будет отправлен токен многофакторной аутентификации. Найдите токен и отправьте его сюда, чтобы продолжить.
cas.mfa.googleauth.pagetitle=Google Аутентификатор
cas.mfa.googleauth.label.token=Токен:
cas.mfa.radius.pagetitle=Радиусная аутентификация
screen.authentication.yubikey.reganotherdevice=Вы также можете зарегистрировать другое устройство для использования для многофакторной аутентификации.
screen.authentication.yubikey.name=Имя устройства:
cas.mfa.yubikey.pagetitle=Аутентификация YubiKey
cas.mfa.yubikey.authenticate=Используйте зарегистрированные устройства YubiKey для аутентификации.
cas.mfa.yubikey.register=Ваше устройство еще не зарегистрировано. Используйте форму ниже, чтобы зарегистрировать свое устройство в CAS.
cas.mfa.yubikey.register.fail=Невозможно зарегистрировать ваше устройство YubiKey для аутентификации. Предоставленный токен может быть недействительным, просроченным или иным образом скомпрометированным.
cas.mfa.yubikey.label.token=Токен:
cas.mfa.webauthn.auth.fail=Не удалось проверить ваше устройство на предмет аутентификации. Предоставленные полезные данные могут быть недействительными, с истекшим сроком действия или иным образом скомпрометированными.
cas.mfa.webauthn.register.helptext=Присвойте понятное имя своему устройству с поддержкой FIDO2, а затем зарегистрируйте его в CAS для многофакторной аутентификации. После успешного завершения регистрации устройства вы автоматически будете перенаправлены на следующий шаг для входа в систему с помощью вашего устройства.
cas.mfa.webauthn.register.wait=Ваше устройство с поддержкой FIDO2 теперь зарегистрировано в CAS. Пожалуйста, подождите…
cas.mfa.webauthn.register.discoverablecredentials=Вы также можете зарегистрировать свое устройство, используя <i>Обнаруживаемые учетные данные/резидентные ключи</i>. Это означает, что закрытый ключ и связанные с ним метаданные хранятся в постоянной памяти на аутентификаторе, а не на сервере CAS.
cas.mfa.registerdevice.label.title=Зарегистрировать устройство
cas.mfa.registerdevice.label.intro=Пожалуйста, назовите текущее устройство.
cas.mfa.registerdevice.pagetitle=Зарегистрировать устройство
cas.mfa.registerdevice.label.name=Имя
cas.mfa.registerdevice.label.duration=Как долго нам следует помнить об этом устройстве?
cas.mfa.registerdevice.label.expiration=Срок действия
cas.mfa.registerdevice.button.register=Зарегистрироваться
cas.mfa.registerdevice.button.skip=Пропустить
cas.mfa.registerdevice.options.timeunit.forever=Навсегда
passwordless.token.header=Предоставить токен
passwordless.token.description=Предоставьте токен безопасности, отправленный вам по электронной почте, телефону и т. д. Обратите внимание, что токен действителен только в течение короткого периода времени, и после отправки все остальные токены будут признаны недействительными и удалены.
passwordless.error.failure.title=Ошибка аутентификации
passwordless.error.failure.description=Предоставленный токен не удалось проверить. Возможно, он был признан недействительным, удален или срок его действия истек.
passwordless.error.unknown.user=Указанное имя пользователя не может быть распознано и обнаружено CAS.
passwordless.error.invalid.user=Указанное имя пользователя не содержит достаточной контактной информации.
passwordless.getuser.header=Беспарольная аутентификация
passwordless.getuser.description=Пожалуйста, укажите свое имя пользователя, чтобы найти свою учетную запись. Как только ваша учетная запись будет подтверждена, CAS выберет для вас подходящую стратегию аутентификации.
passwordless.selection.header=Выбор аутентификации
passwordless.selection.description=Чтобы продолжить, выберите один из вариантов аутентификации, перечисленных ниже.
passwordless.selection.password.header=Пароль
passwordless.selection.password.description=Вы можете пройти аутентификацию, используя свой пароль. Вас также могут попросить пройти многофакторную аутентификацию, если ваша учетная запись соответствует критериям.
passwordless.selection.token.header=Токен
passwordless.selection.token.description=Вы получите одноразовый токен, действительный в течение ограниченного периода времени, по электронной почте или SMS от CAS, и вам будет предложено ввести код обратно, чтобы продолжить.
passwordless.selection.mfa.header=Многофакторный
passwordless.selection.mfa.description=Вы будете перенаправлены непосредственно на поток многофакторной аутентификации. После завершения этапа аутентификации поток автоматически возобновится.
passwordless.selection.delegation.header=Внешний
passwordless.selection.delegation.description=Вы будете перенаправлены к внешнему поставщику удостоверений для входа в систему. После завершения процесса аутентификации с помощью внешнего поставщика удостоверений вы будете автоматически перенаправлены обратно в CAS для продолжения.
cas.authn.qr.fail=Невозможно принять запрос на аутентификацию на основе QR-кода. Убедитесь, что QR-код отсканирован правильно, а предоставленные учетные данные действительны, выданы этим CAS-сервером и срок их действия не истек.
