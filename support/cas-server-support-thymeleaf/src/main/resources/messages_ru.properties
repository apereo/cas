screen.oauth.confirm.processing=Мы успешно обработали ваше предыдущее решение о согласии, чтобы клиентское приложение могло получить запрошенные области. Никаких действий с вашей стороны не требуется. Вам будет предложено дать согласие и утвердить запрос еще раз, если потребуются дополнительные данные. <p>А пока подождите, пока мы перенаправим вас в приложение...
