screen.pac4j.authn.SAMLException=Ответ аутентификации, предоставленный CAS внешним поставщиком удостоверений, не может быть принят. Проверьте журналы и конфигурацию сервера CAS, чтобы определить причину проблемы, а затем повторите попытку.
