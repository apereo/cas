screen.oidc.confirm.scopes=Области применения
screen.oidc.confirm.claims=Претензии
screen.oidc.confirm.scope.profile=При этом запрашивается доступ к претензиям профиля, за исключением претензий на адрес и электронную почту.
screen.oidc.confirm.scope.email=Это запрашивает доступ к претензиям по электронной почте.
screen.oidc.confirm.scope.address=Это запрашивает доступ к утверждениям адреса.
screen.oidc.confirm.scope.openid=Это указывает на запрос авторизации OpenID Connect.
screen.oidc.confirm.scope.phone=Для этого запрашивается доступ к заявкам на телефон.
screen.oidc.confirm.scope.offline_access=При этом запрашивается доступ к токену обновления, используемому для автономного доступа.
screen.oidc.confirm.claim.name=Полное имя Конечного пользователя в отображаемой форме, включая все части имени, возможно, включая заголовки и суффиксы, упорядоченные в соответствии с языковыми стандартами и предпочтениями Конечного пользователя.
screen.oidc.confirm.claim.given_name=Имя(а) или имя(а) Конечного пользователя. Обратите внимание, что в некоторых культурах люди могут иметь несколько имен; все могут присутствовать, при этом имена разделяются пробелами.
screen.oidc.confirm.claim.middle_name=Отчество(а) Конечного пользователя. Обратите внимание, что в некоторых культурах у людей может быть несколько отчества; все могут присутствовать, при этом имена разделяются пробелами. Также обратите внимание, что в некоторых культурах отчества не используются.
screen.oidc.confirm.claim.family_name=Фамилия(и) или фамилия(и) Конечного Пользователя. Обратите внимание, что в некоторых культурах люди могут иметь несколько фамилий или не иметь фамилий; все могут присутствовать, при этом имена разделяются пробелами.
screen.oidc.confirm.claim.email=Предпочтительный адрес электронной почты конечного пользователя.
screen.oidc.confirm.claim.preferred_username=МОЖЕТ быть любой допустимой строкой JSON, включая специальные символы, такие как @, / или пробелы. RP НЕ ДОЛЖЕН полагаться на уникальность этого значения.
screen.oidc.confirm.claim.profile=URL-адрес страницы профиля конечного пользователя. Содержимое этой веб-страницы ДОЛЖНО быть посвящено Конечному пользователю.
screen.oidc.confirm.claim.picture=URL-адрес изображения профиля Конечного пользователя. Этот URL-адрес ДОЛЖЕН относиться к файлу изображения (например, файлу изображения PNG, JPEG или GIF), а не к веб-странице, содержащей изображение. Обратите внимание, что этот URL-адрес ДОЛЖЕН конкретно ссылаться на фотографию профиля Конечного пользователя, подходящую для отображения при описании Конечного пользователя, а не на произвольную фотографию, сделанную Конечным пользователем.
screen.oidc.confirm.claim.phone_number=Предпочтительный номер телефона конечного пользователя. РЕКОМЕНДУЕТСЯ использовать именно этот формат заявления. Например, <code>+1 (425) 555-1212</code> или <code>+56 (2) 687 2400</code>.
