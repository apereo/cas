screen.authentication.gauth.blocked.title=Заблокированная попытка многофакторной аутентификации
screen.authentication.gauth.blocked.desc=Ваша попытка многофакторной аутентификации заблокирована. Количество неудачных попыток аутентификации превысило максимально допустимый порог. Повторите попытку аутентификации и, если проблема не исчезнет, ​​обратитесь за помощью к администратору CAS.
screen.welcome.button.register-residentkey=Зарегистрируйте устройство с доступными учетными данными
