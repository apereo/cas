screen.samlidp.error.title=Ошибка поставщика удостоверений SAML2
screen.samlidp.error.description=Служба, в которую вы пытаетесь войти, обнаружила проблему с вашим профилем или запросом. Обратитесь в службу ИТ-поддержки за поддержкой.
screen.unavailable.header=Ошибка CAS
screen.unavailable.heading=CAS не может обработать этот запрос: "{0}:{1}"
screen.unavailable.message=При попытке выполнить ваш запрос произошла ошибка. <strong>Пожалуйста, сообщите в службу поддержки или повторите попытку.</strong> <p><div>Apereo — это некоммерческий фонд управления программным обеспечением с открытым исходным кодом. Программное обеспечение CAS является проектом, спонсируемым Apereo, и его может бесплатно загрузить и использовать любой желающий. Однако Apereo не управляет системами кого-либо, использующего это программное обеспечение, и в большинстве случаев даже не знает, кто его использует или как с ними связаться, если только они не являются активной частью сообщества Apereo.<br/></br>Если у вас возникли проблемы со входом в систему с помощью CAS, <strong>вам нужно будет обратиться за помощью к ИТ-персоналу или в службу поддержки вашей организации.</strong>. <br/><br/>Мы хотели бы быть более полезными для вас.</div>
screen.mfaDenied.header=МИД отказано
screen.mfaDenied.heading=Попытка MFA отклонена провайдером
screen.mfaDenied.message=Ваш провайдер MFA отклонил вашу попытку двухфакторной аутентификации. Обратитесь к системному администратору за помощью в восстановлении учетной записи.
