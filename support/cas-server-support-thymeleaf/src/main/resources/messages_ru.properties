screen.success.header=Войти успешно
screen.success.success=Ты, <strong>{0}</strong>, успешно вошли в центральную службу аутентификации. Однако вы видите эту страницу, потому что CAS не знает о вашем целевом пункте назначения и о том, как вас туда доставить. Еще раз проверьте запрос на аутентификацию и убедитесь, что указана целевая служба/приложение, авторизованное и зарегистрированное в CAS.
screen.success.security=Когда вы закончите, в целях безопасности, пожалуйста, <a href="logout">выйти из системы</a> и выйдите из веб-браузера.
screen.logout.confirm.header=Ты, <strong>{0}</strong>, хотите полностью выйти из системы?
screen.logout.confirm.header.anonymous=Вы хотите полностью выйти из системы?
screen.logout.confirm.text=<p>Возможно, приложение перенаправило вас в центральную службу аутентификации, чтобы полностью выйти из системы и уничтожить сеанс единого входа. Если вы решите выйти из системы, вам снова будет предложено ввести свои учетные данные и снова войти в систему, как только вы попытаетесь получить доступ к приложению.</p>
screen.logout.confirm.proceed=Хотите продолжить?
screen.logout.header=Выход выполнен успешно
screen.logout.success=Вы успешно вышли из Центральной службы аутентификации. Вы можете <a href="{0}">войти в систему</a> снова.
screen.logout.fc.success=Вы успешно вышли из Центральной службы аутентификации. Если с помощью CAS включен единый выход из системы, следующий список приложений: <strong> только уведомлен</strong> чтобы выйти из системы и уничтожить вашу пользовательскую сессию. Помните, что это всего лишь уведомление, а не гарантия. Само приложение должно учитывать эти уведомления и правильно принимать меры для выхода из системы.
screen.logout.security=В целях безопасности закройте веб-браузер.
screen.logout.pending=Ожидается запрос на выход…
screen.service.wildcard.message=Это приложение не имеет специальной регистрационной записи в реестре службы CAS. Это авторизовано и разрешено CAS, поскольку в реестре служб CAS существует запись определения службы с подстановочными знаками, которая разрешает и принимает запросы аутентификации от неизвестных приложений, таких как это. <p/>В качестве наилучшей практики безопасности настоятельно рекомендуется ограничить возможности управления услугами <strong>включать только список известных приложений</strong> которым явно разрешено использовать CAS. Если оставить интерфейс управления открытым для всех приложений, это может создать возможность для атак на систему безопасности и затруднит аудит требований приложений и атрибутов.
screen.service.sso.error.header=Для доступа к этой услуге необходима повторная аутентификация
screen.service.sso.error.message=Вы попытались получить доступ к службе, требующей аутентификации, без повторной аутентификации.  Пожалуйста, попробуйте пройти аутентификацию еще раз</a>.
screen.service.required.message=Вы попытались пройти аутентификацию без указания целевого приложения. Пожалуйста, еще раз проверьте запрос и повторите попытку.
screen.service.initial.message=Попытка доступа к CAS или указанному целевому приложению в настоящее время запрещена. Политика аутентификации требует, чтобы вы изменили исходное приложение, а затем перешли к другим приложениям и службам.
captchaError=Проверка reCAPTCHA не удалась.
username.required=Имя пользователя – обязательное поле.
password.required=Пароль – обязательное поле.
source.required=Источник аутентификации — обязательное поле.
confirmedPassword.required=Пароль должен быть подтвержден.
pm.passwordsMustMatch=Предоставленные пароли не совпадают.
pm.passwordFailedCriteria=Предоставленный пароль не соответствует политике безопасности паролей. Пожалуйста, попробуйте еще раз.
pm.updateFailure=Пароль учетной записи не может быть изменен. Пожалуйста, попробуйте еще раз.
authenticationFailure.AccountDisabledException=Эта учетная запись отключена.
authenticationFailure.AccountLockedException=Эта учетная запись заблокирована.
authenticationFailure.AccountExpiredException=Срок действия этой учетной записи истек, и в настоящее время вход в систему запрещен.
authenticationFailure.CredentialExpiredException=Срок действия вашего пароля истек.
authenticationFailure.InvalidLoginLocationException=Вы не можете войти в систему с этой рабочей станции.
authenticationFailure.UniquePrincipalRequiredException=В настоящее время вы не можете войти в систему, поскольку у вас есть еще один активный сеанс единого входа, а в CAS настроена политика аутентификации, которая предотвращает несколько одновременных сеансов единого входа.
authenticationFailure.InvalidLoginTimeException=В настоящее время вход в вашу учетную запись запрещен.
authenticationFailure.AccountNotFoundException=Ваша учетная запись не распознана и в настоящее время вы не можете войти в нее.
authenticationFailure.FailedLoginException=Попытка аутентификации не удалась, вероятно, из-за неверных учетных данных. Пожалуйста, подтвердите и повторите попытку.
authenticationFailure.MultifactorAuthenticationProviderAbsentException=Невозможно удовлетворить требования многофакторной аутентификации. В вашей учетной записи настроена стратегия многофакторной аутентификации, однако CAS не может найти и выполнить эту стратегию, скорее всего, из-за неправильной конфигурации сервера. Обратитесь за помощью к администраторам сервиса.
authenticationFailure.SurrogateAuthenticationException=В настоящее время вы не имеете права выдавать себя за указанного пользователя.
authenticationFailure.AccountPasswordMustChangeException=Срок действия пароля вашей учетной записи истек, и его необходимо изменить.
authenticationFailure.UnauthorizedServiceForPrincipalException=Доступ к службе запрещен из-за отсутствия привилегий.
authenticationFailure.MultifactorAuthenticationRequiredException=Попытка аутентификации вашей учетной записи отклонена, поскольку ваша учетная запись еще не настроена для прохождения многофакторной аутентификации. Обратитесь за помощью к администраторам службы, убедитесь, что ваша учетная запись зарегистрирована и имеет право на многофакторную аутентификацию, и повторите попытку.
authenticationFailure.MultifactorAuthenticationFailedException=Попытка многофакторной аутентификации не удалась, вероятно, из-за неверных учетных данных многофакторной аутентификации. Пожалуйста, подтвердите и повторите попытку.
authenticationFailure.RiskyAuthenticationException=CAS не может продолжить процесс аутентификации, вероятно, потому, что эта попытка аутентификации определена как рискованная и подозрительная с достаточно высокой оценкой риска, превышающей принятый порог. Возможно, ваша попытка аутентификации заблокирована, поскольку вы используете неизвестный веб-браузер или входите в систему из неизвестного места. Для получения дополнительной информации и рекомендаций обратитесь к своему администратору и/или в службу поддержки.
authenticationFailure.UNKNOWN=Попытка аутентификации не удалась.
authenticationFailure.AuthenticationException=Учетные данные отклонены/недействительны, а попытка аутентификации не удалась.
INVALID_REQUEST_PROXY=Запрос неправильно оформлен. Убедитесь, что все необходимые параметры правильно закодированы и включены.
INVALID_TICKET_SPEC=Спецификация билета не прошла проверку. Возможные ошибки могут включать попытку проверки прокси-билета через валидатор сервисного билета или невыполнение запроса `renew=true`.
INVALID_REQUEST=Невозможно идентифицировать, авторизовать или выполнить этот запрос, вероятно, из-за неправильного формирования или отсутствия обязательных параметров.
INVALID_AUTHENTICATION_CONTEXT=Запрос проверки для [''{0}''] не может быть удовлетворено. Запрос либо не распознан, либо не выполнен.
INVALID_TICKET=Билет ''{0}'' не признан
INVALID_PROXY_GRANTING_TICKET=PGT уже создан для этого ST. Невозможно предоставить более одного PGT для ST.
INVALID_SERVICE=Билет ''{0}'' не соответствует предоставленной услуге. Исходная услуга была ''{1}'' и предоставленная услуга была ''{2}''.
INVALID_PROXY_CALLBACK=Предоставленный URL-адрес обратного вызова прокси ''{0}'' не удалось аутентифицировать. Либо ''{0}'' недоступен, или ему не разрешено выполнять аутентификацию прокси.
UNAUTHORIZED_SERVICE_PROXY=Предоставляемая услуга ''{0}'' не имеет права использовать аутентификацию прокси-сервера CAS.
UNSATISFIED_AUTHN_POLICY=Доступ к службе запрещен из-за неудовлетворительной политики аутентификации.
INVALID_AUTHN_REQUEST=Попытка аутентификации не удалась, вероятно, из-за неверных учетных данных.
BLOCKED_AUTHN_REQUEST=Попытка аутентификации заблокирована и не может быть продолжена, вероятно, из-за неправильного формата или отсутствия обязательных параметров. Изучите журналы сервера CAS, чтобы определить основную причину ошибки.
UNSATISFIED_SAML_REQUEST=Запрос аутентификации SAML не может быть понят, принят или проверен CAS, вероятно, из-за неправильного формирования или отсутствия обязательных параметров. Просмотрите журналы сервера CAS, чтобы определить причину ошибки.
MISSING_SAML_REQUEST=Запрос аутентификации SAML2 не может быть определен из хранилища сеансов CAS. Обычно это означает, что исходный запрос аутентификации SAML2, который был отправлен в CAS через поставщика услуг SAML2, не может быть получен и восстановлен после попытки аутентификации, вероятно, потому, что базовое хранилище сеансов либо принудительно удалило запрос аутентификации, либо определило, что отслеживаемый запрос просрочен и устарел, за пределами того, что позволяет политика истечения срока действия хранилища сеансов. Просмотрите журналы сервера CAS, чтобы определить причину ошибки.
screen.service.error.header=Приложению не разрешено использовать CAS
screen.service.error.redirect=У вас нет доступа к этому приложению. Пожалуйста, будьте терпеливы, так как вы собираетесь быть перенаправлены на <strong>{0}</strong> чтобы узнать больше об этом сценарии.
service.principal.resolution.error=CAS не может определить правильный субъект аутентификации. Либо принципал не может быть правильно определен как единый уникальный объект, либо CAS обнаружил смешанные/несколько потенциальных принципалов и не может решить, какой из них следует использовать. Эта ошибка также может быть вызвана, если аутентифицированному субъекту не разрешен доступ к целевому приложению из-за отсутствия привилегий, установленных политиками авторизации сервера CAS.
service.not.authorized.missing.attr=У вас нет прав на доступ к приложению, поскольку у вашей учетной записи отсутствуют привилегии, необходимые серверу CAS для аутентификации в этой службе. Пожалуйста, сообщите в службу поддержки.
screen.service.error.message=Приложение, в котором вы пытались пройти аутентификацию, не имеет права использовать CAS. Обычно это означает, что приложение не зарегистрировано в CAS, или его политика авторизации, определенная в его регистрационной записи, не позволяет ему использовать функциональные возможности CAS, или оно искажено и не распознается CAS. Свяжитесь с администратором CAS, чтобы узнать, как можно зарегистрировать и интегрировать свое приложение с CAS.
screen.service.empty.error.message=Реестр служб CAS пуст и не содержит определений служб. Приложения, желающие пройти аутентификацию с помощью CAS, должны быть явно определены в реестре служб.
screen.service.expired.message=Срок действия приложения, в котором вы пытались пройти аутентификацию, истек в реестре службы CAS. Если считается, что эта услуга все еще используется, обратитесь к администраторам службы, чтобы обновить приложение.
screen.surrogates.account.selection.header=Выбор учетной записи для выдачи себя за другое лицо
screen.surrogates.choose.account=Выберите учетную запись
screen.surrogates.message=<p>Вам предоставляется список учетных записей, от имени которых вам разрешено проходить аутентификацию.</p> <p>Выберите один и продолжайте.</p>
screen.surrogates.button.cancel=Отмена
screen.surrogates.account.selection.error=В настоящее время вы не имеете права выдавать себя за указанного пользователя.
screen.surrogates.wildcard.title=Выбор учетной записи для выдачи себя за другое лицо 
screen.surrogates.wildcard.description=CAS внутренне распознает вашу учетную запись как учетную запись со специальными разрешениями, позволяющую выдавать себя за всех пользователей и учетные записи. Поэтому выбор учетной записи для олицетворения не разрешен для вашей учетной записи. Вместо этого вы можете напрямую войти в систему и выдать себя за любую другую учетную запись, используя ее имя пользователя.
screen.browserstorage.failure.title=Невозможно перейти к следующему шагу.
screen.browserstorage.failure.message=API хранилища, скорее всего, не поддерживается или не доступен в вашем браузере. Вместо этого механизм хранения должен быть настроен на использование хранилища на стороне сервера. Обратитесь за помощью к ИТ-персоналу вашей организации.
password.expiration.warning=Срок действия вашего пароля истекает через {0} день(а). Пожалуйста <a href="https://pm.example.edu">смени свой пароль</a> сейчас.
password.expiration.loginsRemaining=У тебя есть {0} логины, оставшиеся до вас <strong>ДОЛЖЕН</strong> смените пароль.
