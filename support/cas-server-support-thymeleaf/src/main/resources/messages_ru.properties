screen.mfaUnavailable.heading=Поставщик MFA недоступен
screen.mfaUnavailable.message=В настоящее время CAS не удалось связаться с настроенным поставщиком MFA. Из-за политик сбоев, настроенных для службы, к которой вы пытаетесь получить доступ, аутентификация не может быть предоставлена ​​в настоящее время.
