screen.authentication.webauthn.confirm.desc=Начните процесс регистрации устройства, присвоив понятное имя вашему устройству с поддержкой FIDO2.
screen.authentication.webauthn.name=Имя устройства
screen.authentication.webauthn.login.title=Войти с помощью устройства с поддержкой FIDO2
screen.authentication.webauthn.login.desc=Для входа используйте зарегистрированное устройство с поддержкой FIDO2. Чтобы успешно выполнить это действие, ваше имя пользователя и устройство уже должны быть зарегистрированы в CAS.
screen.authentication.webauthn.authn.fail.title=Аутентификация не удалась
screen.authentication.webauthn.authn.fail.desc=Попытка аутентификации не удалась. Убедитесь, что ваше имя пользователя и выбранное устройство зарегистрированы в CAS. Проверьте журналы сервера CAS, чтобы определить основную причину ошибки. 
screen.authentication.webauthn.qr.success.title=Успешная аутентификация
screen.authentication.webauthn.qr.success.desc=Теперь вы успешно прошли аутентификацию на своем устройстве с поддержкой FIDO2. Теперь CAS автоматически распознает вашу попытку аутентификации и перейдет к следующему шагу. Вы можете закрыть это окно и вернуться к исходному экрану.
screen.authentication.webauthn.qr.fail.title=Аутентификация не удалась
screen.authentication.webauthn.qr.fail.desc=Попытка аутентификации не удалась. Убедитесь, что ваше имя пользователя и выбранное устройство зарегистрированы в CAS, а также проверьте журналы сервера CAS, чтобы определить основную причину ошибки. Будущие попытки аутентификации будут заблокированы. Не обновляйте окно, а вместо этого рассмотрите возможность перезапуска процесса аутентификации.
screen.authentication.webauthn.qr.info=Если у вас нет с собой устройства с поддержкой FIDO или это устройство не зарегистрировано в CAS, вы можете отсканировать приведенный ниже QR-код и пройти аутентификацию, используя другое (мобильное) устройство. После успешной аутентификации вы автоматически перейдете к следующему шагу.
