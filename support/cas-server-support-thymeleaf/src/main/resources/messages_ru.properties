cas.inwebo.error.heading=Произошла ошибка.
cas.inwebo.error.userrefusedortoolate=Вы отказались от аутентификации или не подтвердили ее достаточно быстро.
cas.inwebo.error.usernotregistered=Прежде чем войти в систему, вы должны зарегистрироваться на Inwebo. Проверьте свой почтовый ящик, чтобы следовать процессу регистрации, или введите ниже коды активации и PIN-коды, чтобы зарегистрироваться в браузере…
cas.inwebo.selectauthent.title=Выберите аутентификацию
cas.inwebo.selectauthent.heading=Выберите метод аутентификации:
cas.inwebo.selectauthent.browser=Аутентификация браузера
