cas.screen.acct.title=Регистрация аккаунта
cas.screen.acct.intro=Пожалуйста, заполните форму ниже, чтобы зарегистрировать новую учетную запись в CAS. После отправки формы вы получите электронное письмо со ссылкой для активации учетной записи, чтобы включить ее, настроить пароль и начать использовать CAS.
cas.screen.acct.infosent=Инструкции по активации аккаунта успешно отправлены. Пожалуйста, проверьте свою электронную почту и т. д. и следуйте инструкциям.
cas.screen.acct.intro.complete=Добро пожаловать обратно! Благодарим вас за подтверждение вашей учетной записи. Пожалуйста, заполните форму ниже, чтобы зарегистрировать новую учетную запись в CAS. 
cas.screen.acct.intro.completed=Спасибо! Теперь ваша учетная запись активирована и зарегистрирована в CAS.
cas.screen.acct.button.submit=Отправить
cas.screen.acct.button.cancel=Отмена
cas.screen.acct.button.update=Обновить
cas.screen.acct.error.provision=Невозможно предоставить запрошенную учетную запись.
cas.screen.acct.error.fail=Невозможно зарегистрировать запрошенную учетную запись или отправить ссылку для активации учетной записи.
cas.screen.acct.error.invalid-value=Предоставленное значение отсутствует, недействительно или не соответствует требуемому шаблону для типа ввода.
