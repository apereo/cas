screen.pm.weak.message=Mật khẩu của bạn không đáp ứng yêu cầu bảo mật của chúng tôi. Mật khẩu mạnh là điều cần thiết để bảo vệ tài khoản của bạn khỏi bị truy cập trái phép và các mối đe dọa bảo mật tiềm ẩn. Tiếp tục ở đây để chọn mật khẩu mới đáp ứng các yêu cầu của chính sách mật khẩu và đảm bảo mật khẩu mới của bạn là duy nhất và không được sử dụng cho bất kỳ tài khoản nào khác.
