cas.mfa.simple.contact-selection.title=Chọn thông tin liên hệ
cas.mfa.simple.contact-selection.description=Chúng tôi đã tìm thấy nhiều cách để liên hệ với bạn về tài khoản của bạn. Vui lòng chọn (các) tài khoản mà bạn muốn nhận mã thông báo xác thực đa yếu tố.
cas.mfa.simple.pagetitle=Đăng nhập xác thực đa yếu tố CAS
cas.mfa.simple.label.token=Mã thông báo:
cas.mfa.simple.label.resend=Gửi lại
cas.mfa.simple.label.tokensent=Mã thông báo xác thực đa yếu tố được gửi cho bạn qua email hoặc tin nhắn văn bản. Vui lòng xác định vị trí mã thông báo và gửi nó ở đây để tiếp tục. Lưu ý rằng mã thông báo sẽ hết hạn sau một khoảng thời gian ngắn và sẽ không được CAS công nhận nữa, trong trường hợp đó, bạn có thể yêu cầu CAS gửi cho bạn mã thông báo mới.
cas.mfa.simple.label.contactfailed.sms=CAS không thể sử dụng thông tin liên hệ đã chọn để gửi cho bạn SMS có mã thông báo xác thực đa yếu tố. Vui lòng xem lại thông tin liên hệ của bạn và liên hệ với quản trị viên CAS của bạn để được hỗ trợ.
cas.mfa.simple.label.contactfailed.email=CAS không thể sử dụng thông tin liên hệ đã chọn để gửi cho bạn email có mã thông báo xác thực đa yếu tố. Vui lòng xem lại thông tin liên hệ của bạn và liên hệ với quản trị viên CAS của bạn để được hỗ trợ.
cas.mfa.simple.token.failed=Không thể chấp nhận nỗ lực xác thực đa yếu tố này. Mã thông báo được cung cấp không hợp lệ.
cas.mfa.simple.registration.title=Đăng ký tài khoản
cas.mfa.simple.registration.description=Tài khoản của bạn chưa được đăng ký xác thực đa yếu tố mặc dù nó đủ điều kiện và được yêu cầu bởi ứng dụng bạn đang cố truy cập. làm ơn <a href="https://account.example.org/mfa">đăng ký tài khoản của bạn</a> để xác thực đa yếu tố và đảm bảo CAS có quyền truy cập vào thông tin liên hệ của bạn như địa chỉ email, điện thoại, v.v.
cas.mfa.simple.registration.email.failed=Không thể đăng ký tài khoản của bạn để xác thực đa yếu tố. CAS không thể nhận dạng và chấp nhận địa chỉ email của bạn để gửi cho bạn email có liên kết đăng ký. Vui lòng xem lại thông tin liên hệ của bạn và liên hệ với quản trị viên CAS của bạn để được hỗ trợ.
cas.mfa.simple.registration.email.sent=Một email có mã thông báo đăng ký đã được gửi cho bạn. Vui lòng kiểm tra hộp thư đến của bạn và nhà cung cấp mã tại đây.
cas.mfa.simple.registration.token.failed=Không thể đăng ký tài khoản của bạn để xác thực đa yếu tố. Mã thông báo được cung cấp không hợp lệ, hết hạn hoặc bị xâm phạm. Vui lòng xem lại mã thông báo và thử lại.
