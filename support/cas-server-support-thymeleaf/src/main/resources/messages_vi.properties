screen.authentication.webauthn.authn.fail.desc=Nỗ lực xác thực đã thất bại. Vui lòng đảm bảo tên người dùng và thiết bị bạn chọn đã được đăng ký với CAS. Xác minh nhật ký máy chủ CAS để xác định nguyên nhân gốc rễ của lỗi. 
screen.authentication.webauthn.qr.success.title=Xác thực thành công
screen.authentication.webauthn.qr.success.desc=Bây giờ bạn đã xác thực thành công với thiết bị hỗ trợ FIDO2 của mình. CAS bây giờ sẽ tự động nhận ra nỗ lực xác thực của bạn và sẽ tiếp tục sang bước tiếp theo. Bạn có thể đóng cửa sổ này và quay lại màn hình ban đầu.
screen.authentication.webauthn.qr.fail.title=Xác thực không thành công
