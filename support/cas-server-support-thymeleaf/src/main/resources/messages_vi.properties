screen.error.page.unprocessable=CAS không thể xử lý yêu cầu này. Yêu cầu không đúng định dạng, chứa các tham số không được nhận dạng và không được CAS hỗ trợ hoặc đã cũ hoặc hướng dẫn CAS kích hoạt một luồng xác thực cụ thể không hợp lệ hoặc không được nhận dạng. Cũng có thể phiên đăng nhập đã hết thời gian chờ và bạn đã đợi quá lâu trước khi đăng nhập. <p>làm ơn <strong>đóng các cửa sổ trình duyệt không liên quan, xóa tất cả cookie của trình duyệt, xóa bộ nhớ cache của trình duyệt và bắt đầu lại</strong> để xóa dấu vết của tất cả các phiên trước đó và dữ liệu có thể không hợp lệ.</p>
