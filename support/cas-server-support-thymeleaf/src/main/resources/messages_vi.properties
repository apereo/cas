cas.mfa.providerselection.mfa-duo=Bảo mật kép
cas.mfa.providerselection.mfa-duo.notes=Nhiều phương thức xác thực đa dạng của Duo cho phép mọi người dùng đăng nhập nhanh chóng và an toàn. Duo Push, được gửi bởi ứng dụng xác thực Duo Mobile, cho phép người dùng phê duyệt thông báo đẩy để xác minh danh tính của họ.
cas.mfa.providerselection.mfa-webauthn=Xác thực web FIDO2
cas.mfa.providerselection.mfa-webauthn.notes=WebAuthn là một API giúp một bên đáng tin cậy, chẳng hạn như dịch vụ web, dễ dàng tích hợp xác thực mạnh mẽ vào các ứng dụng bằng cách sử dụng tính năng hỗ trợ được tích hợp sẵn cho tất cả các trình duyệt và nền tảng hàng đầu. 
cas.mfa.providerselection.mfa-gauth=Trình xác thực Google
cas.mfa.providerselection.mfa-gauth.notes=Google Authenticator là trình xác thực dựa trên phần mềm triển khai các dịch vụ xác minh hai bước để xác thực người dùng ứng dụng di động của Google.
cas.mfa.providerselection.mfa-simple=Xác thực đa yếu tố CAS
cas.mfa.providerselection.mfa-simple.notes=Cho phép CAS tự hoạt động như một nhà cung cấp xác thực đa yếu tố, phát hành mã thông báo và gửi chúng đến người dùng cuối thông qua các kênh liên lạc được xác định trước như email hoặc tin nhắn văn bản.
cas.mfa.providerselection.mfa-yubikey=Xác thực đa yếu tố YubiKey
cas.mfa.providerselection.mfa-yubikey.notes=Yubico là dịch vụ dựa trên đám mây cho phép xác thực hai yếu tố mạnh mẽ, dễ sử dụng và giá cả phải chăng bằng mật khẩu một lần thông qua sản phẩm chủ lực của họ, YubiKey. 
