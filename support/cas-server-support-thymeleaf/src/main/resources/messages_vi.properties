screen.aup.policyterms=<p>Mục đích của chính sách này là thiết lập việc sử dụng có thể chấp nhận và không thể chấp nhận được đối với các thiết bị điện tử và tài nguyên mạng kết hợp với văn hóa đã được thiết lập về hành vi đạo đức và hợp pháp, sự cởi mở, tin cậy và liêm chính.</p> <p>Bằng cách sử dụng các tài nguyên này, bạn đồng ý tuân theo Chính sách sử dụng được chấp nhận.</p>
