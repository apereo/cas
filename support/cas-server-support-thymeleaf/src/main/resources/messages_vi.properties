screen.oidc.confirm.claim.name=Tên đầy đủ của Người dùng cuối ở dạng có thể hiển thị bao gồm tất cả các phần tên, có thể bao gồm tiêu đề và hậu tố, được sắp xếp theo ngôn ngữ và sở thích của Người dùng cuối.
screen.oidc.confirm.claim.given_name=(Các) tên hoặc (các) tên của Người dùng cuối. Lưu ý rằng ở một số nền văn hóa, mọi người có thể có nhiều tên riêng; tất cả đều có thể có mặt, với các tên được phân tách bằng ký tự khoảng trắng.
screen.oidc.confirm.claim.middle_name=(Các) tên đệm của Người dùng cuối. Lưu ý rằng ở một số nền văn hóa, mọi người có thể có nhiều tên đệm; tất cả đều có thể có mặt, với các tên được phân tách bằng ký tự khoảng trắng. Cũng lưu ý rằng ở một số nền văn hóa, tên đệm không được sử dụng.
screen.oidc.confirm.claim.family_name=(Các) Họ hoặc (các) họ của Người dùng cuối. Lưu ý rằng ở một số nền văn hóa, con người có thể có nhiều họ hoặc không có họ; tất cả đều có thể có mặt, với các tên được phân tách bằng ký tự khoảng trắng.
screen.oidc.confirm.claim.email=Địa chỉ email ưa thích của người dùng cuối.
screen.oidc.confirm.claim.preferred_username=CÓ THỂ là bất kỳ chuỗi JSON hợp lệ nào bao gồm các ký tự đặc biệt như @, / hoặc khoảng trắng. RP KHÔNG PHẢI coi giá trị này là duy nhất.
screen.oidc.confirm.claim.profile=URL của trang hồ sơ của Người dùng cuối. Nội dung của trang Web này PHẢI nói về Người dùng cuối.
screen.oidc.confirm.claim.picture=URL của ảnh hồ sơ của Người dùng cuối. URL này PHẢI đề cập đến một tệp hình ảnh (ví dụ: tệp hình ảnh PNG, JPEG hoặc GIF), thay vì đến một trang Web có chứa hình ảnh. Lưu ý rằng URL này NÊN tham chiếu cụ thể ảnh hồ sơ của Người dùng cuối phù hợp để hiển thị khi mô tả Người dùng cuối, thay vì ảnh tùy ý do Người dùng cuối chụp.
screen.oidc.confirm.claim.phone_number=Số điện thoại ưa thích của Người dùng cuối. Nó được KHUYẾN NGHỊ làm định dạng của khiếu nại này. Ví dụ, <code>+1 (425) 555-1212</code> hoặc <code>+56 (2) 687 2400</code>.
