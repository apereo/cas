screen.authentication.webauthn.qr.info=Nếu bạn không mang theo thiết bị hỗ trợ FIDO bên mình hoặc thiết bị này chưa được đăng ký với CAS, bạn có thể quét mã QR bên dưới và xác thực bằng thiết bị (di động) khác. Sau khi xác thực thành công, bạn sẽ tự động chuyển sang bước tiếp theo.
