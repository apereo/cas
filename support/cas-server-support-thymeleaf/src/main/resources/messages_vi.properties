screen.account.sessions=Xem lại các phiên đăng nhập một lần đang hoạt động được đăng ký với CAS trên tất cả các thiết bị và trình duyệt của bạn.
screen.account.applications=Có những ứng dụng đã đăng ký với CAS mà CAS được phép cho phép bạn truy cập.
screen.account.attributes=Đây là những thuộc tính mà CAS đã tìm thấy và đính kèm vào hồ sơ xác thực của bạn. Các thuộc tính này được bao gồm trong nhóm các thuộc tính có sẵn có thể được chia sẻ và phát hành cho các ứng dụng.
