cas.mfa.webauthn.register.helptext=Gán tên thân thiện cho thiết bị hỗ trợ FIDO2 của bạn rồi đăng ký tên đó với CAS để xác thực đa yếu tố. Sau khi đăng ký thiết bị hoàn tất thành công, bạn sẽ tự động được chuyển hướng đến bước tiếp theo để đăng nhập bằng thiết bị của mình.
cas.mfa.webauthn.register.wait=Thiết bị hỗ trợ FIDO2 của bạn hiện đã được đăng ký với CAS. Xin vui lòng chờ…
cas.mfa.webauthn.register.discoverablecredentials=Bạn cũng có thể đăng ký thiết bị của mình bằng cách sử dụng <i>Thông tin xác thực có thể khám phá / Khóa thường trú</i>. Điều này có nghĩa là khóa riêng và siêu dữ liệu liên quan được lưu trữ trong bộ nhớ liên tục trên trình xác thực chứ không phải trên máy chủ CAS.
