screen.oidc.confirm.bindingmessage.description=Mã định danh hoặc thông báo mà con người có thể đọc được nhằm mục đích hiển thị trên cả thiết bị tiêu dùng và thiết bị xác thực để khóa chúng lại với nhau để thực hiện giao dịch bằng tín hiệu trực quan cho người dùng cuối. Thông báo khóa liên động này cho phép người dùng cuối đảm bảo rằng hành động được thực hiện trên thiết bị xác thực có liên quan đến yêu cầu do thiết bị tiêu dùng khởi tạo.
