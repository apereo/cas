screen.success.header=Đăng nhập thành công
screen.success.success=bạn, <strong>{0}</strong>, đã đăng nhập thành công vào Dịch vụ xác thực trung tâm. Tuy nhiên, bạn nhìn thấy trang này vì CAS không biết về điểm đến mục tiêu của bạn và cách đưa bạn đến đó. Kiểm tra lại yêu cầu xác thực và đảm bảo rằng dịch vụ/ứng dụng đích được ủy quyền và đăng ký với CAS đã được chỉ định.
screen.success.security=Khi bạn hoàn tất, vì lý do bảo mật, vui lòng <a href="logout">đăng xuất</a> và thoát khỏi trình duyệt web của bạn.
screen.logout.confirm.header=Bạn có, <strong>{0}</strong>, muốn đăng xuất hoàn toàn?
screen.logout.confirm.header.anonymous=Bạn có muốn đăng xuất hoàn toàn không?
screen.logout.confirm.text=<p>Một ứng dụng có thể đã chuyển hướng bạn đến Dịch vụ xác thực trung tâm để đăng xuất hoàn toàn và hủy phiên đăng nhập một lần của bạn. Nếu bạn chọn đăng xuất, bạn sẽ được yêu cầu cung cấp lại thông tin xác thực của mình và đăng nhập lại sau khi cố gắng truy cập một ứng dụng.</p>
screen.logout.confirm.proceed=Bạn có muốn tiếp tục không?
screen.logout.header=Đăng xuất thành công
screen.logout.success=Bạn đã đăng xuất thành công khỏi Dịch vụ xác thực trung tâm. Bạn có thể <a href="{0}">đăng nhập</a> một lần nữa.
screen.logout.fc.success=Bạn đã đăng xuất thành công khỏi Dịch vụ xác thực trung tâm. Với tính năng đăng xuất một lần được kích hoạt bằng CAS, danh sách ứng dụng sau đây là <strong> chỉ được thông báo</strong> để đăng xuất bạn và hủy phiên người dùng của bạn. Hãy nhớ rằng đây chỉ là một thông báo, không phải là một sự đảm bảo. Ứng dụng có trách nhiệm tôn trọng những thông báo này và thực hiện hành động thích hợp để đăng xuất bạn.
screen.logout.security=Vì lý do bảo mật, hãy thoát khỏi trình duyệt web của bạn.
screen.logout.pending=Yêu cầu đăng xuất đang chờ xử lý…
screen.service.wildcard.message=Ứng dụng này không có mục đăng ký chuyên dụng trong sổ đăng ký dịch vụ CAS. Nó được CAS ủy quyền và cho phép vì tồn tại một mục định nghĩa dịch vụ có ký tự đại diện trong sổ đăng ký dịch vụ CAS cho phép và chấp nhận các yêu cầu xác thực từ các ứng dụng không xác định như ứng dụng này. <p/>Là một biện pháp bảo mật tốt nhất, chúng tôi đặc biệt khuyến nghị giới hạn cơ sở quản lý dịch vụ ở <strong>chỉ bao gồm danh sách các ứng dụng đã biết</strong> được ủy quyền rõ ràng để sử dụng CAS. Để giao diện quản lý mở cho tất cả các ứng dụng có thể tạo cơ hội cho các cuộc tấn công bảo mật và sẽ gây khó khăn cho việc kiểm tra các yêu cầu ứng dụng và nhu cầu thuộc tính.
screen.service.sso.error.header=Cần phải xác thực lại để truy cập dịch vụ này
screen.service.sso.error.message=Bạn đã cố truy cập vào một dịch vụ yêu cầu xác thực mà không xác thực lại.  Vui lòng thử xác thực lại</a>.
screen.service.required.message=Bạn đã thử xác thực mà không chỉ định ứng dụng đích. Vui lòng kiểm tra lại yêu cầu và thử lại.
screen.service.initial.message=Việc cố gắng truy cập CAS hoặc ứng dụng mục tiêu được chỉ định không được phép tại thời điểm này. Chính sách xác thực yêu cầu bạn thay đổi ứng dụng đang khởi động, sau đó chuyển sang các ứng dụng và dịch vụ khác.
captchaError=Xác thực reCAPTCHA không thành công.
username.required=Tên người dùng là trường bắt buộc.
password.required=Mật khẩu là trường bắt buộc.
source.required=Nguồn xác thực là trường bắt buộc.
confirmedPassword.required=Mật khẩu phải được xác nhận.
pm.passwordsMustMatch=Mật khẩu được cung cấp không khớp.
pm.passwordFailedCriteria=Mật khẩu được cung cấp không đáp ứng chính sách bảo mật mật khẩu. Vui lòng thử lại.
pm.updateFailure=Không thể sửa đổi mật khẩu tài khoản. Vui lòng thử lại.
authenticationFailure.AccountDisabledException=Tài khoản này đã bị vô hiệu hóa.
authenticationFailure.AccountLockedException=Tài khoản này đã bị khóa.
authenticationFailure.AccountExpiredException=Tài khoản này đã hết hạn và bị cấm đăng nhập vào thời điểm này.
authenticationFailure.CredentialExpiredException=Mật khẩu của bạn đã hết hạn.
authenticationFailure.InvalidLoginLocationException=Bạn không thể đăng nhập từ máy trạm này.
authenticationFailure.UniquePrincipalRequiredException=Bạn không thể đăng nhập vào lúc này vì bạn có một phiên đăng nhập một lần đang hoạt động khác và CAS được định cấu hình bằng chính sách xác thực nhằm ngăn chặn nhiều phiên đăng nhập một lần đồng thời.
authenticationFailure.InvalidLoginTimeException=Tài khoản của bạn bị cấm đăng nhập vào thời điểm này.
authenticationFailure.AccountNotFoundException=Tài khoản của bạn không được công nhận và không thể đăng nhập vào lúc này.
authenticationFailure.FailedLoginException=Nỗ lực xác thực không thành công, có thể do thông tin xác thực không hợp lệ. Vui lòng xác minh và thử lại.
authenticationFailure.MultifactorAuthenticationProviderAbsentException=Không thể đáp ứng yêu cầu xác thực đa yếu tố. Tài khoản của bạn được định cấu hình cho chiến lược xác thực đa yếu tố, tuy nhiên CAS không thể xác định và thực thi chiến lược đó rất có thể là do máy chủ bị định cấu hình sai. Hãy liên hệ với quản trị viên dịch vụ để được hỗ trợ.
authenticationFailure.SurrogateAuthenticationException=Bạn không được phép mạo danh người dùng được chỉ định vào lúc này.
authenticationFailure.AccountPasswordMustChangeException=Mật khẩu tài khoản của bạn đã hết hạn và phải được thay đổi.
authenticationFailure.UnauthorizedServiceForPrincipalException=Truy cập dịch vụ bị từ chối do thiếu đặc quyền.
authenticationFailure.MultifactorAuthenticationRequiredException=Nỗ lực xác thực cho tài khoản của bạn bị từ chối vì tài khoản của bạn chưa được định cấu hình để thực hiện xác thực đa yếu tố. Hãy liên hệ với quản trị viên dịch vụ để được hỗ trợ, đảm bảo tài khoản của bạn đã được đăng ký và đủ điều kiện để xác thực đa yếu tố rồi thử lại.
authenticationFailure.MultifactorAuthenticationFailedException=Nỗ lực xác thực đa yếu tố không thành công, có thể do thông tin xác thực đa yếu tố không hợp lệ. Vui lòng xác minh và thử lại.
authenticationFailure.RiskyAuthenticationException=CAS không thể tiếp tục quy trình xác thực, có thể là do nỗ lực xác thực này được xác định là có rủi ro và đáng ngờ với điểm rủi ro đủ cao trên ngưỡng được chấp nhận. Có thể nỗ lực xác thực của bạn bị chặn vì bạn đang sử dụng một trình duyệt web không xác định hoặc bạn đang đăng nhập từ một vị trí không xác định. Để biết thêm thông tin và hướng dẫn, vui lòng liên hệ với quản trị viên và/hoặc bộ phận trợ giúp của bạn.
authenticationFailure.UNKNOWN=Nỗ lực xác thực đã thất bại.
authenticationFailure.AuthenticationException=Thông tin xác thực bị từ chối/không hợp lệ và nỗ lực xác thực không thành công.
INVALID_REQUEST_PROXY=Yêu cầu được định dạng không chính xác. Đảm bảo tất cả các thông số cần thiết được mã hóa và đưa vào đúng cách.
INVALID_TICKET_SPEC=Thông số xác thực vé không thành công. Các lỗi có thể xảy ra có thể bao gồm việc cố gắng xác thực Vé proxy thông qua trình xác thực Vé dịch vụ hoặc không tuân thủ yêu cầu `renew=true`.
INVALID_REQUEST=Không thể xác định, ủy quyền hoặc hoàn thành yêu cầu này, có thể do các tham số bắt buộc không đúng định dạng hoặc thiếu.
INVALID_AUTHENTICATION_CONTEXT=Yêu cầu xác thực cho [''{0}''] không thể hài lòng. Yêu cầu không được nhận dạng hoặc không được thực hiện.
INVALID_TICKET=Vé ''{0}'' không được công nhận
INVALID_PROXY_GRANTING_TICKET=PGT đã được tạo cho ST này. Không thể cấp nhiều hơn một PGT cho ST
INVALID_SERVICE=Vé ''{0}'' không khớp với dịch vụ được cung cấp. Dịch vụ ban đầu là ''{1}'' và dịch vụ được cung cấp là ''{2}''.
INVALID_PROXY_CALLBACK=Url gọi lại proxy được cung cấp ''{0}'' không thể được xác thực. Hoặc ''{0}'' không thể truy cập được hoặc không được phép thực hiện xác thực proxy.
UNAUTHORIZED_SERVICE_PROXY=Dịch vụ đi kèm ''{0}'' không được phép sử dụng xác thực proxy CAS.
UNSATISFIED_AUTHN_POLICY=Quyền truy cập dịch vụ bị từ chối do chính sách xác thực không được thỏa mãn.
INVALID_AUTHN_REQUEST=Nỗ lực xác thực không thành công, có thể do thông tin xác thực không hợp lệ.
BLOCKED_AUTHN_REQUEST=Nỗ lực xác thực bị chặn và không thể tiếp tục, có thể do các tham số bắt buộc không đúng định dạng hoặc thiếu. Kiểm tra nhật ký máy chủ CAS để xác định nguyên nhân gốc rễ của lỗi.
UNSATISFIED_SAML_REQUEST=CAS không thể hiểu, chấp nhận hoặc xác thực yêu cầu xác thực SAML, có thể là do các tham số bắt buộc bị thiếu hoặc không đúng định dạng. Vui lòng kiểm tra nhật ký máy chủ CAS để xác định nguyên nhân gốc rễ của lỗi.
MISSING_SAML_REQUEST=Không thể xác định yêu cầu xác thực SAML2 từ kho lưu trữ phiên CAS. Điều này thường có nghĩa là không thể truy xuất và khôi phục yêu cầu xác thực SAML2 ban đầu được gửi tới CAS thông qua nhà cung cấp dịch vụ SAML2 sau một lần thử xác thực do kho phiên cơ bản đã loại bỏ yêu cầu xác thực một cách mạnh mẽ hoặc xác định rằng yêu cầu được theo dõi đã hết hạn và cũ, vượt quá những gì chính sách hết hạn của cửa hàng phiên cho phép. Vui lòng kiểm tra nhật ký máy chủ CAS để xác định nguyên nhân gốc rễ của lỗi.
screen.service.error.header=Ứng dụng không được phép sử dụng CAS
screen.service.error.redirect=Bạn không được phép truy cập ứng dụng này. Hãy kiên nhẫn vì bạn sắp được chuyển hướng đến <strong>{0}</strong> để tìm hiểu thêm về kịch bản này.
service.principal.resolution.error=CAS không thể xác định nguyên tắc xác thực chính xác. Không thể giải quyết chính xác hiệu trưởng dưới dạng một thực thể duy nhất hoặc CAS đã tìm thấy các hiệu trưởng hỗn hợp/nhiều ứng cử viên và không thể quyết định nên sử dụng hiệu trưởng nào. Lỗi này cũng có thể xảy ra nếu hiệu trưởng được xác thực không được phép truy cập vào ứng dụng đích do thiếu các đặc quyền do chính sách ủy quyền máy chủ CAS đặt ra.
service.not.authorized.missing.attr=Bạn không được phép truy cập ứng dụng vì tài khoản của bạn thiếu các đặc quyền mà máy chủ CAS yêu cầu để xác thực dịch vụ này. Vui lòng thông báo cho bộ phận hỗ trợ của bạn.
screen.service.error.message=Ứng dụng mà bạn cố gắng xác thực không được phép sử dụng CAS. Điều này thường chỉ ra rằng ứng dụng chưa được đăng ký với CAS hoặc chính sách ủy quyền của ứng dụng được xác định trong hồ sơ đăng ký ngăn ứng dụng tận dụng chức năng CAS hoặc ứng dụng đó không đúng định dạng và không được CAS nhận dạng. Hãy liên hệ với quản trị viên CAS của bạn để tìm hiểu cách bạn có thể đăng ký và tích hợp ứng dụng của mình với CAS.
screen.service.empty.error.message=Sổ đăng ký dịch vụ của CAS trống và không có định nghĩa dịch vụ. Các ứng dụng muốn xác thực bằng CAS phải được xác định rõ ràng trong sổ đăng ký dịch vụ.
screen.service.expired.message=Ứng dụng mà bạn cố gắng xác thực đã hết hạn trong Cơ quan đăng ký dịch vụ CAS. Nếu dịch vụ này vẫn được xem xét sử dụng, vui lòng liên hệ với quản trị viên dịch vụ để gia hạn ứng dụng.
