screen.surrogates.wildcard.description=Tài khoản của bạn được CAS công nhận nội bộ là tài khoản có quyền đặc biệt, được phép mạo danh tất cả người dùng và tài khoản. Do đó, việc lựa chọn tài khoản mạo danh không được phép đối với tài khoản của bạn. Thay vào đó, bạn có thể trực tiếp tiến hành đăng nhập và mạo danh bất kỳ tài khoản nào khác bằng tên người dùng của tài khoản đó.
