passwordless.token.header=Cung cấp mã thông báo
passwordless.token.description=Vui lòng cung cấp mã thông báo bảo mật được gửi cho bạn qua email, điện thoại, v.v. Lưu ý rằng mã thông báo chỉ có hiệu lực trong một khoảng thời gian ngắn và sau khi gửi, tất cả các mã thông báo khác sẽ bị vô hiệu và bị xóa.
passwordless.error.failure.title=Lỗi xác thực
passwordless.error.failure.description=Không thể xác minh mã thông báo được cung cấp. Nó có thể đã bị vô hiệu, bị xóa hoặc hết hạn.
passwordless.error.unknown.user=Tên người dùng đã cung cấp không thể được CAS nhận dạng và định vị.
passwordless.error.invalid.user=Tên người dùng được cung cấp không mang đủ thông tin liên hệ.
passwordless.getuser.header=Xác thực không cần mật khẩu
passwordless.getuser.description=Vui lòng cung cấp tên người dùng để xác định tài khoản của bạn. Sau khi tài khoản của bạn được xác minh, CAS sẽ chọn chiến lược xác thực phù hợp cho bạn.
passwordless.selection.header=Lựa chọn xác thực
passwordless.selection.description=Chọn một trong các tùy chọn xác thực được liệt kê bên dưới để tiếp tục.
passwordless.selection.password.header=Mật khẩu
passwordless.selection.password.description=Bạn có thể xác thực bằng mật khẩu của mình. Bạn cũng có thể được yêu cầu hoàn thành quy trình xác thực đa yếu tố nếu tài khoản của bạn đủ điều kiện.
passwordless.selection.token.header=Mã thông báo
passwordless.selection.token.description=Bạn sẽ nhận được mã thông báo một lần, có giá trị trong một khoảng thời gian giới hạn, qua email hoặc SMS từ CAS và bạn sẽ được yêu cầu nhập lại mã để tiếp tục.
passwordless.selection.mfa.header=đa yếu tố
passwordless.selection.mfa.description=Bạn sẽ được chuyển trực tiếp đến luồng xác thực đa yếu tố. Khi bạn đã hoàn thành bước xác thực, quy trình sẽ tự động tiếp tục.
passwordless.selection.delegation.header=Bên ngoài
passwordless.selection.delegation.description=Bạn sẽ được gửi đến một nhà cung cấp nhận dạng bên ngoài để đăng nhập. Sau khi hoàn tất quy trình xác thực với nhà cung cấp danh tính bên ngoài, bạn sẽ tự động được chuyển trở lại CAS để tiếp tục.
cas.authn.qr.fail=Không thể chấp nhận yêu cầu xác thực dựa trên mã QR. Đảm bảo mã QR được quét chính xác và thông tin đăng nhập được cung cấp là hợp lệ, do máy chủ CAS này cấp và chưa hết hạn.
cas.inwebo.checkresult.title=Kiểm tra xác thực Inwebo
cas.inwebo.checkresult.heading=Đang chờ thông báo Inwebo được phê duyệt:
cas.inwebo.checkresult.message=Vui lòng xác thực nó trên điện thoại/máy tính để bàn của bạn…
cas.inwebo.error.title=Lỗi xác thực Inwebo
cas.inwebo.error.heading=Đã xảy ra lỗi.
cas.inwebo.error.userrefusedortoolate=Bạn đã từ chối xác thực hoặc không xác thực nó đủ nhanh.
cas.inwebo.error.usernotregistered=Trước khi đăng nhập, bạn phải đăng ký tại Inwebo. Kiểm tra hộp thư của bạn để thực hiện quy trình đăng ký hoặc điền mã kích hoạt và mã PIN bên dưới để đăng ký vào trình duyệt của bạn…
cas.inwebo.selectauthent.title=Chọn xác thực
cas.inwebo.selectauthent.heading=Chọn phương thức xác thực của bạn:
cas.inwebo.selectauthent.browser=Xác thực trình duyệt
cas.inwebo.selectauthent.push=Xác thực ứng dụng di động/máy tính để bàn
cas.inwebo.browserauthent.title=Xác thực trình duyệt
cas.inwebo.enroll.code=Mã kích hoạt
cas.inwebo.enroll.button=Đăng ký xác thực trình duyệt
cas.inwebo.enroll.failure=Việc đăng ký không thành công
cas.inwebo.pin=mã PIN
cas.inwebo.pin2=Xác nhận mã PIN
cas.inwebo.enroll.badpinconfirmation=Mã PIN không khớp
cas.inwebo.browser.heading=Điền mã PIN của bạn:
cas.inwebo.browser.button=Đăng nhập vào trình duyệt
cas.inwebo.browser.failure=Lỗi tạo OTP
cas.inwebo.retry.button=Thử lại xác thực đa yếu tố Inwebo
cas.screen.acct.title=Đăng ký tài khoản
cas.screen.acct.intro=Vui lòng điền vào mẫu dưới đây để đăng ký tài khoản mới của bạn với CAS. Sau khi gửi biểu mẫu, bạn sẽ nhận được email có liên kết kích hoạt tài khoản để kích hoạt tài khoản, thiết lập mật khẩu và bắt đầu sử dụng CAS.
cas.screen.acct.infosent=Hướng dẫn kích hoạt tài khoản đã được gửi thành công. Vui lòng kiểm tra email của bạn, v.v. và làm theo hướng dẫn.
cas.screen.acct.intro.complete=Chào mừng trở lại! Cảm ơn bạn đã xác minh tài khoản của bạn. Vui lòng điền vào mẫu dưới đây để đăng ký tài khoản mới của bạn với CAS. 
cas.screen.acct.intro.completed=Cảm ơn bạn! Tài khoản của bạn hiện đã được kích hoạt và đăng ký với CAS.
cas.screen.acct.button.submit=Gửi
cas.screen.acct.button.cancel=Hủy bỏ
cas.screen.acct.button.update=cập nhật
cas.screen.acct.error.provision=Không thể cung cấp tài khoản được yêu cầu.
cas.screen.acct.error.fail=Không thể đăng ký tài khoản được yêu cầu hoặc gửi liên kết kích hoạt tài khoản.
cas.screen.acct.error.invalid-value=Giá trị được cung cấp bị thiếu, không hợp lệ hoặc không khớp với mẫu được yêu cầu cho loại đầu vào.
cas.screen.acct.label.email=Địa chỉ email
cas.screen.acct.title.email=Đây là địa chỉ email chính của bạn mà liên kết kích hoạt sẽ được gửi tới.
cas.screen.acct.label.firstName=Tên
cas.screen.acct.title.firstName=Tên của bạn.
cas.screen.acct.label.lastName=Họ
cas.screen.acct.title.lastName=Họ/họ của bạn.
cas.screen.acct.label.username=Tên người dùng
cas.screen.acct.title.username=Tên người dùng bạn muốn sử dụng cho các lần đăng nhập.
cas.screen.acct.label.phone=Số điện thoại
cas.screen.acct.title.phone=Đây là số điện thoại của bạn mà liên kết kích hoạt sẽ được gửi tới.
cas.screen.acct.label.country=Quốc gia
cas.screen.acct.title.country=Đây là quốc gia được liên kết với số điện thoại của bạn.
screen.acct.label.security.question.1=Câu hỏi bảo mật 1
screen.acct.label.security.question.2=Câu hỏi bảo mật 2
screen.acct.label.security.answer=Nhập câu trả lời của bạn vào đây…
