screen.account.success=bạn, <strong>{0}</strong>, đã đăng nhập thành công vào Dịch vụ xác thực trung tâm. Trang này cho phép bạn xem lại và quản lý hồ sơ tài khoản của mình cũng như xác minh việc thu thập các thuộc tính cá nhân được CAS truy xuất.
screen.account.security=Khi bạn hoàn tất, vì lý do bảo mật, vui lòng <a href="logout">đăng xuất</a> và thoát khỏi trình duyệt web của bạn.
screen.account.pwreset=Thao tác này buộc phải đăng xuất trước khi thay đổi mật khẩu. Bạn có chắc chắn muốn tiếp tục không?
screen.account.failure=Lỗi vận hành
screen.account.securityquestions.subtitle=Bạn có thể xem lại và cập nhật các câu hỏi bảo mật của mình tại đây. Hãy nhớ rằng tất cả các câu hỏi và câu trả lời bảo mật <strong>PHẢI</strong> trở nên độc đáo. Các câu hỏi hoặc câu trả lời trùng lặp sẽ bị CAS từ chối.
screen.account.accesstokens.title=Mã thông báo truy cập
screen.account.accesstokens.subtitle=Đây là các mã thông báo truy cập được CAS cấp cho bạn và được sử dụng để truy cập các dịch vụ và ứng dụng khác nhau.
