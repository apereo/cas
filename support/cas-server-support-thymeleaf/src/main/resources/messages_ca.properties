cas.mfa.providerselection.mfa-duo=Duo Security
cas.mfa.providerselection.mfa-duo.notes=L'àmplia varietat de mètodes d'autenticació de Duo permet a tots els usuaris iniciar sessió de manera segura i ràpida. Duo Push, enviat per l'aplicació d'autenticació Duo Mobile, permet als usuaris aprovar notificacions push per verificar la seva identitat.
