cas.mfa.providerselection.mfa-webauthn.notes=WebAuthn és una API que facilita que una part de confiança, com ara un servei web, integri una autenticació forta a les aplicacions mitjançant el suport integrat a tots els navegadors i plataformes principals. 
cas.mfa.providerselection.mfa-gauth=Google Authenticator
cas.mfa.providerselection.mfa-gauth.notes=Google Authenticator és un autenticador basat en programari que implementa serveis de verificació en dos passos per autenticar usuaris d'aplicacions mòbils de Google.
