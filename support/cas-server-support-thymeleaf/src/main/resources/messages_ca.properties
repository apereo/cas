cas.mfa.providerselection.mfa-simple.notes=Permet que CAS actuï com a proveïdor d'autenticació multifactor per si mateix, emetent fitxes i enviant-los als usuaris finals mitjançant canals de comunicació predefinits, com ara correu electrònic o missatges de text.
cas.mfa.providerselection.mfa-yubikey=Autenticació multifactor YubiKey
cas.mfa.providerselection.mfa-yubikey.notes=Yubico és un servei basat en núvol que permet una autenticació de dos factors sòlida, fàcil d'utilitzar i assequible amb contrasenyes d'un sol ús mitjançant el seu producte estrella, YubiKey. 
