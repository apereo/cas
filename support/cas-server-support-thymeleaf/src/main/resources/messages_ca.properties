screen.oidc.confirm.claim.preferred_username=POT ser qualsevol cadena JSON vàlida que inclou caràcters especials com ara @, / o espais en blanc. El RP NO HA de confiar que aquest valor sigui únic.
screen.oidc.confirm.claim.profile=URL de la pàgina de perfil de l'usuari final. El contingut d'aquesta pàgina web HA de tractar sobre l'usuari final.
screen.oidc.confirm.claim.picture=URL de la foto de perfil de l'usuari final. Aquest URL HA de fer referència a un fitxer d'imatge (per exemple, un fitxer d'imatge PNG, JPEG o GIF), més que a una pàgina web que conté una imatge. Tingueu en compte que aquest URL HA de fer referència específicament a una foto de perfil de l'usuari final adequada per mostrar-se quan es descriu l'usuari final, en lloc d'una foto arbitrària presa per l'usuari final.
screen.oidc.confirm.claim.phone_number=Número de telèfon preferit de l'usuari final. Es RECOMANA com a format d'aquesta reclamació. Per exemple, <code>+1 (425) 555-1212</code> o <code>+56 (2) 687 2400</code>.
