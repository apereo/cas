screen.samlidp.error.description=El servei al qual esteu intentant iniciar sessió ha identificat un problema amb el vostre perfil o sol·licitud. Poseu-vos en contacte amb el vostre servei d'assistència informàtica per obtenir assistència.
screen.unavailable.header=Error CAS
screen.unavailable.heading=CAS no pot processar aquesta sol·licitud: "{0}:{1}"
screen.unavailable.message=S'ha produït un error en intentar completar la vostra sol·licitud. <strong>Si us plau, aviseu el vostre servei d'assistència o torneu-ho a provar.</strong> <p><div>Apereo és una fundació de govern de programari de codi obert sense ànim de lucre. El programari CAS és un projecte patrocinat per Apereo i es pot descarregar i utilitzar gratuïtament per qualsevol persona. No obstant això, Apereo no opera els sistemes de ningú que faci servir el programari i, en la majoria dels casos, ni tan sols sap qui l'està utilitzant o com contactar amb ells tret que sigui una part activa de la comunitat Apereo.<br/></br>Si teniu problemes per iniciar sessió amb CAS, <strong>haureu de posar-vos en contacte amb el personal informàtic o el servei d'ajuda de la vostra organització per obtenir ajuda</strong>. <br/><br/>Ens agradaria que us poguéssim ajudar més directament.</div>
