authenticationFailure.MultifactorAuthenticationProviderAbsentException=No es poden satisfer els requisits d'autenticació multifactor. El vostre compte està configurat per a una estratègia d'autenticació multifactor, però CAS no pot localitzar i executar aquesta estratègia probablement a causa d'una configuració incorrecta del servidor. Poseu-vos en contacte amb els administradors del servei per obtenir ajuda.
authenticationFailure.SurrogateAuthenticationException=En aquest moment no teniu autorització per suplantar la identitat de l'usuari indicat.
