screen.oidc.confirm.claim.family_name=Cognom(s) o cognom(s) de l'Usuari Final. Tingueu en compte que en algunes cultures, les persones poden tenir diversos cognoms o cap cognom; tots poden estar presents, amb els noms separats per espais.
