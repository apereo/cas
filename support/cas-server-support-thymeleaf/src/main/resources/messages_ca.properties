authenticationFailure.MultifactorAuthenticationRequiredException=S'ha denegat l'intent d'autenticació del vostre compte, perquè el vostre compte encara no està configurat per passar per l'autenticació multifactor. Poseu-vos en contacte amb els administradors del servei per obtenir ajuda, assegureu-vos que el vostre compte estigui registrat i apte per a l'autenticació multifactor i torneu-ho a provar.
authenticationFailure.MultifactorAuthenticationFailedException=L'intent d'autenticació multifactor ha fallat, probablement a causa de credencials d'autenticació multifactor no vàlides. Si us plau, verifica i torna-ho a provar.
authenticationFailure.RiskyAuthenticationException=CAS no pot continuar amb el flux d'autenticació, probablement perquè es determina que aquest intent d'autenticació és arriscat i sospitós amb una puntuació de risc prou alta per sobre del llindar acceptat. Pot ser que el vostre intent d'autenticació estigui bloquejat perquè utilitzeu un navegador web desconegut o perquè inicieu sessió des d'una ubicació desconeguda. Per obtenir informació i orientació addicionals, poseu-vos en contacte amb el vostre administrador i/o servei d'ajuda.
