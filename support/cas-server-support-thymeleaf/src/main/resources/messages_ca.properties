screen.service.wildcard.message=Aquesta aplicació no té una entrada de registre dedicada al registre del servei CAS. Està autoritzat i admès per CAS perquè hi ha una entrada de definició de servei amb comodí al registre de serveis CAS que permet i accepta sol·licituds d'autenticació d'aplicacions desconegudes com aquesta. <p/>Com a pràctica recomanada de seguretat, es recomana limitar la instal·lació de gestió del servei a <strong>incloure només la llista d'aplicacions conegudes</strong> que estan autoritzats explícitament a utilitzar CAS. Deixar la interfície de gestió oberta per a totes les aplicacions pot crear una oportunitat per a atacs de seguretat i dificultar l'auditoria dels requisits de l'aplicació i les necessitats d'atributs.
