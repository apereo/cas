screen.oidc.confirm.bindingmessage.description=Un identificador o missatge llegible per l'home destinat a mostrar-se tant al dispositiu de consum com al dispositiu d'autenticació per enclavar-los junts per a la transacció mitjançant una indicació visual per a l'usuari final. Aquest missatge d'enclavament permet a l'usuari final assegurar-se que l'acció realitzada al dispositiu d'autenticació està relacionada amb la sol·licitud iniciada pel dispositiu de consum.
