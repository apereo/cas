BLOCKED_AUTHN_REQUEST=L'intent d'autenticació està bloquejat i no pot continuar, probablement a causa d'un mal format o que falten paràmetres necessaris. Examineu els registres del servidor CAS per localitzar la causa arrel de l'error.
UNSATISFIED_SAML_REQUEST=CAS no pot entendre, acceptar o validar la sol·licitud d'autenticació SAML, probablement a causa d'un mal format o que falten paràmetres obligatoris. Si us plau, examineu els registres del servidor CAS per localitzar la causa arrel de l'error.
MISSING_SAML_REQUEST=La sol·licitud d'autenticació SAML2 no es pot determinar des del magatzem de sessions CAS. Normalment, això significa que la sol·licitud d'autenticació SAML2 original que es va enviar a CAS mitjançant un proveïdor de serveis SAML2 no es pot recuperar i restaurar després d'un intent d'autenticació probablement perquè el magatzem de sessió subjacent va eliminar la sol·licitud d'autenticació de manera forçada o va determinar que la sol·licitud de seguiment estava caducada i obsoleta, més enllà del que permet la política de caducitat del magatzem de sessions. Si us plau, examineu els registres del servidor CAS per localitzar la causa arrel de l'error.
screen.service.error.header=L'aplicació no està autoritzada per utilitzar CAS
