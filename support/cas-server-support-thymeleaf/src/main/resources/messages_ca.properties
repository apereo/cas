cas.mfa.simple.label.tokensent=Se us envia un testimoni d'autenticació multifactor per correu electrònic o missatge de text. Localitzeu el testimoni i envieu-lo aquí per continuar. Tingueu en compte que el testimoni caducarà al cap d'un breu període de temps i ja no serà reconegut per CAS, en aquest cas, podeu demanar a CAS que us enviï un nou testimoni.
cas.mfa.simple.label.contactfailed.sms=CAS no pot utilitzar la informació de contacte seleccionada per enviar-vos un SMS amb el testimoni d'autenticació multifactor. Reviseu la vostra informació de contacte i poseu-vos en contacte amb l'administrador de CAS per obtenir ajuda.
cas.mfa.simple.label.contactfailed.email=CAS no pot utilitzar la informació de contacte seleccionada per enviar-vos un correu electrònic amb el testimoni d'autenticació multifactor. Reviseu la vostra informació de contacte i poseu-vos en contacte amb l'administrador de CAS per obtenir ajuda.
cas.mfa.simple.token.failed=No es pot acceptar aquest intent d'autenticació multifactor. El testimoni proporcionat no és vàlid.
cas.mfa.simple.registration.title=Registre del compte
cas.mfa.simple.registration.description=El vostre compte no està registrat per a l'autenticació multifactor tot i que és apte i requerit per l'aplicació a la qual esteu intentant accedir. Si us plau <a href="https://account.example.org/mfa">registra el teu compte</a> per a l'autenticació multifactor i assegureu-vos que CAS tingui accés a la vostra informació de contacte, com ara l'adreça de correu electrònic, el telèfon, etc.
cas.mfa.simple.registration.email.failed=No es pot registrar el vostre compte per a l'autenticació multifactor. CAS no pot reconèixer i acceptar la vostra adreça de correu electrònic per enviar-vos un correu electrònic amb l'enllaç de registre. Reviseu la vostra informació de contacte i poseu-vos en contacte amb l'administrador de CAS per obtenir ajuda.
cas.mfa.simple.registration.email.sent=S'ha enviat un correu electrònic amb el testimoni de registre. Si us plau, comproveu la vostra safata d'entrada i el codi del proveïdor aquí.
cas.mfa.simple.registration.token.failed=No es pot registrar el vostre compte per a l'autenticació multifactor. El testimoni proporcionat no és vàlid, ha caducat o està compromès d'una altra manera. Revisa el testimoni i torna-ho a provar.
