screen.samlidp.error.title=Erreur du fournisseur d'identité SAML2
screen.samlidp.error.description=Le service auquel vous essayez de vous connecter a identifié un problème avec votre profil ou votre demande. Veuillez contacter votre service d'assistance informatique pour obtenir de l'aide.
screen.unavailable.header=Erreur CAS
screen.unavailable.heading=Le CAS n'est pas en mesure de traiter cette demande : "{0}:{1}"
screen.unavailable.message=Une erreur s'est produite lors de la tentative de traitement de votre demande. <strong>Veuillez en informer votre service d'assistance ou réessayer.</strong> <p><div>Apereo est une fondation de gouvernance de logiciels open source à but non lucratif. Le logiciel CAS est un projet sponsorisé par Apereo et est librement téléchargeable et utilisable par tous. Cependant, Apereo n'exploite pas les systèmes de quiconque utilise le logiciel et, dans la plupart des cas, ne sait même pas qui l'utilise ni comment les contacter, à moins qu'ils ne soient un membre actif de la communauté Apereo.<br/></br>Si vous rencontrez des problèmes pour vous connecter à l'aide de CAS, <strong>vous devrez contacter le personnel informatique ou le service d'assistance de votre organisation pour obtenir de l'aide.</strong>. <br/><br/>Nous souhaitons pouvoir vous être plus directement utiles.</div>
screen.mfaDenied.header=MFA refusée
screen.mfaDenied.heading=La tentative MFA a été refusée par le fournisseur
screen.mfaDenied.message=Votre fournisseur MFA a refusé votre tentative d’authentification à deuxième facteur. Contactez votre administrateur système pour obtenir de l'aide pour restaurer votre compte.
screen.mfaUnavailable.header=Fournisseur MFA indisponible
screen.mfaUnavailable.heading=Fournisseur MFA indisponible
screen.mfaUnavailable.message=CAS n'a pas pu atteindre votre fournisseur MFA configuré pour le moment. En raison des politiques d'échec configurées pour le service auquel vous tentez d'accéder, l'authentification ne peut pas être accordée pour le moment.
