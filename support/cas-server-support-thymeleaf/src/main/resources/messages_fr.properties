screen.oidc.confirm.bindingmessage.header=Message de liaison
screen.oidc.confirm.bindingmessage.description=Un identifiant ou un message lisible par l'homme destiné à être affiché à la fois sur le dispositif de consommation et sur le dispositif d'authentification pour les verrouiller ensemble pour la transaction au moyen d'un repère visuel pour l'utilisateur final. Ce message de verrouillage permet à l'utilisateur final de s'assurer que l'action effectuée sur le dispositif d'authentification est liée à la requête initiée par le dispositif de consommation.
screen.oidc.confirm.usercode.header=Code utilisateur
screen.oidc.confirm.usercode.description=Un code secret, tel qu'un mot de passe ou un code PIN, connu uniquement de l'utilisateur mais vérifiable par CAS. Le code permet d'autoriser l'envoi d'une demande d'authentification au dispositif d'authentification de l'utilisateur.
