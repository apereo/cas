cas.inwebo.error.userrefusedortoolate=Vous avez refusé l'authentification ou ne l'avez pas validée assez rapidement.
cas.inwebo.error.usernotregistered=Avant toute connexion, vous devez être inscrit sur Inwebo. Vérifiez votre boîte mail pour suivre le processus d’inscription ou remplissez vos codes d’activation et PIN ci-dessous pour vous inscrire dans votre navigateur…
