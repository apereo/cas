cas.screen.acct.title=Enregistrement de compte
cas.screen.acct.intro=Veuillez remplir le formulaire ci-dessous pour enregistrer votre nouveau compte auprès du CAS. Une fois le formulaire soumis, vous recevrez un e-mail avec un lien d'activation de compte pour activer votre compte, configurer votre mot de passe et commencer à utiliser CAS.
cas.screen.acct.infosent=Les instructions d'activation du compte ont été envoyées avec succès. Veuillez vérifier votre courrier électronique, etc. et suivre les instructions.
cas.screen.acct.intro.complete=Bon retour ! Merci d'avoir vérifié votre compte. Veuillez remplir le formulaire ci-dessous pour enregistrer votre nouveau compte auprès du CAS. 
cas.screen.acct.intro.completed=Merci! Votre compte est maintenant activé et enregistré auprès du CAS.
