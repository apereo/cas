screen.oidc.confirm.claim.given_name=Prénom(s) ou prénom(s) de l’Utilisateur Final. Notez que dans certaines cultures, les personnes peuvent avoir plusieurs prénoms ; tous peuvent être présents, les noms étant séparés par des espaces.
screen.oidc.confirm.claim.middle_name=Deuxième(s) prénom(s) de l'utilisateur final. Notez que dans certaines cultures, les gens peuvent avoir plusieurs deuxièmes prénoms ; tous peuvent être présents, les noms étant séparés par des espaces. Notez également que dans certaines cultures, les deuxièmes prénoms ne sont pas utilisés.
screen.oidc.confirm.claim.family_name=Nom(s) ou nom(s) de famille de l'utilisateur final. Notez que dans certaines cultures, les gens peuvent avoir plusieurs noms de famille ou aucun nom de famille ; tous peuvent être présents, les noms étant séparés par des espaces.
screen.oidc.confirm.claim.email=Adresse e-mail préférée de l'utilisateur final.
screen.oidc.confirm.claim.preferred_username=PEUT être n'importe quelle chaîne JSON valide comprenant des caractères spéciaux tels que @, / ou des espaces. Le RP NE DOIT PAS compter sur le fait que cette valeur soit unique.
screen.oidc.confirm.claim.profile=URL de la page de profil de l'utilisateur final. Le contenu de cette page Web DEVRAIT concerner l'utilisateur final.
screen.oidc.confirm.claim.picture=URL de la photo de profil de l'utilisateur final. Cette URL DOIT faire référence à un fichier image (par exemple, un fichier image PNG, JPEG ou GIF), plutôt qu'à une page Web contenant une image. Notez que cette URL DEVRAIT spécifiquement faire référence à une photo de profil de l'utilisateur final pouvant être affichée lors de la description de l'utilisateur final, plutôt qu'à une photo arbitraire prise par l'utilisateur final.
screen.oidc.confirm.claim.phone_number=Numéro de téléphone préféré de l'utilisateur final. Il est RECOMMANDÉ comme format de cette réclamation. Par exemple, <code>+1 (425) 555-1212</code> ou <code>+56 (2) 687 2400</code>.
