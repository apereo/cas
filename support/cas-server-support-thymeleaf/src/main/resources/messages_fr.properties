cas.mfa.providerselection.optional.header=Authentification multifacteur facultative
cas.mfa.providerselection.optional.description=L'authentification multifacteur est configurée pour être facultative et vous pouvez continuer sans choisir de fournisseur pour continuer.
cas.mfa.providerselection.mfa-duo=Duo Sécurité
cas.mfa.providerselection.mfa-duo.notes=La grande variété de méthodes d'authentification de Duo permet à chaque utilisateur de se connecter rapidement et en toute sécurité. Duo Push, envoyé par l'application d'authentification Duo Mobile, permet aux utilisateurs d'approuver les notifications push pour vérifier leur identité.
cas.mfa.providerselection.mfa-webauthn=FIDO2 WebAuthn
cas.mfa.providerselection.mfa-webauthn.notes=WebAuthn est une API qui permet à une partie utilisatrice, telle qu'un service Web, d'intégrer très facilement une authentification forte dans les applications en utilisant la prise en charge intégrée à tous les principaux navigateurs et plates-formes. 
cas.mfa.providerselection.mfa-gauth=Authentificateur Google
cas.mfa.providerselection.mfa-gauth.notes=Google Authenticator est un authentificateur logiciel qui met en œuvre des services de vérification en deux étapes pour authentifier les utilisateurs d'applications mobiles par Google.
cas.mfa.providerselection.mfa-simple=Authentification multifacteur CAS
cas.mfa.providerselection.mfa-simple.notes=Permettez à CAS d'agir seul en tant que fournisseur d'authentification multifacteur, en émettant des jetons et en les envoyant aux utilisateurs finaux via des canaux de communication prédéfinis tels que les e-mails ou les SMS.
cas.mfa.providerselection.mfa-yubikey=Authentification multifacteur YubiKey
cas.mfa.providerselection.mfa-yubikey.notes=Yubico est un service basé sur le cloud qui permet une authentification à deux facteurs forte, facile à utiliser et abordable avec des mots de passe à usage unique via leur produit phare, YubiKey. 
cas.mfa.duologin.pagetitle=Connexion de sécurité Duo
cas.mfa.simple.contact-selection.title=Sélectionnez les informations de contact
cas.mfa.simple.contact-selection.description=Nous avons trouvé plusieurs façons de vous contacter pour votre compte. Veuillez choisir le(s) compte(s) sur lequel(s) vous souhaitez recevoir le jeton d'authentification multifacteur.
cas.mfa.simple.pagetitle=Connexion à l'authentification multifacteur CAS
cas.mfa.simple.label.token=Jeton :
cas.mfa.simple.label.resend=Renvoyer
cas.mfa.simple.label.tokensent=Un jeton d'authentification multifacteur vous est envoyé par e-mail ou SMS. Veuillez localiser le jeton et soumettez-le ici pour continuer. Notez que le token expirera après un court laps de temps et ne sera plus reconnu par le CAS, auquel cas vous pourrez demander au CAS de vous envoyer un nouveau token.
cas.mfa.simple.label.contactfailed.sms=CAS n'est pas en mesure d'utiliser les informations de contact sélectionnées pour vous envoyer un SMS avec le jeton d'authentification multifacteur. Veuillez vérifier vos coordonnées et contacter votre administrateur CAS pour obtenir de l'aide.
cas.mfa.simple.label.contactfailed.email=CAS n'est pas en mesure d'utiliser les informations de contact sélectionnées pour vous envoyer un e-mail avec le jeton d'authentification multifacteur. Veuillez vérifier vos coordonnées et contacter votre administrateur CAS pour obtenir de l'aide.
cas.mfa.simple.token.failed=Impossible d'accepter cette tentative d'authentification multifacteur. Le jeton fourni n'est pas valide.
cas.mfa.simple.registration.title=Enregistrement de compte
cas.mfa.simple.registration.description=Votre compte n'est pas enregistré pour l'authentification multifacteur même s'il est éligible et requis par l'application à laquelle vous essayez d'accéder. S'il vous plaît <a href="https://account.example.org/mfa">enregistrez votre compte</a> pour l'authentification multifacteur et assurez-vous que CAS a accès à vos informations de contact telles que votre adresse e-mail, votre téléphone, etc.
cas.mfa.simple.registration.email.failed=Impossible d'enregistrer votre compte pour l'authentification multifacteur. CAS n'est pas en mesure de reconnaître et d'accepter votre adresse e-mail pour vous envoyer un e-mail contenant le lien d'inscription. Veuillez vérifier vos coordonnées et contacter votre administrateur CAS pour obtenir de l'aide.
cas.mfa.simple.registration.email.sent=Un email avec le jeton d'inscription vous a été envoyé. Veuillez vérifier votre boîte de réception et fournir le code ici.
cas.mfa.simple.registration.token.failed=Impossible d'enregistrer votre compte pour l'authentification multifacteur. Le jeton fourni est invalide, expiré ou autrement compromis. Veuillez examiner le jeton et réessayer.
