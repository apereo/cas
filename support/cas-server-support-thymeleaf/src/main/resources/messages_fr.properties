authenticationFailure.MultifactorAuthenticationProviderAbsentException=Impossible de satisfaire aux exigences d'authentification multifacteur. Votre compte est configuré pour une stratégie d'authentification multifacteur, mais CAS n'est pas en mesure de localiser et d'exécuter cette stratégie, probablement en raison d'une mauvaise configuration du serveur. Contactez les administrateurs du service pour obtenir de l’aide.
authenticationFailure.SurrogateAuthenticationException=Vous n'êtes pas autorisé à usurper l'identité de l'utilisateur indiqué pour le moment.
authenticationFailure.AccountPasswordMustChangeException=Le mot de passe de votre compte a expiré et doit être modifié.
authenticationFailure.UnauthorizedServiceForPrincipalException=Accès au service refusé en raison de privilèges manquants.
authenticationFailure.MultifactorAuthenticationRequiredException=La tentative d'authentification pour votre compte est refusée, car votre compte n'est pas encore configuré pour passer par l'authentification multifacteur. Contactez les administrateurs du service pour obtenir de l'aide, assurez-vous que votre compte est inscrit et éligible à l'authentification multifacteur et réessayez.
authenticationFailure.MultifactorAuthenticationFailedException=La tentative d'authentification multifacteur a échoué, probablement en raison d'informations d'identification multifacteur non valides. Veuillez vérifier et réessayer.
authenticationFailure.RiskyAuthenticationException=CAS n'est pas en mesure de poursuivre le flux d'authentification, probablement parce que cette tentative d'authentification est jugée risquée et suspecte avec un score de risque suffisamment élevé au-dessus du seuil accepté. Il se peut que votre tentative d'authentification soit bloquée parce que vous utilisez un navigateur Web inconnu ou que vous vous connectez à partir d'un emplacement inconnu. Pour plus d’informations et de conseils, veuillez contacter votre administrateur et/ou votre service d’assistance.
authenticationFailure.UNKNOWN=La tentative d'authentification a échoué.
authenticationFailure.AuthenticationException=Les informations d'identification sont rejetées/invalides et la tentative d'authentification a échoué.
INVALID_REQUEST_PROXY=La demande est mal formatée. Assurez-vous que tous les paramètres requis sont correctement codés et inclus.
INVALID_TICKET_SPEC=Spécification de validation du ticket ayant échoué. Les erreurs possibles peuvent inclure la tentative de validation d'un ticket proxy via un validateur de ticket de service, ou le non-respect de la demande « renew=true ».
INVALID_REQUEST=Impossible d'identifier, d'autoriser ou de compléter cette demande, probablement en raison de paramètres requis mal formés ou manquants.
INVALID_AUTHENTICATION_CONTEXT=La demande de validation pour [''{0}''] ne peut pas être satisfait. La demande est soit non reconnue, soit non satisfaite.
