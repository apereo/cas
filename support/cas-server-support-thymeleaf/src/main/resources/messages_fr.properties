OAUTH_BAD_SESSION_REQUEST=La demande OAuth ne peut pas être complétée, car CAS n'est pas en mesure de localiser ou de déterminer l'URL de redirection OAuth. Il s'agit généralement d'une indication d'une demande obsolète ou incompatible, dans laquelle l'ID de session de la demande traitée est différent de la session active et peut être provoquée par une opération de déconnexion complète. Effacez les cookies et l'historique, redémarrez votre navigateur et réessayez s'il vous plaît.
