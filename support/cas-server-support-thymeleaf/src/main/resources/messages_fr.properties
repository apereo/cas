cas.mfa.yubikey.pagetitle=Authentification YubiKey
cas.mfa.yubikey.authenticate=Utilisez votre ou vos appareils YubiKey enregistrés pour vous authentifier.
cas.mfa.yubikey.register=Votre appareil n'est pas encore enregistré. Utilisez le formulaire ci-dessous pour enregistrer votre appareil auprès du CAS.
cas.mfa.yubikey.register.fail=Impossible d'enregistrer votre appareil YubiKey pour l'authentification. Le jeton fourni peut être invalide, expiré ou autrement compromis.
