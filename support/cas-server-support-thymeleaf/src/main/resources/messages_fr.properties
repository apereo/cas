INVALID_PROXY_GRANTING_TICKET=PGT déjà généré pour cette ST. Impossible d'accorder plus d'un PGT pour ST
INVALID_SERVICE=Billet ''{0}'' ne correspond pas au service fourni. Le service d'origine était ''{1}'' et le service fourni était ''{2}''.
INVALID_PROXY_CALLBACK=L'URL de rappel du proxy fournie ''{0}'' n'a pas pu être authentifié. Soit ''{0}'' n'est pas accessible ou il n'est pas autorisé à exercer une authentification proxy.
UNAUTHORIZED_SERVICE_PROXY=Le service fourni ''{0}'' n'est pas autorisé à utiliser l'authentification proxy CAS.
UNSATISFIED_AUTHN_POLICY=Accès au service refusé en raison d'une politique d'authentification non satisfaite.
INVALID_AUTHN_REQUEST=La tentative d'authentification a échoué, probablement en raison d'informations d'identification non valides.
BLOCKED_AUTHN_REQUEST=La tentative d'authentification est bloquée et ne peut pas se poursuivre, probablement en raison de paramètres requis mal formés ou manquants. Examinez les journaux du serveur CAS pour localiser la cause première de l'erreur.
UNSATISFIED_SAML_REQUEST=La demande d'authentification SAML ne peut pas être comprise, acceptée ou validée par CAS, probablement en raison de paramètres requis mal formés ou manquants. Veuillez examiner les journaux du serveur CAS pour localiser la cause première de l'erreur.
MISSING_SAML_REQUEST=La demande d'authentification SAML2 ne peut pas être déterminée à partir du magasin de sessions CAS. Cela signifie généralement que la demande d'authentification SAML2 d'origine qui a été soumise au CAS via un fournisseur de services SAML2 ne peut pas être récupérée et restaurée après une tentative d'authentification, probablement parce que le magasin de sessions sous-jacent a supprimé la demande d'authentification de force ou a déterminé que la demande suivie était expirée et obsolète, au-delà de ce que permet la politique d'expiration du magasin de sessions. Veuillez examiner les journaux du serveur CAS pour localiser la cause première de l'erreur.
screen.service.error.header=Application non autorisée à utiliser CAS
screen.service.error.redirect=Vous n'êtes pas autorisé à accéder à cette application. Soyez patient car vous êtes sur le point d'être redirigé vers <strong>{0}</strong> pour en savoir plus sur ce scénario.
service.principal.resolution.error=CAS n'est pas en mesure de déterminer le principal d'authentification correct. Soit le principal n'a pas pu être résolu correctement en tant qu'entité unique, soit CAS a trouvé des principaux candidats mixtes/multiples et est incapable de décider lequel doit être utilisé. Cette erreur peut également survenir si le mandataire authentifié n'est pas autorisé à accéder à l'application cible en raison de privilèges manquants définis par les stratégies d'autorisation du serveur CAS.
service.not.authorized.missing.attr=Vous n'êtes pas autorisé à accéder à l'application car votre compte ne dispose pas des privilèges requis par le serveur CAS pour vous authentifier auprès de ce service. Veuillez en informer votre service d'assistance.
screen.service.error.message=L'application auprès de laquelle vous avez tenté de vous authentifier n'est pas autorisée à utiliser CAS. Cela indique généralement que l'application n'est pas enregistrée auprès du CAS, ou que sa politique d'autorisation définie dans son enregistrement d'enregistrement l'empêche d'exploiter les fonctionnalités du CAS, ou qu'elle est mal formée et non reconnue par le CAS. Contactez votre administrateur CAS pour savoir comment vous pouvez enregistrer et intégrer votre application à CAS.
screen.service.empty.error.message=Le registre des services de CAS est vide et ne contient aucune définition de service. Les applications qui souhaitent s’authentifier auprès du CAS doivent être explicitement définies dans le registre des services.
screen.service.expired.message=L'application à laquelle vous avez tenté de vous authentifier a expiré dans le CAS Service Registry. Si ce service doit toujours être considéré comme utilisé, veuillez contacter les administrateurs du service pour faire renouveler l'application.
