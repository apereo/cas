screen.service.wildcard.message=Cette application ne dispose pas d'une entrée d'enregistrement dédiée dans le registre du service CAS. Il est autorisé et autorisé par CAS car il existe une entrée de définition de service générique dans le registre des services CAS qui autorise et accepte les demandes d'authentification provenant d'applications inconnues telles que celle-ci. <p/>En tant que bonne pratique de sécurité, il est fortement recommandé de limiter la fonction de gestion des services à <strong>inclure uniquement la liste des applications connues</strong> qui sont explicitement autorisés à utiliser CAS. Laisser l'interface de gestion ouverte à toutes les applications peut créer une opportunité d'attaques de sécurité et rendra difficile l'audit des exigences des applications et des besoins d'attribution.
