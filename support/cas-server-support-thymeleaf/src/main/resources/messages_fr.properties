passwordless.token.header=Fournir un jeton
passwordless.token.description=Veuillez fournir le jeton de sécurité qui vous a été envoyé par e-mail, téléphone, etc. Notez que le jeton n'est valide que pendant une brève période et qu'une fois soumis, tous les autres jetons seront invalidés et supprimés.
passwordless.error.failure.title=Échec d'authentification
passwordless.error.failure.description=Le jeton fourni n'a pas pu être vérifié. Il a peut-être été invalidé, supprimé ou expiré.
passwordless.error.unknown.user=Le nom d’utilisateur fourni ne peut pas être reconnu et localisé par CAS.
passwordless.error.invalid.user=Le nom d’utilisateur fourni ne contient pas suffisamment d’informations de contact.
passwordless.getuser.header=Authentification sans mot de passe
passwordless.getuser.description=Veuillez fournir votre nom d'utilisateur pour localiser votre compte. Une fois votre compte vérifié, CAS choisira la stratégie d'authentification appropriée pour vous.
passwordless.selection.header=Sélection d'authentification
passwordless.selection.description=Sélectionnez l'une des options d'authentification répertoriées ci-dessous pour continuer.
passwordless.selection.password.header=Mot de passe
passwordless.selection.password.description=Vous pouvez vous authentifier à l'aide de votre mot de passe. Il peut également vous être demandé de suivre un flux d'authentification multifacteur si votre compte est éligible.
passwordless.selection.token.header=Jeton
passwordless.selection.token.description=Vous recevrez un jeton unique, valable pour une période de temps limitée, par e-mail ou SMS de la part du CAS et il vous sera demandé de saisir à nouveau le code pour continuer.
passwordless.selection.mfa.header=Multifacteur
passwordless.selection.mfa.description=Vous serez directement dirigé vers un flux d’authentification multifacteur. Une fois l’étape d’authentification terminée, le flux reprendra automatiquement.
passwordless.selection.delegation.header=Externe
passwordless.selection.delegation.description=Vous serez envoyé vers un fournisseur d’identité externe pour vous connecter. Une fois que vous avez terminé le flux d'authentification avec le fournisseur d'identité externe, vous serez automatiquement redirigé vers CAS pour continuer.
cas.authn.qr.fail=Impossible d'accepter la demande d'authentification basée sur le code QR. Assurez-vous que le code QR est correctement scanné et que les informations d'identification fournies sont valides, émises par ce serveur CAS et n'ont pas expiré.
