screen.authentication.webauthn.qr.info=Si vous n'avez pas votre appareil compatible FIDO avec vous ou si cet appareil n'est pas enregistré auprès du CAS, vous pouvez scanner le code QR ci-dessous et vous authentifier à l'aide d'un autre appareil (mobile). Une fois votre authentification réussie, vous passerez automatiquement à l'étape suivante.
