cas.mfa.webauthn.auth.fail=Impossible de vérifier votre appareil pour l'authentification. Les charges utiles fournies peuvent être invalides, expirées ou autrement compromises.
cas.mfa.webauthn.register.helptext=Attribuez un nom convivial à votre appareil compatible FIDO2, puis enregistrez-le auprès du CAS pour l'authentification multifacteur. Une fois l'enregistrement de l'appareil terminé avec succès, vous serez automatiquement redirigé vers l'étape suivante pour vous connecter avec votre appareil.
cas.mfa.webauthn.register.wait=Votre appareil compatible FIDO2 est maintenant enregistré auprès du CAS. Veuillez patienter…
cas.mfa.webauthn.register.discoverablecredentials=Vous pouvez également enregistrer votre appareil en utilisant <i>Informations d'identification détectables/clés résidentes</i>. Cela signifie que la clé privée et les métadonnées associées sont stockées en mémoire persistante sur l'authentificateur et non sur le serveur CAS.
cas.mfa.registerdevice.label.title=Enregistrer l'appareil
