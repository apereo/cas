passwordless.token.header=Proporcionar token
passwordless.token.description=Proporcione el token de seguridad que se le envió por correo electrónico, teléfono, etc. Tenga en cuenta que el token es válido solo durante un breve período y, una vez enviado, todos los demás tokens se invalidarán y eliminarán.
passwordless.error.failure.title=Fallo de autenticación
passwordless.error.failure.description=No se pudo verificar el token proporcionado. Es posible que haya sido invalidado, eliminado o caducado.
passwordless.error.unknown.user=CAS no puede reconocer ni localizar el nombre de usuario proporcionado.
passwordless.error.invalid.user=El nombre de usuario proporcionado no contiene suficiente información de contacto.
passwordless.getuser.header=Autenticación sin contraseña
passwordless.getuser.description=Proporcione su nombre de usuario para localizar su cuenta. Una vez que se verifique su cuenta, CAS elegirá la estrategia de autenticación adecuada para usted.
passwordless.selection.header=Selección de autenticación
passwordless.selection.description=Seleccione una de las opciones de autenticación que se enumeran a continuación para continuar.
passwordless.selection.password.header=Contraseña
passwordless.selection.password.description=Puede autenticarse utilizando su contraseña. También es posible que se le solicite que complete un flujo de autenticación multifactor si su cuenta es elegible.
passwordless.selection.token.header=ficha
passwordless.selection.token.description=Recibirá un token único, válido por un período de tiempo limitado, por correo electrónico o SMS de CAS y se le pedirá que vuelva a ingresar el código para continuar.
passwordless.selection.mfa.header=Multifactor
passwordless.selection.mfa.description=Se le dirigirá directamente a un flujo de autenticación multifactor. Una vez que haya completado el paso de autenticación, el flujo se reanudará automáticamente.
passwordless.selection.delegation.header=Externo
passwordless.selection.delegation.description=Se le enviará a un proveedor de identidad externo para iniciar sesión. Una vez que haya completado el flujo de autenticación con el proveedor de identidad externo, se le redirigirá automáticamente de regreso a CAS para continuar.
cas.authn.qr.fail=No se puede aceptar la solicitud de autenticación basada en el código QR. Asegúrese de que el código QR esté escaneado correctamente y que las credenciales proporcionadas sean válidas, emitidas por este servidor CAS y no hayan caducado.
