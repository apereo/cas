cas.mfa.providerselection.optional.description=La autenticación multifactor está configurada para ser opcional y puede continuar sin elegir un proveedor para continuar.
cas.mfa.providerselection.mfa-duo=Seguridad dúo
cas.mfa.providerselection.mfa-duo.notes=La amplia variedad de métodos de autenticación de Duo permite a todos los usuarios iniciar sesión de forma segura y rápida. Duo Push, enviado por la aplicación de autenticación Duo Mobile, permite a los usuarios aprobar notificaciones automáticas para verificar su identidad.
cas.mfa.providerselection.mfa-webauthn=Autenticación web FIDO2
cas.mfa.providerselection.mfa-webauthn.notes=WebAuthn es una API que hace que sea muy fácil para una parte de confianza, como un servicio web, integrar una autenticación sólida en aplicaciones utilizando el soporte integrado en todos los navegadores y plataformas líderes. 
cas.mfa.providerselection.mfa-gauth=Autenticador de Google
cas.mfa.providerselection.mfa-gauth.notes=Google Authenticator es un autenticador basado en software que implementa servicios de verificación en dos pasos para autenticar usuarios de aplicaciones móviles de Google.
cas.mfa.providerselection.mfa-simple=Autenticación multifactor CAS
cas.mfa.providerselection.mfa-simple.notes=Permita que CAS actúe como un proveedor de autenticación multifactor por sí solo, emitiendo tokens y enviándolos a los usuarios finales a través de canales de comunicación predefinidos, como correo electrónico o mensajes de texto.
cas.mfa.providerselection.mfa-yubikey=Autenticación multifactor YubiKey
cas.mfa.providerselection.mfa-yubikey.notes=Yubico es un servicio basado en la nube que permite una autenticación de dos factores sólida, fácil de usar y asequible con contraseñas de un solo uso a través de su producto estrella, YubiKey. 
cas.mfa.duologin.pagetitle=Inicio de sesión de seguridad Duo
cas.mfa.simple.contact-selection.title=Seleccione información de contacto
cas.mfa.simple.contact-selection.description=Hemos encontrado varias formas de comunicarnos con usted para su cuenta. Elija la(s) cuenta(s) donde le gustaría recibir el token de autenticación multifactor.
cas.mfa.simple.pagetitle=Inicio de sesión de autenticación multifactor CAS
cas.mfa.simple.label.token=Ficha:
cas.mfa.simple.label.resend=Reenviar
cas.mfa.simple.label.tokensent=Se le envía un token de autenticación multifactor por correo electrónico o mensaje de texto. Localice el token y envíelo aquí para continuar. Tenga en cuenta que el token caducará después de un corto período de tiempo y CAS ya no lo reconocerá, en cuyo caso, puede solicitarle a CAS que le envíe un token nuevo.
cas.mfa.simple.label.contactfailed.sms=CAS no puede utilizar la información de contacto seleccionada para enviarle un SMS con el token de autenticación multifactor. Revise su información de contacto y comuníquese con su administrador de CAS para obtener ayuda.
cas.mfa.simple.label.contactfailed.email=CAS no puede utilizar la información de contacto seleccionada para enviarle un correo electrónico con el token de autenticación multifactor. Revise su información de contacto y comuníquese con su administrador de CAS para obtener ayuda.
cas.mfa.simple.token.failed=No se puede aceptar este intento de autenticación multifactor. El token proporcionado no es válido.
cas.mfa.simple.registration.title=Registro de cuenta
cas.mfa.simple.registration.description=Su cuenta no está registrada para la autenticación multifactor a pesar de que es elegible y requerida por la aplicación a la que intenta acceder. por favor <a href="https://account.example.org/mfa">registra tu cuenta</a> para la autenticación multifactor y asegúrese de que CAS tenga acceso a su información de contacto, como dirección de correo electrónico, teléfono, etc.
cas.mfa.simple.registration.email.failed=No se puede registrar su cuenta para la autenticación multifactor. CAS no puede reconocer ni aceptar su dirección de correo electrónico para enviarle un correo electrónico con el enlace de registro. Revise su información de contacto y comuníquese con su administrador de CAS para obtener ayuda.
cas.mfa.simple.registration.email.sent=Se le ha enviado un correo electrónico con el token de registro. Por favor revise su bandeja de entrada y proporcione el código aquí.
cas.mfa.simple.registration.token.failed=No se puede registrar su cuenta para la autenticación multifactor. El token proporcionado no es válido, ha caducado o está comprometido de algún otro modo. Revise el token e inténtelo de nuevo.
