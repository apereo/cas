UNSATISFIED_SAML_REQUEST=CAS no puede entender, aceptar o validar la solicitud de autenticación SAML, probablemente debido a parámetros requeridos mal formados o faltantes. Examine los registros del servidor CAS para localizar la causa raíz del error.
MISSING_SAML_REQUEST=La solicitud de autenticación SAML2 no se puede determinar desde el almacén de sesiones de CAS. Por lo general, esto significa que la solicitud de autenticación SAML2 original que se envió a CAS a través de un proveedor de servicios SAML2 no se puede recuperar ni restaurar después de un intento de autenticación, probablemente porque el almacén de sesiones subyacente eliminó la solicitud de autenticación por la fuerza o determinó que la solicitud rastreada estaba caducada y obsoleta, más allá de lo que permite la política de caducidad del almacén de sesiones. Examine los registros del servidor CAS para localizar la causa raíz del error.
