authenticationFailure.RiskyAuthenticationException=CAS no puede continuar con el flujo de autenticación, probablemente porque se determina que este intento de autenticación es riesgoso y sospechoso con una puntuación de riesgo suficientemente alta por encima del umbral aceptado. Puede ser que su intento de autenticación esté bloqueado porque está utilizando un navegador web desconocido o está iniciando sesión desde una ubicación desconocida. Para obtener información y orientación adicionales, comuníquese con su administrador y/o servicio de asistencia.
authenticationFailure.UNKNOWN=El intento de autenticación ha fallado.
