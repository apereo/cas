cas.mfa.webauthn.auth.fail=No se puede verificar su dispositivo para la autenticación. Las cargas útiles proporcionadas pueden no ser válidas, estar caducadas o estar comprometidas de otro modo.
cas.mfa.webauthn.register.helptext=Asigne un nombre descriptivo a su dispositivo habilitado para FIDO2 y luego regístrelo con CAS para la autenticación multifactor. Una vez que el registro del dispositivo se complete exitosamente, será redirigido automáticamente al siguiente paso para iniciar sesión con su dispositivo.
cas.mfa.webauthn.register.wait=Su dispositivo habilitado para FIDO2 ahora está registrado en CAS. Por favor espera...
cas.mfa.webauthn.register.discoverablecredentials=También puede registrar su dispositivo usando <i>Credenciales reconocibles/Claves residentes</i>. Esto significa que la clave privada y los metadatos asociados se almacenan en la memoria persistente del autenticador y no en el servidor CAS.
