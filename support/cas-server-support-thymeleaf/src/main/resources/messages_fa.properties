screen.success.success=تو، <strong>{0}</strong>، با موفقیت به سرویس احراز هویت مرکزی وارد شده اند. با این حال، شما این صفحه را می بینید زیرا CAS از مقصد مورد نظر شما و نحوه رسیدن شما به آنجا اطلاعی ندارد. درخواست احراز هویت را دوباره بررسی کنید و مطمئن شوید که یک سرویس/برنامه هدف مجاز و ثبت شده در CAS مشخص شده است.
screen.success.security=وقتی کارتان تمام شد، به دلایل امنیتی، لطفاً <a href="logout">خروج از سیستم</a> و از مرورگر وب خود خارج شوید.
