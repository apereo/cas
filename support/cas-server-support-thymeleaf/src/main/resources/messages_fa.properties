cas.mfa.providerselection.mfa-duo=Duo Security
cas.mfa.providerselection.mfa-duo.notes=طیف گسترده ای از روش های احراز هویت Duo، هر کاربر را قادر می سازد تا به سرعت و ایمن وارد سیستم شود. Duo Push که توسط برنامه احراز هویت Duo Mobile ارسال شده است، به کاربران اجازه می دهد تا اعلان های فشار را برای تأیید هویت خود تأیید کنند.
cas.mfa.providerselection.mfa-webauthn=FIDO2 WebAuthn
cas.mfa.providerselection.mfa-webauthn.notes=WebAuthn یک API است که ادغام احراز هویت قوی در برنامه‌ها با استفاده از پشتیبانی موجود در همه مرورگرها و پلتفرم‌های پیشرو را برای یک طرف متکی مانند یک سرویس وب بسیار آسان می‌کند. 
cas.mfa.providerselection.mfa-gauth=Google Authenticator
cas.mfa.providerselection.mfa-gauth.notes=Google Authenticator یک احراز هویت مبتنی بر نرم افزار است که خدمات تأیید دو مرحله ای را برای احراز هویت کاربران برنامه های تلفن همراه توسط Google پیاده سازی می کند.
cas.mfa.providerselection.mfa-simple=احراز هویت چند عاملی CAS
cas.mfa.providerselection.mfa-simple.notes=به CAS اجازه دهید تا به تنهایی به عنوان یک ارائه دهنده احراز هویت چندعاملی عمل کند و توکن ها را صادر کند و آنها را از طریق کانال های ارتباطی از پیش تعریف شده مانند ایمیل یا پیام های متنی برای کاربران نهایی ارسال کند.
cas.mfa.providerselection.mfa-yubikey=احراز هویت چند عاملی YubiKey
cas.mfa.providerselection.mfa-yubikey.notes=Yubico یک سرویس مبتنی بر ابر است که احراز هویت دو مرحله ای قوی، آسان و مقرون به صرفه را با رمزهای عبور یک بار مصرف از طریق محصول شاخص خود، YubiKey، امکان پذیر می کند. 
