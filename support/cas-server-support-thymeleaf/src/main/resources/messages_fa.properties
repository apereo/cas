screen.error.page.unprocessable=CAS قادر به پردازش این درخواست نیست. درخواست یا نادرست است، حاوی پارامترهای ناشناخته‌ای است که توسط CAS پشتیبانی نمی‌شوند، یا قدیمی شده‌اند یا به CAS دستور می‌دهد یک جریان احراز هویت خاص را فعال کند که یا نامعتبر یا ناشناخته است. همچنین ممکن است زمان جلسه ورود به سیستم به پایان رسیده باشد و شما قبل از ورود به سیستم خیلی صبر کرده باشید. <p>لطفا <strong>پنجره های اضافی مرورگر را ببندید، تمام کوکی های مرورگر را حذف کنید، حافظه پنهان مرورگر خود را پاک کنید و دوباره شروع به تمیز کردن کنید</strong> برای حذف آثار تمام جلسات قبلی و داده های نامعتبر احتمالی.</p>
