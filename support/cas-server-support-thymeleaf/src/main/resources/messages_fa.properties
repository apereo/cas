screen.oidc.confirm.claim.name=نام کامل کاربر نهایی به شکل قابل نمایش شامل تمام قسمت‌های نام، احتمالاً شامل عناوین و پسوندها، که بر اساس محلی و اولویت‌های کاربر نهایی مرتب شده‌اند.
screen.oidc.confirm.claim.given_name=نام(های) داده شده یا نام(های) کاربر نهایی. توجه داشته باشید که در برخی فرهنگ ها، افراد می توانند چندین نام داشته باشند. همه می توانند وجود داشته باشند و نام ها با کاراکترهای فاصله از هم جدا شوند.
screen.oidc.confirm.claim.middle_name=نام (های) میانی کاربر نهایی. توجه داشته باشید که در برخی از فرهنگ ها، افراد می توانند چندین نام میانی داشته باشند. همه می توانند وجود داشته باشند و نام ها با کاراکترهای فاصله از هم جدا شوند. همچنین توجه داشته باشید که در برخی فرهنگ ها از نام های میانی استفاده نمی شود.
screen.oidc.confirm.claim.family_name=نام (ها) یا نام خانوادگی کاربر نهایی. توجه داشته باشید که در برخی فرهنگ‌ها، افراد می‌توانند چندین نام خانوادگی داشته باشند یا نام خانوادگی نداشته باشند. همه می توانند وجود داشته باشند و نام ها با کاراکترهای فاصله از هم جدا شوند.
screen.oidc.confirm.claim.email=آدرس ایمیل ترجیحی کاربر نهایی.
screen.oidc.confirm.claim.preferred_username=ممکن است هر رشته JSON معتبری شامل کاراکترهای خاص مانند @، / یا فضای خالی باشد. RP نباید به منحصر به فرد بودن این مقدار متکی باشد.
screen.oidc.confirm.claim.profile=URL صفحه نمایه کاربر نهایی. محتوای این صفحه وب باید در مورد کاربر نهایی باشد.
screen.oidc.confirm.claim.picture=URL تصویر نمایه کاربر نهایی. این URL باید به یک فایل تصویری (مثلاً یک فایل تصویری PNG، JPEG یا GIF)، به جای صفحه وب حاوی یک تصویر اشاره داشته باشد. توجه داشته باشید که این URL باید به طور خاص به عکس نمایه کاربر نهایی که برای نمایش در هنگام توصیف کاربر نهایی مناسب است اشاره کند، نه یک عکس دلخواه که توسط کاربر نهایی گرفته شده است.
screen.oidc.confirm.claim.phone_number=شماره تلفن مورد نظر کاربر نهایی به عنوان قالب این ادعا توصیه می شود. به عنوان مثال، <code>+1 (425) 555-1212</code> یا <code>+56 (2) 687 2400</code>.
