screen.logout.fc.success=شما با موفقیت از سیستم احراز هویت مرکزی خارج شدید. با توجه به اینکه خروج تنها با CAS فعال است، لیست برنامه های زیر هستند <strong> فقط اطلاع داده شد</strong> تا شما را از سیستم خارج کرده و جلسه کاربری شما را از بین ببرد. به یاد داشته باشید که این فقط یک اعلان است، نه یک تضمین. این خود برنامه است که به این اعلان ها احترام بگذارد و به درستی برای خروج شما از سیستم اقدام کند.
screen.logout.security=به دلایل امنیتی، از مرورگر وب خود خارج شوید.
screen.logout.pending=درخواست خروج در انتظار…
screen.service.wildcard.message=این برنامه یک ورودی ثبت نام اختصاصی در رجیستری خدمات CAS ندارد. توسط CAS مجاز و مجاز است زیرا یک ورودی تعریف سرویس با حروف عام در رجیستری سرویس CAS وجود دارد که درخواست‌های احراز هویت را از برنامه‌های ناشناخته مانند این مورد اجازه می‌دهد و می‌پذیرد. <p/>به عنوان بهترین روش امنیتی، اکیداً توصیه می شود که تسهیلات مدیریت خدمات را محدود کنید <strong>فقط لیست برنامه های شناخته شده را شامل شود</strong> که به صراحت مجاز به استفاده از CAS هستند. باز گذاشتن رابط مدیریت برای همه برنامه ها ممکن است فرصتی برای حملات امنیتی ایجاد کند و بررسی الزامات برنامه و نیازهای ویژگی را دشوار کند.
screen.service.sso.error.header=برای دسترسی به این سرویس احراز هویت مجدد مورد نیاز است
screen.service.sso.error.message=شما سعی کردید بدون احراز هویت مجدد به سرویسی دسترسی پیدا کنید که نیاز به احراز هویت دارد.  لطفاً دوباره احراز هویت را امتحان کنید</a>.
screen.service.required.message=شما بدون مشخص کردن برنامه هدف، احراز هویت را انجام دادید. لطفاً درخواست را دوباره بررسی کنید و دوباره امتحان کنید.
screen.service.initial.message=تلاش برای دسترسی به CAS یا برنامه هدف مشخص شده در حال حاضر مجاز نیست. خط مشی احراز هویت مستلزم این است که برنامه شروع خود را تغییر دهید و سپس به برنامه ها و سرویس های دیگر بروید.
