passwordless.token.header=توکن را ارائه دهید
passwordless.token.description=لطفا رمز امنیتی ارسال شده برای شما از طریق ایمیل، تلفن و غیره را ارائه دهید. توجه داشته باشید که رمز تنها برای یک پنجره کوتاه معتبر است و پس از ارسال، سایر توکن ها باطل و حذف خواهند شد.
passwordless.error.failure.title=خرابی احراز هویت
passwordless.error.failure.description=رمز ارائه شده تأیید نشد. ممکن است باطل، حذف یا منقضی شده باشد.
passwordless.error.unknown.user=نام کاربری ارائه شده توسط CAS قابل شناسایی و یافتن نیست.
passwordless.error.invalid.user=نام کاربری ارائه شده حاوی اطلاعات تماس کافی نیست.
passwordless.getuser.header=احراز هویت بدون رمز عبور
passwordless.getuser.description=لطفاً نام کاربری خود را برای تعیین محل حساب خود وارد کنید. هنگامی که حساب شما تأیید شد، CAS استراتژی احراز هویت مناسب را برای شما انتخاب می کند.
passwordless.selection.header=انتخاب احراز هویت
passwordless.selection.description=برای ادامه، یکی از گزینه های احراز هویت فهرست شده در زیر را انتخاب کنید.
passwordless.selection.password.header=رمز عبور
passwordless.selection.password.description=شما می توانید با استفاده از رمز عبور خود احراز هویت کنید. در صورتی که حساب شما واجد شرایط باشد، ممکن است از شما خواسته شود که یک جریان احراز هویت چندعاملی را تکمیل کنید.
passwordless.selection.token.header=رمز
passwordless.selection.token.description=از طریق ایمیل یا پیامک از CAS یک رمز یک بار مصرف، معتبر برای مدت محدود، دریافت می‌کنید و از شما خواسته می‌شود برای ادامه، کد را دوباره وارد کنید.
passwordless.selection.mfa.header=چند عاملی
passwordless.selection.mfa.description=شما مستقیماً به یک جریان احراز هویت چند عاملی هدایت خواهید شد. پس از تکمیل مرحله احراز هویت، جریان به طور خودکار از سر گرفته می شود.
passwordless.selection.delegation.header=خارجی
passwordless.selection.delegation.description=برای ورود به یک ارائه دهنده هویت خارجی فرستاده می شوید. پس از تکمیل جریان احراز هویت با ارائه‌دهنده هویت خارجی، برای ادامه به طور خودکار به CAS هدایت می‌شوید.
cas.authn.qr.fail=پذیرش درخواست احراز هویت بر اساس کد QR امکان پذیر نیست. مطمئن شوید که کد QR به درستی اسکن شده است، و اعتبارنامه های ارائه شده معتبر هستند، که توسط این سرور CAS صادر شده و منقضی نشده اند.
cas.inwebo.checkresult.title=بررسی احراز هویت Inwebo
cas.inwebo.checkresult.heading=در انتظار تایید اعلان Inwebo:
cas.inwebo.checkresult.message=لطفاً آن را روی تلفن/رومیزی خود تأیید کنید…
cas.inwebo.error.title=خطای احراز هویت Inwebo
cas.inwebo.error.heading=خطایی رخ داده است.
cas.inwebo.error.userrefusedortoolate=شما احراز هویت را رد کردید یا به سرعت آن را تأیید نکردید.
cas.inwebo.error.usernotregistered=قبل از هر گونه ورود، باید در Inwebo ثبت نام کرده باشید. صندوق پستی خود را بررسی کنید تا مراحل ثبت نام را دنبال کنید یا کدهای فعال سازی و پین خود را در زیر وارد کنید تا در مرورگر خود ثبت نام کنید…
cas.inwebo.selectauthent.title=احراز هویت را انتخاب کنید
cas.inwebo.selectauthent.heading=روش احراز هویت خود را انتخاب کنید:
