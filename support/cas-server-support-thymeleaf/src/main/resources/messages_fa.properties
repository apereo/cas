screen.logout.confirm.text=<p>ممکن است یک برنامه شما را به سرویس احراز هویت مرکزی هدایت کرده باشد تا شما را به طور کامل از سیستم خارج کرده و جلسه ورود به سیستم را از بین ببرد. اگر خروج از سیستم را انتخاب کنید، پس از تلاش برای دسترسی به یک برنامه، مجدداً از شما خواسته می شود که اعتبار خود را ارائه دهید و دوباره وارد شوید.</p>
