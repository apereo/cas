authenticationFailure.CredentialExpiredException=رمز عبور شما منقضی شده است.
authenticationFailure.InvalidLoginLocationException=شما نمی توانید از این ایستگاه کاری وارد شوید.
authenticationFailure.UniquePrincipalRequiredException=در حال حاضر نمی توانید وارد سیستم شوید، زیرا یک جلسه ورود فعال دیگر در حال انجام است و CAS با یک خط مشی احراز هویت پیکربندی شده است که از چندین جلسه ورود همزمان به سیستم جلوگیری می کند.
authenticationFailure.InvalidLoginTimeException=در حال حاضر ورود به حساب شما ممنوع است.
authenticationFailure.AccountNotFoundException=حساب شما شناسایی نشده است و در حال حاضر نمی توانید وارد شوید.
authenticationFailure.FailedLoginException=تلاش برای احراز هویت ناموفق بوده است، احتمالاً به دلیل اعتبارنامه نامعتبر است. لطفاً تأیید کنید و دوباره امتحان کنید.
authenticationFailure.MultifactorAuthenticationProviderAbsentException=برآورده کردن الزامات احراز هویت چند عاملی ممکن نیست. حساب شما برای یک استراتژی احراز هویت چندعاملی پیکربندی شده است، اما CAS به احتمال زیاد به دلیل پیکربندی نادرست سرور نمی تواند آن استراتژی را پیدا و اجرا کند. برای راهنمایی با مدیران سرویس تماس بگیرید.
authenticationFailure.SurrogateAuthenticationException=شما در حال حاضر مجاز به جعل هویت کاربر مشخص شده نیستید.
authenticationFailure.AccountPasswordMustChangeException=رمز عبور حساب شما منقضی شده است و باید تغییر دهید.
authenticationFailure.UnauthorizedServiceForPrincipalException=دسترسی به سرویس به دلیل از دست دادن امتیازات رد شد.
authenticationFailure.MultifactorAuthenticationRequiredException=تلاش برای احراز هویت برای حساب شما رد شد، زیرا حساب شما هنوز پیکربندی نشده است تا از طریق احراز هویت چند عاملی انجام شود. برای دریافت راهنمایی با مدیران سرویس تماس بگیرید، مطمئن شوید که حساب شما ثبت نام کرده و واجد شرایط احراز هویت چند عاملی است و دوباره امتحان کنید.
authenticationFailure.MultifactorAuthenticationFailedException=تلاش برای احراز هویت چندعاملی ناموفق بوده است، احتمالاً به دلیل اعتبارنامه تأیید اعتبار چند عاملی نامعتبر است. لطفاً تأیید کنید و دوباره امتحان کنید.
authenticationFailure.RiskyAuthenticationException=CAS نمی‌تواند جریان احراز هویت را ادامه دهد، احتمالاً به این دلیل که این تلاش برای احراز هویت خطرناک و مشکوک است و امتیاز ریسک کافی بالاتر از آستانه پذیرفته شده است. ممکن است تلاش شما برای احراز هویت مسدود شده باشد زیرا از یک مرورگر وب ناشناخته استفاده می کنید یا از یک مکان نامعلوم وارد سیستم می شوید. برای اطلاعات بیشتر و راهنمایی، لطفاً با سرپرست و/یا میز کمک تماس بگیرید.
authenticationFailure.UNKNOWN=تلاش برای احراز هویت ناموفق بود.
authenticationFailure.AuthenticationException=اعتبارنامه ها رد می شوند/نامعتبر هستند و تلاش برای احراز هویت ناموفق است.
INVALID_REQUEST_PROXY=فرمت درخواست نادرست است. اطمینان حاصل کنید که تمام پارامترهای مورد نیاز به درستی کدگذاری شده و گنجانده شده اند.
INVALID_TICKET_SPEC=مشخصات تأیید اعتبار بلیت ناموفق بود. خطاهای احتمالی می تواند شامل تلاش برای تأیید اعتبار یک بلیط پروکسی از طریق اعتبارسنجی بلیط خدمات یا عدم انطباق با درخواست «تجدید = واقعی» باشد.
INVALID_REQUEST=امکان شناسایی، تأیید یا تکمیل این درخواست وجود ندارد، احتمالاً به دلیل نادرست بودن یا ناقص بودن پارامترهای مورد نیاز است.
INVALID_AUTHENTICATION_CONTEXT=درخواست اعتبارسنجی برای [''{0}''] نمی تواند راضی شود. درخواست یا شناسایی نشده یا برآورده نشده است.
INVALID_TICKET=بلیط ''{0}'' شناسایی نشد
INVALID_PROXY_GRANTING_TICKET=PGT قبلاً برای این ST ایجاد شده است. نمی توان بیش از یک PGT برای ST اعطا کرد
INVALID_SERVICE=بلیط ''{0}'' با خدمات ارائه شده مطابقت ندارد. سرویس اولیه این بود ''{1}'' و سرویس ارائه شده بود ''{2}''.
INVALID_PROXY_CALLBACK=آدرس اینترنتی پاسخ به تماس پراکسی ارائه شده ''{0}'' نمی تواند احراز هویت شود. یا ''{0}دسترسی به '' امکان پذیر نیست، یا انجام احراز هویت پروکسی مجاز نیست.
UNAUTHORIZED_SERVICE_PROXY=خدمات ارائه شده ''{0}'' مجاز به استفاده از احراز هویت پروکسی CAS نیست.
UNSATISFIED_AUTHN_POLICY=به دلیل یک خط مشی احراز هویت ناراضی، دسترسی به سرویس رد شد.
INVALID_AUTHN_REQUEST=تلاش برای احراز هویت ناموفق بوده است، احتمالاً به دلیل اعتبارنامه نامعتبر است.
BLOCKED_AUTHN_REQUEST=تلاش برای احراز هویت مسدود شده است و نمی‌تواند ادامه یابد، احتمالاً به دلیل نادرست بودن یا عدم وجود پارامترهای مورد نیاز. گزارش های سرور CAS را بررسی کنید تا علت اصلی خطا را پیدا کنید.
UNSATISFIED_SAML_REQUEST=درخواست احراز هویت SAML نمی تواند توسط CAS درک، پذیرفته یا تأیید شود، احتمالاً به دلیل نادرست بودن یا عدم وجود پارامترهای مورد نیاز. لطفاً گزارش‌های سرور CAS را بررسی کنید تا علت اصلی خطا را پیدا کنید.
MISSING_SAML_REQUEST=درخواست احراز هویت SAML2 را نمی توان از فروشگاه جلسه CAS تعیین کرد. این معمولاً به این معنی است که درخواست احراز هویت SAML2 اصلی که از طریق ارائه‌دهنده خدمات SAML2 به CAS ارسال شده است، نمی‌تواند پس از تلاش برای احراز هویت بازیابی و بازیابی شود، احتمالاً زیرا ذخیره‌کننده جلسه اصلی یا درخواست احراز هویت را به اجبار حذف کرده یا تشخیص داده است که درخواست ردیابی منقضی شده و قدیمی است، فراتر از آنچه که خط مشی انقضای فروشگاه جلسه اجازه می‌دهد. لطفاً گزارش‌های سرور CAS را بررسی کنید تا علت اصلی خطا را پیدا کنید.
screen.service.error.header=برنامه مجاز به استفاده از CAS نیست
screen.service.error.redirect=شما مجاز به دسترسی به این برنامه نیستید. لطفا صبور باشید زیرا در شرف هدایت به آن هستید <strong>{0}</strong> برای کسب اطلاعات بیشتر در مورد این سناریو
service.principal.resolution.error=CAS قادر به تعیین اصل صحیح احراز هویت نیست. یا نمی‌توان اصل را به‌درستی حل کرد زیرا یک نهاد منحصربه‌فرد منفرد، یا CAS اصول نامزد مختلط/چندین را پیدا کرده است و نمی‌تواند تصمیم بگیرد که کدام یک باید استفاده شود. این خطا همچنین ممکن است در صورتی ایجاد شود که اصل تأیید شده به دلیل از دست دادن امتیازات تعیین شده توسط خط مشی های مجوز سرور CAS، اجازه دسترسی به برنامه هدف را نداشته باشد.
service.not.authorized.missing.attr=شما مجاز به دسترسی به برنامه نیستید زیرا حساب شما دارای امتیازات مورد نیاز سرور CAS برای احراز هویت در این سرویس نیست. لطفا به بخش پشتیبانی خود اطلاع دهید.
screen.service.error.message=برنامه‌ای که سعی کردید آن را احراز هویت کنید، مجاز به استفاده از CAS نیست. این معمولاً نشان می‌دهد که برنامه در CAS ثبت نشده است، یا خط‌مشی مجوز آن که در سابقه ثبت آن تعریف شده است، از اعمال نفوذ آن به عملکرد CAS جلوگیری می‌کند، یا بدشکل است و توسط CAS شناسایی نشده است. برای اطلاع از نحوه ثبت و ادغام برنامه خود با CAS با سرپرست CAS خود تماس بگیرید.
screen.service.empty.error.message=رجیستری خدمات CAS خالی است و هیچ تعریف سرویسی ندارد. برنامه هایی که می خواهند با CAS احراز هویت شوند باید به صراحت در رجیستری سرویس ها تعریف شوند.
