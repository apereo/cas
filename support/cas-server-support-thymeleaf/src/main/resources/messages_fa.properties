cas.screen.acct.error.fail=امکان ثبت حساب درخواستی یا ارسال لینک فعال سازی حساب وجود ندارد.
cas.screen.acct.error.invalid-value=مقدار ارائه شده وجود ندارد، نامعتبر است یا با الگوی مورد نیاز برای نوع ورودی مطابقت ندارد.
