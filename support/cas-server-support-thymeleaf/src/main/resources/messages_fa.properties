cas.mfa.yubikey.label.token=نشانه:
cas.mfa.webauthn.auth.fail=نمی‌توان دستگاه شما را برای احراز هویت تأیید کرد. محموله‌های مشروط ممکن است نامعتبر، منقضی شده یا به‌طور دیگری در معرض خطر باشند.
cas.mfa.webauthn.register.helptext=یک نام مناسب به دستگاه دارای FIDO2 خود اختصاص دهید و سپس آن را برای احراز هویت چند عاملی در CAS ثبت کنید. هنگامی که ثبت نام دستگاه با موفقیت انجام شد، به طور خودکار به مرحله بعدی هدایت می شوید تا با دستگاه خود وارد شوید.
cas.mfa.webauthn.register.wait=دستگاه دارای FIDO2 شما اکنون در CAS ثبت شده است. لطفا صبر کنید…
cas.mfa.webauthn.register.discoverablecredentials=شما همچنین می توانید دستگاه خود را با استفاده از ثبت نام کنید <i>اعتبارنامه های قابل کشف / کلیدهای مقیم</i>. این بدان معناست که کلید خصوصی و ابرداده مربوطه در حافظه دائمی روی احراز هویت کننده ذخیره می شود و نه در سرور CAS.
cas.mfa.registerdevice.label.title=ثبت دستگاه
cas.mfa.registerdevice.label.intro=لطفاً دستگاه فعلی را نام ببرید.
