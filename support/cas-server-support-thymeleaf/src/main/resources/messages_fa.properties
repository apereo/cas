screen.unavailable.heading=CAS قادر به پردازش این درخواست نیست: "{0}:{1}"
screen.unavailable.message=در تلاش برای تکمیل درخواست شما خطایی روی داد. <strong>لطفاً به میز پشتیبانی خود اطلاع دهید یا دوباره امتحان کنید.</strong> <p><div>Apereo یک بنیاد مدیریت نرم افزار منبع باز غیر انتفاعی است. نرم افزار CAS یک پروژه تحت حمایت Apereo است و به صورت رایگان برای هر کسی قابل دانلود و استفاده است. با این حال، Apereo سیستم‌های کسی را که از نرم‌افزار استفاده می‌کند کار نمی‌کند و در بیشتر موارد حتی نمی‌داند چه کسی از آن استفاده می‌کند یا چگونه با آنها تماس بگیرد، مگر اینکه آنها بخشی فعال از جامعه Apereo باشند.<br/></br>اگر در ورود به سیستم با استفاده از CAS مشکل دارید، <strong>برای کمک باید با کارکنان فناوری اطلاعات یا میز راهنمایی سازمان خود تماس بگیرید</strong>. <br/><br/>ما آرزو می کنیم که بتوانیم مستقیماً به شما کمک کنیم.</div>
