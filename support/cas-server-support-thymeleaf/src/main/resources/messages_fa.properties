cas.mfa.simple.contact-selection.description=ما چندین راه برای تماس با شما برای حساب شما پیدا کرده ایم. لطفاً حساب(هایی) را انتخاب کنید که می‌خواهید رمز احراز هویت چندعاملی را دریافت کنید.
cas.mfa.simple.pagetitle=ورود به سیستم احراز هویت چند عاملی CAS
cas.mfa.simple.label.token=نشانه:
cas.mfa.simple.label.resend=ارسال مجدد
cas.mfa.simple.label.tokensent=یک رمز احراز هویت چند عاملی از طریق ایمیل یا پیام متنی برای شما ارسال می شود. لطفاً رمز را پیدا کنید و برای ادامه آن را اینجا ارسال کنید. توجه داشته باشید که توکن پس از مدت کوتاهی منقضی می‌شود و دیگر توسط CAS شناسایی نمی‌شود، در این صورت، می‌توانید از CAS بخواهید یک توکن جدید برای شما ارسال کند.
cas.mfa.simple.label.contactfailed.sms=CAS نمی‌تواند از اطلاعات تماس انتخاب‌شده برای ارسال پیامک با رمز احراز هویت چند عاملی برای شما استفاده کند. لطفاً اطلاعات تماس خود را بررسی کنید و برای کمک با سرپرست CAS خود تماس بگیرید.
cas.mfa.simple.label.contactfailed.email=CAS نمی‌تواند از اطلاعات تماس انتخاب‌شده برای ارسال یک ایمیل با رمز احراز هویت چند عاملی برای شما استفاده کند. لطفاً اطلاعات تماس خود را بررسی کنید و برای کمک با سرپرست CAS خود تماس بگیرید.
cas.mfa.simple.token.failed=این تلاش برای احراز هویت چندعاملی پذیرفته نشد. رمز ارائه شده نامعتبر است.
cas.mfa.simple.registration.title=ثبت حساب
cas.mfa.simple.registration.description=حساب شما برای احراز هویت چند عاملی ثبت نشده است، حتی اگر برنامه‌ای که می‌خواهید به آن دسترسی پیدا کنید واجد شرایط و الزامی است. لطفا <a href="https://account.example.org/mfa">حساب خود را ثبت کنید</a> برای احراز هویت چند عاملی و اطمینان از اینکه CAS به اطلاعات تماس شما مانند آدرس ایمیل، تلفن و غیره دسترسی دارد.
cas.mfa.simple.registration.email.failed=نمی توان حساب خود را برای احراز هویت چند عاملی ثبت کرد. CAS نمی تواند آدرس ایمیل شما را بشناسد و بپذیرد تا یک ایمیل با پیوند ثبت نام برای شما ارسال کند. لطفاً اطلاعات تماس خود را بررسی کنید و برای کمک با سرپرست CAS خود تماس بگیرید.
cas.mfa.simple.registration.email.sent=یک ایمیل با رمز ثبت نام برای شما ارسال شده است. لطفاً صندوق ورودی و کد ارائه دهنده خود را در اینجا بررسی کنید.
cas.mfa.simple.registration.token.failed=نمی توان حساب خود را برای احراز هویت چند عاملی ثبت کرد. توکن ارائه شده نامعتبر، منقضی شده یا در معرض خطر دیگری است. لطفاً رمز را مرور کنید و دوباره امتحان کنید.
