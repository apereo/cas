cas.screen.acct.title=ثبت حساب
cas.screen.acct.intro=لطفاً فرم زیر را تکمیل کنید تا حساب جدید خود را در CAS ثبت کنید. پس از ارسال فرم، یک ایمیل با لینک فعال سازی حساب دریافت خواهید کرد تا حساب خود را فعال کنید، رمز عبور خود را تنظیم کنید و شروع به استفاده از CAS کنید.
cas.screen.acct.infosent=دستورالعمل های فعال سازی حساب با موفقیت ارسال شد. لطفا ایمیل خود و غیره را بررسی کنید و دستورالعمل ها را دنبال کنید.
cas.screen.acct.intro.complete=خوش آمدید! از اینکه حساب خود را تأیید کردید متشکریم. لطفاً فرم زیر را تکمیل کنید تا حساب جدید خود را در CAS ثبت کنید. 
cas.screen.acct.intro.completed=متشکرم اکنون حساب شما در CAS فعال و ثبت شده است.
cas.screen.acct.button.submit=ارسال کنید
