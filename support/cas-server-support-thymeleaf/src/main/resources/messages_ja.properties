screen.oidc.confirm.claim.given_name=エンドユーザーの名または名。文化によっては、人々が複数の名前を持つことができることに注意してください。すべての名前をスペース文字で区切って存在させることができます。
screen.oidc.confirm.claim.middle_name=エンドユーザーのミドルネーム。文化によっては、人々が複数のミドルネームを持つことができることに注意してください。すべての名前をスペース文字で区切って存在させることができます。また、文化によってはミドルネームが使用されないことにも注意してください。
screen.oidc.confirm.claim.family_name=エンドユーザーの姓または姓。文化によっては、人々が複数の姓を持っていたり、姓を持たなかったりする場合があることに注意してください。すべての名前をスペース文字で区切って存在させることができます。
screen.oidc.confirm.claim.email=エンドユーザーの優先電子メール アドレス。
