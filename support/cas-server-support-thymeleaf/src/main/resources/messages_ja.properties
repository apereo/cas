screen.oidc.confirm.claim.profile=エンドユーザーのプロフィール ページの URL。この Web ページのコンテンツはエンドユーザーに関するものである必要があります。
screen.oidc.confirm.claim.picture=エンドユーザーのプロフィール写真の URL。この URL は、画像を含む Web ページではなく、画像ファイル (PNG、JPEG、または GIF 画像ファイルなど) を参照する必要があります。この URL は、エンドユーザーが撮影した任意の写真ではなく、エンドユーザーを説明するときに表示するのに適したエンドユーザーのプロフィール写真を具体的に参照する必要があることに注意してください。
screen.oidc.confirm.claim.phone_number=エンドユーザーの優先電話番号。このクレームの形式として推奨されます。たとえば、 <code>+1 (425) 555-1212</code> または <code>+56 (2) 687 2400</code>.
