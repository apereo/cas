cas.screen.acct.title=アカウント登録
cas.screen.acct.intro=新しいアカウントを CAS に登録するには、以下のフォームに記入してください。フォームが送信されると、アカウントを有効にしてパスワードを設定し、CAS の使用を開始するためのアカウント アクティベーション リンクが記載された電子メールが届きます。
cas.screen.acct.infosent=アカウントの有効化手順が正常に送信されました。メール等をご確認の上、指示に従ってください。
cas.screen.acct.intro.complete=おかえりなさい！アカウントを確認していただきありがとうございます。新しいアカウントを CAS に登録するには、以下のフォームに記入してください。 
