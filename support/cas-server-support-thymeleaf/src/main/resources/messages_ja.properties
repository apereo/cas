screen.oidc.confirm.bindingmessage.description=エンドユーザーへの視覚的な合図として、消費デバイスと認証デバイスの両方に表示されてトランザクションを連動させることを目的とした人間が読める識別子またはメッセージ。この連動メッセージにより、エンドユーザーは、認証デバイスで実行されたアクションが消費デバイスによって開始された要求に関連していることを確認できます。
