MISSING_SAML_REQUEST=SAML2 認証リクエストは CAS セッション ストアから判断できません。これは通常、SAML2 サービス プロバイダーを介して CAS に送信された元の SAML2 認証リクエストが、認証試行後に取得および復元できないことを意味します。これは、基盤となるセッション ストアが認証リクエストを強制的に削除したか、セッション ストアの有効期限ポリシーで許可されている範囲を超えて、追跡されたリクエストが期限切れで古いと判断したためである可能性があります。 CAS サーバーのログを調べて、エラーの根本原因を特定してください。
