screen.surrogates.wildcard.description=Váš účet je interně rozpoznán CAS jako účet se zvláštními oprávněními, oprávněný vydávat se za všechny uživatele a účty. Z tohoto důvodu není pro váš účet povolen výběr účtu pro zosobnění. Místo toho se můžete přímo přihlásit a vydávat se za jakýkoli jiný účet pomocí jeho uživatelského jména.
