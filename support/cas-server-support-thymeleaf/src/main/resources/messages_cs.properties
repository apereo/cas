cas.screen.acct.title=Registrace účtu
cas.screen.acct.intro=Vyplňte prosím níže uvedený formulář a zaregistrujte svůj nový účet u CAS. Po odeslání formuláře obdržíte e-mail s odkazem na aktivaci účtu, abyste mohli svůj účet aktivovat, nastavit heslo a začít používat CAS.
cas.screen.acct.infosent=Pokyny k aktivaci účtu byly úspěšně odeslány. Zkontrolujte prosím svůj e-mail atd. a postupujte podle pokynů.
cas.screen.acct.intro.complete=Vítejte zpět! Děkujeme za ověření vašeho účtu. Vyplňte prosím níže uvedený formulář a zaregistrujte svůj nový účet u CAS. 
