cas.oauth.error.pagetitle=Chyba OAuth
cas.oauth.error.header=Chyba autorizace OAuth
OAUTH_BAD_SESSION_REQUEST=Požadavek OAuth nelze dokončit, protože CAS nemůže najít nebo určit adresu URL přesměrování OAuth. To je obvykle indikace zastaralého nebo neshodného požadavku, kde se ID relace zpracovaného požadavku liší od aktivní relace a může být způsobeno operací úplného odhlášení. Vymažte soubory cookie a historii, restartujte prohlížeč a zkuste to znovu.
screen.oidc.confirm.ciba.header=Požadavek na ověření zpětného kanálu
screen.oidc.confirm.ciba.confirmed=Požadavek na ověření zpětného kanálu je nyní potvrzen. Toto okno neobnovujte. Místo toho prosím zavřete toto okno prohlížeče a zkontrolujte, zda vaše zařízení neobsahuje další pokyny.
screen.oidc.confirm.ciba.failed=Požadavek na ověření zpětného kanálu nelze potvrdit. Zkontrolujte protokoly serveru a pro další informace kontaktujte svého správce CAS.
OIDC_CIBA_BAD_REQUEST=Požadavek na ověření zpětného kanálu se nezdařil.
screen.oidc.confirm.bindingmessage.header=Závazná zpráva
screen.oidc.confirm.bindingmessage.description=Lidsky čitelný identifikátor nebo zpráva určená k zobrazení jak na spotřebním zařízení, tak na ověřovacím zařízení k jejich vzájemnému propojení pro transakci prostřednictvím vizuálního podnětu pro koncového uživatele. Tato blokovací zpráva umožňuje koncovému uživateli zajistit, že akce provedená na ověřovacím zařízení souvisí s požadavkem iniciovaným spotřebním zařízením.
screen.oidc.confirm.usercode.header=Uživatelský kód
screen.oidc.confirm.usercode.description=Tajný kód, jako je heslo nebo PIN, který zná pouze uživatel, ale lze jej ověřit CAS. Kód se používá k autorizaci odeslání požadavku na ověření na autentizační zařízení uživatele.
screen.oidc.confirm.infourl=Další informace o {0}.
screen.oidc.confirm.privacyurl=Dozvědět se o {0} pravidla ochrany osobních údajů.
screen.oidc.confirm.scopes=Rozsahy
screen.oidc.confirm.claims=Nároky
screen.oidc.confirm.scope.profile=To vyžaduje přístup k nárokům profilu s výjimkou nároků na adresu a e-mail.
screen.oidc.confirm.scope.email=To vyžaduje přístup k e-mailovým nárokům.
screen.oidc.confirm.scope.address=To vyžaduje přístup k nárokům na adresu.
screen.oidc.confirm.scope.openid=To označuje požadavek na autorizaci OpenID Connect.
screen.oidc.confirm.scope.phone=To vyžaduje přístup k nárokům na telefon.
screen.oidc.confirm.scope.offline_access=To vyžaduje přístup pro obnovovací token používaný pro offline přístup.
screen.oidc.confirm.claim.name=Celé jméno koncového uživatele v zobrazitelné podobě včetně všech částí jména, případně včetně názvů a přípon, seřazených podle národního prostředí a preferencí koncového uživatele.
screen.oidc.confirm.claim.given_name=Křestní jméno (jména) nebo jméno (jména) Koncového uživatele. Všimněte si, že v některých kulturách mohou mít lidé více křestních jmen; mohou být přítomny všechny, přičemž jména jsou oddělena mezerami.
screen.oidc.confirm.claim.middle_name=Prostřední jméno (jména) koncového uživatele. Všimněte si, že v některých kulturách mohou mít lidé více druhých jmen; mohou být přítomny všechny, přičemž jména jsou oddělena mezerami. Všimněte si také, že v některých kulturách se prostřední jména nepoužívají.
screen.oidc.confirm.claim.family_name=Příjmení nebo příjmení Koncového uživatele. Všimněte si, že v některých kulturách mohou mít lidé více příjmení nebo žádné příjmení; mohou být přítomny všechny, přičemž jména jsou oddělena mezerami.
screen.oidc.confirm.claim.email=Preferovaná e-mailová adresa koncového uživatele.
screen.oidc.confirm.claim.preferred_username=MŮŽE to být jakýkoli platný řetězec JSON včetně speciálních znaků, jako jsou @, / nebo mezery. RP NESMÍ spoléhat na to, že tato hodnota je jedinečná.
screen.oidc.confirm.claim.profile=Adresa URL stránky profilu koncového uživatele. Obsah této webové stránky BY MĚL být o koncovém uživateli.
screen.oidc.confirm.claim.picture=Adresa URL profilového obrázku koncového uživatele. Tato adresa URL MUSÍ odkazovat na soubor obrázku (například soubor obrázku PNG, JPEG nebo GIF), nikoli na webovou stránku obsahující obrázek. Všimněte si, že tato adresa URL BY MĚLA konkrétně odkazovat na profilovou fotografii Koncového uživatele vhodnou pro zobrazení při popisu Koncového uživatele, nikoli na libovolnou fotografii pořízenou Koncovým uživatelem.
screen.oidc.confirm.claim.phone_number=Preferované telefonní číslo koncového uživatele. Jako formát tohoto tvrzení se DOPORUČUJE. např. <code>+1 (425) 555-1212</code> nebo <code>+56 (2) 687 2400</code>.
screen.oidc.confirm.asksinfo=Klient požaduje následující informace:
screen.oidc.confirm.dynamic=Tento klient byl dynamicky registrován na <code>{0}</code>.
screen.oidc.issuer.invalid=Adresa URL vydavatele je neplatná a neodpovídá adrese URL vydavatele serveru CAS.
screen.samlidp.error.title=Chyba poskytovatele identity SAML2
screen.samlidp.error.description=Služba, do které se pokoušíte přihlásit, identifikovala problém s vaším profilem nebo požadavkem. Obraťte se prosím na váš IT helpdesk pro podporu.
screen.unavailable.header=Chyba CAS
screen.unavailable.heading=CAS nemůže zpracovat tento požadavek: "{0}:{1}"
screen.unavailable.message=Při pokusu o dokončení vašeho požadavku došlo k chybě. <strong>Informujte prosím oddělení podpory nebo to zkuste znovu.</strong> <p><div>Apereo je nezisková nadace pro správu softwaru s otevřeným zdrojovým kódem. Software CAS je projekt sponzorovaný společností Apereo a je volně ke stažení a použitelný kýmkoli. Apereo však neprovozuje systémy nikoho, kdo software používá, a ve většině případů ani neví, kdo jej používá nebo jak je kontaktovat, pokud nejsou aktivní součástí komunity Apereo.<br/></br>Pokud máte problémy s přihlášením pomocí CAS, <strong>budete muset požádat o pomoc pracovníky IT nebo Help Desk vaší organizace</strong>. <br/><br/>Přejeme si, abychom vám mohli být přímo nápomocní.</div>
screen.mfaDenied.header=MZV zamítnuto
screen.mfaDenied.heading=Pokus o MFA byl poskytovatelem zamítnut
screen.mfaDenied.message=Váš poskytovatel MFA zamítl váš pokus o ověření druhého faktoru. Požádejte správce systému o pomoc s obnovením účtu.
screen.mfaUnavailable.header=Poskytovatel MFA není k dispozici
screen.mfaUnavailable.heading=Poskytovatel MFA není k dispozici
screen.mfaUnavailable.message=CAS se v tuto chvíli nepodařilo spojit s vaším nakonfigurovaným poskytovatelem MFA. Kvůli chybovým zásadám nakonfigurovaným pro službu, ke které se pokoušíte získat přístup, nelze v tuto chvíli udělit ověření.
