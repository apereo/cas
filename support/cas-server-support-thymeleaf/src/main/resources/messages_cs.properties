cas.oauth.confirm.pagetitle=Schválit přístup
screen.oauth.confirm.processing=Úspěšně jsme zpracovali vaše předchozí rozhodnutí o souhlasu, abychom klientské aplikaci umožnili získat požadované rozsahy. Z vaší strany není vyžadována žádná akce. Budete-li požádáni o další údaje, budete vyzváni k opětovnému souhlasu a schválení žádosti. <p>Prozatím prosím počkejte, než vás přesměrujeme do aplikace...
cas.oauth.device.confirm.header=Připojte zařízení
