screen.authentication.webauthn.qr.success.title=Úspěšné ověření
screen.authentication.webauthn.qr.success.desc=Nyní jste úspěšně autentizovali své zařízení s podporou FIDO2. CAS nyní automaticky rozpozná váš pokus o ověření a přejde k dalšímu kroku. Toto okno můžete zavřít a vrátit se na původní obrazovku.
screen.authentication.webauthn.qr.fail.title=Ověření se nezdařilo
screen.authentication.webauthn.qr.fail.desc=Pokus o ověření se nezdařil. Ujistěte se, že vaše uživatelské jméno a vybrané zařízení jsou registrovány u CAS, a ověřte protokoly serveru CAS, abyste určili hlavní příčinu chyby. Budoucí pokusy o ověření budou zablokovány. Neobnovujte okno a místo toho zvažte restartování procesu ověřování.
screen.authentication.webauthn.qr.info=Pokud u sebe nemáte své zařízení s podporou FIDO nebo toto zařízení není registrováno u CAS, můžete naskenovat QR kód níže a ověřit pomocí jiného (mobilního) zařízení. Po úspěšném ověření automaticky přejdete k dalšímu kroku.
screen.oauth.confirm.header=Autorizace
