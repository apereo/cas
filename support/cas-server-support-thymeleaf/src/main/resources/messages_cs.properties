screen.logout.confirm.text=<p>Aplikace vás mohla přesměrovat na centrální autentizační službu, aby vás zcela odhlásila a zničila vaši relaci jednotného přihlášení. Pokud se rozhodnete odhlásit, budete znovu požádáni o zadání přihlašovacích údajů a opětovné přihlášení, jakmile se pokusíte o přístup k aplikaci.</p>
screen.logout.confirm.proceed=Chcete pokračovat?
screen.logout.header=Odhlášení proběhlo úspěšně
screen.logout.success=Úspěšně jste se odhlásili z Centrální autentizační služby. Můžete <a href="{0}">přihlásit se</a> znovu.
screen.logout.fc.success=Úspěšně jste se odhlásili z Centrální autentizační služby. Vzhledem k tomu, že je u CAS povoleno jediné odhlášení, je uveden následující seznam aplikací <strong> pouze oznámeno</strong> k odhlášení a zničení vaší uživatelské relace. Pamatujte, že toto je pouze upozornění, nikoli záruka. Je na samotné aplikaci, aby tato upozornění respektovala a řádně provedla kroky k vašemu odhlášení.
screen.logout.security=Z bezpečnostních důvodů ukončete webový prohlížeč.
screen.logout.pending=Nevyřízená žádost o odhlášení…
screen.service.wildcard.message=Tato aplikace nemá vyhrazenou registrační položku v registru služeb CAS. Je autorizován a povolen CAS, protože v registru služeb CAS existuje záznam definice služby se zástupnými znaky, který umožňuje a přijímá požadavky na autentizaci od neznámých aplikací, jako je tato. <p/>Jako osvědčený bezpečnostní postup se důrazně doporučuje omezit zařízení správy služeb na <strong>obsahovat pouze seznam známých aplikací</strong> které jsou výslovně oprávněny používat CAS. Ponechání rozhraní pro správu otevřené pro všechny aplikace může vytvořit příležitost pro bezpečnostní útoky a ztíží audit požadavků aplikací a potřeb atributů.
screen.service.sso.error.header=Pro přístup k této službě je vyžadováno opětovné ověření
