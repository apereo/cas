authenticationFailure.InvalidLoginLocationException=Z této pracovní stanice se nemůžete přihlásit.
authenticationFailure.UniquePrincipalRequiredException=V tuto chvíli se nemůžete přihlásit, protože probíhá další aktivní relace jednotného přihlášení a CAS je nakonfigurován se zásadou autentizace, která zabraňuje více souběžným relacím jednotného přihlášení.
authenticationFailure.InvalidLoginTimeException=K vašemu účtu je v tuto chvíli zakázáno se přihlásit.
authenticationFailure.AccountNotFoundException=Váš účet nebyl rozpoznán a v tuto chvíli se nelze přihlásit.
authenticationFailure.FailedLoginException=Pokus o ověření se nezdařil, pravděpodobně kvůli neplatným přihlašovacím údajům. Prosím ověřte a zkuste to znovu.
authenticationFailure.MultifactorAuthenticationProviderAbsentException=Nelze splnit požadavky na vícefaktorovou autentizaci. Váš účet je nakonfigurován pro strategii vícefaktorové autentizace, ale CAS není schopen tuto strategii najít a provést s největší pravděpodobností kvůli špatné konfiguraci serveru. Požádejte o pomoc správce služeb.
authenticationFailure.SurrogateAuthenticationException=V tuto chvíli nejste oprávněni vydávat se za uvedeného uživatele.
authenticationFailure.AccountPasswordMustChangeException=Platnost hesla vašeho účtu vypršela a je třeba jej změnit.
authenticationFailure.UnauthorizedServiceForPrincipalException=Přístup ke službě byl odepřen kvůli chybějícím oprávněním.
authenticationFailure.MultifactorAuthenticationRequiredException=Pokus o ověření vašeho účtu byl zamítnut, protože váš účet ještě není nakonfigurován tak, aby prošel vícefaktorovým ověřením. Požádejte o pomoc administrátory služby, ujistěte se, že je váš účet zaregistrován a způsobilý pro vícefaktorové ověření, a zkuste to znovu.
authenticationFailure.MultifactorAuthenticationFailedException=Pokus o vícefaktorové ověření se nezdařil, pravděpodobně kvůli neplatným pověřením pro vícefaktorové ověření. Prosím ověřte a zkuste to znovu.
authenticationFailure.RiskyAuthenticationException=CAS nemůže pokračovat v autentizačním toku, pravděpodobně proto, že tento pokus o autentizaci je považován za riskantní a podezřelý s dostatečně vysokým rizikovým skóre nad přijatým prahem. Je možné, že váš pokus o ověření je zablokován, protože používáte neznámý webový prohlížeč nebo se přihlašujete z neznámého místa. Chcete-li získat další informace a pokyny, obraťte se na svého správce a/nebo help desk.
authenticationFailure.UNKNOWN=Pokus o ověření se nezdařil.
authenticationFailure.AuthenticationException=Pověření jsou odmítnuta/neplatná a pokus o ověření se nezdařil.
INVALID_REQUEST_PROXY=Požadavek má nesprávný formát. Ujistěte se, že jsou všechny požadované parametry správně zakódovány a zahrnuty.
INVALID_TICKET_SPEC=Vstupenka selhala ve specifikaci ověření. Možné chyby mohou zahrnovat pokus o ověření proxy lístku prostřednictvím validátoru servisního lístku nebo nevyhovění požadavku `renew=true`.
INVALID_REQUEST=Tento požadavek nelze identifikovat, autorizovat nebo dokončit, pravděpodobně kvůli nesprávně vytvořeným nebo chybějícím požadovaným parametrům.
INVALID_AUTHENTICATION_CONTEXT=Žádost o ověření pro [''{0}''] nelze uspokojit. Požadavek je buď nerozpoznaný, nebo nesplněný.
INVALID_TICKET=lístek ''{0}''není rozpoznáno
INVALID_PROXY_GRANTING_TICKET=PGT již vygenerovaný pro tento ST. Nelze udělit více než jeden PGT pro ST
INVALID_SERVICE=lístek ''{0}'' neodpovídá dodané službě. Původní služba byla ''{1}'' a poskytovaná služba byla ''{2}''.
INVALID_PROXY_CALLBACK=Zadaná adresa URL zpětného volání proxy „“{0}'' se nepodařilo ověřit. buď ''{0}'' nelze dosáhnout nebo není povoleno provádět ověřování proxy.
UNAUTHORIZED_SERVICE_PROXY=Poskytovaná služba ''{0}'' nemá oprávnění používat ověřování proxy CAS.
UNSATISFIED_AUTHN_POLICY=Přístup ke službě byl odepřen kvůli nespokojeným zásadám ověřování.
INVALID_AUTHN_REQUEST=Pokus o ověření se nezdařil, pravděpodobně kvůli neplatným přihlašovacím údajům.
BLOCKED_AUTHN_REQUEST=Pokus o ověření je zablokován a nemůže pokračovat, pravděpodobně kvůli nesprávnému tvaru nebo chybějícím požadovaným parametrům. Prozkoumejte protokoly serveru CAS a vyhledejte hlavní příčinu chyby.
UNSATISFIED_SAML_REQUEST=Požadavek na ověření SAML nemůže CAS porozumět, přijmout nebo ověřit, pravděpodobně kvůli nesprávným nebo chybějícím požadovaným parametrům. Zkontrolujte protokoly serveru CAS a vyhledejte hlavní příčinu chyby.
MISSING_SAML_REQUEST=Požadavek na ověření SAML2 nelze určit z úložiště relací CAS. To obvykle znamená, že původní požadavek na ověření SAML2, který byl odeslán do CAS prostřednictvím poskytovatele služeb SAML2, nelze načíst a obnovit po pokusu o ověření pravděpodobně proto, že základní úložiště relací buď násilně odstranilo požadavek na ověření, nebo určilo, že sledovaný požadavek vypršela a zanikla, nad rámec toho, co povolují zásady vypršení platnosti úložiště relací. Zkontrolujte protokoly serveru CAS a vyhledejte hlavní příčinu chyby.
screen.service.error.header=Aplikace není oprávněna používat CAS
screen.service.error.redirect=Nemáte oprávnění pro přístup k této aplikaci. Buďte prosím trpěliví, protože budete přesměrováni na <strong>{0}</strong> se o tomto scénáři dozvíte více.
service.principal.resolution.error=CAS není schopen určit správný ověřovací objekt. Buď principál nemohl být správně vyřešen jako jedna jedinečná entita, nebo CAS našel smíšené/více kandidátských principálů a není schopen rozhodnout, který by měl být použit. Tato chyba může být způsobena také tím, že ověřený principál nemá povolen přístup k cílové aplikaci kvůli chybějícím oprávněním nastaveným zásadami autorizace serveru CAS.
service.not.authorized.missing.attr=Nemáte oprávnění k přístupu k aplikaci, protože vašemu účtu chybí oprávnění vyžadovaná serverem CAS k ověření v této službě. Informujte prosím oddělení podpory.
screen.service.error.message=Aplikace, ke které jste se pokusili ověřit, nemá oprávnění používat CAS. To obvykle znamená, že aplikace není registrována v CAS nebo její autorizační politika definovaná v jejím registračním záznamu jí brání ve využití funkcí CAS, nebo že je chybná a CAS ji nerozpozná. Obraťte se na svého správce CAS a zjistěte, jak byste mohli zaregistrovat a integrovat svou aplikaci s CAS.
screen.service.empty.error.message=Registr služeb CAS je prázdný a nemá žádné definice služeb. Aplikace, které se chtějí ověřit pomocí CAS, musí být explicitně definovány v registru služeb.
screen.service.expired.message=Platnost aplikace, ke které jste se pokusili ověřit, vypršela v registru služeb CAS. Pokud by se mělo uvažovat o používání této služby, obraťte se na správce služby, aby aplikaci obnovili.
