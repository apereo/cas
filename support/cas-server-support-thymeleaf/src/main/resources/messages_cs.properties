cas.mfa.providerselection.optional.header=Volitelné vícefaktorové ověřování
cas.mfa.providerselection.optional.description=Vícefaktorové ověřování je nakonfigurováno jako volitelné a můžete pokračovat bez výběru poskytovatele.
cas.mfa.providerselection.mfa-duo=Duo Security
cas.mfa.providerselection.mfa-duo.notes=Široká škála autentizačních metod Duo umožňuje každému uživateli se bezpečně a rychle přihlásit. Duo Push, zasílaný autentizační aplikací Duo Mobile, umožňuje uživatelům schvalovat push notifikace k ověření jejich identity.
cas.mfa.providerselection.mfa-webauthn=FIDO2 WebAuthn
cas.mfa.providerselection.mfa-webauthn.notes=WebAuthn je API, které spoléhající se straně, jako je webová služba, velmi usnadňuje integraci silné autentizace do aplikací pomocí podpory zabudované do všech předních prohlížečů a platforem. 
cas.mfa.providerselection.mfa-gauth=Google Authenticator
cas.mfa.providerselection.mfa-gauth.notes=Google Authenticator je softwarový autentizátor, který implementuje dvoufázové ověřovací služby pro ověřování uživatelů mobilních aplikací společností Google.
cas.mfa.providerselection.mfa-simple=CAS Multifaktorová autentizace
cas.mfa.providerselection.mfa-simple.notes=Umožněte CAS samostatně vystupovat jako poskytovatel vícefaktorové autentizace, vydávat tokeny a odesílat je koncovým uživatelům prostřednictvím předdefinovaných komunikačních kanálů, jako jsou e-maily nebo textové zprávy.
cas.mfa.providerselection.mfa-yubikey=YubiKey vícefaktorové ověřování
cas.mfa.providerselection.mfa-yubikey.notes=Yubico je cloudová služba, která umožňuje silné, snadno použitelné a cenově dostupné dvoufaktorové ověřování pomocí jednorázových hesel prostřednictvím jejich vlajkového produktu YubiKey. 
cas.mfa.duologin.pagetitle=Přihlášení zabezpečení Duo
cas.mfa.simple.contact-selection.title=Vyberte Kontaktní informace
cas.mfa.simple.contact-selection.description=Našli jsme několik způsobů, jak vás kontaktovat pro váš účet. Vyberte prosím účet (účty), na který chcete získat token vícefaktorové autentizace.
cas.mfa.simple.pagetitle=Přihlášení CAS Multifactor Authentication
cas.mfa.simple.label.token=Token:
cas.mfa.simple.label.resend=Odeslat znovu
cas.mfa.simple.label.tokensent=Vícefaktorový ověřovací token vám bude zaslán e-mailem nebo textovou zprávou. Chcete-li pokračovat, vyhledejte token a odešlete jej zde. Mějte na paměti, že platnost tokenu po krátké době vyprší a CAS jej již nebude rozpoznávat. V takovém případě můžete požádat CAS o zaslání nového tokenu.
cas.mfa.simple.label.contactfailed.sms=CAS nemůže použít vybrané kontaktní informace k odeslání SMS s vícefaktorovým autentizačním tokenem. Zkontrolujte prosím své kontaktní údaje a požádejte o pomoc svého správce CAS.
cas.mfa.simple.label.contactfailed.email=CAS nemůže použít vybrané kontaktní informace k odeslání e-mailu s tokenem vícefaktorové autentizace. Zkontrolujte prosím své kontaktní údaje a požádejte o pomoc svého správce CAS.
cas.mfa.simple.token.failed=Tento pokus o vícefaktorové ověření nelze přijmout. Poskytnutý token je neplatný.
cas.mfa.simple.registration.title=Registrace účtu
cas.mfa.simple.registration.description=Váš účet není registrován pro vícefaktorové ověřování, i když je způsobilý a vyžadován aplikací, ke které se pokoušíte získat přístup. Prosím <a href="https://account.example.org/mfa">zaregistrujte svůj účet</a> pro vícefaktorovou autentizaci a zajistěte, aby CAS měl přístup k vašim kontaktním informacím, jako je e-mailová adresa, telefon atd.
cas.mfa.simple.registration.email.failed=Nelze zaregistrovat váš účet pro vícefaktorové ověřování. CAS nedokáže rozpoznat a přijmout vaši e-mailovou adresu, aby vám poslala e-mail s registračním odkazem. Zkontrolujte prosím své kontaktní údaje a požádejte o pomoc svého správce CAS.
cas.mfa.simple.registration.email.sent=Byl vám zaslán e-mail s registračním tokenem. Zkontrolujte prosím svou doručenou poštu a kód poskytovatele zde.
cas.mfa.simple.registration.token.failed=Nelze zaregistrovat váš účet pro vícefaktorové ověřování. Poskytnutý token je neplatný, vypršela jeho platnost nebo byl jinak ohrožen. Zkontrolujte token a zkuste to znovu.
cas.mfa.twilio.pagetitle=Vícefaktorové ověřování Twilio
cas.mfa.twilio.label.token=Token:
cas.mfa.twilio.label.tokensent=Je vám zaslán vícefaktorový ověřovací token. Chcete-li pokračovat, vyhledejte token a odešlete jej zde.
cas.mfa.googleauth.pagetitle=Google Authenticator
cas.mfa.googleauth.label.token=Token:
cas.mfa.radius.pagetitle=Ověření rádiusu
screen.authentication.yubikey.reganotherdevice=Můžete také zaregistrovat další zařízení pro vícefaktorové ověřování.
screen.authentication.yubikey.name=Název zařízení:
cas.mfa.yubikey.pagetitle=Ověření YubiKey
cas.mfa.yubikey.authenticate=K ověření použijte své registrované zařízení YubiKey.
cas.mfa.yubikey.register=Vaše zařízení ještě není zaregistrováno. Pomocí níže uvedeného formuláře zaregistrujte své zařízení do CAS.
cas.mfa.yubikey.register.fail=Nelze zaregistrovat vaše zařízení YubiKey pro ověření. Poskytnutý token může být neplatný, vypršela jeho platnost nebo může být jinak ohrožen.
cas.mfa.yubikey.label.token=Token:
cas.mfa.webauthn.auth.fail=Nelze ověřit vaše zařízení pro ověření. Poskytnuté užitečné zatížení může být neplatné, může vypršet nebo jinak ohroženo.
cas.mfa.webauthn.register.helptext=Přiřaďte svému zařízení s podporou FIDO2 přátelský název a poté jej zaregistrujte u CAS pro vícefaktorové ověřování. Po úspěšném dokončení registrace zařízení budete automaticky přesměrováni na další krok k přihlášení pomocí vašeho zařízení.
cas.mfa.webauthn.register.wait=Vaše zařízení s podporou FIDO2 je nyní registrováno u CAS. Čekejte prosím…
cas.mfa.webauthn.register.discoverablecredentials=Zařízení můžete také zaregistrovat pomocí <i>Zjistitelné přihlašovací údaje / rezidentní klíče</i>. To znamená, že soukromý klíč a přidružená metadata jsou uložena v trvalé paměti ověřovače a nikoli na serveru CAS.
cas.mfa.registerdevice.label.title=Zaregistrujte zařízení
cas.mfa.registerdevice.label.intro=Pojmenujte prosím aktuální zařízení.
cas.mfa.registerdevice.pagetitle=Zaregistrujte zařízení
cas.mfa.registerdevice.label.name=Jméno
cas.mfa.registerdevice.label.duration=Jak dlouho si máme toto zařízení pamatovat?
cas.mfa.registerdevice.label.expiration=Vypršení platnosti
cas.mfa.registerdevice.button.register=Zaregistrujte se
cas.mfa.registerdevice.button.skip=Přeskočit
cas.mfa.registerdevice.options.timeunit.forever=navždy
passwordless.token.header=Poskytněte token
passwordless.token.description=Uveďte prosím bezpečnostní token, který vám byl zaslán e-mailem, telefonem atd. Upozorňujeme, že token je platný pouze po krátkou dobu a po odeslání budou všechny ostatní tokeny zneplatněny a odstraněny.
passwordless.error.failure.title=Selhání ověření
passwordless.error.failure.description=Poskytnutý token se nepodařilo ověřit. Může být zrušena, odstraněna nebo vypršela její platnost.
passwordless.error.unknown.user=Zadané uživatelské jméno nemůže CAS rozpoznat a najít.
passwordless.error.invalid.user=Zadané uživatelské jméno nenese dostatek kontaktních informací.
passwordless.getuser.header=Autentizace bez hesla
passwordless.getuser.description=Zadejte prosím své uživatelské jméno, abyste svůj účet našli. Jakmile bude váš účet ověřen, CAS za vás vybere vhodnou autentizační strategii.
passwordless.selection.header=Výběr autentizace
passwordless.selection.description=Pokračujte výběrem jedné z níže uvedených možností ověření.
passwordless.selection.password.header=Heslo
passwordless.selection.password.description=Můžete se ověřit pomocí svého hesla. Pokud je váš účet způsobilý, můžete být také požádáni o dokončení postupu vícefaktorového ověření.
passwordless.selection.token.header=Token
passwordless.selection.token.description=Jednorázový token platný po omezenou dobu obdržíte e-mailem nebo SMS od CAS a budete požádáni o zadání kódu zpět, abyste mohli pokračovat.
passwordless.selection.mfa.header=Vícefaktorové
passwordless.selection.mfa.description=Budete přímo přesměrováni na tok vícefaktorové autentizace. Jakmile dokončíte krok ověření, tok se automaticky obnoví.
passwordless.selection.delegation.header=Externí
passwordless.selection.delegation.description=Budete odesláni k externímu poskytovateli identity, abyste se přihlásili. Jakmile dokončíte tok ověřování s externím poskytovatelem identity, budete automaticky přesměrováni zpět do CAS, abyste mohli pokračovat.
cas.authn.qr.fail=Nelze přijmout požadavek na ověření na základě QR kódu. Ujistěte se, že je QR kód správně naskenován a za předpokladu, že jsou platné přihlašovací údaje vydané tímto serverem CAS a jejichž platnost nevypršela.
