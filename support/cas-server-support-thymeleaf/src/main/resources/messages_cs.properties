screen.service.required.message=Pokusili jste se o ověření bez určení cílové aplikace. Zkontrolujte prosím žádost a zkuste to znovu.
screen.service.initial.message=Pokus o přístup k CAS nebo k uvedené cílové aplikaci je v tuto chvíli zakázán. Zásady ověřování vyžadují, abyste změnili svou spouštěcí aplikaci a poté přešli na jiné aplikace a služby.
