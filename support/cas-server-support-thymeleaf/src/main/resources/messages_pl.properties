screen.authentication.gauth.blocked.title=Zablokowana próba uwierzytelnienia wieloskładnikowego
screen.authentication.gauth.blocked.desc=Twoja próba uwierzytelnienia wielopoziomowego została zablokowana. Liczba nieudanych prób uwierzytelnienia przekroczyła maksymalny dozwolony próg. Uruchom ponownie próbę uwierzytelnienia, a jeśli problem będzie się powtarzał, skontaktuj się z administratorem CAS w celu uzyskania pomocy.
screen.welcome.button.register-residentkey=Zarejestruj urządzenie z wykrywalnymi poświadczeniami
screen.authentication.webauthn.confirm.title=Potwierdź rejestrację konta
screen.authentication.webauthn.confirm.desc=Rozpocznij proces rejestracji urządzenia, przypisując przyjazną nazwę swojemu urządzeniu obsługującemu FIDO2.
screen.authentication.webauthn.name=Nazwa urządzenia
screen.authentication.webauthn.login.title=Zaloguj się za pomocą urządzenia obsługującego FIDO2
screen.authentication.webauthn.login.desc=Aby się zalogować, użyj zarejestrowanego urządzenia obsługującego FIDO2. Aby pomyślnie wykonać tę czynność, Twoja nazwa użytkownika i urządzenie muszą być już zarejestrowane w CAS.
screen.authentication.webauthn.authn.fail.title=Uwierzytelnianie nie powiodło się
screen.authentication.webauthn.authn.fail.desc=Próba uwierzytelnienia nie powiodła się. Upewnij się, że Twoja nazwa użytkownika i wybrane urządzenie są zarejestrowane w CAS. Sprawdź dzienniki serwera CAS, aby określić główną przyczynę błędu. 
screen.authentication.webauthn.qr.success.title=Pomyślne uwierzytelnienie
screen.authentication.webauthn.qr.success.desc=Pomyślnie dokonałeś uwierzytelnienia na swoim urządzeniu obsługującym FIDO2. CAS automatycznie rozpozna teraz Twoją próbę uwierzytelnienia i przejdzie do następnego kroku. Możesz zamknąć to okno i powrócić do pierwotnego ekranu.
screen.authentication.webauthn.qr.fail.title=Uwierzytelnianie nie powiodło się
screen.authentication.webauthn.qr.fail.desc=Próba uwierzytelnienia nie powiodła się. Upewnij się, że Twoja nazwa użytkownika i wybrane urządzenie są zarejestrowane w CAS i sprawdź logi serwera CAS, aby określić pierwotną przyczynę błędu. Przyszłe próby uwierzytelnienia będą blokowane. Nie odświeżaj okna i zamiast tego rozważ ponowne uruchomienie procesu uwierzytelniania.
screen.authentication.webauthn.qr.info=Jeśli nie masz przy sobie urządzenia obsługującego FIDO lub to urządzenie nie jest zarejestrowane w CAS, możesz zeskanować poniższy kod QR i uwierzytelnić się przy użyciu innego urządzenia (mobilnego). Po pomyślnym uwierzytelnieniu automatycznie przejdziesz do następnego kroku.
