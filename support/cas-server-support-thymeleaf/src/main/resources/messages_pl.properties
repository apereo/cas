cas.mfa.providerselection.optional.description=Uwierzytelnianie wielopoziomowe jest skonfigurowane jako opcjonalne i możesz kontynuować bez wybierania dostawcy.
cas.mfa.providerselection.mfa-duo=Bezpieczeństwo duetu
cas.mfa.providerselection.mfa-duo.notes=Różnorodne metody uwierzytelniania Duo umożliwiają każdemu użytkownikowi bezpieczne i szybkie logowanie. Duo Push, wysyłany przez aplikację uwierzytelniającą Duo Mobile, pozwala użytkownikom zatwierdzać powiadomienia push w celu weryfikacji ich tożsamości.
cas.mfa.providerselection.mfa-webauthn=Autoryzacja internetowa FIDO2
cas.mfa.providerselection.mfa-webauthn.notes=WebAuthn to interfejs API, który bardzo ułatwia stronie ufającej, takiej jak usługa internetowa, integrację silnego uwierzytelniania z aplikacjami przy użyciu obsługi wbudowanej we wszystkich wiodących przeglądarkach i platformach. 
cas.mfa.providerselection.mfa-gauth=Autoryzator Google
cas.mfa.providerselection.mfa-gauth.notes=Google Authenticator to programowy uwierzytelniacz, który implementuje usługi weryfikacji dwuetapowej w celu uwierzytelniania użytkowników aplikacji mobilnych przez Google.
cas.mfa.providerselection.mfa-simple=Uwierzytelnianie wieloczynnikowe CAS
cas.mfa.providerselection.mfa-simple.notes=Pozwól CAS działać samodzielnie jako dostawca uwierzytelniania wielopoziomowego, wydając tokeny i wysyłając je do użytkowników końcowych za pośrednictwem wcześniej zdefiniowanych kanałów komunikacji, takich jak e-mail lub wiadomości tekstowe.
cas.mfa.providerselection.mfa-yubikey=Uwierzytelnianie wieloczynnikowe YubiKey
cas.mfa.providerselection.mfa-yubikey.notes=Yubico to usługa oparta na chmurze, która umożliwia silne, łatwe w użyciu i niedrogie uwierzytelnianie dwuskładnikowe za pomocą jednorazowych haseł za pośrednictwem ich flagowego produktu YubiKey. 
cas.mfa.duologin.pagetitle=Logowanie zabezpieczające Duo
cas.mfa.simple.contact-selection.title=Wybierz Informacje kontaktowe
cas.mfa.simple.contact-selection.description=Znaleźliśmy wiele sposobów skontaktowania się z Tobą w sprawie Twojego konta. Wybierz konto(a), na które chcesz otrzymać token uwierzytelniania wieloczynnikowego.
cas.mfa.simple.pagetitle=Logowanie z uwierzytelnianiem wieloskładnikowym CAS
cas.mfa.simple.label.token=Token:
cas.mfa.simple.label.resend=Wyślij ponownie
cas.mfa.simple.label.tokensent=Token uwierzytelniania wieloskładnikowego jest wysyłany do Ciebie e-mailem lub SMS-em. Znajdź token i prześlij go tutaj, aby kontynuować. Pamiętaj, że token wygaśnie po krótkim czasie i nie będzie już rozpoznawany przez CAS. W takim przypadku możesz poprosić CAS o przesłanie Ci nowego tokena.
cas.mfa.simple.label.contactfailed.sms=CAS nie może użyć wybranych danych kontaktowych, aby wysłać Ci wiadomość SMS z tokenem uwierzytelniania wielopoziomowego. Przejrzyj swoje dane kontaktowe i skontaktuj się z administratorem CAS w celu uzyskania pomocy.
cas.mfa.simple.label.contactfailed.email=CAS nie może użyć wybranych danych kontaktowych do wysłania Ci wiadomości e-mail z tokenem uwierzytelniania wielopoziomowego. Przejrzyj swoje dane kontaktowe i skontaktuj się z administratorem CAS w celu uzyskania pomocy.
cas.mfa.simple.token.failed=Nie można zaakceptować tej próby uwierzytelnienia wielopoziomowego. Podany token jest nieprawidłowy.
cas.mfa.simple.registration.title=Rejestracja konta
cas.mfa.simple.registration.description=Twoje konto nie jest zarejestrowane w celu uwierzytelniania wielopoziomowego, mimo że spełnia wymagania i jest wymagane przez aplikację, do której próbujesz uzyskać dostęp. Proszę <a href="https://account.example.org/mfa">zarejestruj swoje konto</a> do uwierzytelniania wielopoziomowego i upewnij się, że CAS ma dostęp do Twoich danych kontaktowych, takich jak adres e-mail, telefon itp.
cas.mfa.simple.registration.email.failed=Nie można zarejestrować Twojego konta w celu uwierzytelniania wielopoziomowego. CAS nie jest w stanie rozpoznać i zaakceptować Twojego adresu e-mail, aby wysłać Ci wiadomość e-mail z linkiem rejestracyjnym. Przejrzyj swoje dane kontaktowe i skontaktuj się z administratorem CAS w celu uzyskania pomocy.
cas.mfa.simple.registration.email.sent=Wiadomość e-mail z tokenem rejestracyjnym została wysłana do Ciebie. Sprawdź swoją skrzynkę odbiorczą i podaj kod tutaj.
cas.mfa.simple.registration.token.failed=Nie można zarejestrować Twojego konta w celu uwierzytelniania wielopoziomowego. Podany token jest nieprawidłowy, wygasł lub w inny sposób naruszony. Sprawdź token i spróbuj ponownie.
cas.mfa.twilio.pagetitle=Uwierzytelnianie wieloskładnikowe Twilio
cas.mfa.twilio.label.token=Token:
cas.mfa.twilio.label.tokensent=Do Ciebie zostanie wysłany token uwierzytelniania wieloskładnikowego. Znajdź token i prześlij go tutaj, aby kontynuować.
cas.mfa.googleauth.pagetitle=Autoryzator Google
