cas.screen.acct.label.username=Nazwa użytkownika
cas.screen.acct.title.username=Nazwa użytkownika, której chcesz używać przy próbach logowania.
cas.screen.acct.label.phone=Numer telefonu
cas.screen.acct.title.phone=To jest Twój numer telefonu, na który zostanie wysłany link aktywacyjny.
