cas.oauth.confirm.pagetitle=Zatwierdź dostęp
screen.oauth.confirm.processing=Pomyślnie przetworzyliśmy Twoją poprzednią decyzję o zgodzie, aby umożliwić aplikacji klienckiej otrzymanie żądanych zakresów. Nie jest wymagane żadne działanie z Twojej strony. Jeśli wymagane będą dodatkowe dane, zostaniesz poproszony o wyrażenie zgody i ponowne zatwierdzenie żądania. <p>Na razie proszę poczekać, przekierujemy Cię do aplikacji...
cas.oauth.device.confirm.header=Podłącz urządzenie
cas.oauth.device.confirm.message=Aby kontynuować, wpisz kod wyświetlony na urządzeniu.
cas.oauth.device.confirmed.header=Kod zatwierdzony
cas.oauth.device.confirmed.message=Wróć do urządzenia, aby kontynuować.
screen.oauth.confirm.scopes=Zakresy
