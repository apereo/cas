authenticationFailure.InvalidLoginLocationException=Nie możesz zalogować się z tej stacji roboczej.
authenticationFailure.UniquePrincipalRequiredException=W tej chwili nie możesz się zalogować, ponieważ trwa inna aktywna sesja pojedynczego logowania, a CAS jest skonfigurowany z polityką uwierzytelniania, która zapobiega wielu jednoczesnym sesjom pojedynczego logowania.
authenticationFailure.InvalidLoginTimeException=Na Twoje konto nie można się w tej chwili zalogować.
authenticationFailure.AccountNotFoundException=Twoje konto nie zostało rozpoznane i w tej chwili nie można się zalogować.
authenticationFailure.FailedLoginException=Próba uwierzytelnienia nie powiodła się, prawdopodobnie z powodu nieprawidłowych poświadczeń. Sprawdź i spróbuj ponownie.
authenticationFailure.MultifactorAuthenticationProviderAbsentException=Nie można spełnić wymagań dotyczących uwierzytelniania wielopoziomowego. Twoje konto jest skonfigurowane pod kątem strategii uwierzytelniania wieloskładnikowego, jednak CAS nie jest w stanie zlokalizować i wykonać tej strategii, najprawdopodobniej z powodu błędnej konfiguracji serwera. Skontaktuj się z administratorami usługi, aby uzyskać pomoc.
authenticationFailure.SurrogateAuthenticationException=W tej chwili nie masz uprawnień do podszywania się pod wskazanego użytkownika.
authenticationFailure.AccountPasswordMustChangeException=Hasło do Twojego konta wygasło i należy je zmienić.
authenticationFailure.UnauthorizedServiceForPrincipalException=Odmowa dostępu do usługi z powodu braku uprawnień.
authenticationFailure.MultifactorAuthenticationRequiredException=Próba uwierzytelnienia Twojego konta została odrzucona, ponieważ Twoje konto nie zostało jeszcze skonfigurowane do uwierzytelniania wielopoziomowego. Skontaktuj się z administratorami usługi, aby uzyskać pomoc, upewnij się, że Twoje konto jest zarejestrowane i kwalifikuje się do uwierzytelniania wielopoziomowego, a następnie spróbuj ponownie.
authenticationFailure.MultifactorAuthenticationFailedException=Próba uwierzytelnienia wieloskładnikowego nie powiodła się, prawdopodobnie z powodu nieprawidłowych poświadczeń uwierzytelniania wieloskładnikowego. Sprawdź i spróbuj ponownie.
authenticationFailure.RiskyAuthenticationException=CAS nie może kontynuować procesu uwierzytelniania, prawdopodobnie dlatego, że próba uwierzytelnienia została uznana za ryzykowną i podejrzaną, a wynik ryzyka przekracza akceptowany próg. Może się zdarzyć, że Twoja próba uwierzytelnienia zostanie zablokowana, ponieważ korzystasz z nieznanej przeglądarki internetowej lub logujesz się z nieznanej lokalizacji. Aby uzyskać dodatkowe informacje i wskazówki, skontaktuj się z administratorem i/lub działem pomocy.
authenticationFailure.UNKNOWN=Próba uwierzytelnienia nie powiodła się.
authenticationFailure.AuthenticationException=Poświadczenia zostały odrzucone/nieprawidłowe, a próba uwierzytelnienia nie powiodła się.
INVALID_REQUEST_PROXY=Żądanie jest nieprawidłowo sformatowane. Upewnij się, że wszystkie wymagane parametry są prawidłowo zakodowane i uwzględnione.
INVALID_TICKET_SPEC=Specyfikacja walidacji biletu nie powiodła się. Możliwe błędy mogą obejmować próbę sprawdzenia poprawności biletu proxy za pomocą modułu sprawdzania biletu usługi lub niezastosowanie się do żądania „renew=true”.
INVALID_REQUEST=Nie można zidentyfikować, autoryzować ani ukończyć tego żądania, prawdopodobnie z powodu nieprawidłowego formatu lub braku wymaganych parametrów.
INVALID_AUTHENTICATION_CONTEXT=Żądanie sprawdzenia poprawności dla [''{0}„”] nie może zostać spełnione. Żądanie jest nierozpoznane lub niespełnione.
INVALID_TICKET=Bilet „”{0}'' nie rozpoznano
INVALID_PROXY_GRANTING_TICKET=PGT już wygenerowany dla tego ST. Nie można przyznać więcej niż jednego PGT dla ST
INVALID_SERVICE=Bilet „”{0}„” nie odpowiada oferowanej usłudze. Oryginalna usługa brzmiała „”{1}'' a świadczona usługa była ''{2}''.
INVALID_PROXY_CALLBACK=Podany adres URL wywołania zwrotnego proxy „”{0}Nie można uwierzytelnić. Albo „”{0}„” jest nieosiągalny lub nie jest dozwolone uwierzytelnianie proxy.
UNAUTHORIZED_SERVICE_PROXY=Świadczona usługa ''{0}„” nie jest upoważniony do korzystania z uwierzytelniania proxy CAS.
UNSATISFIED_AUTHN_POLICY=Odmowa dostępu do usługi z powodu niezadowalającej polityki uwierzytelniania.
INVALID_AUTHN_REQUEST=Próba uwierzytelnienia nie powiodła się, prawdopodobnie z powodu nieprawidłowych poświadczeń.
BLOCKED_AUTHN_REQUEST=Próba uwierzytelnienia została zablokowana i nie może być kontynuowana, prawdopodobnie z powodu nieprawidłowego formatu lub braku wymaganych parametrów. Sprawdź dzienniki serwera CAS, aby zlokalizować główną przyczynę błędu.
UNSATISFIED_SAML_REQUEST=Żądanie uwierzytelnienia SAML nie może zostać zrozumiane, zaakceptowane ani zatwierdzone przez CAS, prawdopodobnie z powodu nieprawidłowego sformułowania lub braku wymaganych parametrów. Sprawdź logi serwera CAS, aby zlokalizować główną przyczynę błędu.
MISSING_SAML_REQUEST=Nie można określić żądania uwierzytelnienia SAML2 na podstawie magazynu sesji CAS. Zwykle oznacza to, że pierwotnego żądania uwierzytelnienia SAML2, które zostało przesłane do CAS za pośrednictwem dostawcy usługi SAML2, nie można odzyskać ani przywrócić po próbie uwierzytelnienia, prawdopodobnie dlatego, że bazowy magazyn sesji albo na siłę usunął żądanie uwierzytelnienia, albo stwierdził, że śledzone żądanie wygasło i jest nieaktualne, wykraczające poza to, na co pozwala polityka wygasania magazynu sesji. Sprawdź logi serwera CAS, aby zlokalizować główną przyczynę błędu.
screen.service.error.header=Aplikacja nie jest autoryzowana do korzystania z CAS
screen.service.error.redirect=Nie masz uprawnień dostępu do tej aplikacji. Prosimy o cierpliwość, gdyż zaraz nastąpi przekierowanie <strong>{0}</strong> aby dowiedzieć się więcej o tym scenariuszu.
service.principal.resolution.error=CAS nie jest w stanie określić prawidłowego podmiotu uwierzytelniania. Albo podmiot główny nie mógł zostać poprawnie rozpoznany jako pojedyncza, unikalna jednostka, albo CAS znalazł mieszanych/wielu kandydatów na podmioty zabezpieczeń i nie jest w stanie zdecydować, którego należy użyć. Ten błąd może również wystąpić, jeśli uwierzytelniony podmiot zabezpieczeń nie ma dostępu do aplikacji docelowej z powodu brakujących uprawnień ustawionych przez zasady autoryzacji serwera CAS.
service.not.authorized.missing.attr=Nie masz uprawnień dostępu do aplikacji, ponieważ na Twoim koncie brakuje uprawnień wymaganych przez serwer CAS w celu uwierzytelnienia w tej usłudze. Proszę powiadomić swoje biuro wsparcia.
screen.service.error.message=Aplikacja, w której próbowałeś się uwierzytelnić, nie jest autoryzowana do korzystania z CAS. Zwykle oznacza to, że aplikacja nie jest zarejestrowana w CAS lub jej zasady autoryzacji określone w rekordzie rejestracji uniemożliwiają jej wykorzystanie funkcjonalności CAS, lub jest zniekształcona i nierozpoznana przez CAS. Skontaktuj się z administratorem CAS, aby dowiedzieć się, jak zarejestrować i zintegrować swoją aplikację z CAS.
screen.service.empty.error.message=Rejestr usług CAS jest pusty i nie zawiera definicji usług. Aplikacje, które chcą uwierzytelniać się w CAS, muszą być wyraźnie zdefiniowane w rejestrze usług.
screen.service.expired.message=Aplikacja, w której próbowałeś się uwierzytelnić, wygasła w rejestrze usług CAS. Jeśli ta usługa nadal będzie używana, skontaktuj się z administratorami usługi, aby odnowić aplikację.
