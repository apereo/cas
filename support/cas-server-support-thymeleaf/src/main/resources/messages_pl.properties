cas.oauth.error.pagetitle=Błąd OAuth
cas.oauth.error.header=Błąd autoryzacji OAuth
OAUTH_BAD_SESSION_REQUEST=Nie można ukończyć żądania OAuth, ponieważ CAS nie jest w stanie zlokalizować ani określić adresu URL przekierowania OAuth. Zazwyczaj jest to oznaką nieaktualnego lub niedopasowanego żądania, w przypadku którego identyfikator sesji przetworzonego żądania różni się od identyfikatora sesji aktywnej i może być spowodowane operacją całkowitego wylogowania. Wyczyść pliki cookie i historię, uruchom ponownie przeglądarkę i spróbuj ponownie.
screen.oidc.confirm.ciba.header=Żądanie uwierzytelnienia kanału zwrotnego
screen.oidc.confirm.ciba.confirmed=Żądanie uwierzytelnienia kanału zwrotnego zostało teraz potwierdzone. Nie odświeżaj tego okna. Zamiast tego zamknij to okno przeglądarki i sprawdź, czy na urządzeniu znajdują się dalsze instrukcje.
screen.oidc.confirm.ciba.failed=Nie można potwierdzić żądania uwierzytelnienia kanału zwrotnego. Sprawdź logi serwera i skontaktuj się z administratorem CAS, aby uzyskać więcej informacji.
OIDC_CIBA_BAD_REQUEST=Żądanie uwierzytelnienia kanału zwrotnego nie powiodło się.
screen.oidc.confirm.bindingmessage.header=Wiążąca wiadomość
screen.oidc.confirm.bindingmessage.description=Czytelny dla człowieka identyfikator lub komunikat, który ma być wyświetlany zarówno na urządzeniu konsumpcyjnym, jak i na urządzeniu uwierzytelniającym, w celu powiązania ich ze sobą na potrzeby transakcji w drodze wizualnej wskazówki dla użytkownika końcowego. Ten komunikat blokujący umożliwia użytkownikowi końcowemu upewnienie się, że działanie podjęte na urządzeniu uwierzytelniającym jest powiązane z żądaniem zainicjowanym przez urządzenie konsumujące.
screen.oidc.confirm.usercode.header=Kod użytkownika
screen.oidc.confirm.usercode.description=Tajny kod, taki jak hasło lub PIN, znany tylko użytkownikowi, ale możliwy do zweryfikowania przez CAS. Kod służy do autoryzacji wysłania żądania uwierzytelnienia do urządzenia uwierzytelniającego użytkownika.
screen.oidc.confirm.infourl=Dowiedz się więcej o {0}.
screen.oidc.confirm.privacyurl=Dowiedz się o {0} zasady prywatności.
screen.oidc.confirm.scopes=Zakresy
screen.oidc.confirm.claims=Roszczenia
screen.oidc.confirm.scope.profile=Wymaga to dostępu do roszczeń profilowych z wyłączeniem roszczeń dotyczących adresu i adresu e-mail.
screen.oidc.confirm.scope.email=To wymaga dostępu do roszczeń e-mailowych.
screen.oidc.confirm.scope.address=To żąda dostępu do roszczeń adresowych.
screen.oidc.confirm.scope.openid=Oznacza to żądanie autoryzacji OpenID Connect.
screen.oidc.confirm.scope.phone=To wymaga dostępu do roszczeń telefonicznych.
screen.oidc.confirm.scope.offline_access=To żąda dostępu do tokena odświeżania używanego do dostępu offline.
screen.oidc.confirm.claim.name=Imię i nazwisko Użytkownika końcowego w możliwej do wyświetlenia formie, łącznie ze wszystkimi częściami nazwy, ewentualnie łącznie z tytułami i przyrostkami, uporządkowane zgodnie z lokalizacją i preferencjami Użytkownika końcowego.
screen.oidc.confirm.claim.given_name=Imię(imiona) lub imię(imiona) Użytkownika Końcowego. Należy pamiętać, że w niektórych kulturach ludzie mogą mieć wiele imion; wszystkie mogą być obecne, a nazwy oddzielane są spacjami.
screen.oidc.confirm.claim.middle_name=Drugie imię(imiona) Użytkownika końcowego. Należy pamiętać, że w niektórych kulturach ludzie mogą mieć wiele drugich imion; wszystkie mogą być obecne, a nazwy oddzielane są spacjami. Należy również pamiętać, że w niektórych kulturach nie używa się drugich imion.
screen.oidc.confirm.claim.family_name=Nazwisko(-a) lub nazwisko(-a) Użytkownika końcowego. Należy pamiętać, że w niektórych kulturach ludzie mogą mieć wiele nazwisk lub nie mieć żadnego nazwiska; wszystkie mogą być obecne, a nazwy oddzielane są spacjami.
screen.oidc.confirm.claim.email=Preferowany adres e-mail Użytkownika końcowego.
screen.oidc.confirm.claim.preferred_username=MOŻE to być dowolny prawidłowy ciąg JSON, w tym znaki specjalne, takie jak @, / lub białe znaki. RP NIE MOŻE polegać na unikalności tej wartości.
screen.oidc.confirm.claim.profile=Adres URL strony profilowej Użytkownika końcowego. Treść tej strony internetowej POWINNA dotyczyć Użytkownika końcowego.
screen.oidc.confirm.claim.picture=Adres URL zdjęcia profilowego Użytkownika końcowego. Ten adres URL MUSI odnosić się do pliku obrazu (na przykład pliku obrazu PNG, JPEG lub GIF), a nie do strony internetowej zawierającej obraz. Należy pamiętać, że ten adres URL POWINIEN w szczególności odnosić się do zdjęcia profilowego Użytkownika końcowego, które można wyświetlić podczas opisywania Użytkownika końcowego, a nie do dowolnego zdjęcia zrobionego przez Użytkownika końcowego.
screen.oidc.confirm.claim.phone_number=Preferowany numer telefonu Użytkownika końcowego. Jest ZALECANY jako format tego roszczenia. Na przykład <code>+1 (425) 555-1212</code> lub <code>+56 (2) 687 2400</code>.
screen.oidc.confirm.asksinfo=Klient prosi o następujące informacje:
screen.oidc.confirm.dynamic=Ten klient został dynamicznie zarejestrowany pod adresem <code>{0}</code>.
screen.oidc.issuer.invalid=Adres URL wydawcy jest nieprawidłowy i nie pasuje do adresu URL wydawcy serwera CAS.
screen.samlidp.error.title=Błąd dostawcy tożsamości SAML2
screen.samlidp.error.description=Usługa, do której próbujesz się zalogować, wykryła problem z Twoim profilem lub żądaniem. Aby uzyskać pomoc, skontaktuj się z działem pomocy technicznej IT.
screen.unavailable.header=Błąd CASa
screen.unavailable.heading=CAS nie może przetworzyć tego żądania: „{0}:{1}"
screen.unavailable.message=Wystąpił błąd podczas próby realizacji Twojego żądania. <strong>Powiadom swój dział wsparcia lub spróbuj ponownie.</strong> <p><div>Apereo to fundacja non-profit zajmująca się zarządzaniem oprogramowaniem typu open source. Oprogramowanie CAS jest projektem sponsorowanym przez Apereo i można je bezpłatnie pobrać i używać przez każdego. Jednak Apereo nie obsługuje systemów nikogo korzystającego z oprogramowania i w większości przypadków nawet nie wie, kto z niego korzysta i jak się z nim skontaktować, chyba że jest on aktywną częścią społeczności Apereo.<br/></br>Jeśli masz problemy z zalogowaniem się za pomocą CAS, <strong>w celu uzyskania pomocy będziesz musiał skontaktować się z personelem IT lub działem pomocy technicznej swojej organizacji</strong>. <br/><br/>Chcielibyśmy móc być dla Ciebie bardziej bezpośrednio pomocni.</div>
screen.mfaDenied.header=Ministerstwo Spraw Zagranicznych odrzucone
screen.mfaDenied.heading=Próba MFA została odrzucona przez dostawcę
screen.mfaDenied.message=Dostawca usługi MFA odrzucił Twoją próbę uwierzytelnienia drugiego stopnia. Skontaktuj się z administratorem systemu, aby uzyskać pomoc w przywróceniu konta.
screen.mfaUnavailable.header=Dostawca usługi MFA jest niedostępny
screen.mfaUnavailable.heading=Dostawca usługi MFA jest niedostępny
screen.mfaUnavailable.message=CAS nie mógł w tej chwili skontaktować się ze skonfigurowanym dostawcą usługi MFA. Ze względu na zasady niepowodzeń skonfigurowane dla usługi, do której próbujesz uzyskać dostęp, w tej chwili nie można udzielić uwierzytelnienia.
