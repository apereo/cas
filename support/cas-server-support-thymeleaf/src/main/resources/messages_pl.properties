screen.authentication.yubikey.reganotherdevice=Możesz także zarejestrować inne urządzenie, które będzie używane do uwierzytelniania wielopoziomowego.
screen.authentication.yubikey.name=Nazwa urządzenia:
cas.mfa.yubikey.pagetitle=Uwierzytelnianie YubiKey
cas.mfa.yubikey.authenticate=Do uwierzytelnienia użyj zarejestrowanych urządzeń YubiKey.
cas.mfa.yubikey.register=Twoje urządzenie nie jest jeszcze zarejestrowane. Skorzystaj z poniższego formularza, aby zarejestrować swoje urządzenie w CAS.
cas.mfa.yubikey.register.fail=Nie można zarejestrować urządzenia YubiKey w celu uwierzytelnienia. Dostarczony token może być nieprawidłowy, wygasnąć lub w inny sposób naruszony.
cas.mfa.yubikey.label.token=Token:
cas.mfa.webauthn.auth.fail=Nie można zweryfikować urządzenia w celu uwierzytelnienia. Dostarczone ładunki mogą być nieprawidłowe, wygasłe lub w inny sposób zagrożone.
cas.mfa.webauthn.register.helptext=Przypisz przyjazną nazwę do urządzenia obsługującego FIDO2, a następnie zarejestruj je w CAS w celu uwierzytelnienia wieloczynnikowego. Po pomyślnym zakończeniu rejestracji urządzenia zostaniesz automatycznie przekierowany do kolejnego kroku logowania na swoim urządzeniu.
cas.mfa.webauthn.register.wait=Twoje urządzenie obsługujące FIDO2 jest teraz zarejestrowane w CAS. Proszę czekać…
cas.mfa.webauthn.register.discoverablecredentials=Możesz także zarejestrować swoje urządzenie za pomocą <i>Wykrywalne poświadczenia/klucze rezydentne</i>. Oznacza to, że klucz prywatny i powiązane z nim metadane są przechowywane w pamięci trwałej na urządzeniu uwierzytelniającym, a nie na serwerze CAS.
cas.mfa.registerdevice.label.title=Zarejestruj urządzenie
cas.mfa.registerdevice.label.intro=Podaj nazwę bieżącego urządzenia.
cas.mfa.registerdevice.pagetitle=Zarejestruj urządzenie
cas.mfa.registerdevice.label.name=Imię
cas.mfa.registerdevice.label.duration=Jak długo powinniśmy pamiętać to urządzenie?
cas.mfa.registerdevice.label.expiration=Wygaśnięcie
cas.mfa.registerdevice.button.register=Zarejestruj się
cas.mfa.registerdevice.button.skip=Pomiń
cas.mfa.registerdevice.options.timeunit.forever=Na zawsze
passwordless.token.header=Podaj token
passwordless.token.description=Proszę podać token bezpieczeństwa przesłany do Ciebie e-mailem, telefonicznie itp. Pamiętaj, że token jest ważny tylko przez krótki okres, a po przesłaniu wszystkie inne tokeny zostaną unieważnione i usunięte.
passwordless.error.failure.title=Błąd uwierzytelnienia
passwordless.error.failure.description=Nie można zweryfikować podanego tokena. Mogło zostać unieważnione, usunięte lub wygasło.
passwordless.error.unknown.user=Podana nazwa użytkownika nie może zostać rozpoznana i zlokalizowana przez CAS.
passwordless.error.invalid.user=Podana nazwa użytkownika nie zawiera wystarczających informacji kontaktowych.
passwordless.getuser.header=Uwierzytelnianie bez hasła
passwordless.getuser.description=Podaj swoją nazwę użytkownika, aby zlokalizować swoje konto. Po zweryfikowaniu Twojego konta CAS wybierze dla Ciebie odpowiednią strategię uwierzytelniania.
passwordless.selection.header=Wybór uwierzytelnienia
passwordless.selection.description=Aby kontynuować, wybierz jedną z opcji uwierzytelniania wymienionych poniżej.
passwordless.selection.password.header=Hasło
passwordless.selection.password.description=Możesz uwierzytelnić się za pomocą hasła. Możesz także zostać poproszony o ukończenie procesu uwierzytelniania wielopoziomowego, jeśli Twoje konto się kwalifikuje.
passwordless.selection.token.header=Żeton
passwordless.selection.token.description=Otrzymasz jednorazowy token, ważny przez ograniczony czas, e-mailem lub SMS-em od CAS i zostaniesz poproszony o ponowne wprowadzenie kodu, aby kontynuować.
passwordless.selection.mfa.header=Wieloczynnikowy
passwordless.selection.mfa.description=Nastąpi bezpośrednie przekierowanie do procesu uwierzytelniania wielopoziomowego. Po zakończeniu etapu uwierzytelniania przepływ zostanie automatycznie wznowiony.
passwordless.selection.delegation.header=Zewnętrzne
passwordless.selection.delegation.description=Zostaniesz wysłany do zewnętrznego dostawcy tożsamości, aby się zalogować. Po zakończeniu procesu uwierzytelniania u zewnętrznego dostawcy tożsamości zostaniesz automatycznie przekierowany z powrotem do CAS, aby kontynuować.
cas.authn.qr.fail=Nie można zaakceptować żądania uwierzytelnienia na podstawie kodu QR. Upewnij się, że kod QR został poprawnie zeskanowany, a podane dane uwierzytelniające są ważne, wydane przez ten serwer CAS i nie wygasły.
cas.inwebo.checkresult.title=Sprawdzanie uwierzytelnienia Inwebo
cas.inwebo.checkresult.heading=Oczekiwanie na zatwierdzenie powiadomienia Inwebo:
cas.inwebo.checkresult.message=Sprawdź poprawność na swoim telefonie/komputerze…
cas.inwebo.error.title=Błąd uwierzytelnienia Inwebo
cas.inwebo.error.heading=Wystąpił błąd.
cas.inwebo.error.userrefusedortoolate=Odmówiłeś uwierzytelnienia lub nie zweryfikowałeś go wystarczająco szybko.
cas.inwebo.error.usernotregistered=Przed jakimkolwiek logowaniem musisz się zarejestrować w Inwebo. Sprawdź swoją skrzynkę pocztową, aby śledzić proces rejestracji lub wpisz poniżej kody aktywacyjne i PIN, aby zarejestrować się w przeglądarce…
cas.inwebo.selectauthent.title=Wybierz uwierzytelnianie
