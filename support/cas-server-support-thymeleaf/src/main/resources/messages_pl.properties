screen.surrogates.wildcard.description=Twoje konto jest wewnętrznie uznawane przez CAS za posiadające specjalne uprawnienia, uprawnione do podszywania się pod wszystkich użytkowników i konta. W związku z tym wybór konta personifikacji nie jest dozwolony w przypadku Twojego konta. Zamiast tego możesz bezpośrednio przystąpić do logowania i podszywać się pod dowolne inne konto, używając jego nazwy użytkownika.
