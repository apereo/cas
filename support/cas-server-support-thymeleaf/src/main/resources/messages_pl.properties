cas.screen.acct.title=Rejestracja konta
cas.screen.acct.intro=Wypełnij poniższy formularz, aby zarejestrować nowe konto w CAS. Po przesłaniu formularza otrzymasz wiadomość e-mail z linkiem aktywacyjnym konta, który umożliwi aktywację konta, ustawienie hasła i rozpoczęcie korzystania z CAS.
cas.screen.acct.infosent=Instrukcje aktywacji konta zostały pomyślnie wysłane. Sprawdź swoją pocztę e-mail itp. i postępuj zgodnie z instrukcjami.
cas.screen.acct.intro.complete=Witamy ponownie! Dziękujemy za zweryfikowanie konta. Wypełnij poniższy formularz, aby zarejestrować nowe konto w CAS. 
cas.screen.acct.intro.completed=Dziękuję! Twoje konto jest teraz aktywowane i zarejestrowane w CAS.
cas.screen.acct.button.submit=Prześlij
cas.screen.acct.button.cancel=Anuluj
cas.screen.acct.button.update=Aktualizacja
cas.screen.acct.error.provision=Nie można udostępnić żądanego konta.
cas.screen.acct.error.fail=Nie można zarejestrować żądanego konta lub wysłać linku aktywacyjnego do konta.
cas.screen.acct.error.invalid-value=Brakuje podanej wartości, jest ona nieprawidłowa lub nie pasuje do wymaganego wzorca dla typu danych wejściowych.
cas.screen.acct.label.email=Adres e-mail
cas.screen.acct.title.email=To jest Twój główny adres e-mail, na który zostanie wysłany link aktywacyjny.
