screen.success.success=Ty, <strong>{0}</strong>, pomyślnie zalogowałeś się do Centralnej Usługi Uwierzytelniania. Jednakże widzisz tę stronę, ponieważ CAS nie wie o Twoim docelowym miejscu docelowym ani o tym, jak Cię tam dotrzeć. Sprawdź ponownie żądanie uwierzytelnienia i upewnij się, że określono docelową usługę/aplikację, która jest autoryzowana i zarejestrowana w CAS.
screen.success.security=Kiedy już skończysz, proszę, ze względów bezpieczeństwa <a href="logout">wyloguj się</a> i zamknij przeglądarkę internetową.
screen.logout.confirm.header=Czy ty, <strong>{0}</strong>, chcesz się całkowicie wylogować?
screen.logout.confirm.header.anonymous=Czy chcesz się całkowicie wylogować?
screen.logout.confirm.text=<p>Aplikacja mogła przekierować Cię do Centralnej Usługi Uwierzytelniania, aby całkowicie Cię wylogować i zniszczyć sesję pojedynczego logowania. Jeśli zdecydujesz się wylogować, zostaniesz ponownie poproszony o podanie danych uwierzytelniających i ponowne zalogowanie się przy próbie uzyskania dostępu do aplikacji.</p>
screen.logout.confirm.proceed=Czy chcesz kontynuować?
screen.logout.header=Wylogowanie powiodło się
screen.logout.success=Pomyślnie wylogowałeś się z Centralnej Usługi Uwierzytelniania. Możesz <a href="{0}">zaloguj się</a> ponownie.
screen.logout.fc.success=Pomyślnie wylogowałeś się z Centralnej Usługi Uwierzytelniania. Biorąc pod uwagę, że w CAS włączono opcję pojedynczego wylogowania, poniższa lista aplikacji jest dostępna <strong> tylko powiadomiony</strong> aby Cię wylogować i zniszczyć Twoją sesję użytkownika. Pamiętaj, że to tylko powiadomienie, a nie gwarancja. To od samej aplikacji zależy, czy będzie honorować te powiadomienia i odpowiednio podejmować działania mające na celu wylogowanie Cię.
screen.logout.security=Ze względów bezpieczeństwa zamknij przeglądarkę internetową.
screen.logout.pending=Oczekująca prośba o wylogowanie…
screen.service.wildcard.message=Aplikacja ta nie posiada dedykowanego wpisu rejestracyjnego w rejestrze usług CAS. Jest to autoryzowane i dozwolone przez firmę CAS, ponieważ w rejestrze usług CAS istnieje wpis definicji usługi ze znakiem wieloznacznym, który umożliwia i akceptuje żądania uwierzytelnienia z nieznanych aplikacji, takich jak ta. <p/>Ze względu na najlepszą praktykę w zakresie bezpieczeństwa zdecydowanie zaleca się ograniczenie możliwości zarządzania usługami do <strong>zawierać tylko listę znanych aplikacji</strong> które są wyraźnie upoważnione do korzystania z CAS. Pozostawienie interfejsu zarządzania otwartego dla wszystkich aplikacji może stworzyć okazję do ataków bezpieczeństwa i utrudni audyt wymagań aplikacji i potrzeb atrybutów.
screen.service.sso.error.header=Aby uzyskać dostęp do tej usługi, wymagane jest ponowne uwierzytelnienie
screen.service.sso.error.message=Próbowano uzyskać dostęp do usługi wymagającej uwierzytelnienia bez ponownego uwierzytelniania.  Spróbuj ponownie uwierzytelnić</a>.
screen.service.required.message=Podjęto próbę uwierzytelnienia bez określenia aplikacji docelowej. Proszę ponownie sprawdzić żądanie i spróbować ponownie.
screen.service.initial.message=Próba uzyskania dostępu do CAS lub wskazanej aplikacji docelowej jest obecnie zabroniona. Polityka uwierzytelniania wymaga zmiany aplikacji początkowej, a następnie przejścia do innych aplikacji i usług.
