cas.mfa.providerselection.optional.header=Autenticação multifator opcional
cas.mfa.providerselection.optional.description=A autenticação multifator está configurada como opcional e você pode prosseguir sem escolher um provedor para continuar.
cas.mfa.providerselection.mfa-duo=Segurança Dupla
cas.mfa.providerselection.mfa-duo.notes=A ampla variedade de métodos de autenticação do Duo permite que cada usuário faça login com segurança e rapidez. O Duo Push, enviado pelo aplicativo de autenticação Duo Mobile, permite que os usuários aprovem notificações push para verificar sua identidade.
cas.mfa.providerselection.mfa-webauthn=FIDO2 WebAuthn
cas.mfa.providerselection.mfa-webauthn.notes=WebAuthn é uma API que torna muito fácil para uma parte confiável, como um serviço web, integrar autenticação forte em aplicativos usando suporte integrado a todos os principais navegadores e plataformas. 
cas.mfa.providerselection.mfa-gauth=Autenticador Google
cas.mfa.providerselection.mfa-gauth.notes=Google Authenticator é um autenticador baseado em software que implementa serviços de verificação em duas etapas para autenticar usuários de aplicativos móveis do Google.
cas.mfa.providerselection.mfa-simple=Autenticação multifator CAS
cas.mfa.providerselection.mfa-simple.notes=Permita que o CAS atue como um provedor de autenticação multifatorial por conta própria, emitindo tokens e enviando-os aos usuários finais por meio de canais de comunicação predefinidos, como e-mail ou mensagens de texto.
cas.mfa.providerselection.mfa-yubikey=Autenticação multifator YubiKey
cas.mfa.providerselection.mfa-yubikey.notes=Yubico é um serviço baseado em nuvem que permite autenticação de dois fatores forte, fácil de usar e acessível com senhas de uso único por meio de seu principal produto, YubiKey. 
cas.mfa.duologin.pagetitle=Login de segurança Duo
cas.mfa.simple.contact-selection.title=Selecione informações de contato
cas.mfa.simple.contact-selection.description=Encontramos várias maneiras de entrar em contato com você para sua conta. Escolha a(s) conta(s) onde você gostaria de receber o token de autenticação multifator.
cas.mfa.simple.pagetitle=Login de autenticação multifator CAS
cas.mfa.simple.label.token=Símbolo:
cas.mfa.simple.label.resend=Reenviar
cas.mfa.simple.label.tokensent=Um token de autenticação multifator é enviado a você por e-mail ou mensagem de texto. Localize o token e envie-o aqui para continuar. Observe que o token expirará após um curto período de tempo e não será mais reconhecido pelo CAS; nesse caso, você poderá solicitar ao CAS que lhe envie um novo token.
cas.mfa.simple.label.contactfailed.sms=O CAS não consegue usar as informações de contato selecionadas para enviar um SMS com o token de autenticação multifator. Revise suas informações de contato e entre em contato com o administrador do CAS para obter assistência.
cas.mfa.simple.label.contactfailed.email=O CAS não pode usar as informações de contato selecionadas para enviar um email com o token de autenticação multifator. Revise suas informações de contato e entre em contato com o administrador do CAS para obter assistência.
cas.mfa.simple.token.failed=Não foi possível aceitar esta tentativa de autenticação multifator. O token fornecido é inválido.
cas.mfa.simple.registration.title=Registro de conta
cas.mfa.simple.registration.description=Sua conta não está registrada para autenticação multifator, embora ela seja qualificada e exigida pelo aplicativo que você está tentando acessar. Por favor <a href="https://account.example.org/mfa">cadastre sua conta</a> para autenticação multifator e garantir que o CAS tenha acesso às suas informações de contato, como endereço de e-mail, telefone, etc.
cas.mfa.simple.registration.email.failed=Não foi possível registrar sua conta para autenticação multifator. O CAS não consegue reconhecer e aceitar seu endereço de e-mail para enviar um e-mail com o link de registro. Revise suas informações de contato e entre em contato com o administrador do CAS para obter assistência.
cas.mfa.simple.registration.email.sent=Um e-mail com o token de registro foi enviado para você. Verifique sua caixa de entrada e forneça o código aqui.
cas.mfa.simple.registration.token.failed=Não foi possível registrar sua conta para autenticação multifator. O token fornecido é inválido, expirou ou está comprometido de outra forma. Revise o token e tente novamente.
