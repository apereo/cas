authenticationFailure.AccountPasswordMustChangeException=A senha da sua conta expirou e deve ser alterada.
authenticationFailure.UnauthorizedServiceForPrincipalException=Acesso ao serviço negado devido à falta de privilégios.
authenticationFailure.MultifactorAuthenticationRequiredException=A tentativa de autenticação da sua conta foi negada porque sua conta ainda não está configurada para passar pela autenticação multifator. Entre em contato com os administradores do serviço para obter assistência, certifique-se de que sua conta esteja inscrita e qualificada para autenticação multifator e tente novamente.
authenticationFailure.MultifactorAuthenticationFailedException=A tentativa de autenticação multifator falhou, provavelmente devido a credenciais de autenticação multifator inválidas. Verifique e tente novamente.
authenticationFailure.RiskyAuthenticationException=O CAS não consegue prosseguir com o fluxo de autenticação, provavelmente porque esta tentativa de autenticação foi considerada arriscada e suspeita, com uma pontuação de risco suficientemente alta acima do limite aceito. Pode ser que sua tentativa de autenticação esteja bloqueada porque você está usando um navegador desconhecido ou fazendo login em um local desconhecido. Para obter informações e orientações adicionais, entre em contato com seu administrador e/ou suporte técnico.
authenticationFailure.UNKNOWN=A tentativa de autenticação falhou.
authenticationFailure.AuthenticationException=As credenciais foram rejeitadas/inválidas e a tentativa de autenticação falhou.
INVALID_REQUEST_PROXY=A solicitação está formatada incorretamente. Certifique-se de que todos os parâmetros necessários estejam devidamente codificados e incluídos.
INVALID_TICKET_SPEC=Especificação de validação de ticket com falha. Possíveis erros podem incluir a tentativa de validar um ticket de proxy por meio de um validador de ticket de serviço ou o não cumprimento da solicitação `renew=true`.
INVALID_REQUEST=Não foi possível identificar, autorizar ou concluir esta solicitação, provavelmente devido a parâmetros obrigatórios mal formados ou ausentes.
INVALID_AUTHENTICATION_CONTEXT=A solicitação de validação para [''{0}''] não pode ser satisfeito. A solicitação não foi reconhecida ou não foi atendida.
INVALID_TICKET=Bilhete ''{0}''não reconhecido
INVALID_PROXY_GRANTING_TICKET=PGT já gerado para este ST. Não é possível conceder mais de um PGT para ST
INVALID_SERVICE=Bilhete ''{0}'' não corresponde ao serviço fornecido. O serviço original era ''{1}'' e o serviço prestado foi ''{2}''.
INVALID_PROXY_CALLBACK=O URL de retorno de chamada do proxy fornecido ''{0}'' não pôde ser autenticado. Ou ''{0}'' não pode ser alcançado ou não é permitido exercer autenticação de proxy.
UNAUTHORIZED_SERVICE_PROXY=O serviço fornecido ''{0}'' não está autorizado a usar autenticação de proxy CAS.
UNSATISFIED_AUTHN_POLICY=Acesso ao serviço negado devido a uma política de autenticação não satisfeita.
INVALID_AUTHN_REQUEST=A tentativa de autenticação falhou, provavelmente devido a credenciais inválidas.
BLOCKED_AUTHN_REQUEST=A tentativa de autenticação está bloqueada e não pode prosseguir, provavelmente devido a parâmetros obrigatórios mal formados ou ausentes. Examine os logs do servidor CAS para localizar a causa raiz do erro.
UNSATISFIED_SAML_REQUEST=A solicitação de autenticação SAML não pode ser compreendida, aceita ou validada pelo CAS, provavelmente devido a parâmetros obrigatórios mal formados ou ausentes. Examine os logs do servidor CAS para localizar a causa raiz do erro.
MISSING_SAML_REQUEST=A solicitação de autenticação SAML2 não pode ser determinada no armazenamento de sessões CAS. Isso normalmente significa que a solicitação de autenticação SAML2 original que foi enviada ao CAS por meio de um provedor de serviços SAML2 não pode ser recuperada e restaurada após uma tentativa de autenticação, provavelmente porque o armazenamento de sessão subjacente removeu a solicitação de autenticação à força ou determinou que a solicitação rastreada estava expirada e obsoleta, além do permitido pela política de expiração do armazenamento de sessão. Examine os logs do servidor CAS para localizar a causa raiz do erro.
screen.service.error.header=Aplicativo não autorizado para usar CAS
