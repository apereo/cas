passwordless.token.header=Fornecer token
passwordless.token.description=Forneça o token de segurança enviado a você por e-mail, telefone, etc. Observe que o token é válido apenas por um breve período e, após o envio, todos os outros tokens serão invalidados e removidos.
passwordless.error.failure.title=Falha de autenticação
passwordless.error.failure.description=O token fornecido não pôde ser verificado. Pode ter sido invalidado, removido ou expirado.
passwordless.error.unknown.user=O nome de usuário fornecido não pode ser reconhecido e localizado pelo CAS.
passwordless.error.invalid.user=O nome de usuário fornecido não contém informações de contato suficientes.
passwordless.getuser.header=Autenticação sem senha
passwordless.getuser.description=Forneça seu nome de usuário para localizar sua conta. Assim que sua conta for verificada, o CAS escolherá a estratégia de autenticação apropriada para você.
passwordless.selection.header=Seleção de autenticação
passwordless.selection.description=Selecione uma das opções de autenticação listadas abaixo para continuar.
passwordless.selection.password.header=Senha
passwordless.selection.password.description=Você pode autenticar usando sua senha. Você também poderá ser solicitado a concluir um fluxo de autenticação multifator se sua conta for elegível.
passwordless.selection.token.header=Símbolo
passwordless.selection.token.description=Você receberá um token único, válido por um período limitado de tempo, por e-mail ou SMS do CAS e será solicitado que você insira o código novamente para prosseguir.
passwordless.selection.mfa.header=Multifator
passwordless.selection.mfa.description=Você será direcionado diretamente para um fluxo de autenticação multifator. Depois de concluir a etapa de autenticação, o fluxo será retomado automaticamente.
passwordless.selection.delegation.header=Externo
passwordless.selection.delegation.description=Você será enviado a um provedor de identidade externo para fazer login. Depois de concluir o fluxo de autenticação com o provedor de identidade externo, você será automaticamente encaminhado de volta ao CAS para continuar.
cas.authn.qr.fail=Não foi possível aceitar a solicitação de autenticação com base no código QR. Certifique-se de que o código QR foi digitalizado corretamente e que as credenciais fornecidas são válidas, emitidas por este servidor CAS e não expiraram.
