cas.mfa.webauthn.auth.fail=Não foi possível verificar a autenticação do seu dispositivo. As cargas fornecidas podem ser inválidas, expiradas ou comprometidas de outra forma.
cas.mfa.webauthn.register.helptext=Atribua um nome amigável ao seu dispositivo habilitado para FIDO2 e registre-o no CAS para autenticação multifator. Assim que o registro do dispositivo for concluído com sucesso, você será automaticamente redirecionado para a próxima etapa para fazer login no seu dispositivo.
cas.mfa.webauthn.register.wait=Seu dispositivo habilitado para FIDO2 agora está registrado no CAS. Por favor, espere…
cas.mfa.webauthn.register.discoverablecredentials=Você também pode registrar seu dispositivo usando <i>Credenciais detectáveis/chaves residentes</i>. Isto significa que a chave privada e os metadados associados são armazenados na memória persistente no autenticador e não no servidor CAS.
