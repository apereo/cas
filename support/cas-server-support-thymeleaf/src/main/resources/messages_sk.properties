cas.oauth.confirm.pagetitle=Schválenie prístupu
screen.oauth.confirm.processing=Úspešne sme spracovali vaše predchádzajúce rozhodnutie o súhlase, aby sme klientskej aplikácii umožnili získať požadované rozsahy. Z vašej strany sa nevyžaduje žiadna akcia. Ak budú požadované dodatočné údaje, budete vyzvaní na súhlas a opätovné schválenie žiadosti. <p>Zatiaľ počkajte, kým vás presmerujeme do aplikácie...
cas.oauth.device.confirm.header=Pripojte zariadenie
cas.oauth.device.confirm.message=Ak chcete pokračovať, zadajte kód zobrazený na vašom zariadení.
cas.oauth.device.confirmed.header=Kód schválený
cas.oauth.device.confirmed.message=Ak chcete pokračovať, vráťte sa do zariadenia.
