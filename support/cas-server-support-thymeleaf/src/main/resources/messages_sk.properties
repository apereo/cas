cas.mfa.providerselection.optional.header=Voliteľná viacfaktorová autentifikácia
cas.mfa.providerselection.optional.description=Viacfaktorové overenie je nakonfigurované ako voliteľné a môžete pokračovať bez výberu poskytovateľa.
cas.mfa.providerselection.mfa-duo=Bezpečnosť Duo
cas.mfa.providerselection.mfa-duo.notes=Široká škála metód autentifikácie Duo umožňuje každému používateľovi sa bezpečne a rýchlo prihlásiť. Duo Push, odosielaný autentifikačnou aplikáciou Duo Mobile, umožňuje používateľom schvaľovať push notifikácie na overenie ich identity.
cas.mfa.providerselection.mfa-webauthn=FIDO2 WebAuthn
cas.mfa.providerselection.mfa-webauthn.notes=WebAuthn je API, vďaka ktorému je pre závislú stranu, ako je webová služba, veľmi jednoduché integrovať silnú autentifikáciu do aplikácií pomocou podpory zabudovanej vo všetkých popredných prehliadačoch a platformách. 
cas.mfa.providerselection.mfa-gauth=Google Authenticator
cas.mfa.providerselection.mfa-gauth.notes=Google Authenticator je softvérový autentifikátor, ktorý implementuje dvojstupňové overovacie služby na overovanie používateľov mobilných aplikácií spoločnosťou Google.
cas.mfa.providerselection.mfa-simple=CAS Multifaktorová autentifikácia
cas.mfa.providerselection.mfa-simple.notes=Umožnite CAS samostatne vystupovať ako poskytovateľ viacfaktorovej autentifikácie, vydávať tokeny a odosielať ich koncovým používateľom prostredníctvom vopred definovaných komunikačných kanálov, ako sú e-maily alebo textové správy.
cas.mfa.providerselection.mfa-yubikey=YubiKey Multifaktorová autentifikácia
cas.mfa.providerselection.mfa-yubikey.notes=Yubico je cloudová služba, ktorá umožňuje silnú, ľahko použiteľnú a cenovo dostupnú dvojfaktorovú autentifikáciu s jednorazovými heslami prostredníctvom ich vlajkového produktu YubiKey. 
cas.mfa.duologin.pagetitle=Bezpečnostné prihlásenie Duo
cas.mfa.simple.contact-selection.title=Vyberte Kontaktné informácie
cas.mfa.simple.contact-selection.description=Našli sme viacero spôsobov, ako vás kontaktovať pre váš účet. Vyberte si účet (účty), na ktorý by ste chceli získať token viacfaktorovej autentifikácie.
cas.mfa.simple.pagetitle=Prihlásenie na viacfaktorovú autentifikáciu CAS
cas.mfa.simple.label.token=Token:
cas.mfa.simple.label.resend=Znova odoslať
cas.mfa.simple.label.tokensent=Viacfaktorový autentifikačný token vám bude odoslaný prostredníctvom e-mailu alebo textovej správy. Ak chcete pokračovať, nájdite token a odošlite ho tu. Upozorňujeme, že platnosť tokenu po krátkom čase vyprší a CAS ho už nerozpozná. V takom prípade môžete požiadať CAS, aby vám poslal nový token.
cas.mfa.simple.label.contactfailed.sms=CAS nemôže použiť vybraté kontaktné informácie na odoslanie SMS s multifaktorovým overovacím tokenom. Skontrolujte svoje kontaktné informácie a požiadajte o pomoc svojho správcu CAS.
cas.mfa.simple.label.contactfailed.email=CAS nemôže použiť vybraté kontaktné informácie na odoslanie e-mailu s tokenom viacfaktorovej autentifikácie. Skontrolujte svoje kontaktné informácie a požiadajte o pomoc svojho správcu CAS.
cas.mfa.simple.token.failed=Tento pokus o viacfaktorové overenie nie je možné prijať. Poskytnutý token je neplatný.
cas.mfa.simple.registration.title=Registrácia účtu
cas.mfa.simple.registration.description=Váš účet nie je zaregistrovaný na viacfaktorovú autentifikáciu, aj keď je vhodný a vyžadovaný aplikáciou, ku ktorej sa pokúšate dostať. Prosím <a href="https://account.example.org/mfa">zaregistrujte svoj účet</a> pre viacfaktorovú autentifikáciu a uistite sa, že CAS má prístup k vašim kontaktným informáciám, ako je e-mailová adresa, telefón atď.
cas.mfa.simple.registration.email.failed=Nie je možné zaregistrovať váš účet na viacfaktorové overenie. CAS nedokáže rozpoznať a prijať vašu e-mailovú adresu, aby vám poslala e-mail s odkazom na registráciu. Skontrolujte svoje kontaktné informácie a požiadajte o pomoc svojho správcu CAS.
cas.mfa.simple.registration.email.sent=Bol vám odoslaný e-mail s registračným tokenom. Skontrolujte svoju doručenú poštu a kód poskytovateľa tu.
cas.mfa.simple.registration.token.failed=Nie je možné zaregistrovať váš účet na viacfaktorové overenie. Poskytnutý token je neplatný, jeho platnosť vypršala alebo je inak ohrozený. Skontrolujte token a skúste to znova.
cas.mfa.twilio.pagetitle=Viacfaktorové overenie Twilio
cas.mfa.twilio.label.token=Token:
cas.mfa.twilio.label.tokensent=Odošle sa vám token viacfaktorovej autentifikácie. Ak chcete pokračovať, nájdite token a odošlite ho tu.
cas.mfa.googleauth.pagetitle=Google Authenticator
cas.mfa.googleauth.label.token=Token:
cas.mfa.radius.pagetitle=Autentifikácia polomeru
screen.authentication.yubikey.reganotherdevice=Môžete tiež zaregistrovať ďalšie zariadenie na viacfaktorovú autentifikáciu.
screen.authentication.yubikey.name=Názov zariadenia:
cas.mfa.yubikey.pagetitle=Autentifikácia YubiKey
cas.mfa.yubikey.authenticate=Na overenie použite svoje zaregistrované zariadenia YubiKey.
cas.mfa.yubikey.register=Vaše zariadenie ešte nie je zaregistrované. Pomocou nižšie uvedeného formulára zaregistrujte svoje zariadenie v CAS.
cas.mfa.yubikey.register.fail=Nie je možné zaregistrovať vaše zariadenie YubiKey na overenie. Poskytnutý token môže byť neplatný, môže vypršať jeho platnosť alebo môže byť inak ohrozený.
cas.mfa.yubikey.label.token=Token:
cas.mfa.webauthn.auth.fail=Nepodarilo sa overiť vaše zariadenie na overenie. Poskytnuté užitočné zaťaženie môže byť neplatné, môže vypršať jeho platnosť alebo môže byť inak ohrozené.
cas.mfa.webauthn.register.helptext=Priraďte svojmu zariadeniu s podporou FIDO2 priateľský názov a potom ho zaregistrujte v CAS pre viacfaktorovú autentifikáciu. Po úspešnom dokončení registrácie zariadenia budete automaticky presmerovaní na ďalší krok na prihlásenie pomocou svojho zariadenia.
cas.mfa.webauthn.register.wait=Vaše zariadenie s podporou FIDO2 je teraz zaregistrované v CAS. Čakajte prosím…
cas.mfa.webauthn.register.discoverablecredentials=Svoje zariadenie môžete zaregistrovať aj pomocou <i>Zistiteľné poverenia / Rezidentné kľúče</i>. To znamená, že súkromný kľúč a súvisiace metadáta sú uložené v trvalej pamäti na autentifikátore a nie na serveri CAS.
cas.mfa.registerdevice.label.title=Zaregistrujte zariadenie
cas.mfa.registerdevice.label.intro=Pomenujte aktuálne zariadenie.
