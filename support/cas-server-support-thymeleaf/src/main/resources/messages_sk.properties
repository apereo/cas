screen.surrogates.wildcard.description=Váš účet je interne uznaný CAS ako účet so špeciálnymi povoleniami, ktorý je oprávnený vydávať sa za všetkých používateľov a účty. Preto nie je pre váš účet povolený výber účtu na odcudzenie identity. Namiesto toho sa môžete priamo prihlásiť a vydávať sa za iný účet pomocou jeho používateľského mena.
screen.browserstorage.failure.title=Nie je možné prejsť na ďalší krok.
screen.browserstorage.failure.message=Storage API pravdepodobne nie je podporované alebo dostupné vo vašom prehliadači. Mechanizmus úložiska musí byť nakonfigurovaný tak, aby namiesto toho používal úložisko na strane servera. Požiadajte o pomoc personál IT vašej organizácie.
