cas.screen.acct.title=Registrácia účtu
cas.screen.acct.intro=Vyplňte nižšie uvedený formulár a zaregistrujte si svoj nový účet v CAS. Po odoslaní formulára dostanete e-mail s odkazom na aktiváciu účtu, aby ste mohli aktivovať svoj účet, nastaviť heslo a začať používať CAS.
cas.screen.acct.infosent=Pokyny na aktiváciu účtu boli úspešne odoslané. Skontrolujte svoj e-mail atď. a postupujte podľa pokynov.
cas.screen.acct.intro.complete=Vitajte späť! Ďakujeme za overenie účtu. Vyplňte nižšie uvedený formulár a zaregistrujte si svoj nový účet v CAS. 
