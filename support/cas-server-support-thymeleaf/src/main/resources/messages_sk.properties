screen.logout.confirm.header=vy, <strong>{0}</strong>, chcete sa úplne odhlásiť?
screen.logout.confirm.header.anonymous=Chcete sa úplne odhlásiť?
screen.logout.confirm.text=<p>Aplikácia vás mohla presmerovať na centrálnu autentifikačnú službu, aby vás úplne odhlásila a zničila vašu reláciu jediného prihlásenia. Ak sa rozhodnete odhlásiť, po pokuse o prístup k aplikácii budete znova požiadaní o zadanie prihlasovacích údajov a opätovné prihlásenie.</p>
screen.logout.confirm.proceed=Chcete pokračovať?
screen.logout.header=Odhlásenie bolo úspešné
screen.logout.success=Úspešne ste sa odhlásili zo služby centrálnej autentifikácie. Môžete <a href="{0}">prihláste sa</a> znova.
screen.logout.fc.success=Úspešne ste sa odhlásili zo služby centrálnej autentifikácie. Vzhľadom na to, že je v CAS povolené jediné odhlásenie, je uvedený nasledujúci zoznam aplikácií <strong> iba oznámené</strong> aby ste sa odhlásili a zničili vašu používateľskú reláciu. Pamätajte, že toto je len upozornenie, nie záruka. Je na samotnej aplikácii, aby rešpektovala tieto upozornenia a správne vykonala kroky na vaše odhlásenie.
screen.logout.security=Z bezpečnostných dôvodov ukončite webový prehliadač.
screen.logout.pending=Čaká sa na žiadosť o odhlásenie…
screen.service.wildcard.message=Táto aplikácia nemá vyhradenú registračnú položku v registri služieb CAS. Je autorizovaný a povolený CAS, pretože v registri služieb CAS existuje položka definície služby so zástupným znakom, ktorá povoľuje a prijíma požiadavky na autentifikáciu od neznámych aplikácií, ako je táto. <p/>Ako najlepší bezpečnostný postup sa dôrazne odporúča obmedziť zariadenie na správu služieb na <strong>obsahovať iba zoznam známych aplikácií</strong> ktoré sú výslovne oprávnené používať CAS. Ponechanie rozhrania správy otvorené pre všetky aplikácie môže vytvoriť príležitosť pre bezpečnostné útoky a sťaží audit požiadaviek aplikácií a potrieb atribútov.
screen.service.sso.error.header=Na prístup k tejto službe je potrebná opätovná autentifikácia
screen.service.sso.error.message=Pokúsili ste sa o prístup k službe, ktorá vyžaduje overenie bez opätovného overenia.  Skúste overenie znova</a>.
screen.service.required.message=Pokúsili ste sa o autentifikáciu bez zadania cieľovej aplikácie. Znova skontrolujte žiadosť a skúste to znova.
screen.service.initial.message=Pokus o prístup k CAS alebo označenej cieľovej aplikácii je momentálne zakázaný. Autentizačná politika vyžaduje, aby ste zmenili svoju počiatočnú aplikáciu a potom prešli na iné aplikácie a služby.
captchaError=Overenie reCAPTCHA zlyhalo.
username.required=Používateľské meno je povinné pole.
password.required=Heslo je povinné pole.
source.required=Autentifikačný zdroj je povinné pole.
confirmedPassword.required=Heslo musí byť potvrdené.
pm.passwordsMustMatch=Zadané heslá sa nezhodujú.
pm.passwordFailedCriteria=Zadané heslo nespĺňa zásady zabezpečenia hesla. Skúste to znova.
pm.updateFailure=Heslo účtu sa nepodarilo zmeniť. Skúste to znova.
authenticationFailure.AccountDisabledException=Tento účet bol deaktivovaný.
authenticationFailure.AccountLockedException=Tento účet bol uzamknutý.
authenticationFailure.AccountExpiredException=Platnosť tohto účtu vypršala a momentálne je zakázané sa prihlásiť.
authenticationFailure.CredentialExpiredException=Platnosť vášho hesla vypršala.
authenticationFailure.InvalidLoginLocationException=Z tejto pracovnej stanice sa nemôžete prihlásiť.
authenticationFailure.UniquePrincipalRequiredException=V tejto chvíli sa nemôžete prihlásiť, pretože prebieha ďalšia aktívna relácia jednotného prihlásenia a CAS je nakonfigurované s politikou autentifikácie, ktorá zabraňuje viacerým súbežným reláciám jednotného prihlásenia.
authenticationFailure.InvalidLoginTimeException=Váš účet má momentálne zakázané prihlásenie.
authenticationFailure.AccountNotFoundException=Váš účet nie je rozpoznaný a momentálne sa nemôžete prihlásiť.
authenticationFailure.FailedLoginException=Pokus o overenie zlyhal, pravdepodobne z dôvodu neplatných poverení. Prosím overte a skúste to znova.
authenticationFailure.MultifactorAuthenticationProviderAbsentException=Nie je možné splniť požiadavky na viacfaktorovú autentifikáciu. Váš účet je nakonfigurovaný na stratégiu viacfaktorovej autentifikácie, no CAS nedokáže nájsť a spustiť túto stratégiu s najväčšou pravdepodobnosťou z dôvodu nesprávnej konfigurácie servera. Požiadajte o pomoc správcov služieb.
authenticationFailure.SurrogateAuthenticationException=V súčasnosti nie ste oprávnený vydávať sa za uvedeného používateľa.
authenticationFailure.AccountPasswordMustChangeException=Platnosť hesla vášho účtu vypršala a je potrebné ho zmeniť.
authenticationFailure.UnauthorizedServiceForPrincipalException=Prístup k službe bol odmietnutý z dôvodu chýbajúcich privilégií.
authenticationFailure.MultifactorAuthenticationRequiredException=Pokus o overenie vášho účtu bol zamietnutý, pretože váš účet ešte nie je nakonfigurovaný na viacfaktorové overenie. Požiadajte o pomoc správcov služby, uistite sa, že váš účet je zaregistrovaný a vhodný na viacfaktorové overenie, a skúste to znova.
authenticationFailure.MultifactorAuthenticationFailedException=Pokus o viacfaktorové overenie zlyhal, pravdepodobne z dôvodu neplatných poverení na viacfaktorové overenie. Prosím overte a skúste to znova.
authenticationFailure.RiskyAuthenticationException=CAS nemôže pokračovať v autentifikačnom toku, pravdepodobne preto, že tento pokus o autentifikáciu je vyhodnotený ako riskantný a podozrivý s dostatočne vysokým skóre rizika nad akceptovaným prahom. Je možné, že váš pokus o overenie je zablokovaný, pretože používate neznámy webový prehliadač alebo sa prihlasujete z neznámeho miesta. Ak potrebujete ďalšie informácie a pokyny, obráťte sa na svojho správcu a/alebo oddelenie technickej podpory.
authenticationFailure.UNKNOWN=Pokus o overenie zlyhal.
authenticationFailure.AuthenticationException=Poverenia sú odmietnuté/neplatné a pokus o overenie zlyhal.
INVALID_REQUEST_PROXY=Žiadosť má nesprávny formát. Uistite sa, že všetky požadované parametre sú správne zakódované a zahrnuté.
INVALID_TICKET_SPEC=Vstupenka neprešla špecifikáciou overenia. Možné chyby môžu zahŕňať pokus o overenie proxy lístka prostredníctvom validátora servisného lístka alebo nevyhovenie požiadavke `renew=true`.
INVALID_REQUEST=Nie je možné identifikovať, autorizovať alebo dokončiť túto požiadavku, pravdepodobne z dôvodu nesprávneho tvaru alebo chýbajúcich požadovaných parametrov.
INVALID_AUTHENTICATION_CONTEXT=Žiadosť o overenie pre [''{0}''] nemožno uspokojiť. Žiadosť je buď nerozpoznaná alebo nesplnená.
INVALID_TICKET=lístok ''{0}''nerozpoznaný
INVALID_PROXY_GRANTING_TICKET=PGT už vygenerované pre tento ST. Nie je možné udeliť viac ako jeden PGT pre ST
INVALID_SERVICE=lístok ''{0}'' nezodpovedá dodanej službe. Pôvodná služba bola ''{1}'' a poskytnutá služba bola ''{2}''.
INVALID_PROXY_CALLBACK=Poskytnutá adresa URL spätného volania servera proxy „“{0}'' sa nepodarilo overiť. buď ''{0}'' nie je možné dosiahnuť alebo nie je povolené vykonávať autentifikáciu proxy.
UNAUTHORIZED_SERVICE_PROXY=Poskytovaná služba ''{0}„“ nemá oprávnenie používať autentifikáciu proxy servera CAS.
UNSATISFIED_AUTHN_POLICY=Prístup k službe bol odmietnutý z dôvodu neuspokojivých pravidiel overovania.
INVALID_AUTHN_REQUEST=Pokus o overenie zlyhal, pravdepodobne z dôvodu neplatných poverení.
BLOCKED_AUTHN_REQUEST=Pokus o overenie je zablokovaný a nemôže pokračovať, pravdepodobne z dôvodu nesprávneho tvaru alebo chýbajúcich požadovaných parametrov. Preskúmajte protokoly servera CAS a nájdite hlavnú príčinu chyby.
UNSATISFIED_SAML_REQUEST=Žiadosť o overenie SAML nemôže CAS pochopiť, akceptovať alebo overiť, pravdepodobne z dôvodu nesprávneho tvaru alebo chýbajúcich požadovaných parametrov. Skontrolujte denníky servera CAS, aby ste našli hlavnú príčinu chyby.
MISSING_SAML_REQUEST=Požiadavku na autentifikáciu SAML2 nemožno určiť z úložiska relácie CAS. Zvyčajne to znamená, že pôvodnú požiadavku na autentifikáciu SAML2, ktorá bola odoslaná do CAS prostredníctvom poskytovateľa služieb SAML2, nie je možné získať a obnoviť po pokuse o autentifikáciu pravdepodobne preto, že základný ukladací priestor relácií buď násilne odstránil žiadosť o autentifikáciu, alebo určil, že sledovaná žiadosť už vypršala a je zastaraná, nad rámec toho, čo politika uplynutia platnosti úložiska relácií povoľuje. Skontrolujte denníky servera CAS, aby ste našli hlavnú príčinu chyby.
screen.service.error.header=Aplikácia nie je oprávnená používať CAS
screen.service.error.redirect=Nemáte oprávnenie na prístup k tejto aplikácii. Buďte prosím trpezliví, pretože budete presmerovaní na <strong>{0}</strong> sa dozviete viac o tomto scenári.
service.principal.resolution.error=CAS nedokáže určiť správnu autorizáciu. Buď príkazca nemohol byť správne vyriešený ako jedna jedinečná entita, alebo CAS našiel zmiešaných/viacerých kandidátskych príkazcov a nevie sa rozhodnúť, ktorý by sa mal použiť. Táto chyba môže byť spôsobená aj vtedy, ak autentifikovaný principál nemá povolený prístup k cieľovej aplikácii kvôli chýbajúcim privilégiám nastaveným v politikách autorizácie servera CAS.
service.not.authorized.missing.attr=Nemáte oprávnenie na prístup k aplikácii, pretože vášmu účtu chýbajú privilégiá vyžadované serverom CAS na autentifikáciu do tejto služby. Oznámte to svojmu oddeleniu podpory.
screen.service.error.message=Aplikácia, pre ktorú ste sa pokúsili autentifikovať, nemá oprávnenie na používanie CAS. Zvyčajne to znamená, že aplikácia nie je registrovaná v CAS, alebo jej autorizačná politika definovaná v jej registračnom zázname jej bráni využívať funkcie CAS, alebo je chybná a nerozpoznaná CAS. Kontaktujte svojho správcu CAS, aby ste sa dozvedeli, ako môžete zaregistrovať a integrovať svoju aplikáciu s CAS.
screen.service.empty.error.message=Register služieb CAS je prázdny a nemá žiadne definície služieb. Aplikácie, ktoré sa chcú autentifikovať pomocou CAS, musia byť explicitne definované v registri služieb.
screen.service.expired.message=Platnosť aplikácie, ku ktorej ste sa pokúsili autentifikovať, vypršala v registri služieb CAS. Ak by sa táto služba mala naďalej používať, obráťte sa na správcov služby, aby aplikáciu obnovili.
