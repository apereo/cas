screen.authentication.webauthn.login.desc=Na prihlásenie použite svoje registrované zariadenie s podporou FIDO2. Ak chcete úspešne vykonať túto akciu, vaše používateľské meno a zariadenie už musia byť zaregistrované v CAS.
screen.authentication.webauthn.authn.fail.title=Autentifikácia zlyhala
screen.authentication.webauthn.authn.fail.desc=Pokus o overenie zlyhal. Uistite sa, že vaše používateľské meno a zvolené zariadenie sú registrované v CAS. Overte protokoly servera CAS, aby ste určili hlavnú príčinu chyby. 
screen.authentication.webauthn.qr.success.title=Úspešná autentifikácia
screen.authentication.webauthn.qr.success.desc=Teraz ste úspešne overili svoje zariadenie s podporou FIDO2. CAS teraz automaticky rozpozná váš pokus o overenie a prejde na ďalší krok. Toto okno môžete zavrieť a vrátiť sa na pôvodnú obrazovku.
screen.authentication.webauthn.qr.fail.title=Autentifikácia zlyhala
screen.authentication.webauthn.qr.fail.desc=Pokus o overenie zlyhal. Uistite sa, že vaše používateľské meno a vybrané zariadenie sú zaregistrované v CAS, a overte denníky servera CAS, aby ste určili hlavnú príčinu chyby. Budúce pokusy o overenie budú zablokované. Neobnovujte okno a namiesto toho zvážte reštartovanie procesu overovania.
screen.authentication.webauthn.qr.info=Ak pri sebe nemáte svoje zariadenie s podporou FIDO alebo toto zariadenie nie je zaregistrované v CAS, môžete naskenovať QR kód nižšie a overiť sa pomocou iného (mobilného) zariadenia. Po úspešnom overení automaticky prejdete na ďalší krok.
screen.oauth.confirm.header=Autorizácia
