passwordless.token.header=Poskytnite token
passwordless.token.description=Uveďte bezpečnostný token, ktorý vám bol zaslaný e-mailom, telefónom atď. Upozorňujeme, že token je platný len krátke obdobie a po odoslaní budú všetky ostatné tokeny znehodnotené a odstránené.
passwordless.error.failure.title=Zlyhanie overenia
passwordless.error.failure.description=Poskytnutý token nebolo možné overiť. Môže byť zrušená, odstránená alebo jej platnosť vypršala.
passwordless.error.unknown.user=Poskytnuté používateľské meno nemôže CAS rozpoznať a nájsť.
passwordless.error.invalid.user=Zadané používateľské meno neobsahuje dostatok kontaktných informácií.
passwordless.getuser.header=Autentifikácia bez hesla
passwordless.getuser.description=Ak chcete nájsť svoj účet, zadajte svoje používateľské meno. Po overení vášho účtu CAS vyberie vhodnú stratégiu overenia za vás.
passwordless.selection.header=Výber overenia
passwordless.selection.description=Ak chcete pokračovať, vyberte jednu z možností overenia uvedených nižšie.
passwordless.selection.password.header=heslo
passwordless.selection.password.description=Môžete sa overiť pomocou hesla. Ak je váš účet vhodný, môže sa od vás vyžadovať aj dokončenie postupu viacfaktorového overenia.
passwordless.selection.token.header=Token
passwordless.selection.token.description=Jednorazový token s obmedzenou platnosťou dostanete e-mailom alebo SMS od CAS a budete požiadaní o zadanie kódu späť, aby ste mohli pokračovať.
passwordless.selection.mfa.header=Viacfaktorové
passwordless.selection.mfa.description=Budete priamo presmerovaní na tok viacfaktorovej autentifikácie. Po dokončení overovacieho kroku sa tok automaticky obnoví.
passwordless.selection.delegation.header=Vonkajšie
passwordless.selection.delegation.description=Budete odoslaní externému poskytovateľovi identity, aby ste sa prihlásili. Po dokončení procesu overovania s externým poskytovateľom identity budete automaticky presmerovaní späť do CAS, aby ste mohli pokračovať.
cas.authn.qr.fail=Nie je možné prijať žiadosť o overenie na základe QR kódu. Uistite sa, že QR kód je správne naskenovaný a za predpokladu, že sú platné poverenia vydané týmto serverom CAS a ich platnosť ešte nevypršala.
