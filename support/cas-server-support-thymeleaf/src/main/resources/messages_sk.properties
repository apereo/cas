screen.oauth.confirm.scope.phone=To vyžaduje prístup k informáciám o telefóne.
cas.oauth.error.pagetitle=Chyba protokolu OAuth
cas.oauth.error.header=Chyba autorizácie OAuth
OAUTH_BAD_SESSION_REQUEST=Žiadosť OAuth nie je možné dokončiť, pretože CAS nedokáže nájsť ani určiť webovú adresu presmerovania OAuth. Toto je zvyčajne indikácia zastaranej alebo nezhodnej požiadavky, kde sa ID relácie spracovanej požiadavky líši od aktívnej relácie a môže byť spôsobené úplnou operáciou odhlásenia. Vymažte súbory cookie a históriu, reštartujte prehliadač a skúste to znova.
screen.oidc.confirm.ciba.header=Požiadavka na overenie spätného kanála
screen.oidc.confirm.ciba.confirmed=Požiadavka na overenie spätného kanála je teraz potvrdená. Toto okno neobnovujte. Namiesto toho zatvorte toto okno prehliadača a skontrolujte ďalšie pokyny na svojom zariadení.
screen.oidc.confirm.ciba.failed=Požiadavku na overenie spätného kanála nebolo možné potvrdiť. Skontrolujte protokoly servera a pre ďalšie informácie kontaktujte svojho správcu CAS.
OIDC_CIBA_BAD_REQUEST=Žiadosť o overenie spätného kanála zlyhala.
screen.oidc.confirm.bindingmessage.header=Záväzná správa
screen.oidc.confirm.bindingmessage.description=Ľudsky čitateľný identifikátor alebo správa určená na zobrazenie na spotrebnom zariadení aj na autentifikačnom zariadení na ich vzájomné prepojenie pri transakcii prostredníctvom vizuálneho podnetu pre koncového používateľa. Táto blokovacia správa umožňuje koncovému užívateľovi zabezpečiť, že akcia vykonaná na autentifikačnom zariadení súvisí s požiadavkou iniciovanou spotrebiteľským zariadením.
screen.oidc.confirm.usercode.header=Užívateľský kód
screen.oidc.confirm.usercode.description=Tajný kód, ako napríklad heslo alebo PIN, ktorý pozná iba používateľ, ale overí ho CAS. Kód sa používa na autorizáciu odoslania autentifikačnej požiadavky na autentifikačné zariadenie užívateľa.
screen.oidc.confirm.infourl=Zistite viac o {0}.
screen.oidc.confirm.privacyurl=Prečítajte si o {0} pravidlá ochrany osobných údajov.
screen.oidc.confirm.scopes=Rozsahy
screen.oidc.confirm.claims=Nároky
screen.oidc.confirm.scope.profile=Toto vyžaduje prístup k nárokom profilu s výnimkou nárokov na adresu a e-mail.
screen.oidc.confirm.scope.email=To vyžaduje prístup k e-mailovým nárokom.
screen.oidc.confirm.scope.address=Toto vyžaduje prístup k nárokom na adresu.
screen.oidc.confirm.scope.openid=Označuje požiadavku na autorizáciu OpenID Connect.
screen.oidc.confirm.scope.phone=To vyžaduje prístup k nárokom na telefón.
screen.oidc.confirm.scope.offline_access=Toto vyžaduje prístup pre obnovovací token používaný na offline prístup.
screen.oidc.confirm.claim.name=Celé meno Koncového používateľa v viditeľnej forme vrátane všetkých častí mena, prípadne vrátane názvov a prípon, zoradených podľa miestneho nastavenia a preferencií Koncového používateľa.
screen.oidc.confirm.claim.given_name=Krstné meno (mená) alebo meno (mená) Koncového používateľa. Všimnite si, že v niektorých kultúrach môžu mať ľudia viacero krstných mien; môžu byť prítomné všetky, pričom názvy sú oddelené medzerami.
screen.oidc.confirm.claim.middle_name=Stredné meno (mená) koncového používateľa. Všimnite si, že v niektorých kultúrach môžu mať ľudia viacero stredných mien; môžu byť prítomné všetky, pričom názvy sú oddelené medzerami. Všimnite si tiež, že v niektorých kultúrach sa stredné mená nepoužívajú.
screen.oidc.confirm.claim.family_name=Priezvisko (mená) alebo priezvisko (mená) Koncového používateľa. Všimnite si, že v niektorých kultúrach môžu mať ľudia viacero priezvisk alebo žiadne priezvisko; môžu byť prítomné všetky, pričom názvy sú oddelené medzerami.
screen.oidc.confirm.claim.email=Preferovaná e-mailová adresa koncového používateľa.
screen.oidc.confirm.claim.preferred_username=MÔŽE byť akýkoľvek platný reťazec JSON vrátane špeciálnych znakov, ako sú @, / alebo medzery. RP sa NESMIE spoliehať na to, že táto hodnota je jedinečná.
screen.oidc.confirm.claim.profile=Adresa URL stránky profilu koncového používateľa. Obsah tejto webovej stránky BY MAL byť o Koncovom používateľovi.
screen.oidc.confirm.claim.picture=Adresa URL profilového obrázka koncového používateľa. Táto adresa URL MUSÍ odkazovať na súbor obrázka (napríklad súbor obrázka PNG, JPEG alebo GIF), a nie na webovú stránku obsahujúcu obrázok. Upozorňujeme, že táto adresa URL BY MAL špecificky odkazovať na profilovú fotografiu Koncového používateľa, ktorá je vhodná na zobrazenie pri popise Koncového používateľa, a nie na ľubovoľnú fotografiu zhotovenú Koncovým používateľom.
screen.oidc.confirm.claim.phone_number=Preferované telefónne číslo koncového používateľa. Ako formát tohto nároku sa ODPORÚČA. napr. <code>+1 (425) 555-1212</code> alebo <code>+56 (2) 687 2400</code>.
screen.oidc.confirm.asksinfo=Klient požaduje nasledujúce informácie:
screen.oidc.confirm.dynamic=Tento klient bol dynamicky zaregistrovaný na <code>{0}</code>.
screen.oidc.issuer.invalid=Webová adresa vydavateľa je neplatná a nezhoduje sa s webovou adresou vydavateľa servera CAS.
screen.samlidp.error.title=Chyba poskytovateľa identity SAML2
screen.samlidp.error.description=Služba, do ktorej sa pokúšate prihlásiť, identifikovala problém s vaším profilom alebo požiadavkou. Ak potrebujete podporu, obráťte sa na svoju IT asistenčnú službu.
screen.unavailable.header=Chyba CAS
screen.unavailable.heading=CAS nemôže spracovať túto požiadavku: "{0}:{1}"
screen.unavailable.message=Pri pokuse o dokončenie vašej požiadavky sa vyskytla chyba. <strong>Informujte prosím svoju podporu alebo to skúste znova.</strong> <p><div>Apereo je nezisková nadácia pre správu softvéru s otvoreným zdrojom. Softvér CAS je projekt sponzorovaný spoločnosťou Apereo a je voľne stiahnuteľný a použiteľný pre kohokoľvek. Apereo však neprevádzkuje systémy nikoho, kto používa softvér a vo väčšine prípadov ani nevie, kto ho používa alebo ako ho kontaktovať, pokiaľ nie je aktívnou súčasťou komunity Apereo.<br/></br>Ak máte problémy s prihlásením pomocou CAS, <strong>budete musieť požiadať o pomoc personál IT alebo Help Desk vašej organizácie</strong>. <br/><br/>Želáme si, aby sme vám mohli byť priamo nápomocní.</div>
screen.mfaDenied.header=MZV zamietnuté
screen.mfaDenied.heading=Poskytovateľ zamietol pokus o MFA
screen.mfaDenied.message=Váš poskytovateľ MFA zamietol váš pokus o overenie druhého faktora. Požiadajte správcu systému o pomoc s obnovením účtu.
screen.mfaUnavailable.header=Poskytovateľ MFA nedostupný
screen.mfaUnavailable.heading=Poskytovateľ MFA nedostupný
screen.mfaUnavailable.message=CAS sa momentálne nepodarilo spojiť s vaším nakonfigurovaným poskytovateľom MFA. Z dôvodu zlyhania politík nakonfigurovaných pre službu, ku ktorej sa pokúšate pristupovať, nie je možné momentálne udeliť autentifikáciu.
