cas.screen.acct.title=Registrazione dell'account
cas.screen.acct.intro=Compila il modulo sottostante per registrare il tuo nuovo account presso CAS. Una volta inviato il modulo, riceverai un'e-mail con un collegamento di attivazione dell'account per abilitare il tuo account, impostare la password e iniziare a utilizzare CAS.
cas.screen.acct.infosent=Le istruzioni per l'attivazione dell'account sono state inviate con successo. Controlla la tua email, ecc. e segui le istruzioni.
cas.screen.acct.intro.complete=Bentornato! Grazie per aver verificato il tuo account. Compila il modulo sottostante per registrare il tuo nuovo account presso CAS. 
