screen.unavailable.message=Si è verificato un errore durante il tentativo di completare la tua richiesta. <strong>Avvisare il servizio di supporto o riprovare.</strong> <p><div>Apereo è una fondazione di governance del software open source senza scopo di lucro. Il software CAS è un progetto sponsorizzato da Apereo ed è liberamente scaricabile e utilizzabile da chiunque. Tuttavia, Apereo non gestisce i sistemi di chiunque utilizzi il software e nella maggior parte dei casi non sa nemmeno chi lo sta utilizzando o come contattarlo a meno che non sia parte attiva della comunità Apereo.<br/></br>Se hai problemi ad accedere utilizzando CAS, <strong>dovrai contattare lo staff IT o l'Help Desk della tua organizzazione per ricevere assistenza</strong>. <br/><br/>Ci auguriamo di poterti essere più direttamente d'aiuto.</div>
