authenticationFailure.MultifactorAuthenticationProviderAbsentException=Impossibile soddisfare i requisiti di autenticazione a più fattori. Il tuo account è configurato per una strategia di autenticazione a più fattori, ma CAS non è in grado di individuare ed eseguire tale strategia molto probabilmente a causa di un'errata configurazione del server. Contatta gli amministratori del servizio per ricevere assistenza.
authenticationFailure.SurrogateAuthenticationException=Al momento non sei autorizzato a impersonare l'utente indicato.
authenticationFailure.AccountPasswordMustChangeException=La password del tuo account è scaduta e deve essere modificata.
authenticationFailure.UnauthorizedServiceForPrincipalException=Accesso al servizio negato a causa di privilegi mancanti.
authenticationFailure.MultifactorAuthenticationRequiredException=Il tentativo di autenticazione per il tuo account è stato negato perché il tuo account non è ancora configurato per eseguire l'autenticazione a più fattori. Contatta gli amministratori del servizio per assistenza, assicurati che il tuo account sia registrato e idoneo per l'autenticazione a più fattori e riprova.
authenticationFailure.MultifactorAuthenticationFailedException=Il tentativo di autenticazione a più fattori non è riuscito, probabilmente a causa di credenziali di autenticazione a più fattori non valide. Verifica e riprova.
authenticationFailure.RiskyAuthenticationException=CAS non è in grado di procedere con il flusso di autenticazione, probabilmente perché questo tentativo di autenticazione è considerato rischioso e sospetto con un punteggio di rischio sufficientemente elevato superiore alla soglia accettata. È possibile che il tuo tentativo di autenticazione sia bloccato perché stai utilizzando un browser Web sconosciuto o stai accedendo da una posizione sconosciuta. Per ulteriori informazioni e indicazioni, contattare l'amministratore e/o l'help desk.
authenticationFailure.UNKNOWN=Il tentativo di autenticazione non è riuscito.
authenticationFailure.AuthenticationException=Le credenziali sono state rifiutate/non valide e il tentativo di autenticazione non è riuscito.
INVALID_REQUEST_PROXY=La richiesta è formattata in modo errato. Assicurarsi che tutti i parametri richiesti siano codificati e inclusi correttamente.
INVALID_TICKET_SPEC=Specifica di convalida del ticket non riuscita. Possibili errori potrebbero includere il tentativo di convalidare un ticket proxy tramite un validatore di ticket di servizio o il mancato rispetto della richiesta "renew=true".
INVALID_REQUEST=Impossibile identificare, autorizzare o completare questa richiesta, probabilmente a causa di parametri richiesti non corretti o mancanti.
INVALID_AUTHENTICATION_CONTEXT=La richiesta di convalida per [''{0}''] non può essere soddisfatto. La richiesta non è stata riconosciuta o non è stata soddisfatta.
INVALID_TICKET=Biglietto ''{0}''non riconosciuto
INVALID_PROXY_GRANTING_TICKET=PGT già generato per questo ST. Non è possibile concedere più di un PGT per ST
INVALID_SERVICE=Biglietto ''{0}'' non corrisponde al servizio fornito. Il servizio originale era ''{1}'' e il servizio fornito era ''{2}''.
INVALID_PROXY_CALLBACK=L'URL di callback proxy fornito ''{0}"" non può essere autenticato. Oppure ''{0}'' non può essere raggiunto oppure non è consentito esercitare l'autenticazione proxy.
UNAUTHORIZED_SERVICE_PROXY=Il servizio fornito''{0}'' non è autorizzato a utilizzare l'autenticazione proxy CAS.
UNSATISFIED_AUTHN_POLICY=Accesso al servizio negato a causa di una politica di autenticazione non soddisfatta.
INVALID_AUTHN_REQUEST=Il tentativo di autenticazione non è riuscito, probabilmente a causa di credenziali non valide.
BLOCKED_AUTHN_REQUEST=Il tentativo di autenticazione è bloccato e non può procedere, probabilmente a causa di parametri richiesti non corretti o mancanti. Esaminare i registri del server CAS per individuare la causa principale dell'errore.
UNSATISFIED_SAML_REQUEST=La richiesta di autenticazione SAML non può essere compresa, accettata o convalidata da CAS, probabilmente a causa di parametri richiesti non corretti o mancanti. Esaminare i registri del server CAS per individuare la causa principale dell'errore.
MISSING_SAML_REQUEST=Impossibile determinare la richiesta di autenticazione SAML2 dall'archivio sessioni CAS. Ciò significa in genere che la richiesta di autenticazione SAML2 originale inviata a CAS tramite un fornitore di servizi SAML2 non può essere recuperata e ripristinata dopo un tentativo di autenticazione, probabilmente perché l'archivio di sessione sottostante ha rimosso forzatamente la richiesta di autenticazione o ha determinato che la richiesta tracciata era scaduta e obsoleta, oltre quanto consentito dalla policy di scadenza dell'archivio di sessione. Esaminare i registri del server CAS per individuare la causa principale dell'errore.
screen.service.error.header=Applicazione non autorizzata all'uso di CAS
screen.service.error.redirect=Non sei autorizzato ad accedere a questa applicazione. Sii paziente perché stai per essere reindirizzato a <strong>{0}</strong> per saperne di più su questo scenario.
service.principal.resolution.error=CAS non è in grado di determinare l'entità di autenticazione corretta. Non è stato possibile risolvere correttamente il principale come singola entità univoca oppure CAS ha trovato principali candidati misti/multipli e non è in grado di decidere quale utilizzare. Questo errore può essere causato anche se all'entità autenticata non è consentito accedere all'applicazione di destinazione a causa della mancanza dei privilegi impostati dalle policy di autorizzazione del server CAS.
service.not.authorized.missing.attr=Non sei autorizzato ad accedere all'applicazione poiché al tuo account mancano i privilegi richiesti dal server CAS per autenticarsi in questo servizio. Si prega di avvisare il servizio di supporto.
screen.service.error.message=L'applicazione a cui hai tentato di autenticarti non è autorizzata a utilizzare CAS. Ciò in genere indica che l'applicazione non è registrata presso CAS o che la politica di autorizzazione definita nel record di registrazione le impedisce di sfruttare la funzionalità CAS oppure che il formato non è valido e non è riconosciuto da CAS. Contatta il tuo amministratore CAS per sapere come registrarti e integrare la tua applicazione con CAS.
screen.service.empty.error.message=Il registro dei servizi di CAS è vuoto e non contiene definizioni di servizio. Le applicazioni che desiderano autenticarsi con CAS devono essere esplicitamente definite nel registro dei servizi.
screen.service.expired.message=L'applicazione per la quale hai tentato di autenticarti è scaduta nel registro del servizio CAS. Se il servizio dovesse ritenersi ancora in uso rivolgersi agli amministratori del servizio per il rinnovo dell'applicazione.
