cas.mfa.providerselection.optional.header=Autenticazione a più fattori opzionale
cas.mfa.providerselection.optional.description=L'autenticazione a più fattori è configurata come facoltativa e puoi procedere senza scegliere un provider per continuare.
cas.mfa.providerselection.mfa-duo=Duo Sicurezza
cas.mfa.providerselection.mfa-duo.notes=L'ampia varietà di metodi di autenticazione di Duo consente a ogni utente di accedere in modo rapido e sicuro. Duo Push, inviato dall'app di autenticazione Duo Mobile, consente agli utenti di approvare le notifiche push per verificare la propria identità.
cas.mfa.providerselection.mfa-webauthn=FIDO2 WebAuthn
cas.mfa.providerselection.mfa-webauthn.notes=WebAuthn è un'API che semplifica molto l'integrazione dell'autenticazione forte nelle applicazioni da parte di un componente, ad esempio un servizio Web, utilizzando il supporto integrato in tutti i principali browser e piattaforme. 
cas.mfa.providerselection.mfa-gauth=Autenticatore di Google
cas.mfa.providerselection.mfa-gauth.notes=Google Authenticator è un autenticatore basato su software che implementa servizi di verifica in due passaggi per autenticare gli utenti delle applicazioni mobili di Google.
cas.mfa.providerselection.mfa-simple=Autenticazione a più fattori CAS
cas.mfa.providerselection.mfa-simple.notes=Consenti a CAS di agire autonomamente come fornitore di autenticazione a più fattori, emettendo token e inviandoli agli utenti finali tramite canali di comunicazione predefiniti come e-mail o messaggi di testo.
cas.mfa.providerselection.mfa-yubikey=Autenticazione multifattore YubiKey
cas.mfa.providerselection.mfa-yubikey.notes=Yubico è un servizio basato su cloud che consente un'autenticazione a due fattori forte, facile da usare e conveniente con password monouso attraverso il loro prodotto di punta, YubiKey. 
cas.mfa.duologin.pagetitle=Accesso di sicurezza Duo
cas.mfa.simple.contact-selection.title=Seleziona Informazioni di contatto
cas.mfa.simple.contact-selection.description=Abbiamo trovato diversi modi per contattarti per il tuo account. Scegli gli account in cui desideri ricevere il token di autenticazione a più fattori.
cas.mfa.simple.pagetitle=Accesso con autenticazione a più fattori CAS
cas.mfa.simple.label.token=Gettone:
cas.mfa.simple.label.resend=Invia nuovamente
cas.mfa.simple.label.tokensent=Un token di autenticazione a più fattori ti viene inviato tramite e-mail o messaggio di testo. Individua il token e invialo qui per continuare. Tieni presente che il token scadrà dopo un breve periodo di tempo e non sarà più riconosciuto da CAS, nel qual caso potrai chiedere a CAS di inviarti un nuovo token.
cas.mfa.simple.label.contactfailed.sms=CAS non è in grado di utilizzare le informazioni di contatto selezionate per inviarti un SMS con il token di autenticazione a più fattori. Controlla le tue informazioni di contatto e contatta l'amministratore CAS per ricevere assistenza.
cas.mfa.simple.label.contactfailed.email=CAS non è in grado di utilizzare le informazioni di contatto selezionate per inviarti un'e-mail con il token di autenticazione a più fattori. Controlla le tue informazioni di contatto e contatta l'amministratore CAS per ricevere assistenza.
cas.mfa.simple.token.failed=Impossibile accettare questo tentativo di autenticazione a più fattori. Il token fornito non è valido.
cas.mfa.simple.registration.title=Registrazione dell'account
cas.mfa.simple.registration.description=Il tuo account non è registrato per l'autenticazione a più fattori anche se è idoneo e richiesto dall'applicazione a cui stai tentando di accedere. Per favore <a href="https://account.example.org/mfa">registra il tuo account</a> per l'autenticazione a più fattori e garantire che CAS abbia accesso alle informazioni di contatto come indirizzo e-mail, telefono, ecc.
cas.mfa.simple.registration.email.failed=Impossibile registrare il tuo account per l'autenticazione a più fattori. CAS non è in grado di riconoscere e accettare il tuo indirizzo e-mail per inviarti un'e-mail con il collegamento di registrazione. Controlla le tue informazioni di contatto e contatta l'amministratore CAS per ricevere assistenza.
cas.mfa.simple.registration.email.sent=Ti è stata inviata un'e-mail con il token di registrazione. Controlla la tua casella di posta e il codice del provider qui.
cas.mfa.simple.registration.token.failed=Impossibile registrare il tuo account per l'autenticazione a più fattori. Il token fornito non è valido, è scaduto o altrimenti compromesso. Controlla il token e riprova.
cas.mfa.twilio.pagetitle=Autenticazione a più fattori Twilio
cas.mfa.twilio.label.token=Gettone:
cas.mfa.twilio.label.tokensent=Ti verrà inviato un token di autenticazione a più fattori. Individua il token e invialo qui per continuare.
