passwordless.token.header=Fornire gettone
passwordless.token.description=Fornisci il token di sicurezza che ti è stato inviato via e-mail, telefono, ecc. Tieni presente che il token è valido solo per un breve periodo e dopo l'invio, tutti gli altri token verranno invalidati e rimossi.
passwordless.error.failure.title=Errore di autenticazione
passwordless.error.failure.description=Impossibile verificare il token fornito. Potrebbe essere stato invalidato, rimosso o scaduto.
passwordless.error.unknown.user=Il nome utente fornito non può essere riconosciuto e individuato da CAS.
passwordless.error.invalid.user=Il nome utente fornito non contiene informazioni di contatto sufficienti.
passwordless.getuser.header=Autenticazione senza password
passwordless.getuser.description=Fornisci il tuo nome utente per individuare il tuo account. Una volta verificato il tuo account, CAS sceglierà la strategia di autenticazione appropriata per te.
passwordless.selection.header=Selezione dell'autenticazione
passwordless.selection.description=Seleziona una delle opzioni di autenticazione elencate di seguito per procedere.
passwordless.selection.password.header=Parola d'ordine
passwordless.selection.password.description=Puoi autenticarti utilizzando la tua password. Potrebbe anche esserti chiesto di completare un flusso di autenticazione a più fattori se il tuo account è idoneo.
passwordless.selection.token.header=Gettone
passwordless.selection.token.description=Riceverai un token una tantum, valido per un periodo di tempo limitato, via e-mail o SMS da CAS e ti verrà chiesto di inserire nuovamente il codice per procedere.
passwordless.selection.mfa.header=Multifattoriale
passwordless.selection.mfa.description=Verrai indirizzato direttamente a un flusso di autenticazione a più fattori. Una volta completata la fase di autenticazione, il flusso riprenderà automaticamente.
passwordless.selection.delegation.header=Esterno
passwordless.selection.delegation.description=Verrai indirizzato a un provider di identità esterno per effettuare l'accesso. Una volta completato il flusso di autenticazione con il provider di identità esterno, verrai automaticamente reindirizzato al CAS per continuare.
cas.authn.qr.fail=Impossibile accettare la richiesta di autenticazione basata sul codice QR. Assicurati che il codice QR sia stato scansionato correttamente e che le credenziali fornite siano valide, emesse da questo server CAS e non siano scadute.
