screen.authentication.webauthn.qr.success.desc=Ora ti sei autenticato con successo con il tuo dispositivo abilitato FIDO2. CAS ora riconoscerà automaticamente il tuo tentativo di autenticazione e riprenderà al passaggio successivo. È possibile chiudere questa finestra e tornare alla schermata originale.
