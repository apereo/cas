screen.authentication.webauthn.qr.info=Se non hai con te il tuo dispositivo abilitato FIDO o questo dispositivo non è registrato con CAS, puoi scansionare il codice QR riportato di seguito ed autenticarti utilizzando un dispositivo (mobile) diverso. Una volta autenticato con successo, procederai automaticamente al passaggio successivo.
