screen.authentication.yubikey.name=Nome dispositivo:
cas.mfa.yubikey.pagetitle=Autenticazione YubiKey
cas.mfa.yubikey.authenticate=Utilizza i tuoi dispositivi YubiKey registrati per autenticarti.
cas.mfa.yubikey.register=Il tuo dispositivo non è ancora registrato. Utilizza il modulo sottostante per registrare il tuo dispositivo con CAS.
cas.mfa.yubikey.register.fail=Impossibile registrare il tuo dispositivo YubiKey per l'autenticazione. Il token fornito potrebbe non essere valido, scaduto o altrimenti compromesso.
cas.mfa.yubikey.label.token=Gettone:
cas.mfa.webauthn.auth.fail=Impossibile verificare il dispositivo per l'autenticazione. I payload forniti potrebbero non essere validi, scaduti o altrimenti compromessi.
cas.mfa.webauthn.register.helptext=Assegna un nome descrittivo al tuo dispositivo abilitato FIDO2 e quindi registralo con CAS per l'autenticazione a più fattori. Una volta completata con successo la registrazione del dispositivo, verrai reindirizzato automaticamente al passaggio successivo per accedere con il tuo dispositivo.
cas.mfa.webauthn.register.wait=Il tuo dispositivo abilitato FIDO2 è ora registrato con CAS. Per favore aspetta...
cas.mfa.webauthn.register.discoverablecredentials=Puoi anche registrare il tuo dispositivo utilizzando <i>Credenziali rilevabili/Chiavi residenti</i>. Ciò significa che la chiave privata e i metadati associati vengono archiviati nella memoria persistente sull'autenticatore e non sul server CAS.
