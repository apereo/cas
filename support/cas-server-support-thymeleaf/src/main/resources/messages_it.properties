OAUTH_BAD_SESSION_REQUEST=Impossibile completare la richiesta OAuth poiché CAS non è in grado di individuare o determinare l'URL di reindirizzamento OAuth. Di solito questo è un'indicazione di una richiesta obsoleta o non corrispondente in cui l'ID di sessione della richiesta elaborata è diverso dalla sessione attiva e potrebbe essere causato da un'operazione di disconnessione completa. Cancella cookie e cronologia, riavvia il browser e riprova, per favore.
