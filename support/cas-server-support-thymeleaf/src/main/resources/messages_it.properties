screen.service.wildcard.message=Questa applicazione non dispone di una voce di registrazione dedicata nel registro del servizio CAS. È autorizzato e consentito da CAS perché esiste una voce di definizione del servizio con caratteri jolly nel registro del servizio CAS che consente e accetta richieste di autenticazione da applicazioni sconosciute come questa. <p/>Come procedura consigliata per la sicurezza, si consiglia vivamente di limitare la funzionalità di gestione del servizio a <strong>includere solo l'elenco delle applicazioni conosciute</strong> che sono esplicitamente autorizzati a utilizzare CAS. Lasciare l'interfaccia di gestione aperta per tutte le applicazioni può creare un'opportunità per attacchi alla sicurezza e renderà difficile il controllo dei requisiti delle applicazioni e delle esigenze degli attributi.
