OIDC_CIBA_BAD_REQUEST=Die Backchannel-Authentifizierungsanforderung ist fehlgeschlagen.
screen.oidc.confirm.bindingmessage.header=Verbindliche Nachricht
screen.oidc.confirm.bindingmessage.description=Eine von Menschen lesbare Kennung oder Nachricht, die sowohl auf dem Konsumgerät als auch auf dem Authentifizierungsgerät angezeigt werden soll, um sie für die Transaktion als visuellen Hinweis für den Endbenutzer miteinander zu verbinden. Mit dieser Verriegelungsnachricht kann der Endbenutzer sicherstellen, dass die auf dem Authentifizierungsgerät durchgeführte Aktion mit der vom Verbrauchsgerät initiierten Anfrage zusammenhängt.
screen.oidc.confirm.usercode.header=Benutzercode
screen.oidc.confirm.usercode.description=Ein Geheimcode, beispielsweise ein Passwort oder eine PIN, der nur dem Benutzer bekannt ist, aber von CAS überprüft werden kann. Der Code wird verwendet, um das Senden einer Authentifizierungsanfrage an das Authentifizierungsgerät des Benutzers zu autorisieren.
