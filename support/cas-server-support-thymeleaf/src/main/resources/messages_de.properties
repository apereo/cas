screen.oidc.issuer.invalid=Die Aussteller-URL ist ungültig und stimmt nicht mit der Aussteller-URL des CAS-Servers überein.
screen.samlidp.error.title=Fehler beim SAML2-Identitätsanbieter
screen.samlidp.error.description=Der Dienst, bei dem Sie sich anmelden möchten, hat ein Problem mit Ihrem Profil oder Ihrer Anfrage festgestellt. Für Unterstützung wenden Sie sich bitte an Ihren IT-Helpdesk.
screen.unavailable.header=CAS-Fehler
screen.unavailable.heading=CAS kann diese Anfrage nicht verarbeiten: „{0}:{1}"
screen.unavailable.message=Beim Vervollständigen Ihrer Anfrage ist ein Fehler aufgetreten. <strong>Bitte benachrichtigen Sie Ihren Support oder versuchen Sie es erneut.</strong> <p><div>Apereo ist eine gemeinnützige Open-Source-Software-Governance-Stiftung. Die CAS-Software ist ein von Apereo gesponsertes Projekt und kann von jedem kostenlos heruntergeladen und genutzt werden. Apereo betreibt jedoch nicht die Systeme von Personen, die die Software verwenden, und weiß in den meisten Fällen nicht einmal, wer sie verwendet oder wie man sie kontaktieren kann, es sei denn, sie sind ein aktiver Teil der Apereo-Community.<br/></br>Wenn Sie Probleme beim Anmelden mit CAS haben, <strong>Für Unterstützung müssen Sie sich an das IT-Personal oder den Helpdesk Ihrer Organisation wenden</strong>. <br/><br/>Wir würden uns wünschen, dass wir Ihnen direkter weiterhelfen könnten.</div>
screen.mfaDenied.header=MFA abgelehnt
screen.mfaDenied.heading=Der MFA-Versuch wurde vom Anbieter abgelehnt
screen.mfaDenied.message=Ihr MFA-Anbieter hat Ihren Versuch einer Zweitfaktor-Authentifizierung abgelehnt. Wenden Sie sich an Ihren Systemadministrator, um Hilfe bei der Wiederherstellung Ihres Kontos zu erhalten.
