screen.authentication.webauthn.qr.fail.desc=Der Authentifizierungsversuch ist fehlgeschlagen. Bitte stellen Sie sicher, dass Ihr Benutzername und das ausgewählte Gerät bei CAS registriert sind, und überprüfen Sie die CAS-Serverprotokolle, um die Grundursache des Fehlers zu ermitteln. Zukünftige Authentifizierungsversuche werden blockiert. Aktualisieren Sie das Fenster nicht und erwägen Sie stattdessen, den Authentifizierungsprozess neu zu starten.
screen.authentication.webauthn.qr.info=Wenn Sie Ihr FIDO-fähiges Gerät nicht dabei haben oder dieses Gerät nicht bei CAS registriert ist, können Sie den untenstehenden QR-Code scannen und sich mit einem anderen (mobilen) Gerät authentifizieren. Nach erfolgreicher Authentifizierung gelangen Sie automatisch zum nächsten Schritt.
