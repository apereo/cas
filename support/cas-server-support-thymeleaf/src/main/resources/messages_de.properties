cas.mfa.providerselection.optional.description=Die Multifaktor-Authentifizierung ist optional konfiguriert und Sie können fortfahren, ohne einen Anbieter auszuwählen, um fortzufahren.
cas.mfa.providerselection.mfa-duo=Duo-Sicherheit
cas.mfa.providerselection.mfa-duo.notes=Die vielfältigen Authentifizierungsmethoden von Duo ermöglichen jedem Benutzer eine sichere und schnelle Anmeldung. Mit Duo Push, das von der Duo Mobile-Authentifizierungs-App gesendet wird, können Benutzer Push-Benachrichtigungen genehmigen, um ihre Identität zu überprüfen.
cas.mfa.providerselection.mfa-webauthn=FIDO2 WebAuthn
cas.mfa.providerselection.mfa-webauthn.notes=WebAuthn ist eine API, die es einer vertrauenden Partei, beispielsweise einem Webdienst, sehr einfach macht, eine starke Authentifizierung in Anwendungen zu integrieren, indem sie die in allen führenden Browsern und Plattformen integrierte Unterstützung nutzt. 
cas.mfa.providerselection.mfa-gauth=Google Authenticator
cas.mfa.providerselection.mfa-gauth.notes=Google Authenticator ist ein softwarebasierter Authentifikator, der zweistufige Verifizierungsdienste zur Authentifizierung von Benutzern mobiler Anwendungen durch Google implementiert.
cas.mfa.providerselection.mfa-simple=CAS-Multifaktor-Authentifizierung
cas.mfa.providerselection.mfa-simple.notes=Ermöglichen Sie CAS, als eigenständiger Multifaktor-Authentifizierungsanbieter zu fungieren, Token auszustellen und diese über vordefinierte Kommunikationskanäle wie E-Mail oder Textnachrichten an Endbenutzer zu senden.
cas.mfa.providerselection.mfa-yubikey=YubiKey Multifaktor-Authentifizierung
cas.mfa.providerselection.mfa-yubikey.notes=Yubico ist ein cloudbasierter Dienst, der über sein Flaggschiffprodukt YubiKey eine starke, benutzerfreundliche und kostengünstige Zwei-Faktor-Authentifizierung mit Einmalpasswörtern ermöglicht. 
cas.mfa.duologin.pagetitle=Duo-Sicherheitsanmeldung
cas.mfa.simple.contact-selection.title=Wählen Sie Kontaktinformationen aus
cas.mfa.simple.contact-selection.description=Wir haben mehrere Möglichkeiten gefunden, Sie bezüglich Ihres Kontos zu kontaktieren. Bitte wählen Sie das/die Konto(s) aus, für das/die Sie das Multifaktor-Authentifizierungstoken erhalten möchten.
cas.mfa.simple.pagetitle=CAS-Anmeldung mit Multifaktor-Authentifizierung
cas.mfa.simple.label.token=Token:
cas.mfa.simple.label.resend=Erneut senden
cas.mfa.simple.label.tokensent=Ein Multifaktor-Authentifizierungstoken wird Ihnen per E-Mail oder SMS zugesandt. Bitte suchen Sie das Token und reichen Sie es hier ein, um fortzufahren. Beachten Sie, dass der Token nach kurzer Zeit abläuft und von CAS nicht mehr erkannt wird. In diesem Fall können Sie CAS bitten, Ihnen einen neuen Token zu senden.
cas.mfa.simple.label.contactfailed.sms=CAS kann die ausgewählten Kontaktinformationen nicht verwenden, um Ihnen eine SMS mit dem Multifaktor-Authentifizierungstoken zu senden. Bitte überprüfen Sie Ihre Kontaktinformationen und wenden Sie sich für Unterstützung an Ihren CAS-Administrator.
cas.mfa.simple.label.contactfailed.email=CAS kann die ausgewählten Kontaktinformationen nicht verwenden, um Ihnen eine E-Mail mit dem Multifaktor-Authentifizierungstoken zu senden. Bitte überprüfen Sie Ihre Kontaktinformationen und wenden Sie sich für Unterstützung an Ihren CAS-Administrator.
cas.mfa.simple.token.failed=Dieser Multifaktor-Authentifizierungsversuch kann nicht akzeptiert werden. Das bereitgestellte Token ist ungültig.
cas.mfa.simple.registration.title=Kontoregistrierung
cas.mfa.simple.registration.description=Ihr Konto ist nicht für die Multifaktor-Authentifizierung registriert, obwohl diese für die Anwendung, auf die Sie zugreifen möchten, berechtigt und erforderlich ist. Bitte <a href="https://account.example.org/mfa">Registrieren Sie Ihr Konto</a> für die Multifaktor-Authentifizierung und stellen Sie sicher, dass CAS Zugriff auf Ihre Kontaktinformationen wie E-Mail-Adresse, Telefonnummer usw. hat.
cas.mfa.simple.registration.email.failed=Ihr Konto konnte nicht für die Multifaktor-Authentifizierung registriert werden. CAS kann Ihre E-Mail-Adresse nicht erkennen und akzeptieren, um Ihnen eine E-Mail mit dem Registrierungslink zu senden. Bitte überprüfen Sie Ihre Kontaktinformationen und wenden Sie sich für Unterstützung an Ihren CAS-Administrator.
cas.mfa.simple.registration.email.sent=Eine E-Mail mit dem Registrierungstoken wurde an Sie gesendet. Bitte überprüfen Sie Ihren Posteingang und geben Sie den Code hier ein.
cas.mfa.simple.registration.token.failed=Ihr Konto konnte nicht für die Multifaktor-Authentifizierung registriert werden. Das bereitgestellte Token ist ungültig, abgelaufen oder anderweitig gefährdet. Bitte überprüfen Sie das Token und versuchen Sie es erneut.
