screen.logout.fc.success=Sie haben sich erfolgreich vom zentralen Authentifizierungsdienst abgemeldet. Vorausgesetzt, dass die einmalige Abmeldung mit CAS aktiviert ist, gilt die folgende Liste von Anwendungen <strong> nur benachrichtigt</strong> um Sie abzumelden und Ihre Benutzersitzung zu zerstören. Denken Sie daran, dass dies nur eine Benachrichtigung und keine Garantie ist. Es liegt an der Anwendung selbst, diese Benachrichtigungen zu berücksichtigen und ordnungsgemäß Maßnahmen zu ergreifen, um Sie abzumelden.
