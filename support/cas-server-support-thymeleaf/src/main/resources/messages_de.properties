authenticationFailure.UniquePrincipalRequiredException=Sie können sich derzeit nicht anmelden, da gerade eine andere aktive Single-Sign-On-Sitzung läuft und CAS mit einer Authentifizierungsrichtlinie konfiguriert ist, die mehrere gleichzeitige Single-Sign-On-Sitzungen verhindert.
authenticationFailure.InvalidLoginTimeException=Es ist derzeit nicht möglich, sich mit Ihrem Konto anzumelden.
authenticationFailure.AccountNotFoundException=Ihr Konto wird nicht erkannt und Sie können sich derzeit nicht anmelden.
authenticationFailure.FailedLoginException=Der Authentifizierungsversuch ist fehlgeschlagen, wahrscheinlich aufgrund ungültiger Anmeldeinformationen. Bitte überprüfen Sie und versuchen Sie es erneut.
authenticationFailure.MultifactorAuthenticationProviderAbsentException=Die Anforderungen der Multifaktor-Authentifizierung können nicht erfüllt werden. Ihr Konto ist für eine Multifaktor-Authentifizierungsstrategie konfiguriert, CAS kann diese Strategie jedoch nicht finden und ausführen, was höchstwahrscheinlich auf eine Fehlkonfiguration des Servers zurückzuführen ist. Wenden Sie sich für Unterstützung an die Dienstadministratoren.
authenticationFailure.SurrogateAuthenticationException=Sie sind derzeit nicht berechtigt, sich als der angegebene Benutzer auszugeben.
authenticationFailure.AccountPasswordMustChangeException=Ihr Kontopasswort ist abgelaufen und muss geändert werden.
authenticationFailure.UnauthorizedServiceForPrincipalException=Dienstzugriff aufgrund fehlender Berechtigungen verweigert.
authenticationFailure.MultifactorAuthenticationRequiredException=Der Authentifizierungsversuch für Ihr Konto wurde abgelehnt, da Ihr Konto noch nicht für die Durchführung der Multifaktor-Authentifizierung konfiguriert ist. Wenden Sie sich an die Dienstadministratoren, um Unterstützung zu erhalten. Stellen Sie sicher, dass Ihr Konto registriert und für die Multifaktor-Authentifizierung geeignet ist, und versuchen Sie es erneut.
authenticationFailure.MultifactorAuthenticationFailedException=Der Versuch der Multifaktor-Authentifizierung ist fehlgeschlagen, wahrscheinlich aufgrund ungültiger Anmeldeinformationen für die Multifaktor-Authentifizierung. Bitte überprüfen Sie und versuchen Sie es erneut.
authenticationFailure.RiskyAuthenticationException=CAS kann mit dem Authentifizierungsvorgang nicht fortfahren, wahrscheinlich weil dieser Authentifizierungsversuch als riskant und verdächtig eingestuft wird und die Risikobewertung hoch genug ist und über dem akzeptierten Schwellenwert liegt. Es kann sein, dass Ihr Authentifizierungsversuch blockiert wird, weil Sie einen unbekannten Webbrowser verwenden oder sich von einem unbekannten Ort aus anmelden. Für weitere Informationen und Anleitungen wenden Sie sich bitte an Ihren Administrator und/oder Helpdesk.
authenticationFailure.UNKNOWN=Der Authentifizierungsversuch ist fehlgeschlagen.
authenticationFailure.AuthenticationException=Anmeldeinformationen werden abgelehnt/ungültig und der Authentifizierungsversuch ist fehlgeschlagen.
INVALID_REQUEST_PROXY=Die Anfrage ist falsch formatiert. Stellen Sie sicher, dass alle erforderlichen Parameter ordnungsgemäß codiert und enthalten sind.
INVALID_TICKET_SPEC=Spezifikation für Ticketvalidierung fehlgeschlagen. Mögliche Fehler könnten sein, dass versucht wird, ein Proxy-Ticket über einen Service-Ticket-Validator zu validieren, oder dass der Anforderung „renew=true“ nicht nachgekommen wird.
INVALID_REQUEST=Diese Anfrage konnte nicht identifiziert, autorisiert oder abgeschlossen werden, wahrscheinlich aufgrund fehlerhafter oder fehlender erforderlicher Parameter.
INVALID_AUTHENTICATION_CONTEXT=Die Validierungsanfrage für [''{0}''] kann nicht zufrieden sein. Die Anfrage wird entweder nicht erkannt oder nicht erfüllt.
INVALID_TICKET=Ticket ''{0}'' nicht erkannt
INVALID_PROXY_GRANTING_TICKET=Für diesen ST wurde bereits ein PGT generiert. Es kann nicht mehr als ein PGT für ST gewährt werden
INVALID_SERVICE=Ticket ''{0}'' stimmt nicht mit dem bereitgestellten Service überein. Der ursprüngliche Dienst war ''{1}'' und die erbrachte Dienstleistung war ''{2}''.
INVALID_PROXY_CALLBACK=Die angegebene Proxy-Rückruf-URL ''{0}'' konnte nicht authentifiziert werden. Entweder''{0}„kann nicht erreicht werden, oder die Proxy-Authentifizierung darf nicht durchgeführt werden.
UNAUTHORIZED_SERVICE_PROXY=Die erbrachte Leistung ''{0}'' ist nicht berechtigt, die CAS-Proxy-Authentifizierung zu verwenden.
UNSATISFIED_AUTHN_POLICY=Der Dienstzugriff wurde aufgrund einer nicht erfüllten Authentifizierungsrichtlinie verweigert.
INVALID_AUTHN_REQUEST=Der Authentifizierungsversuch ist fehlgeschlagen, wahrscheinlich aufgrund ungültiger Anmeldeinformationen.
BLOCKED_AUTHN_REQUEST=Der Authentifizierungsversuch wird blockiert und kann nicht fortgesetzt werden, wahrscheinlich aufgrund fehlerhafter oder fehlender erforderlicher Parameter. Untersuchen Sie die CAS-Serverprotokolle, um die Grundursache des Fehlers zu ermitteln.
UNSATISFIED_SAML_REQUEST=Die SAML-Authentifizierungsanfrage kann von CAS nicht verstanden, akzeptiert oder validiert werden, wahrscheinlich aufgrund fehlerhafter oder fehlender erforderlicher Parameter. Bitte überprüfen Sie die CAS-Serverprotokolle, um die Ursache des Fehlers zu ermitteln.
MISSING_SAML_REQUEST=Die SAML2-Authentifizierungsanforderung kann nicht aus dem CAS-Sitzungsspeicher ermittelt werden. Dies bedeutet in der Regel, dass die ursprüngliche SAML2-Authentifizierungsanforderung, die über einen SAML2-Dienstanbieter an CAS übermittelt wurde, nach einem Authentifizierungsversuch nicht abgerufen und wiederhergestellt werden kann, wahrscheinlich weil der zugrunde liegende Sitzungsspeicher die Authentifizierungsanforderung entweder gewaltsam entfernt hat oder festgestellt hat, dass die nachverfolgte Anforderung abgelaufen und veraltet war, was über das hinausgeht, was die Ablaufrichtlinie für den Sitzungsspeicher zulässt. Bitte überprüfen Sie die CAS-Serverprotokolle, um die Ursache des Fehlers zu ermitteln.
screen.service.error.header=Anwendung ist nicht zur Verwendung von CAS berechtigt
screen.service.error.redirect=Sie sind nicht berechtigt, auf diese Anwendung zuzugreifen. Bitte haben Sie etwas Geduld, da Sie weitergeleitet werden <strong>{0}</strong> um mehr über dieses Szenario zu erfahren.
service.principal.resolution.error=CAS kann den richtigen Authentifizierungsprinzipal nicht ermitteln. Entweder konnte der Principal nicht korrekt als einzelne eindeutige Entität aufgelöst werden, oder CAS hat gemischte/mehrere Kandidaten-Principals gefunden und kann nicht entscheiden, welcher verwendet werden soll. Dieser Fehler kann auch verursacht werden, wenn der authentifizierte Prinzipal aufgrund fehlender Berechtigungen, die in den Autorisierungsrichtlinien des CAS-Servers festgelegt sind, nicht auf die Zielanwendung zugreifen darf.
service.not.authorized.missing.attr=Sie sind nicht berechtigt, auf die Anwendung zuzugreifen, da Ihrem Konto die Berechtigungen fehlen, die der CAS-Server zur Authentifizierung bei diesem Dienst benötigt. Bitte benachrichtigen Sie Ihren Support-Desk.
screen.service.error.message=Die Anwendung, bei der Sie versucht haben, sich zu authentifizieren, ist nicht zur Verwendung von CAS berechtigt. Dies weist in der Regel darauf hin, dass die Anwendung nicht bei CAS registriert ist oder dass ihre im Registrierungsdatensatz definierte Autorisierungsrichtlinie die Nutzung der CAS-Funktionalität verhindert oder dass sie fehlerhaft ist und von CAS nicht erkannt wird. Wenden Sie sich an Ihren CAS-Administrator, um zu erfahren, wie Sie Ihre Anwendung bei CAS registrieren und integrieren können.
screen.service.empty.error.message=Die Diensteregistrierung von CAS ist leer und enthält keine Dienstdefinitionen. Anwendungen, die sich bei CAS authentifizieren möchten, müssen explizit in der Registrierung der Dienste definiert werden.
screen.service.expired.message=Die Anwendung, bei der Sie versucht haben, sich zu authentifizieren, ist in der CAS Service Registry abgelaufen. Sollte dieser Dienst weiterhin genutzt werden, wenden Sie sich bitte an die Dienstadministratoren, um die Anwendung erneuern zu lassen.
