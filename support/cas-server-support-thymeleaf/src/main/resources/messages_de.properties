cas.screen.acct.title=Kontoregistrierung
cas.screen.acct.intro=Bitte füllen Sie das untenstehende Formular aus, um Ihr neues Konto bei CAS zu registrieren. Sobald das Formular abgeschickt wurde, erhalten Sie eine E-Mail mit einem Link zur Kontoaktivierung, um Ihr Konto zu aktivieren, Ihr Passwort einzurichten und mit der Nutzung von CAS zu beginnen.
