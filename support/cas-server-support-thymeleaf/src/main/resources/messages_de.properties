screen.oidc.confirm.claims=Ansprüche
screen.oidc.confirm.scope.profile=Dadurch wird Zugriff auf die Profilansprüche angefordert, mit Ausnahme der Adress- und E-Mail-Ansprüche.
screen.oidc.confirm.scope.email=Dadurch wird Zugriff auf die E-Mail-Ansprüche angefordert.
screen.oidc.confirm.scope.address=Dadurch wird Zugriff auf die Adressansprüche angefordert.
screen.oidc.confirm.scope.openid=Dies weist auf eine OpenID Connect-Autorisierungsanfrage hin.
screen.oidc.confirm.scope.phone=Dadurch wird Zugriff auf die Telefonansprüche beantragt.
screen.oidc.confirm.scope.offline_access=Dadurch wird der Zugriff auf ein Aktualisierungstoken angefordert, das für den Offlinezugriff verwendet wird.
screen.oidc.confirm.claim.name=Der vollständige Name des Endbenutzers in anzeigbarer Form, einschließlich aller Namensteile, möglicherweise einschließlich Titeln und Suffixen, geordnet nach dem Gebietsschema und den Präferenzen des Endbenutzers.
screen.oidc.confirm.claim.given_name=Vorname(n) oder Vorname(n) des Endbenutzers. Beachten Sie, dass Menschen in manchen Kulturen mehrere Vornamen haben können; alle können vorhanden sein, wobei die Namen durch Leerzeichen getrennt werden müssen.
screen.oidc.confirm.claim.middle_name=Zweiter Vorname(n) des Endbenutzers. Beachten Sie, dass Menschen in manchen Kulturen mehrere zweite Vornamen haben können; alle können vorhanden sein, wobei die Namen durch Leerzeichen getrennt werden müssen. Beachten Sie auch, dass in einigen Kulturen keine zweiten Vornamen verwendet werden.
screen.oidc.confirm.claim.family_name=Nachname(n) oder Nachname(n) des Endbenutzers. Beachten Sie, dass Menschen in manchen Kulturen mehrere oder gar keinen Familiennamen haben können. alle können vorhanden sein, wobei die Namen durch Leerzeichen getrennt werden müssen.
screen.oidc.confirm.claim.email=Die bevorzugte E-Mail-Adresse des Endbenutzers.
screen.oidc.confirm.claim.preferred_username=KANN eine beliebige gültige JSON-Zeichenfolge sein, einschließlich Sonderzeichen wie @, / oder Leerzeichen. Der RP DARF NICHT darauf vertrauen, dass dieser Wert eindeutig ist.
screen.oidc.confirm.claim.profile=URL der Profilseite des Endbenutzers. Der Inhalt dieser Webseite SOLLTE sich auf den Endbenutzer beziehen.
screen.oidc.confirm.claim.picture=URL des Profilbilds des Endbenutzers. Diese URL MUSS auf eine Bilddatei (z. B. eine PNG-, JPEG- oder GIF-Bilddatei) verweisen und nicht auf eine Webseite, die ein Bild enthält. Beachten Sie, dass diese URL ausdrücklich auf ein Profilfoto des Endbenutzers verweisen sollte, das zur Anzeige bei der Beschreibung des Endbenutzers geeignet ist, und nicht auf ein willkürlich vom Endbenutzer aufgenommenes Foto.
screen.oidc.confirm.claim.phone_number=Die bevorzugte Telefonnummer des Endbenutzers. Es wird als Format für diesen Anspruch EMPFOHLEN. Zum Beispiel, <code>+1 (425) 555-1212</code> oder <code>+56 (2) 687 2400</code>.
screen.oidc.confirm.asksinfo=Der Kunde bittet um folgende Informationen:
