screen.service.wildcard.message=Diese Anwendung verfügt über keinen dedizierten Registrierungseintrag in der CAS-Dienstregistrierung. Es wird von CAS autorisiert und zugelassen, da in der CAS-Dienstregistrierung ein Dienstdefinitionseintrag mit Platzhalter vorhanden ist, der Authentifizierungsanforderungen von unbekannten Anwendungen wie dieser zulässt und akzeptiert. <p/>Aus Sicherheitsgründen wird dringend empfohlen, die Service-Management-Funktion auf zu beschränken <strong>Fügen Sie nur die Liste der bekannten Anwendungen hinzu</strong> die ausdrücklich zur Nutzung von CAS berechtigt sind. Wenn die Verwaltungsschnittstelle für alle Anwendungen offen bleibt, besteht möglicherweise die Möglichkeit für Sicherheitsangriffe und es wird schwierig, Anwendungsanforderungen und Attributanforderungen zu prüfen.
screen.service.sso.error.header=Für den Zugriff auf diesen Dienst ist eine erneute Authentifizierung erforderlich
