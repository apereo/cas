passwordless.token.header=Token bereitstellen
passwordless.token.description=Bitte geben Sie den Sicherheitstoken an, den Sie per E-Mail, Telefon usw. erhalten haben. Beachten Sie, dass der Token nur für einen kurzen Zeitraum gültig ist und nach der Übermittlung alle anderen Token ungültig werden und entfernt werden.
passwordless.error.failure.title=Authentifizierungsfehler
passwordless.error.failure.description=Das bereitgestellte Token konnte nicht überprüft werden. Möglicherweise wurde es ungültig gemacht, entfernt oder ist abgelaufen.
passwordless.error.unknown.user=Der angegebene Benutzername kann von CAS nicht erkannt und gefunden werden.
passwordless.error.invalid.user=Der angegebene Benutzername enthält nicht genügend Kontaktinformationen.
passwordless.getuser.header=Passwortlose Authentifizierung
passwordless.getuser.description=Bitte geben Sie Ihren Benutzernamen ein, um Ihr Konto zu finden. Sobald Ihr Konto verifiziert ist, wählt CAS die geeignete Authentifizierungsstrategie für Sie aus.
passwordless.selection.header=Authentifizierungsauswahl
passwordless.selection.description=Wählen Sie eine der unten aufgeführten Authentifizierungsoptionen aus, um fortzufahren.
passwordless.selection.password.header=Passwort
passwordless.selection.password.description=Sie können sich mit Ihrem Passwort authentifizieren. Wenn Ihr Konto dafür geeignet ist, werden Sie möglicherweise auch aufgefordert, eine Multifaktor-Authentifizierung durchzuführen.
passwordless.selection.token.header=Token
passwordless.selection.token.description=Sie erhalten von CAS per E-Mail oder SMS einen einmaligen, zeitlich begrenzt gültigen Token und werden aufgefordert, den Code erneut einzugeben, um fortzufahren.
passwordless.selection.mfa.header=Multifaktor
passwordless.selection.mfa.description=Sie werden direkt zu einem Multifaktor-Authentifizierungsablauf weitergeleitet. Sobald Sie den Authentifizierungsschritt abgeschlossen haben, wird der Ablauf automatisch fortgesetzt.
passwordless.selection.delegation.header=Extern
passwordless.selection.delegation.description=Sie werden zur Anmeldung an einen externen Identitätsanbieter weitergeleitet. Sobald Sie den Authentifizierungsvorgang beim externen Identitätsanbieter abgeschlossen haben, werden Sie automatisch zurück zu CAS weitergeleitet, um fortzufahren.
cas.authn.qr.fail=Authentifizierungsanfrage basierend auf QR-Code kann nicht akzeptiert werden. Stellen Sie sicher, dass der QR-Code korrekt gescannt wurde und die Anmeldeinformationen gültig sind, von diesem CAS-Server ausgestellt wurden und nicht abgelaufen sind.
