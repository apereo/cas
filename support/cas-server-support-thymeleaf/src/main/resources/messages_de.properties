screen.service.initial.message=Der Versuch, auf CAS oder die angegebene Zielanwendung zuzugreifen, ist derzeit nicht zulässig. Die Authentifizierungsrichtlinie erfordert, dass Sie Ihre Startanwendung ändern und dann zu anderen Anwendungen und Diensten wechseln.
