cas.mfa.yubikey.register=Ihr Gerät ist noch nicht registriert. Verwenden Sie das folgende Formular, um Ihr Gerät bei CAS zu registrieren.
cas.mfa.yubikey.register.fail=Ihr YubiKey-Gerät konnte nicht für die Authentifizierung registriert werden. Das bereitgestellte Token ist möglicherweise ungültig, abgelaufen oder anderweitig gefährdet.
cas.mfa.yubikey.label.token=Token:
cas.mfa.webauthn.auth.fail=Ihr Gerät konnte nicht zur Authentifizierung überprüft werden. Die bereitgestellten Nutzlasten können ungültig, abgelaufen oder anderweitig gefährdet sein.
cas.mfa.webauthn.register.helptext=Weisen Sie Ihrem FIDO2-fähigen Gerät einen benutzerfreundlichen Namen zu und registrieren Sie es dann bei CAS für die Multifaktor-Authentifizierung. Sobald die Geräteregistrierung erfolgreich abgeschlossen ist, werden Sie automatisch zum nächsten Schritt weitergeleitet, um sich mit Ihrem Gerät anzumelden.
cas.mfa.webauthn.register.wait=Ihr FIDO2-fähiges Gerät ist jetzt bei CAS registriert. Bitte warten…
cas.mfa.webauthn.register.discoverablecredentials=Sie können Ihr Gerät auch über registrieren <i>Auffindbare Anmeldeinformationen/Residentschlüssel</i>. Dies bedeutet, dass der private Schlüssel und die zugehörigen Metadaten im persistenten Speicher des Authentifikators und nicht auf dem CAS-Server gespeichert werden.
