cas.mfa.providerselection.optional.header=Valfri multifaktorautentisering
cas.mfa.providerselection.optional.description=Multifaktorautentisering är konfigurerad att vara valfri, och du kan fortsätta utan att välja en leverantör för att fortsätta.
cas.mfa.providerselection.mfa-duo=Duo Säkerhet
cas.mfa.providerselection.mfa-duo.notes=Duos breda utbud av autentiseringsmetoder gör det möjligt för varje användare att säkert och snabbt logga in. Duo Push, skickat av Duo Mobile-autentiseringsappen, låter användare godkänna push-meddelanden för att verifiera sin identitet.
cas.mfa.providerselection.mfa-webauthn=FIDO2 WebAuthn
cas.mfa.providerselection.mfa-webauthn.notes=WebAuthn är ett API som gör det mycket enkelt för en förlitande part, såsom en webbtjänst, att integrera stark autentisering i applikationer med stöd inbyggt i alla ledande webbläsare och plattformar. 
cas.mfa.providerselection.mfa-gauth=Google Authenticator
cas.mfa.providerselection.mfa-gauth.notes=Google Authenticator är en mjukvarubaserad autentisering som implementerar tvåstegsverifieringstjänster för autentisering av användare av mobilapplikationer av Google.
cas.mfa.providerselection.mfa-simple=CAS Multifactor Authentication
cas.mfa.providerselection.mfa-simple.notes=Tillåt CAS att agera som en multifaktorautentiseringsleverantör på egen hand, utfärda tokens och skicka dem till slutanvändare via fördefinierade kommunikationskanaler som e-post eller textmeddelanden.
cas.mfa.providerselection.mfa-yubikey=YubiKey Multifactor Authentication
cas.mfa.providerselection.mfa-yubikey.notes=Yubico är en molnbaserad tjänst som möjliggör stark, lättanvänd och prisvärd tvåfaktorsautentisering med engångslösenord genom deras flaggskeppsprodukt, YubiKey. 
cas.mfa.duologin.pagetitle=Duo Säkerhetsinloggning
cas.mfa.simple.contact-selection.title=Välj Kontaktinformation
cas.mfa.simple.contact-selection.description=Vi har hittat flera sätt att kontakta dig för ditt konto. Välj det eller de konton där du vill få multifaktorautentiseringstoken.
cas.mfa.simple.pagetitle=CAS Multifactor Authentication Login
cas.mfa.simple.label.token=Token:
cas.mfa.simple.label.resend=Skicka igen
cas.mfa.simple.label.tokensent=En multifaktorautentiseringstoken skickas till dig via e-post eller textmeddelande. Vänligen leta upp token och skicka in den här för att fortsätta. Observera att token kommer att förfalla efter en kort tidsperiod och kommer inte längre att kännas igen av CAS, i så fall kan du be CAS att skicka en ny token till dig.
cas.mfa.simple.label.contactfailed.sms=CAS kan inte använda den valda kontaktinformationen för att skicka ett SMS till dig med multifaktorautentiseringstoken. Vänligen granska din kontaktinformation och kontakta din CAS-administratör för hjälp.
cas.mfa.simple.label.contactfailed.email=CAS kan inte använda den valda kontaktinformationen för att skicka dig ett e-postmeddelande med multifaktorautentiseringstoken. Vänligen granska din kontaktinformation och kontakta din CAS-administratör för hjälp.
cas.mfa.simple.token.failed=Det går inte att acceptera detta multifaktorautentiseringsförsök. Den angivna token är ogiltig.
cas.mfa.simple.registration.title=Kontoregistrering
cas.mfa.simple.registration.description=Ditt konto är inte registrerat för multifaktorautentisering även om det är kvalificerat och krävs av applikationen du försöker komma åt. Snälla <a href="https://account.example.org/mfa">registrera ditt konto</a> för multifaktorautentisering och se till att CAS har tillgång till din kontaktinformation som e-postadress, telefon etc.
cas.mfa.simple.registration.email.failed=Det gick inte att registrera ditt konto för multifaktorautentisering. CAS kan inte känna igen och acceptera din e-postadress för att skicka ett e-postmeddelande med registreringslänken. Vänligen granska din kontaktinformation och kontakta din CAS-administratör för hjälp.
cas.mfa.simple.registration.email.sent=Ett e-postmeddelande med registreringstoken har skickats till dig. Kontrollera din inkorg och tillhandahåll koden här.
cas.mfa.simple.registration.token.failed=Det gick inte att registrera ditt konto för multifaktorautentisering. Den angivna token är ogiltig, har löpt ut eller på annat sätt äventyrad. Granska token och försök igen.
cas.mfa.twilio.pagetitle=Twilio Multifactor Authentication
cas.mfa.twilio.label.token=Token:
cas.mfa.twilio.label.tokensent=En multifaktorautentiseringstoken skickas till dig. Vänligen leta upp token och skicka in den här för att fortsätta.
