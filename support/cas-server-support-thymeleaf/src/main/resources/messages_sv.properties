UNSATISFIED_SAML_REQUEST=SAML-autentiseringsbegäran kan inte förstås, accepteras eller valideras av CAS, troligen på grund av felaktiga eller saknade nödvändiga parametrar. Undersök CAS-serverloggarna för att hitta orsaken till felet.
MISSING_SAML_REQUEST=SAML2-autentiseringsbegäran kan inte fastställas från CAS-sessionsarkivet. Detta innebär vanligtvis att den ursprungliga SAML2-autentiseringsbegäran som skickades till CAS via en SAML2-tjänstleverantör inte kan hämtas och återställas efter ett autentiseringsförsök troligtvis eftersom den underliggande sessionsbutiken antingen tog bort autentiseringsbegäran med kraft eller fastställde att den spårade begäran hade löpt ut och inaktuell, utöver vad policyn för utgångsdatum för sessionsbutiken tillåter. Undersök CAS-serverloggarna för att hitta orsaken till felet.
