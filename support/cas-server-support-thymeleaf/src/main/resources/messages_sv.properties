authenticationFailure.RiskyAuthenticationException=CAS kan inte fortsätta med autentiseringsflödet, troligtvis för att detta autentiseringsförsök bedöms vara riskabelt och misstänkt med en tillräckligt hög riskpoäng över den accepterade tröskeln. Det kan vara så att ditt försök till autentisering är blockerat på grund av att du använder en okänd webbläsare eller att du loggar in från en okänd plats. För ytterligare information och vägledning, kontakta din administratör och/eller helpdesk.
