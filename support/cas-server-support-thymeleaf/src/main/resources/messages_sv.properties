cas.mfa.yubikey.pagetitle=YubiKey-autentisering
cas.mfa.yubikey.authenticate=Använd dina registrerade YubiKey-enheter för att autentisera.
cas.mfa.yubikey.register=Din enhet är inte registrerad ännu. Använd formuläret nedan för att registrera din enhet med CAS.
cas.mfa.yubikey.register.fail=Det gick inte att registrera din YubiKey-enhet för autentisering. Den tillhandahållna token kan vara ogiltig, utgången eller på annat sätt äventyrad.
cas.mfa.yubikey.label.token=Token:
cas.mfa.webauthn.auth.fail=Det gick inte att verifiera din enhet för autentisering. Förutsatt att nyttolaster kan vara ogiltiga, förfallna eller på annat sätt äventyras.
cas.mfa.webauthn.register.helptext=Tilldela ett vänligt namn till din FIDO2-aktiverade enhet och registrera den sedan med CAS för multifaktorautentisering. När enhetsregistreringen har slutförts kommer du automatiskt att omdirigeras till nästa steg för att logga in med din enhet.
cas.mfa.webauthn.register.wait=Din FIDO2-aktiverade enhet är nu registrerad med CAS. Vänligen vänta...
cas.mfa.webauthn.register.discoverablecredentials=Du kan också registrera din enhet med <i>Upptäckbara inloggningsuppgifter / invånarnycklar</i>. Detta innebär att den privata nyckeln och tillhörande metadata lagras i beständigt minne på autentiseringsenheten och inte på CAS-servern.
cas.mfa.registerdevice.label.title=Registrera enhet
cas.mfa.registerdevice.label.intro=Vänligen namnge den aktuella enheten.
cas.mfa.registerdevice.pagetitle=Registrera enhet
cas.mfa.registerdevice.label.name=Namn
cas.mfa.registerdevice.label.duration=Hur länge ska vi komma ihåg den här enheten?
