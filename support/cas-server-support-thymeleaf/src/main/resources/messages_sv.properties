cas.screen.acct.title=Kontoregistrering
cas.screen.acct.intro=Fyll i formuläret nedan för att registrera ditt nya konto hos CAS. När formuläret har skickats kommer du att få ett e-postmeddelande med en länk för kontoaktivering för att aktivera ditt konto, ställa in ditt lösenord och börja använda CAS.
