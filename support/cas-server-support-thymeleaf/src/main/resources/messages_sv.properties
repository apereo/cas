passwordless.token.header=Ge token
passwordless.token.description=Vänligen ange säkerhetstoken som skickas till dig via e-post, telefon, etc. Observera att token endast är giltig under ett kort fönster och vid inlämning kommer alla andra tokens att ogiltigförklaras och tas bort.
passwordless.error.failure.title=Autentiseringsfel
passwordless.error.failure.description=Den angivna tokenen kunde inte verifieras. Den kan ha ogiltigförklarats, tagits bort eller gått ut.
passwordless.error.unknown.user=Det angivna användarnamnet kan inte kännas igen och lokaliseras av CAS.
passwordless.error.invalid.user=Förutsatt att användarnamnet inte innehåller tillräckligt med kontaktinformation.
passwordless.getuser.header=Lösenordslös autentisering
passwordless.getuser.description=Ange ditt användarnamn för att hitta ditt konto. När ditt konto har verifierats kommer CAS att välja lämplig autentiseringsstrategi för dig.
passwordless.selection.header=Val av autentisering
passwordless.selection.description=Välj ett av autentiseringsalternativen nedan för att fortsätta.
passwordless.selection.password.header=Lösenord
passwordless.selection.password.description=Du kan autentisera med ditt lösenord. Du kan också bli ombedd att slutföra ett multifaktorautentiseringsflöde om ditt konto är kvalificerat.
passwordless.selection.token.header=Token
passwordless.selection.token.description=Du kommer att få en engångstoken, giltig under en begränsad tid, via e-post eller SMS från CAS och du kommer att bli ombedd att ange koden tillbaka för att fortsätta.
passwordless.selection.mfa.header=Multifaktor
passwordless.selection.mfa.description=Du kommer att dirigeras direkt till ett multifaktorautentiseringsflöde. När du har slutfört autentiseringssteget kommer flödet att återupptas automatiskt.
passwordless.selection.delegation.header=Externt
passwordless.selection.delegation.description=Du kommer att skickas till en extern identitetsleverantör för att logga in. När du har slutfört autentiseringsflödet med den externa identitetsleverantören kommer du automatiskt att dirigeras tillbaka till CAS för att fortsätta.
cas.authn.qr.fail=Det gick inte att acceptera autentiseringsbegäran baserad på QR-kod. Se till att QR-koden är korrekt skannad och förutsatt att användaruppgifterna är giltiga, utfärdade av denna CAS-server och inte har upphört att gälla.
