cas.mfa.webauthn.auth.fail=Kan uw apparaat niet verifiëren voor authenticatie. De opgegeven payloads kunnen ongeldig, verlopen of anderszins gecompromitteerd zijn.
cas.mfa.webauthn.register.helptext=Wijs een beschrijvende naam toe aan uw FIDO2-apparaat en registreer het vervolgens bij CAS voor multifactor-authenticatie. Zodra de apparaatregistratie succesvol is voltooid, wordt u automatisch doorgestuurd naar de volgende stap om in te loggen met uw apparaat.
