BLOCKED_AUTHN_REQUEST=De authenticatiepoging is geblokkeerd en kan niet doorgaan, waarschijnlijk vanwege een onjuiste indeling of ontbrekende vereiste parameters. Onderzoek de CAS-serverlogboeken om de hoofdoorzaak van de fout te achterhalen.
UNSATISFIED_SAML_REQUEST=Het SAML-authenticatieverzoek kan niet worden begrepen, geaccepteerd of gevalideerd door CAS, waarschijnlijk vanwege onjuiste indeling of ontbrekende vereiste parameters. Controleer de CAS-serverlogboeken om de hoofdoorzaak van de fout te achterhalen.
MISSING_SAML_REQUEST=SAML2-authenticatieverzoek kan niet worden bepaald vanuit het CAS-sessiearchief. Dit betekent doorgaans dat het oorspronkelijke SAML2-authenticatieverzoek dat via een SAML2-serviceprovider bij CAS is ingediend, niet kan worden opgehaald en hersteld na een authenticatiepoging, waarschijnlijk omdat het onderliggende sessiearchief het authenticatieverzoek krachtig heeft verwijderd of heeft vastgesteld dat het bijgehouden verzoek verlopen en verouderd was, buiten wat het verloopbeleid van het sessiearchief toestaat. Controleer de CAS-serverlogboeken om de hoofdoorzaak van de fout te achterhalen.
screen.service.error.header=Applicatie niet geautoriseerd om CAS te gebruiken
