cas.mfa.providerselection.mfa-duo=Duo-beveiliging
cas.mfa.providerselection.mfa-duo.notes=Dankzij de grote verscheidenheid aan authenticatiemethoden van Duo kan elke gebruiker veilig en snel inloggen. Duo Push, verzonden door de Duo Mobile authenticatie-app, stelt gebruikers in staat pushmeldingen goed te keuren om hun identiteit te verifiëren.
cas.mfa.providerselection.mfa-webauthn=FIDO2 WebAuthn
cas.mfa.providerselection.mfa-webauthn.notes=WebAuthn is een API die het voor een vertrouwende partij, zoals een webservice, heel gemakkelijk maakt om sterke authenticatie in applicaties te integreren met behulp van ondersteuning die is ingebouwd in alle toonaangevende browsers en platforms. 
cas.mfa.providerselection.mfa-gauth=Google Authenticator
cas.mfa.providerselection.mfa-gauth.notes=Google Authenticator is een op software gebaseerde authenticator die tweestapsverificatieservices implementeert voor het authenticeren van gebruikers van mobiele applicaties van Google.
cas.mfa.providerselection.mfa-simple=CAS-multifactorauthenticatie
cas.mfa.providerselection.mfa-simple.notes=Laat CAS op zichzelf fungeren als een multifactor-authenticatieprovider, door tokens uit te geven en deze naar eindgebruikers te sturen via vooraf gedefinieerde communicatiekanalen zoals e-mail of sms-berichten.
cas.mfa.providerselection.mfa-yubikey=YubiKey meervoudige authenticatie
cas.mfa.providerselection.mfa-yubikey.notes=Yubico is een cloudgebaseerde service die sterke, gebruiksvriendelijke en betaalbare tweefactorauthenticatie met eenmalige wachtwoorden mogelijk maakt via hun vlaggenschipproduct, YubiKey. 
cas.mfa.duologin.pagetitle=Duo Beveiliging Inloggen
cas.mfa.simple.contact-selection.title=Selecteer Contactgegevens
cas.mfa.simple.contact-selection.description=We hebben meerdere manieren gevonden om contact met u op te nemen voor uw account. Kies de account(s) waar u het multifactorauthenticatietoken wilt ontvangen.
cas.mfa.simple.pagetitle=CAS-multifactorauthenticatie Inloggen
cas.mfa.simple.label.token=Token:
cas.mfa.simple.label.resend=Opnieuw verzenden
cas.mfa.simple.label.tokensent=Er wordt een multifactorauthenticatietoken naar u verzonden via een e-mail of sms. Zoek het token en verzend het hier om door te gaan. Houd er rekening mee dat het token na korte tijd vervalt en niet langer door CAS wordt herkend. In dat geval kunt u CAS vragen om u een nieuw token te sturen.
cas.mfa.simple.label.contactfailed.sms=CAS kan de geselecteerde contactgegevens niet gebruiken om u een sms te sturen met het multifactorauthenticatietoken. Controleer uw contactgegevens en neem voor hulp contact op met uw CAS-beheerder.
cas.mfa.simple.label.contactfailed.email=CAS kan de geselecteerde contactgegevens niet gebruiken om u een e-mail te sturen met het multifactorauthenticatietoken. Controleer uw contactgegevens en neem voor hulp contact op met uw CAS-beheerder.
cas.mfa.simple.token.failed=Kan deze poging tot multifactor-authenticatie niet accepteren. Het opgegeven token is ongeldig.
cas.mfa.simple.registration.title=Accountregistratie
cas.mfa.simple.registration.description=Uw account is niet geregistreerd voor multifactor-authenticatie, ook al komt dit wel in aanmerking en is vereist door de applicatie waartoe u toegang probeert te krijgen. Alsjeblieft <a href="https://account.example.org/mfa">registreer uw account</a> voor meervoudige authenticatie en zorg ervoor dat CAS toegang heeft tot uw contactgegevens, zoals e-mailadres, telefoon, enz.
cas.mfa.simple.registration.email.failed=Kan uw account niet registreren voor meervoudige authenticatie. CAS kan uw e-mailadres niet herkennen en accepteren om u een e-mail met de registratielink te sturen. Controleer uw contactgegevens en neem voor hulp contact op met uw CAS-beheerder.
cas.mfa.simple.registration.email.sent=Er is een e-mail met het registratietoken naar u verzonden. Controleer hier uw inbox en verstrek de code.
cas.mfa.simple.registration.token.failed=Kan uw account niet registreren voor meervoudige authenticatie. Het verstrekte token is ongeldig, verlopen of anderszins aangetast. Controleer het token en probeer het opnieuw.
