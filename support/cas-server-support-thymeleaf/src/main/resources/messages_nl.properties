screen.oidc.confirm.claim.preferred_username=KAN elke geldige JSON-tekenreeks zijn, inclusief speciale tekens zoals @, / of witruimte. De RP MOET er NIET op vertrouwen dat deze waarde uniek is.
screen.oidc.confirm.claim.profile=URL van de profielpagina van de Eindgebruiker. De inhoud van deze webpagina MOET over de eindgebruiker gaan.
