screen.unavailable.header=CAS-fout
screen.unavailable.heading=CAS kan dit verzoek niet verwerken: "{0}:{1}"
screen.unavailable.message=Er is een fout opgetreden bij het voltooien van uw verzoek. <strong>Neem contact op met uw supportdesk of probeer het opnieuw.</strong> <p><div>Apereo is een non-profitorganisatie voor open source softwarebeheer. De CAS-software is een door Apereo gesponsord project en kan door iedereen gratis worden gedownload en gebruikt. Apereo beheert echter niet de systemen van iemand die de software gebruikt en weet in de meeste gevallen niet eens wie de software gebruikt of hoe hij of zij contact met hen kan opnemen, tenzij ze een actief onderdeel zijn van de Apereo-gemeenschap.<br/></br>Als u problemen ondervindt bij het inloggen via CAS, <strong>U dient voor hulp contact op te nemen met het IT-personeel of de helpdesk van uw organisatie</strong>. <br/><br/>Wij zouden willen dat wij u directer konden helpen.</div>
