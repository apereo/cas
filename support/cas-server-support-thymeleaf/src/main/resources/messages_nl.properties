cas.mfa.webauthn.register.discoverablecredentials=U kunt uw apparaat ook registreren via <i>Vindbare inloggegevens/residente sleutels</i>. Dit betekent dat de private sleutel en bijbehorende metadata in het persistente geheugen op de authenticator worden opgeslagen en niet op de CAS-server.
