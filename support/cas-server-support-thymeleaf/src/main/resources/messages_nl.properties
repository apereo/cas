passwordless.token.header=Geef een token op
passwordless.token.description=Geef het beveiligingstoken op dat naar u is verzonden via e-mail, telefoon, enz. Houd er rekening mee dat het token slechts een korte periode geldig is en dat bij indiening alle andere tokens ongeldig worden gemaakt en verwijderd.
passwordless.error.failure.title=Authenticatiefout
passwordless.error.failure.description=Het opgegeven token kan niet worden geverifieerd. Mogelijk is het ongeldig verklaard, verwijderd of verlopen.
passwordless.error.unknown.user=De opgegeven gebruikersnaam kan niet worden herkend en gelokaliseerd door CAS.
