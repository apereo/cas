passwordless.getuser.header=Wachtwoordloze authenticatie
passwordless.getuser.description=Geef uw gebruikersnaam op om uw account te lokaliseren. Zodra uw account is geverifieerd, kiest CAS de juiste authenticatiestrategie voor u.
passwordless.selection.header=Authenticatie selectie
passwordless.selection.description=Selecteer een van de onderstaande authenticatieopties om door te gaan.
passwordless.selection.password.header=Wachtwoord
passwordless.selection.password.description=U kunt zich authenticeren met uw wachtwoord. Mogelijk wordt u ook gevraagd een multifactor-authenticatieproces uit te voeren als uw account hiervoor in aanmerking komt.
passwordless.selection.token.header=Token
passwordless.selection.token.description=U ontvangt een eenmalige token, geldig voor een beperkte periode, via e-mail of sms van CAS en u wordt gevraagd de code opnieuw in te voeren om verder te gaan.
passwordless.selection.mfa.header=Multifactorieel
passwordless.selection.mfa.description=U wordt rechtstreeks doorgestuurd naar een meervoudige authenticatiestroom. Zodra u de authenticatiestap hebt voltooid, wordt de stroom automatisch hervat.
passwordless.selection.delegation.header=Extern
passwordless.selection.delegation.description=U wordt doorgestuurd naar een externe identiteitsprovider om in te loggen. Zodra u de authenticatiestroom bij de externe identiteitsprovider hebt voltooid, wordt u automatisch teruggestuurd naar CAS om door te gaan.
cas.authn.qr.fail=Kan authenticatieverzoek op basis van QR-code niet accepteren. Zorg ervoor dat de QR-code correct is gescand en dat de inloggegevens geldig zijn, zijn uitgegeven door deze CAS-server en niet zijn verlopen.
