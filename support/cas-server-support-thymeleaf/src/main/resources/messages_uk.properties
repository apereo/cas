cas.mfa.providerselection.mfa-duo=Duo Security
cas.mfa.providerselection.mfa-duo.notes=Широкий вибір методів автентифікації Duo дозволяє кожному користувачеві безпечно та швидко входити в систему. Duo Push, який надсилається програмою автентифікації Duo Mobile, дозволяє користувачам схвалювати push-повідомлення для підтвердження своєї особи.
cas.mfa.providerselection.mfa-webauthn=FIDO2 WebAuthn
cas.mfa.providerselection.mfa-webauthn.notes=WebAuthn — це API, який дуже спрощує повіряючу сторону, таку як веб-служба, інтегрувати надійну автентифікацію в програми за допомогою підтримки, вбудованої в усі провідні браузери та платформи. 
cas.mfa.providerselection.mfa-gauth=Google Authenticator
cas.mfa.providerselection.mfa-gauth.notes=Google Authenticator — це програмний автентифікатор, який реалізує служби двоетапної перевірки для автентифікації користувачів мобільних додатків Google.
cas.mfa.providerselection.mfa-simple=Багатофакторна автентифікація CAS
cas.mfa.providerselection.mfa-simple.notes=Дозвольте CAS самостійно діяти як постачальник багатофакторної автентифікації, видаючи токени та надсилаючи їх кінцевим користувачам через попередньо визначені канали зв’язку, такі як електронна пошта або текстові повідомлення.
cas.mfa.providerselection.mfa-yubikey=Багатофакторна автентифікація YubiKey
cas.mfa.providerselection.mfa-yubikey.notes=Yubico — це хмарний сервіс, який забезпечує надійну, просту у використанні та доступну двофакторну автентифікацію за допомогою одноразових паролів через їх флагманський продукт YubiKey. 
cas.mfa.duologin.pagetitle=Duo Security Login
cas.mfa.simple.contact-selection.title=Виберіть Контактна інформація
cas.mfa.simple.contact-selection.description=Ми знайшли кілька способів зв’язатися з вами щодо вашого облікового запису. Будь ласка, виберіть обліковий запис(и), де ви хочете отримати маркер багатофакторної автентифікації.
cas.mfa.simple.pagetitle=Вхід для багатофакторної автентифікації CAS
cas.mfa.simple.label.token=Токен:
cas.mfa.simple.label.resend=Надіслати повторно
cas.mfa.simple.label.tokensent=Маркер багатофакторної автентифікації надсилається вам електронним листом або текстовим повідомленням. Щоб продовжити, знайдіть маркер і надішліть його сюди. Зауважте, що через короткий проміжок часу термін дії токена закінчиться, і CAS більше не розпізнаватиме його. У цьому випадку ви можете попросити CAS надіслати вам новий токен.
cas.mfa.simple.label.contactfailed.sms=CAS не може використати вибрану контактну інформацію, щоб надіслати вам SMS із маркером багатофакторної автентифікації. Перегляньте свою контактну інформацію та зверніться по допомогу до адміністратора CAS.
cas.mfa.simple.label.contactfailed.email=CAS не може використати вибрану контактну інформацію, щоб надіслати вам електронний лист із маркером багатофакторної автентифікації. Перегляньте свою контактну інформацію та зверніться по допомогу до адміністратора CAS.
cas.mfa.simple.token.failed=Неможливо прийняти цю спробу багатофакторної автентифікації. Наданий маркер недійсний.
cas.mfa.simple.registration.title=Реєстрація облікового запису
cas.mfa.simple.registration.description=Ваш обліковий запис не зареєстровано для багатофакторної автентифікації, навіть якщо вона відповідає вимогам і вимагається програмою, до якої ви намагаєтесь отримати доступ. Будь ласка <a href="https://account.example.org/mfa">зареєструйте свій обліковий запис</a> для багатофакторної автентифікації та забезпечення доступу CAS до вашої контактної інформації, такої як адреса електронної пошти, телефон тощо.
cas.mfa.simple.registration.email.failed=Не вдалося зареєструвати ваш обліковий запис для багатофакторної автентифікації. CAS не може розпізнати та прийняти вашу електронну адресу, щоб надіслати вам електронний лист із посиланням для реєстрації. Перегляньте свою контактну інформацію та зверніться по допомогу до адміністратора CAS.
cas.mfa.simple.registration.email.sent=Вам надіслано електронний лист із маркером реєстрації. Будь ласка, перевірте свою поштову скриньку та код постачальника тут.
cas.mfa.simple.registration.token.failed=Не вдалося зареєструвати ваш обліковий запис для багатофакторної автентифікації. Наданий токен недійсний, прострочений або іншим чином скомпрометований. Перегляньте маркер і повторіть спробу.
