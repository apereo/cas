screen.authentication.gauth.delete.title=Видалити зареєстрований обліковий запис
screen.authentication.gauth.delete.desc=Підтвердьте видалення облікового запису, надавши маркер із програми автентифікації на вашому пристрої. Після перевірки токена ваш обліковий запис буде видалено.
screen.authentication.gauth.blocked.title=Заблокована спроба багатофакторної автентифікації
screen.authentication.gauth.blocked.desc=Вашу спробу багатофакторної автентифікації заблоковано. Кількість невдалих спроб автентифікації перевищила максимально допустимий поріг. Перезапустіть спробу автентифікації, і якщо проблема не зникне, зверніться по допомогу до свого адміністратора CAS.
