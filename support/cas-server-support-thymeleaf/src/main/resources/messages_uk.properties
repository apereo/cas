screen.pac4j.authn.SAMLException=Відповідь на автентифікацію, надану CAS зовнішнім постачальником ідентифікаційної інформації, не може бути прийнята. Перегляньте журнали та конфігурацію сервера CAS, щоб знайти першопричину проблеми, а потім повторіть спробу.
