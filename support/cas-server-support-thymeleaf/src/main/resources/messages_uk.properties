screen.oauth.confirm.processing=Ми успішно обробили ваше попереднє рішення про згоду, щоб дозволити клієнтській програмі отримати запитані області. Ніяких дій з вашого боку не потрібно. Вам буде запропоновано дати згоду та знову схвалити запит, якщо будуть потрібні додаткові дані. <p>Поки що зачекайте, поки ми перенаправимо вас до програми...
