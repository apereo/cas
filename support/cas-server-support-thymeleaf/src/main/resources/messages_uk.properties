screen.success.header=Успішний вхід
screen.success.success=ти, <strong>{0}</strong>, успішно ввійшли в Центральну службу автентифікації. Однак ви бачите цю сторінку, оскільки CAS не знає про ваш цільовий пункт призначення та про те, як вас туди дістати. Ще раз перегляньте запит на автентифікацію та переконайтеся, що вказано цільову службу/програму, авторизовану та зареєстровану в CAS.
screen.success.security=Коли ви закінчите, з міркувань безпеки, будь ласка <a href="logout">вийти</a> і закрийте веб-браузер.
screen.logout.confirm.header=ти, <strong>{0}</strong>, хочете повністю вийти?
screen.logout.confirm.header.anonymous=Ви хочете повністю вийти?
screen.logout.confirm.text=<p>Програма могла перенаправити вас до центральної служби автентифікації, щоб повністю вийти з системи та знищити сеанс єдиного входу. Якщо ви вирішите вийти, вас знову попросять надати облікові дані та ввійти знову, коли ви спробуєте отримати доступ до програми.</p>
screen.logout.confirm.proceed=Ви бажаєте продовжити?
screen.logout.header=Вихід успішний
screen.logout.success=Ви успішно вийшли з центральної служби автентифікації. Ви можете <a href="{0}">увійти</a> знову.
screen.logout.fc.success=Ви успішно вийшли з центральної служби автентифікації. Якщо за допомогою CAS увімкнено єдиний вихід із системи, наведено список програм <strong> лише сповіщений</strong> щоб вийти з системи та знищити сеанс користувача. Пам’ятайте, що це лише сповіщення, а не гарантія. Сама програма повинна врахувати ці сповіщення та вжити належних заходів, щоб вийти з системи.
screen.logout.security=З міркувань безпеки закрийте веб-браузер.
screen.logout.pending=Очікується запит на вихід…
screen.service.wildcard.message=Ця програма не має спеціального реєстраційного запису в реєстрі послуг CAS. Це авторизовано та дозволено CAS, оскільки в реєстрі послуг CAS існує запис визначення служби із символом підстановки, який дозволяє та приймає запити автентифікації від невідомих програм, таких як ця. <p/>З міркувань безпеки наполегливо рекомендуємо обмежити засоби керування послугами <strong>включити лише список відомих програм</strong> які мають явний дозвіл на використання CAS. Залишення інтерфейсу керування відкритим для всіх програм може створити можливість для атак на безпеку та ускладнить перевірку вимог програми та потреб атрибутів.
screen.service.sso.error.header=Для доступу до цієї служби потрібна повторна автентифікація
screen.service.sso.error.message=Ви спробували отримати доступ до служби, яка вимагає автентифікації, без повторної автентифікації.  Повторіть спробу автентифікації</a>.
screen.service.required.message=Ви спробували автентифікацію, не вказавши цільову програму. Перегляньте запит і повторіть спробу.
screen.service.initial.message=Спроба доступу до CAS або вказаної цільової програми наразі заборонена. Політика автентифікації вимагає, щоб ви змінили початкову програму, а потім перейшли до інших програм і служб.
captchaError=Помилка перевірки reCAPTCHA.
username.required=Ім'я користувача є обов'язковим для заповнення.
password.required=Пароль є обов'язковим полем.
source.required=Джерело автентифікації є обов’язковим для заповнення.
confirmedPassword.required=Пароль має бути підтверджений.
pm.passwordsMustMatch=Надані паролі не збігаються.
pm.passwordFailedCriteria=Наданий пароль не відповідає політиці безпеки паролів. Спробуйте ще раз.
pm.updateFailure=Не вдалося змінити пароль облікового запису. Спробуйте ще раз.
authenticationFailure.AccountDisabledException=Цей обліковий запис вимкнено.
authenticationFailure.AccountLockedException=Цей обліковий запис заблоковано.
authenticationFailure.AccountExpiredException=Термін дії цього облікового запису закінчився, і наразі в нього заборонено входити.
authenticationFailure.CredentialExpiredException=Термін дії вашого пароля закінчився.
authenticationFailure.InvalidLoginLocationException=Ви не можете увійти з цієї робочої станції.
authenticationFailure.UniquePrincipalRequiredException=Ви не можете ввійти в цей час, оскільки у вас є ще один активний сеанс єдиного входу, а CAS налаштовано з політикою автентифікації, яка запобігає кільком одночасним сеансам єдиного входу.
authenticationFailure.InvalidLoginTimeException=Ваш обліковий запис заборонено входити в цей час.
authenticationFailure.AccountNotFoundException=Ваш обліковий запис не розпізнано, і зараз ви не можете ввійти.
authenticationFailure.FailedLoginException=Спроба автентифікації не вдалася, ймовірно, через недійсні облікові дані. Перевірте та повторіть спробу.
authenticationFailure.MultifactorAuthenticationProviderAbsentException=Неможливо задовольнити вимоги багатофакторної автентифікації. Ваш обліковий запис налаштовано на стратегію багатофакторної автентифікації, але CAS не може знайти та виконати цю стратегію, швидше за все, через неправильну конфігурацію сервера. Зверніться за допомогою до адміністраторів сервісу.
authenticationFailure.SurrogateAuthenticationException=Наразі ви не маєте права видавати себе за вказаного користувача.
authenticationFailure.AccountPasswordMustChangeException=Термін дії пароля вашого облікового запису минув і його потрібно змінити.
authenticationFailure.UnauthorizedServiceForPrincipalException=У доступі до служби відмовлено через відсутність привілеїв.
authenticationFailure.MultifactorAuthenticationRequiredException=Спробу автентифікації для вашого облікового запису відхилено, оскільки ваш обліковий запис ще не налаштовано для проходження багатофакторної автентифікації. Зверніться по допомогу до адміністраторів служби, переконайтеся, що ваш обліковий запис зареєстровано та відповідає вимогам для багатофакторної автентифікації, і повторіть спробу.
authenticationFailure.MultifactorAuthenticationFailedException=Спроба багатофакторної автентифікації не вдалася, ймовірно, через недійсні облікові дані багатофакторної автентифікації. Перевірте та повторіть спробу.
authenticationFailure.RiskyAuthenticationException=CAS не може продовжити процес автентифікації, ймовірно, через те, що ця спроба автентифікації вважається ризикованою та підозрілою з достатньо високим показником ризику, що перевищує прийнятний поріг. Можливо, ваша спроба автентифікації заблокована через те, що ви використовуєте невідомий веб-браузер або ви входите в систему з невідомого місця. Щоб отримати додаткову інформацію та вказівки, зверніться до свого адміністратора та/або служби підтримки.
authenticationFailure.UNKNOWN=Невдала спроба автентифікації.
authenticationFailure.AuthenticationException=Облікові дані відхилено/недійсні, спроба автентифікації не вдалася.
INVALID_REQUEST_PROXY=Запит неправильно відформатований. Переконайтеся, що всі необхідні параметри правильно закодовані та включені.
INVALID_TICKET_SPEC=Не вдалося перевірити специфікацію квитка. Можливі помилки можуть включати спробу перевірити проксі-квиток за допомогою валідатора сервісного квитка або невиконання запиту `renew=true`.
INVALID_REQUEST=Не вдається ідентифікувати, авторизувати або завершити цей запит, ймовірно, через невірний формат або відсутність необхідних параметрів.
INVALID_AUTHENTICATION_CONTEXT=Запит перевірки для [''{0}''] не може бути задоволений. Запит не розпізнано або не виконано.
INVALID_TICKET=квиток ''{0}'' не розпізнано
INVALID_PROXY_GRANTING_TICKET=PGT вже створено для цього ST. Не можна надати більше одного PGT для ST
INVALID_SERVICE=квиток ''{0}'' не відповідає наданій послузі. Початкова послуга була ''{1}'' і надана послуга була ''{2}''.
INVALID_PROXY_CALLBACK=Надана URL-адреса зворотного виклику проксі ''{0}'' не вдалося автентифікувати. Або ''{0}'' недоступний, або не дозволено здійснювати автентифікацію проксі.
UNAUTHORIZED_SERVICE_PROXY=Послуга, що надається ''{0}'' не авторизовано використовувати автентифікацію проксі CAS.
UNSATISFIED_AUTHN_POLICY=У доступі до служби відмовлено через невідповідну політику автентифікації.
INVALID_AUTHN_REQUEST=Спроба автентифікації не вдалася, ймовірно, через недійсні облікові дані.
BLOCKED_AUTHN_REQUEST=Спроба автентифікації заблокована та не може продовжитися, ймовірно, через неправильний формат або відсутність необхідних параметрів. Перегляньте журнали сервера CAS, щоб знайти основну причину помилки.
UNSATISFIED_SAML_REQUEST=Запит на автентифікацію SAML не може бути зрозумілий, прийнятий або підтверджений CAS, ймовірно, через невірний формат або відсутність необхідних параметрів. Перегляньте журнали сервера CAS, щоб знайти основну причину помилки.
MISSING_SAML_REQUEST=Запит на автентифікацію SAML2 не можна визначити зі сховища сеансів CAS. Зазвичай це означає, що оригінальний запит на автентифікацію SAML2, який було надіслано до CAS через постачальника послуг SAML2, не можна отримати та відновити після спроби автентифікації, ймовірно, через те, що базове сховище сеансів або примусово видалило запит на автентифікацію, або визначило, що термін дії відстежуваного запиту закінчився та застарів, що перевищує те, що дозволяє політика терміну дії сховища сеансів. Перегляньте журнали сервера CAS, щоб знайти основну причину помилки.
screen.service.error.header=Програма не авторизована для використання CAS
screen.service.error.redirect=Ви не авторизовані для доступу до цієї програми. Будь ласка, будьте терплячими, оскільки вас збираються перенаправити <strong>{0}</strong> щоб дізнатися більше про цей сценарій.
service.principal.resolution.error=CAS не може визначити правильний принципал автентифікації. Або принципала не вдалося правильно розпізнати як єдину унікальну сутність, або CAS знайшов змішані/кілька кандидатів-принципалів і не може вирішити, який слід використовувати. Ця помилка також може виникнути, якщо автентифікованому принципалу не дозволено доступ до цільової програми через відсутність привілеїв, встановлених політикою авторизації сервера CAS.
service.not.authorized.missing.attr=Ви не авторизовані для доступу до програми, оскільки ваш обліковий запис не має привілеїв, необхідних серверу CAS для автентифікації в цій службі. Будь ласка, повідомте свою службу підтримки.
screen.service.error.message=Програма, у якій ви намагалися автентифікуватися, не має права використовувати CAS. Зазвичай це означає, що програму не зареєстровано в CAS, або її політика авторизації, визначена в її реєстраційному записі, не дозволяє їй використовувати функції CAS, або вона неправильно сформована та не розпізнається CAS. Зверніться до свого адміністратора CAS, щоб дізнатися, як ви можете зареєструвати та інтегрувати свою програму з CAS.
screen.service.empty.error.message=Реєстр послуг CAS порожній і не містить визначень послуг. Програми, які бажають автентифікуватися за допомогою CAS, мають бути явно визначені в реєстрі служб.
screen.service.expired.message=Програма, яку ви намагалися автентифікувати, закінчилася в реєстрі послуг CAS. Якщо ця послуга продовжує використовуватися, зверніться до адміністраторів служби, щоб поновити заявку.
screen.surrogates.account.selection.header=Вибір облікового запису під імітацією
screen.surrogates.choose.account=Виберіть обліковий запис
screen.surrogates.message=<p>Вам надається список облікових записів, від імені яких вам дозволено автентифікуватися.</p> <p>Виберіть один і продовжуйте.</p>
screen.surrogates.button.cancel=Скасувати
screen.surrogates.account.selection.error=Наразі ви не маєте права видавати себе за вказаного користувача.
screen.surrogates.wildcard.title=Вибір облікового запису під імітацією 
screen.surrogates.wildcard.description=CAS внутрішньо розпізнає ваш обліковий запис як обліковий запис зі спеціальними дозволами, дозволеним видавати себе за всіх користувачів і облікові записи. Тому для вашого облікового запису заборонено вибирати обліковий запис під імітацією. Натомість ви можете безпосередньо перейти до входу та видати себе за будь-який інший обліковий запис, використовуючи його ім’я користувача.
screen.browserstorage.failure.title=Не вдається перейти до наступного кроку.
screen.browserstorage.failure.message=Імовірно, Storage API не підтримується або недоступний у вашому браузері. Механізм зберігання має бути налаштований на використання сховища на стороні сервера. Зверніться по допомогу до ІТ-персоналу вашої організації.
password.expiration.warning=Ваш пароль діє через {0} день (дні). Будь ласка <a href="https://pm.example.edu">змінити пароль</a> зараз.
password.expiration.loginsRemaining=Ви маєте {0} логіни, що залишилися перед вами <strong>ПОВИНЕН</strong> змінити пароль.
screen.accountdisabled.heading=Цей обліковий запис вимкнено.
screen.accountdisabled.message=Щоб відновити доступ, зверніться до системного адміністратора.
screen.accountlocked.heading=Цей обліковий запис заблоковано.
screen.accountlocked.message=Щоб відновити доступ, зверніться до системного адміністратора.
screen.expiredpass.heading=Привіт, {0}. Термін дії вашого пароля закінчився.
screen.expiredpass.message=Будь ласка <a href="{0}">змінити пароль</a>.
screen.mustchangepass.heading=Привіт, {0}. Ви повинні змінити свій пароль.
screen.mustchangepass.message=Будь ласка <a href="{0}">змінити пароль</a>.
screen.badhours.heading=Ваш обліковий запис заборонено входити в цей час.
