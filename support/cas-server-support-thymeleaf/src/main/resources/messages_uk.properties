screen.authentication.webauthn.login.desc=Для входу використовуйте зареєстрований пристрій із підтримкою FIDO2. Щоб успішно виконати цю дію, ваше ім’я користувача та пристрій уже мають бути зареєстровані в CAS.
screen.authentication.webauthn.authn.fail.title=Помилка автентифікації
screen.authentication.webauthn.authn.fail.desc=Спроба автентифікації не вдалася. Переконайтеся, що ваше ім’я користувача та вибраний пристрій зареєстровано в CAS. Перевірте журнали сервера CAS, щоб визначити основну причину помилки. 
screen.authentication.webauthn.qr.success.title=Успішна автентифікація
screen.authentication.webauthn.qr.success.desc=Тепер ви успішно пройшли автентифікацію за допомогою пристрою з підтримкою FIDO2. Тепер CAS автоматично розпізнає вашу спробу автентифікації та перейде до наступного кроку. Ви можете закрити це вікно та повернутися до вихідного екрана.
screen.authentication.webauthn.qr.fail.title=Помилка автентифікації
screen.authentication.webauthn.qr.fail.desc=Спроба автентифікації не вдалася. Переконайтеся, що ваше ім’я користувача та вибраний пристрій зареєстровано в CAS, і перевірте журнали сервера CAS, щоб визначити основну причину помилки. Подальші спроби автентифікації будуть заблоковані. Не оновлюйте вікно, а спробуйте перезапустити процес автентифікації.
screen.authentication.webauthn.qr.info=Якщо у вас немає пристрою з підтримкою FIDO або цей пристрій не зареєстровано в CAS, ви можете відсканувати QR-код нижче та пройти автентифікацію за допомогою іншого (мобільного) пристрою. Після успішної автентифікації ви автоматично перейдете до наступного кроку.
