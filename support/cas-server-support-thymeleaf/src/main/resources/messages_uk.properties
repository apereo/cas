OAUTH_BAD_SESSION_REQUEST=Запит OAuth не може бути виконано, оскільки CAS не може знайти або визначити URL-адресу переспрямування OAuth. Зазвичай це вказує на застарілий або невідповідний запит, де ідентифікатор сеансу обробленого запиту відрізняється від активного сеансу, і це може бути спричинено повним виходом із системи. Очистіть файли cookie та історію, перезапустіть браузер і повторіть спробу.
screen.oidc.confirm.ciba.header=Запит автентифікації зворотного каналу
screen.oidc.confirm.ciba.confirmed=Запит на автентифікацію зворотного каналу тепер підтверджено. Не оновлюйте це вікно. Натомість закрийте це вікно веб-переглядача та перевірте пристрій, щоб отримати подальші інструкції.
screen.oidc.confirm.ciba.failed=Не вдалося підтвердити запит автентифікації зворотного каналу. Будь ласка, перевірте журнали сервера та зверніться до свого адміністратора CAS для отримання додаткової інформації.
OIDC_CIBA_BAD_REQUEST=Помилка запиту автентифікації зворотного каналу.
screen.oidc.confirm.bindingmessage.header=Обов'язкове повідомлення
screen.oidc.confirm.bindingmessage.description=Зрозумілий ідентифікатор або повідомлення, призначене для відображення як на пристрої споживання, так і на пристрої автентифікації, щоб з’єднати їх разом для транзакції за допомогою візуальної підказки для кінцевого користувача. Це блокуюче повідомлення дозволяє кінцевому користувачеві переконатися, що дія, виконана на пристрої автентифікації, пов’язана із запитом, ініційованим пристроєм споживання.
screen.oidc.confirm.usercode.header=Код користувача
screen.oidc.confirm.usercode.description=Секретний код, наприклад пароль або PIN-код, відомий лише користувачеві, але який можна перевірити за допомогою CAS. Код використовується для авторизації надсилання запиту автентифікації на пристрій автентифікації користувача.
screen.oidc.confirm.infourl=Дізнайтеся більше про {0}.
screen.oidc.confirm.privacyurl=Дізнайтеся про {0} правила конфіденційності.
screen.oidc.confirm.scopes=Області застосування
screen.oidc.confirm.claims=Претензії
screen.oidc.confirm.scope.profile=Це запитує доступ до претензій профілю, за винятком претензій щодо адреси та електронної пошти.
screen.oidc.confirm.scope.email=Це запитує доступ до електронних претензій.
screen.oidc.confirm.scope.address=Це запитує доступ до претензій на адресу.
screen.oidc.confirm.scope.openid=Це вказує на запит авторизації OpenID Connect.
screen.oidc.confirm.scope.phone=Це вимагає доступу до телефонних претензій.
screen.oidc.confirm.scope.offline_access=Це запитує доступ до маркера оновлення, який використовується для офлайн-доступу.
screen.oidc.confirm.claim.name=Повне ім’я кінцевого користувача у формі для відображення, включно з усіма частинами імені, можливо, включаючи заголовки та суфікси, упорядковані відповідно до мови та вподобань кінцевого користувача.
screen.oidc.confirm.claim.given_name=Ім’я (імена) або ім’я (імена) Кінцевого користувача. Зверніть увагу, що в деяких культурах люди можуть мати кілька імен; всі можуть бути присутніми, імена розділяються пробілами.
screen.oidc.confirm.claim.middle_name=По батькові Кінцевого користувача. Зверніть увагу, що в деяких культурах люди можуть мати кілька імен по батькові; всі можуть бути присутніми, імена розділяються пробілами. Також зауважте, що в деяких культурах не використовуються імена по батькові.
screen.oidc.confirm.claim.family_name=Прізвище (і) або прізвище (імена) Кінцевого користувача. Зауважте, що в деяких культурах люди можуть мати кілька прізвищ або не мати прізвища; всі можуть бути присутніми, імена розділяються пробілами.
screen.oidc.confirm.claim.email=Бажана адреса електронної пошти кінцевого користувача.
screen.oidc.confirm.claim.preferred_username=МОЖЕ бути будь-який дійсний рядок JSON, включаючи спеціальні символи, такі як @, / або пробіли. RP НЕ ПОВИНЕН покладатися на унікальність цього значення.
screen.oidc.confirm.claim.profile=URL-адреса сторінки профілю Кінцевого користувача. Вміст цієї веб-сторінки ПОВИНЕН стосуватися Кінцевого користувача.
screen.oidc.confirm.claim.picture=URL-адреса зображення профілю Кінцевого користувача. Ця URL-адреса ПОВИННА посилатися на файл зображення (наприклад, файл зображення PNG, JPEG або GIF), а не на веб-сторінку, що містить зображення. Зауважте, що ця URL-адреса ПОВИННА конкретно посилатися на фотографію профілю Кінцевого користувача, яка підходить для відображення під час опису Кінцевого користувача, а не на довільну фотографію, зроблену Кінцевим користувачем.
screen.oidc.confirm.claim.phone_number=Бажаний номер телефону кінцевого користувача. РЕКОМЕНДУЄТЬСЯ як формат цієї претензії. Наприклад, <code>+1 (425) 555-1212</code> або <code>+56 (2) 687 2400</code>.
screen.oidc.confirm.asksinfo=Клієнт просить надати наступну інформацію:
screen.oidc.confirm.dynamic=Цей клієнт був динамічно зареєстрований на <code>{0}</code>.
screen.oidc.issuer.invalid=URL-адреса емітента недійсна та не відповідає URL-адресі емітента сервера CAS.
