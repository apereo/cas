cas.screen.acct.intro=Будь ласка, заповніть форму нижче, щоб зареєструвати свій новий обліковий запис у CAS. Після надсилання форми ви отримаєте електронний лист із посиланням для активації облікового запису, щоб увімкнути обліковий запис, встановити пароль і почати використовувати CAS.
cas.screen.acct.infosent=Інструкції щодо активації облікового запису успішно надіслано. Перевірте свою електронну пошту тощо та дотримуйтесь інструкцій.
cas.screen.acct.intro.complete=Ласкаво просимо назад! Дякуємо за підтвердження вашого облікового запису. Будь ласка, заповніть форму нижче, щоб зареєструвати свій новий обліковий запис у CAS. 
cas.screen.acct.intro.completed=дякую! Тепер ваш обліковий запис активовано та зареєстровано в CAS.
