cas.mfa.yubikey.pagetitle=Аутентифікація YubiKey
cas.mfa.yubikey.authenticate=Використовуйте зареєстровані пристрої YubiKey для автентифікації.
cas.mfa.yubikey.register=Ваш пристрій ще не зареєстровано. Використовуйте форму нижче, щоб зареєструвати свій пристрій у CAS.
cas.mfa.yubikey.register.fail=Не вдалося зареєструвати ваш пристрій YubiKey для автентифікації. Наданий токен може бути недійсним, простроченим або скомпрометованим іншим чином.
cas.mfa.yubikey.label.token=Токен:
cas.mfa.webauthn.auth.fail=Не вдалося перевірити ваш пристрій для автентифікації. Надані корисні дані можуть бути недійсними, простроченими або іншим чином скомпрометованими.
cas.mfa.webauthn.register.helptext=Призначте зрозуміле ім’я своєму пристрою з підтримкою FIDO2, а потім зареєструйте його в CAS для багатофакторної автентифікації. Після успішного завершення реєстрації пристрою ви будете автоматично перенаправлені до наступного кроку для входу за допомогою свого пристрою.
cas.mfa.webauthn.register.wait=Ваш пристрій із підтримкою FIDO2 тепер зареєстровано в CAS. Будь ласка, зачекайте…
cas.mfa.webauthn.register.discoverablecredentials=Ви також можете зареєструвати свій пристрій за допомогою <i>Виявлені облікові дані / Резидентні ключі</i>. Це означає, що приватний ключ і пов’язані метадані зберігаються в постійній пам’яті на автентифікаторі, а не на сервері CAS.
