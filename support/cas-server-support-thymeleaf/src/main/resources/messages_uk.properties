passwordless.token.header=Надайте маркер
passwordless.token.description=Будь ласка, надайте токен безпеки, надісланий вам електронною поштою, телефоном тощо. Зауважте, що токен дійсний лише протягом короткого періоду, і після надсилання всі інші токени будуть визнані недійсними та видалені.
passwordless.error.failure.title=Помилка автентифікації
passwordless.error.failure.description=Не вдалося перевірити наданий маркер. Можливо, його було визнано недійсним, вилучено або прострочено.
passwordless.error.unknown.user=CAS не може розпізнати та знайти надане ім’я користувача.
passwordless.error.invalid.user=У наданому імені користувача недостатньо контактної інформації.
passwordless.getuser.header=Автентифікація без пароля
passwordless.getuser.description=Будь ласка, введіть своє ім'я користувача, щоб знайти свій обліковий запис. Після підтвердження вашого облікового запису CAS вибере для вас відповідну стратегію автентифікації.
passwordless.selection.header=Вибір автентифікації
passwordless.selection.description=Щоб продовжити, виберіть один із наведених нижче варіантів автентифікації.
passwordless.selection.password.header=Пароль
passwordless.selection.password.description=Ви можете авторизуватися за допомогою свого пароля. Вас також можуть попросити пройти багатофакторну автентифікацію, якщо ваш обліковий запис відповідає вимогам.
passwordless.selection.token.header=Токен
passwordless.selection.token.description=Ви отримаєте одноразовий маркер, дійсний протягом обмеженого періоду часу, електронною поштою або SMS від CAS, і вам буде запропоновано ввести код назад, щоб продовжити.
passwordless.selection.mfa.header=Багатофакторність
passwordless.selection.mfa.description=Ви будете напряму спрямовані до потоку багатофакторної автентифікації. Після завершення етапу автентифікації потік автоматично відновиться.
passwordless.selection.delegation.header=зовнішній
passwordless.selection.delegation.description=Вас буде направлено до зовнішнього постачальника ідентифікаційної інформації для входу. Щойно ви завершите процес автентифікації за допомогою зовнішнього постачальника ідентифікаційної інформації, вас буде автоматично скеровано назад до CAS, щоб продовжити.
cas.authn.qr.fail=Неможливо прийняти запит на автентифікацію на основі QR-коду. Переконайтеся, що QR-код правильно відскановано, а надані облікові дані дійсні, видані цим сервером CAS і термін їх дії не минув.
