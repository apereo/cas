screen.samlidp.error.description=Служба, до якої ви намагаєтесь увійти, виявила проблему з вашим профілем або запитом. Будь ласка, зверніться до служби підтримки IT.
screen.unavailable.header=Помилка CAS
screen.unavailable.heading=CAS не може обробити цей запит: "{0}:{1}"
screen.unavailable.message=Під час виконання вашого запиту сталася помилка. <strong>Будь ласка, повідомте свою службу підтримки або повторіть спробу.</strong> <p><div>Apereo — це некомерційна організація з управління програмним забезпеченням з відкритим кодом. Програмне забезпечення CAS є проектом, спонсорованим Apereo, і його можна безкоштовно завантажити та використовувати будь-хто. Однак Apereo не керує системами тих, хто використовує програмне забезпечення, і в більшості випадків навіть не знає, хто ним користується або як з ними зв’язатися, якщо вони не є активною частиною спільноти Apereo.<br/></br>Якщо у вас виникли проблеми з входом за допомогою CAS, <strong>вам потрібно буде звернутися за допомогою до ІТ-персоналу або служби підтримки вашої організації</strong>. <br/><br/>Ми бажаємо, щоб ми могли допомогти вам безпосередньо.</div>
