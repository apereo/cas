apply plugin: "org.apereo.cas.project-conventions"

description = "Loads CAS configuration from HashiCorp Vault so settings can be managed outside the application package."
ext {
    publishMetadata = true
    projectMetadata = [
            category: "Configuration Management",
            title: "Configuration Management via HashiCorp Vault"
    ]
}
dependencies {
    implementation libraries.springcloudvault
    implementation libraries.springcloudbootstrap

    compileOnly project(":core:cas-server-core-configuration")
}
