apply plugin: "org.apereo.cas.project-conventions"

description = "Reports CAS distributed traces to Zipkin for request observability."
ext {
    publishMetadata = true
    projectMetadata = [
            category: "Tracing",
            title: "Apereo CAS Zipkin Tracing",
            aliases: ["tracingbrave", "zipkin"]
    ]
}
dependencies {
    implementation project(":support:cas-server-support-metrics")

    implementation libraries.metrics
    implementation libraries.tracingbrave
}
