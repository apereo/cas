apply plugin: "org.apereo.cas.project-conventions"

description = "Adds Hazelcast discovery support for Hazelcast clusters."
ext {
    publishMetadata = true
    projectMetadata = [
            category: "Hazelcast Discovery",
            title: "Hazelcast Discovery via AWS"
    ]
}
dependencies {
    implementation libraries.hazelcast
    implementation project(":support:cas-server-support-hazelcast-core")
    implementation project(":core:cas-server-core-util-api")
    implementation project(":core:cas-server-core-configuration-api")

    testImplementation project(path: ":core:cas-server-core-util-api", configuration: "tests")
    testImplementation project(path: ":core:cas-server-core-authentication-api", configuration: "tests")
}
