apply plugin: "org.apereo.cas.project-conventions"

description = "Publishes OpenAPI and Swagger UI documentation for CAS REST endpoints."
ext {
    publishMetadata = true
    projectMetadata = [
            category: "REST Protocol",
            title: "Swagger UI",
            aliases: ["swagger"]
    ]
}
dependencies {
    api libraries.swagger
    implementation libraries.springdoc

    implementation project(":core:cas-server-core-util-api")
    implementation project(":core:cas-server-core-web-api")
    
    testImplementation project(":core:cas-server-core-util")
    testImplementation project(":core:cas-server-core-scripting")

    testImplementation project(path: ":core:cas-server-core-webflow", configuration: "tests")
    testImplementation project(path: ":core:cas-server-core", configuration: "tests")
    testImplementation project(path: ":core:cas-server-core-services", configuration: "tests")
    testImplementation project(path: ":core:cas-server-core-authentication", configuration: "tests")
    testImplementation project(path: ":core:cas-server-core-authentication-api", configuration: "tests")
    testImplementation project(path: ":core:cas-server-core-util", configuration: "tests")
    testImplementation project(path: ":core:cas-server-core-util-api", configuration: "tests")
}
